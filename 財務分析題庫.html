<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>財務分析題庫</title>
<style>
  :root{
    --bg:#f4f6f8; --card:#ffffff; --text:#1f2733; --muted:#6b7684;
    --primary:#2f6feb; --primary-dark:#1d4fb0; --green:#1f9d55; --red:#d93025;
    --amber:#e0a418; --border:#e2e6ea; --radius:12px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);}
  #app{max-width:760px;margin:0 auto;padding:12px 14px 60px;}
  h1{font-size:20px;text-align:center;margin:10px 0 14px;}
  .tabs{display:flex;gap:8px;margin-bottom:12px;}
  .tab-btn{flex:1;padding:10px;border:1px solid var(--border);background:var(--card);border-radius:var(--radius);font-size:15px;cursor:pointer;color:var(--muted);}
  .tab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  .panel{display:none;}
  .panel.active{display:block;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .btn{padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text);font-size:14px;cursor:pointer;}
  .btn:active{transform:scale(0.98);}
  .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);}
  .btn.small{padding:5px 9px;font-size:12px;}
  .btn.on{background:var(--primary);color:#fff;border-color:var(--primary);}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .btn.danger-confirm{background:var(--red);color:#fff;border-color:var(--red);}
  select,input[type=number]{padding:7px;border-radius:8px;border:1px solid var(--border);font-size:14px;}
  .meta-bar{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);margin:8px 0;flex-wrap:wrap;gap:6px;}
  .progress-track{height:6px;background:#e6e9ed;border-radius:4px;overflow:hidden;margin-top:4px;}
  .progress-fill{height:100%;background:var(--primary);}
  .q-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .q-num{font-size:12px;color:var(--muted);margin-bottom:4px;}
  .q-stem{font-size:16px;line-height:1.55;margin:4px 0 12px;white-space:pre-wrap;}
  .heart{font-size:22px;cursor:pointer;user-select:none;line-height:1;background:none;border:none;padding:0 2px;}
  .heart.active{filter:none;}
  .opt{display:block;width:100%;text-align:left;padding:11px 12px;margin:7px 0;border:1px solid var(--border);border-radius:10px;background:#fbfbfc;font-size:15px;cursor:pointer;line-height:1.4;}
  .opt:active{transform:scale(0.99);}
  .opt.correct{background:#e6f6ea;border-color:var(--green);color:#166534;}
  .opt.wrong{background:#fdeceb;border-color:var(--red);color:#a01a12;}
  .opt.disabled{cursor:default;}
  .explain{margin-top:12px;padding:11px 12px;background:#f6f8fb;border-left:3px solid var(--primary);border-radius:6px;font-size:14px;line-height:1.6;white-space:pre-wrap;display:none;}
  .explain.show{display:block;}
  .toolbar{display:flex;justify-content:space-between;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .jump-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .jump-row input{width:64px;}
  .filter-row .btn{flex:1;}
  .hint{font-size:12px;color:var(--muted);margin-top:2px;}
  .setup-grid{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
  .stat-box{font-size:13px;color:var(--muted);}
  .grad-badge{display:inline-block;padding:2px 8px;border-radius:10px;background:#eef2ff;color:var(--primary-dark);font-size:12px;margin-left:6px;}
  .empty-msg{text-align:center;padding:30px 10px;color:var(--muted);font-size:15px;}
  .edit-badge{display:inline-block;padding:2px 8px;border-radius:10px;background:#fff3e0;color:#b06a00;font-size:12px;margin-left:6px;}
  .edit-field-label{font-size:12px;color:var(--muted);margin:10px 0 4px;}
  .edit-field-label:first-child{margin-top:0;}
  .edit-input, .edit-textarea{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;line-height:1.5;}
  .edit-textarea{resize:vertical;min-height:64px;}
  .edit-opt-row{display:flex;align-items:center;gap:8px;margin:6px 0;}
  .edit-opt-row input[type=radio]{width:18px;height:18px;flex-shrink:0;}
  .edit-opt-row .edit-input{flex:1;}
  .edit-toolbar{display:flex;justify-content:space-between;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .btn.edit-toggle{margin-left:6px;}
  footer{text-align:center;font-size:11px;color:#aab1ba;margin-top:20px;}
  @media (max-width:600px){
    #app{padding:8px 8px 40px;}
    h1{font-size:17px;margin:6px 0 10px;}
    .card{padding:10px;border-radius:9px;margin-bottom:8px;}
    .q-stem{font-size:14.5px;margin:2px 0 8px;}
    .opt{padding:9px 10px;margin:5px 0;font-size:14px;}
    .explain{padding:9px 10px;font-size:13px;}
    .btn{padding:7px 10px;font-size:13px;}
    .tab-btn{padding:8px;font-size:14px;}
    .meta-bar{font-size:12px;}
  }
</style>
</head>
<body>
<div id="app">
  <h1>財務分析題庫</h1>
  <div class="tabs">
    <button class="tab-btn active" id="tabTestBtn">測驗模式</button>
    <button class="tab-btn" id="tabReviewBtn">闖關複習模式</button>
  </div>

  <!-- ================= 測驗模式 ================= -->
  <div class="panel active" id="panelTest">
    <div class="card">
      <div class="row jump-row">
        <select id="jumpChapter"></select>
        <input type="number" id="jumpNum" min="1" placeholder="題號">
        <button class="btn" id="jumpGoBtn">跳題</button>
      </div>
      <div class="row filter-row" style="margin-top:8px;">
        <button class="btn" id="filterAllBtn">全部</button>
        <button class="btn" id="filterWrongBtn">錯題+收藏</button>
        <button class="btn" id="filterFavBtn">收藏</button>
      </div>
      <div class="row" style="margin-top:8px;">
        <button class="btn" id="orderBtn">循環：依序</button>
        <button class="btn" id="redoBtn">重做</button>
      </div>
      <div class="meta-bar">
        <span id="testProgressText">第0題／共0題</span>
        <span id="testAccuracyText">正確率 --</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="testProgressFill" style="width:0%"></div></div>
    </div>

    <div class="card" id="testQuestionCard" style="display:none;">
      <div class="q-head">
        <div class="q-num" id="testQNum"></div>
        <div>
          <button class="heart" id="testFavBtn">♡</button>
          <button class="btn small edit-toggle" id="testEditBtn">✎ 編輯</button>
        </div>
      </div>
      <div id="testViewArea">
        <div class="q-stem" id="testStem"></div>
        <div id="testOptions"></div>
        <div class="explain" id="testExplain"></div>
        <div class="toolbar">
          <button class="btn" id="testCopyBtn">複製題目查證</button>
          <div class="row">
            <button class="btn" id="testPrevBtn">← 上一題</button>
            <button class="btn primary" id="testNextBtn">下一題 →</button>
          </div>
        </div>
      </div>
      <div id="testEditArea" style="display:none;"></div>
    </div>
    <div class="card empty-msg" id="testEmptyCard" style="display:none;"></div>
  </div>

  <!-- ================= 闖關複習模式 ================= -->
  <div class="panel" id="panelReview">
    <div class="card" id="reviewSetupCard">
      <div class="stat-box" id="reviewStatusText">目前尚無進行中的複習。</div>
      <div class="setup-grid">
        <label>每輪題數：</label>
        <select id="roundSizeSelect">
          <option value="35">35</option>
          <option value="45">45</option>
          <option value="60" selected>60</option>
          <option value="80">80</option>
        </select>
      </div>
      <div class="row" style="margin-top:6px;">
        <button class="btn primary" id="startAllReviewBtn">全部複習（歸零重來）</button>
        <button class="btn" id="startWrongReviewBtn">只做錯題複習</button>
      </div>
      <div class="row" style="margin-top:6px;">
        <button class="btn" id="continueReviewBtn" disabled>繼續上次複習</button>
      </div>
    </div>

    <div class="card" id="reviewActiveCard" style="display:none;">
      <div class="meta-bar">
        <span id="reviewRoundText">第1輪</span>
        <span id="reviewQueueText">本輪剩餘 0 題</span>
      </div>
      <div class="q-head">
        <div class="q-num" id="reviewQNum"><span class="grad-badge" id="reviewGradBadge"></span></div>
        <div>
          <button class="heart" id="reviewFavBtn">♡</button>
          <button class="btn small edit-toggle" id="reviewEditBtn">✎ 編輯</button>
        </div>
      </div>
      <div id="reviewViewArea">
        <div class="q-stem" id="reviewStem"></div>
        <div id="reviewOptions"></div>
        <div class="explain" id="reviewExplain"></div>
        <div class="toolbar">
          <button class="btn" id="reviewCopyBtn">複製題目查證</button>
          <div class="row">
            <button class="btn" id="reviewNextBtn" style="display:none;">下一題 →</button>
          </div>
        </div>
      </div>
      <div id="reviewEditArea" style="display:none;"></div>
      <div class="row" style="margin-top:10px;">
        <button class="btn" id="reviewEndBtn">結束複習</button>
      </div>
    </div>

    <div class="card empty-msg" id="reviewDoneCard" style="display:none;"></div>
  </div>

  <footer>財務分析題庫 · 離線作答 · 資料僅存於本機瀏覽器</footer>
</div>

<script>
/* ======================= 資料 ======================= */
const SUBJECT_KEY = "finanalysis";
const QUIZ_DATA = {"chapters": [{"id": 1, "title": "第1章 財務報表分析的工具與技術概要", "questions": [{"n": 1, "a": 4, "q": "下列何者為非靜態分析？", "o": ["比率分析", "結構分析", "共同比財務報表", "比較分析"], "e": "選項(1)錯誤，比率分析，科目的期間相同，故為靜態分析。選項(2)錯誤，結構分析，科目的期間相同，故為靜態分析。選項(3)錯誤，共同比財務報表乃是將財務報表中各項目以其占總數之百分比表達，俾利於使用者明瞭各項間結構之比例，各科目的期間相同，故為靜態分析。選項(4)正確，比較分析是將前後兩期或兩期以上財務報表併列，予以比較，藉以瞭解經營情況之變動，科目的期間不同，為動態分析。"}, {"n": 2, "a": 4, "q": "比較兩家營業規模差距甚大之公司時，下列何種方法最佳？", "o": ["趨勢分析", "比較分析", "水平分析", "共同比財務報表分析"], "e": "選項(1)錯誤，趨勢分析係就各年度之財務報表中，選擇某一年為基期，計算每一期間各項目對基期同一項目之趨勢百分數，藉以顯示各項目在各期間之變動趨勢，其為不同年度間之比較，故不適宜。選項(2)錯誤，比較分析是將前後兩期或兩期以上財務報表併列，予以比較，藉以瞭解經營情況之變動，故不適宜。選項(3)錯誤，水平分析即為動態分析，是為不同期間財務報表的比較。選項(4)正確，共同比財務報表乃是將財務報表中各項目以其占總數之百分比表達，可避免因科目金額差異而造成分析者錯誤判斷。"}, {"n": 3, "a": 2, "q": "下列哪一項不是財務報導的編製目的？", "o": ["提供投資與授信決策之資訊", "報導一個企業的清算價值資訊", "報導企業的資源、對這些資源的請求權及其變化的資訊", "報導企業產生現金流量的能力"], "e": "財務報導係基於繼續經營假設所編製，並不提供企業的清算價值資訊。"}, {"n": 4, "a": 3, "q": "息前及稅前盈餘 (Earnings Before Interest and Tax, EBIT) 對利息費用之比率可衡量一公司的：", "o": ["投資報酬率", "流動性", "財務風險", "資產運用效率"], "e": "選項(1)錯誤，無法反映。選項(2)錯誤，無法看出流動性。選項(3)正確，可看出公司對支應利息費用的能力，了解到公司財務風險的高低。選項(4)錯誤，無法反映。"}, {"n": 5, "a": 4, "q": "下列何者並非應用比較分析時可能產生的限制 (無法計算) ？", "o": ["基期為零", "基期為正，比較年為負", "基期為負數", "基期與比較年的金額相當接近"], "e": "比較分析 = (比較年度 - 基期年度) / 基期年度 選項(1)正確，分母為零，無法計算。選項(2)正確，計算結果無法反映出真實狀況。選項(3)正確，計算結果無法反映出真實狀況。選項(4)錯誤，兩期金額相當接近不構成比較分析的限制。"}, {"n": 6, "a": 2, "q": "下列就趨勢分析敘述，何者有誤？", "o": ["物價發生變動，前後年度喪失比較性", "流動負債減少，則趨勢有利", "作趨勢分析時應同時對照絕對數字", "為一動態分析"], "e": "選項(1)正確，物價發生變動，前後年度喪失比較性。選項(2)錯誤，應對照流動資產，或其他科目才可看出。選項(3)正確，作趨勢分析時應同時對照絕對數字，才可正確反映出實際狀況。選項(4)正確，不同期間的相互比較，為一動態分析。"}, {"n": 7, "a": 4, "q": "有關會計事項、事務之處理，下列敘述何者正確？", "o": ["工作底稿屬於必要之會計程序", "會計事項應按發生次序逐日登帳，至遲不得超過二個星期", "記帳憑證係證明會計事項之經過，而為造具記帳憑證所根據之憑證", "商業應以國幣為記帳本位，至因業務實際需要，而以外國貨幣記帳者，仍應在其決算報表中，將外國貨幣折合國幣"], "e": "選項(1)錯誤，工作底稿非屬於必要之會計程序；選項(2)錯誤，會計事項應按發生次序逐日登帳，至遲不得超過二個月；選項(3)錯誤，證明會計事項之經過，而為造具記帳憑證所根據之憑證稱為原始憑證。"}, {"n": 8, "a": 2, "q": "下列就比較分析之敘述何者有誤？", "o": ["其比較方法有絕對數字比較法、絕對數字增減變動法、增減百分數法以及增減比率法", "前後期營業性質不一樣不影響其正確分析", "是以整個財務報表為對象", "前後期物價水準變動對其正確分析有影響"], "e": "選項(1)正確，其比較方法有絕對數字比較法、絕對數字增減變動法、增減百分數法以及增減比率法。選項(2)錯誤，前後期營業性質不一樣影響其分析的正確性。選項(3)正確，比較財務報表分析是將前後兩期或兩期以上財務報表併列，予以比較，藉以瞭解經營情況之變動。選項(4)正確，前後期物價水準變動對其正確分析有影響。"}, {"n": 9, "a": 1, "q": "下列敘述何者有誤？", "o": ["將財務報表項目之增減金額與增減百分比相比較，分析者對於增減金額較感興趣", "財務分析時，如果無形資產不具任何價值應予以消除", "財務報表分析在投資決策中仍為一項不可忽視之基本分析方法", "財務報表分析的目的之一為預測企業未來發展趨勢"], "e": "選項(1)錯誤，兩者皆感興趣。絕對的數字金額之增減資料，不能揭露變動之比例。如能計算出攸關變動百分數，則更易於觀察絕對資料各年淨變動之程度。選項(2)正確，無形資產不具任何價值應予以消除。選項(3)正確，財務報表分析可用以評估公司股票價值及風險，為一項不可忽視之基本分析方法。選項(4)正確，財務報表分析的目的之一為預測企業未來發展趨勢。"}, {"n": 10, "a": 1, "q": "對共同比財務報表分析的敘述，下列何者為非？", "o": ["共同比資產負債表係以權益總額為總數", "綜合損益表以銷貨淨額為總數", "有助於瞭解企業之資本結構", "適用於不同企業之比較"], "e": "選項(1)錯誤，共同比資產負債表係以資產總額為總數。選項(2)正確，綜合損益表以銷貨淨額為總數。選項(3)正確，於瞭解企業之資本結構有所助益。選項(4)正確，因可消除規模差異，故有助於企業間之比較。"}, {"n": 11, "a": 4, "q": "在比率分析中，與同業平均比率比較時，下列何者錯誤？", "o": ["應注意產業平均值內是否有多角化經營公司", "產業平均值應排除情況異常之公司", "應注意產業平均值內各個公司會計制度", "產業平均值應包含不具代表性的公司以免偏頗"], "e": "選項(1)正確，多角化經營的公司，財務比率常含有完全不相關之行業。選項(2)正確，產業平均值應排除情況異常之公司。選項(3)正確，不同會計制度會影響財務比率。選項(4)錯誤，產業平均值應排除不具代表性的公司。"}, {"n": 12, "a": 4, "q": "下列對財務報表使用者之風險描述，何者為非？", "o": ["有會計風險與審計風險", "審計風險是指經審計人員審計後，財務報表仍可能隱含錯誤、不適當，而未被發現之風險", "風險性高的行業其審計風險也會偏高", "財務報表無論是否經過審計，其會計風險均相同"], "e": "選項(1)正確，財務報表使用者之風險有會計風險與審計風險。選項(2)正確，審計風險是指經審計人員審計後，財務報表仍可能隱含錯誤、不適當，而未被發現之風險。選項(3)正確，風險性高的行業其審計風險也會偏高。選項(4)錯誤，財務報表有經過審計，其會計風險下降。"}, {"n": 13, "a": 4, "q": "有關趨勢分析與比較分析之比較，下列何者為非？", "o": ["皆為水平分析", "趨勢分析僅就財報某部分分析，而後者為以整個報表為對象", "作趨勢分析時應同時對照絕對數字，而比較分析有絕對數字比較法", "兩者皆將比較金額及增減金額同時列示"], "e": "選項(1)正確，兩者皆為水平分析。選項(2)正確，趨勢分析僅就財報某部分分析，而後者為以整個報表為對象。選項(3)正確，作趨勢分析時應同時對照絕對數字，而比較分析有絕對數字比較法。選項(4)錯誤，比較分析將比較金額及增減金額同時列示，但趨勢分析多以指數代替絕對金額。"}, {"n": 14, "a": 4, "q": "下列並非財務報表分析的方法？", "o": ["比率分析", "趨勢分析", "共同比財務報表", "標準分析"], "e": "選項(1)正確，探討利潤、固定成本及變動成本之關係，是財務報表分析方法。選項(2)正確，趨勢分析係就各年度之財務報表中，選擇某一年為基期，計算每一期間各項目對基期同一項目之趨勢百分數，藉以顯示各項目在各期間之變動趨勢，其為不同年度間之比較。選項(3)正確，共同比財務報表乃是將財務報表中各項目以其占總數之百分比表達，俾利於使用者明瞭各項目間結構之比例。選項(4)錯誤，無此種分析方法。"}, {"n": 15, "a": 4, "q": "國際會計準則第 24 號中提及應揭露之關係人交易事項包括：", "o": ["交易金額", "與未結清餘額有關之備抵損失", "當期對應關係人款項所認列預期信用損失", "選項(1)(2)(3)皆是"], "e": "依 IAS24 規定關係人交易至少應揭露之事項，除答案選項外，另歸：1.未結清餘額 (包括承諾)。2.關係歸屬關係之性質。"}, {"n": 16, "a": 3, "q": "甲公司購入一組鋼釘，其使用年限為 10 年，但公司仍借記為費用，此符合何種原則？", "o": ["配合原則", "成本原則", "重要性原則", "收入認列原則"], "e": "因鋼釘價值小，若借記資產，每年還要攤銷折舊費用，又其對資產總額影響不大，基於重要性原則，可直接借記為費用。"}, {"n": 17, "a": 1, "q": "下列敘述何者正確？", "o": ["關鍵查核事項是指依會計師專業判斷，對當期合併財務報表之查核最為重要之事項", "編製財務報表是治理單位的責任，管理階層負責監督財務報導流程", "查核意見之基礎段應在查核意見段之前", "不論是上市櫃公司或非上市櫃公司的查核報告，皆需包含關鍵查核事項段"], "e": "選項(2)錯誤，編製財務報表是管理階層的責任，治理單位負責監督財務報導流程。選項(3)錯誤，查核意見之基礎段應在查核意見段之後。選項(4)錯誤，僅有上市櫃公司的查核報告才需包含關鍵查核事項段。"}, {"n": 18, "a": 3, "q": "編製共同比財務報表係屬下列何種分析？", "o": ["趨勢分析", "比率分析", "靜態分析", "比較分析"], "e": "共同比財務報表是以百分比表達的財務報表，例如資產負債表以總資產為 100%，損益表以銷貨淨額為 100%，以此可看出各項目所占之百分比，故屬於靜態分析之一種。靜態分析又稱結構分析、垂直分析或縱的分析，是將同一年度財務報表內各項目加以比較分析。"}, {"n": 19, "a": 3, "q": "表示企業某一特定時日之財務狀況的報表是：", "o": ["盈餘預估表", "權益變動表", "資產負債表", "選項(1)(2)(3)皆是"], "e": "選項(1)盈餘預估表是對未來會計期間的盈餘作預計之表達。選項(2)權益變動表表達在一會計期間內權益變動狀況，不是一特定日。選項(3)資產負債表表達在某一特定日的資產、負債及權益之狀況。"}, {"n": 20, "a": 1, "q": "趨勢分析最常用的基期是：", "o": ["固定基期", "變動基期", "最大基期", "平均基期"], "e": "趨勢分析就是就三期以上的財務報表中某一項目加以分析，通常以最早一期作為基期，再計算之後各期對應於基期的百分比，也就是固定基期。"}, {"n": 21, "a": 4, "q": "下列何項不屬於財務報表的「要素」(Element)？", "o": ["資產", "權益", "費損", "來自營業活動的現金流量"], "e": "IASB 觀念架構定義了五個財務報表的基本要素：資產、負債、權益、收益、費損。"}, {"n": 22, "a": 3, "q": "下列敘述何者正確？", "o": ["使用價值屬於變現價值", "履約價值是指企業預期於其履行負債時，有義務移轉的現金或其他經濟資源的現值，包含承擔負債所發生的交易成本", "公允價值是指於衡量日市場參與者間，在有秩序之交易中出售某一資產所能收取或移轉某一負債所需支付之價格", "公允價值屬於現時價值的一種，履約價值屬於歷史成本的一種。"], "e": "選項(1)錯誤，使用價值屬於退出價值。選項(2)錯誤，履約價值不包含承擔負債所發生的交易成本。選項(4)錯誤，履約價值也屬於現時價值的一種。"}, {"n": 23, "a": 2, "q": "企業財務報表中的「會計師查核報告」，主要的意義為：", "o": ["由會計師證明財務報表內容正確無誤", "由會計師針對「財務報表是否允當表達」一事表示意見", "會計師對企業財務狀況進行分析，並提供改進的建議", "選項(1)(2)(3)皆正確"], "e": "選項(1)錯誤，確保財報內容正確應是管理當局對報表使用者的責任。選項(3)錯誤，會計師是以專業角度來審核企業的財務報表是否符合一般公認會計原則且真實表達企業之財務狀況，分析並非會計師之責任。"}, {"n": 24, "a": 4, "q": "企業提供財務報表資訊所付出的成本，不包括以下哪個項目？", "o": ["會計師查核的成本", "搜集資料的成本", "因競爭者獲得資訊而使企業喪失的競爭優勢", "企業的管理部門使用其財務報表資訊作各項分析研究所消耗資源"], "e": "企業內部管理部門使用其財報分析研究所耗資源和提供外部使用者財報資訊所用之成本並無關聯，一個是提供內部使用的成本，一個則是提供外部使用的成本。"}, {"n": 25, "a": 3, "q": "一般而言，下列何者不是財務報表項目採歷史成本為評價基礎所受到的批評？", "o": ["企業利潤有高估的現象", "企業負擔過多的所得稅", "帳務處理所需的成本較高", "顧及財務報表資訊的忠實表述，但失去攸關性"], "e": "選項(1)正確，以歷史成本評價之資產往往低於市價，故其折舊費用用低估，使利潤高估。選項(2)正確，利潤高估也使企業稅負虛增。選項(3)錯誤，以歷史成本評價不需每期就市價重估，帳務處理較簡單，成本也較低。選項(4)正確，歷史成本可客觀驗證，可忠實表述，但常與決策無關。"}, {"n": 26, "a": 4, "q": "一般而言，企業的長期債權人可能關心以下幾項？ 甲.企業短期財務狀況；乙.企業長期之獲利能力；丙.企業之資本結構是否穩固；丁.企業長期之資金流量", "o": ["一項", "兩項", "三項", "四項"], "e": "長期債權人關心的是企業是否能長期經營，以償還長期債務，所以不論是短期財務狀況或資本結構都關係著企業繼續經營的能力，自然也是長期債權人所關心。"}, {"n": 27, "a": 4, "q": "下列何者不屬於財務報表成分的分析(Component Analysis)？", "o": ["將一企業分成不同地理區域進行分析", "將一企業分成不同部門進行分析", "將財務報表中的某一項目與同年度報表另一項目的相對比率進行分析", "分析某一項目不同年度間的變動情形"], "e": "財務報表成分的分析是以同一年度的財報為基礎，做各項成分之比較分析，而選項(4)是分析同一項目在不同年度之變化，屬趨勢分析，而非成分分析。"}, {"n": 28, "a": 3, "q": "相對而言，下列哪一項目較適合用來評估一個企業的經營績效？", "o": ["每股盈餘金額", "淨利率", "營業利益率", "毛利率"], "e": "選項(1)每股盈餘和選項(2)淨利率都加入了企業非經常性的營運影響。而選項(4)毛利率只包含了銷售帶來之利潤，未考慮其他必要之行政管理費用。"}, {"n": 29, "a": 2, "q": "下列哪一報表通常不作共同比分析？", "o": ["資產負債表", "現金流量表", "綜合損益表", "選項(1)(2)(3)皆非"], "e": "共同比財務報表是以百分比表達的財務報表，例如資產負債表以總資產為 100%，綜合損益表以銷貨淨額為 100%，以此可看出各項目所占之百分比。而現金流量表無法以特定項目作為 100% 的基礎，故不作共同比分析。"}, {"n": 30, "a": 3, "q": "共同比 (Common-size) 損益表是以哪一個項目金額為 100%？", "o": ["本期淨利", "銷貨總額", "銷貨淨額", "賒銷總額"], "e": "共同比損益表通常是以銷貨淨額為 100%，再將表中各項目換算成該總數的百分比，藉此了解成本與費用占銷貨收入之比重，可增加對成本與費用的控制能力。"}, {"n": 31, "a": 4, "q": "將某一金額以下的支出一律作為費用支出，是合乎：", "o": ["可驗證性", "一致性原則", "成本原則", "重要性原則"], "e": "會計事項或金額如果不具重要性，可以不必完全依照一般公認會計原則，以節省成本，此為重要性原則。"}, {"n": 32, "a": 4, "q": "編製共同比 (Common-size) 損益表時：", "o": ["每個損益表項目均以淨利的百分比表示", "每個損益表項目均以基期金額的百分比表示", "當季損益表項目的金額和以前年度同一季的相對金額比較", "每個損益表項目以銷貨淨額的百分比表示"], "e": "共同比損益表是以銷貨淨額為 100%，再看各項目對應於銷貨淨額之百分比，來做比較分析。"}, {"n": 33, "a": 4, "q": "企業管理當局為了避免顯現出獲利不佳，決定改變存貨評價方法，改變之後，公司的財務報表上顯示獲利逐年增加，試問上述事項違反何種品質特性的要求？", "o": ["可瞭解性", "攸關性", "時效性", "中立性"], "e": "「中立性」係指對資訊之選擇或表達，不偏頗、不加重、不強調、不眨抑，不為達到預期結果或圖利某一類關係人而故意篩選。"}, {"n": 34, "a": 4, "q": "為發布年度報告，芬達公司將其經濟活動分割為以 12 個月為一期，此符合下列何種會計假設？", "o": ["繼續經營假設", "經濟個體假設", "貨幣單位假設", "會計期間假設"], "e": "會計期間假設：為便於提供及時的資訊，而將連續不斷的企業生命劃分為一定長度的會計期間，定期提供該期間的財務報表。"}, {"n": 35, "a": 2, "q": "估計售後服務成本 $100,000 未入帳，其違反哪一項會計原則或假設？", "o": ["客觀原則", "配合原則", "收入認列原則", "繼續經營假設"], "e": "「配合原則」係指費用與認列收入的期間相配合，若收入於某一報導期間認列，則因賺取該項收入而發生的各項費用亦應在同一報導期間內認列，以適當衡量各期間的損益。"}, {"n": 36, "a": 3, "q": "會計學上的一貫性 (或稱一致性) 原則是指：", "o": ["會計原則一旦採用，除非企業清算再度開始，否則不得改變", "只有當物價水準上漲或管理人員意圖改變時，可以改用新原則", "當企業所處的環境改變時，可改用新的會計政策", "當會計人員更替時，不同人員可以採用不同之原則，否則不得改變"], "e": "「一致性」係指前後期間採用一致的會計政策及處理程序。但一致性並非指會計政策及處理程序一經採用即永遠不能改變，只是變更時需有正當理由，亦即採用新的方法比原方法更能公正衡量及表達企業的經濟實況，此時應在報表中將變動的性質及理由，及其對當期損益之影響予以揭露。"}, {"n": 37, "a": 3, "q": "在分析財務報表時，債權人最終目的為：", "o": ["瞭解企業未來的獲利能力", "瞭解企業的資本結構", "瞭解債務人是否有能力償還本息", "瞭解企業過去的財務狀況"], "e": "債權人擁有對企業的債務求償權，自然最想了解企業是否能夠償還本息。"}, {"n": 38, "a": 2, "q": "相對於發行股票募集資金，發行債券募集資金具有的好處 (對發行公司而言) 包括下列幾項？ 甲.風險較低；乙.債券不能在市場上交易；丙.債券利息可減少課稅所得，而股利則無法減少課稅所得；丁.現有股東持股比例不受影響", "o": ["一項", "兩項", "三項", "四項"], "e": "甲：舉債風險較高，因為有支付利息及本金的時間壓力，而對普通股股東則無支付股利的必要壓力；乙：公司債只要是經主管機關核准的，就可以在市場上交易。僅有丙、丁正確，共兩項。"}, {"n": 39, "a": 4, "q": "下列何項不屬於動態分析？", "o": ["二期間絕對金額比較", "二期間絕對金額增減變動比較", "二期間百分比變動比較", "和同期同業平均水準比較"], "e": "動態分析是比較財務報表中某一項目在不同期間的變化，若比較的是在同一期間不同項目的關係則屬靜態分析。和同業平均水準比較就不是和自己其他年度的資料比較分析，故不屬動態分析。"}, {"n": 40, "a": 1, "q": "假設母公司於以前年度以股權淨值取得子公司 100% 股權，且兩家公司間並無任何業務往來，則本年度合併損益表中的年度盈餘會等於：", "o": ["母公司的盈餘金額", "子公司的盈餘", "母公司和子公司盈餘的總和", "母公司的盈餘扣除投資收益"], "e": "由於母公司於以前年度以股權淨值取得子公司 100% 股權，因此無須攤銷購買溢價，故母公司當年底在自己帳上就以權益法認列子公司所有的收益了，所以在本年度合併損益表中的年度盈餘就等於母公司的盈餘金額。"}, {"n": 41, "a": 2, "q": "如果公司在財務報表結束日後發生重大資產出售事件之期後事項，應如何揭露？", "o": ["在損益表中認列", "在財務報表附註中揭露", "在資產負債表中認列", "不需要揭露"], "e": "重大期後事項應在財務報表附註中進行揭露，以告知使用者其潛在影響。"}, {"n": 42, "a": 4, "q": "下列哪一種情況發生時，將無法採用「共同比」(Common-size) 的分析方式比較兩個年度的損益表？", "o": ["第一年的盈餘為負值", "第二年的盈餘為負值", "當選項(1)或(2)發生時都不能用共同比的分析方式", "即使盈餘為負值仍可使用共同比的分析方式"], "e": "使用共同比損益表是為了了解成本與費用占銷貨收入之比重，以增加對成本及費用的控制能力，所以盈餘為負數不會影響此分析。"}, {"n": 43, "a": 2, "q": "編製預估式資產負債表的主要目的為何？", "o": ["計算出現金盈餘", "估算資產和負債組成項目之金額", "估算存貨餘額，且按經濟訂購量模型估計之", "計算現金流量，作為資產投資決策參考"], "e": "編製預估式資產負債表要先估收入及各項成本、費用，完成預估損益表，另一方面做資本預算及現金預算，以兩者之資料編製預估資產負債表，最後再編預估現金流量表。"}, {"n": 44, "a": 3, "q": "鐵路局之鐵軌枕木採汰舊法或重置法計提折舊，此係依據：", "o": ["經濟個體假設", "客觀原則", "行業特性原則", "成本原則"], "e": "所謂行業特性原則係指只有該特定行業才可採用的會計方法。故鐵路局的鐵軌枕木可採汰舊法或重置法計提折舊。"}, {"n": 45, "a": 3, "q": "在國際會計準則理事會發布的財務會計觀念架構中，下列哪一項屬於強化性品質特性？", "o": ["免於錯誤", "預測價值", "時效性", "確認價值"], "e": "強化性品質特性：1.可比較性、2.可驗證性、3.時效性、4.可了解性。"}, {"n": 46, "a": 2, "q": "企業流動性風險係指：", "o": ["未來市場價格變動而使金融商品價值波動之風險", "企業無法籌措資金以履行合約之風險", "貨幣性金融商品未來現金流量變動之風險", "交易相對人未履行合約規定而致企業發生損失之風險"], "e": "「流動性風險」係指企業無法籌措資金以履行合約之風險。"}, {"n": 47, "a": 1, "q": "「財務報導與交易事項完全一致或吻合」是財務資訊的哪一項品質特性？", "o": ["忠實表述", "攸關性", "重要性", "可瞭解性"], "e": "忠實表述之定義。"}, {"n": 48, "a": 3, "q": "企業之主要財務報表為綜合損益表、資產負債表、權益變動表及現金流量表，其中動態報表有幾種？", "o": ["一種", "二種", "三種", "四種"], "e": "動態報表有綜合損益表、權益變動表及現金流量表三種。"}, {"n": 49, "a": 1, "q": "下列何項項目是屬於動態分析？", "o": ["計算某一財務報表項目不同期間的金額變動", "計算某一資產項目占資產總額的百分比", "計算某一期間的總資產週轉率", "將某一財務比率與當年度同業平均水準比較"], "e": "動態分析是比較財務報表中某一項目在不同期間的變化，若比較的是在同一期間不同項目的關係則屬靜態分析。"}, {"n": 50, "a": 2, "q": "根據國際財務報導準則第 7 號「金融工具：揭露」之規定，對於以交付現金或其他金融資產清償之金融負債，企業履行與其相關之義務將面臨困難之風險為：", "o": ["信用風險", "流動性風險", "市場風險", "定價風險"], "e": "企業無法依約履行償付金融負債為流動性風險之定義。"}, {"n": 51, "a": 2, "q": "根據國際會計準則第 32 號「金融工具：表達」，當股票選擇權發行人可選擇以現金淨額交割或以本身股份交換現金方式交割時，該股票選擇權宜歸類為：", "o": ["金融資產", "金融負債", "權益", "一般資產"], "e": "當衍生性商品給予任一方選擇交割方式之權利 (如發行人或持有人可選擇以現金淨額交割或以股份交換現金)，該衍生性商品為金融資產或金融負債。例如，當股票選擇權發行人可選擇以現金淨額交割或以本身股份交換現金方式交割時，該股票選擇權宜歸類為金融負債。但選擇之交割方式將導致其為權益商品者，則該衍生性商品宜歸類為權益。"}, {"n": 52, "a": 1, "q": "根據國際會計準則第 32 號「金融工具：表達」，可轉換為企業固定數量普通股之公司債券或類似商品，以金融商品發行人之觀點而言，此等商品包含哪幾項組成要素？", "o": ["金融負債及權益商品", "金融資產及金融負債", "金融資產及權益商品", "金融資產、金融負債及權益商品"], "e": "金融商品同時產生金融負債及給予持有人將該商品轉換為權益商品之選擇權者，應屬複合金融商品，企業宜就複合金融商品其組成要素分別認列。例如，可轉換為企業固定數量普通股之公司債券或類似商品，以金融商品發行人之觀點而言，此等商品包含二項組成要素：1.金融負債 (交付現金或其他金融資產之合約義務) 及 2.權益商品 (在一特定期間內，可由持有人轉換為企業固定數量普通股之買權)。"}, {"n": 53, "a": 3, "q": "根據國際會計準則第 32 號「金融工具：表達」，企業在符合下列何項條件時，宜將金融資產及金融負債互抵，以淨額列示？", "o": ["抵銷權利目前具備法律上之執行效力", "意圖以淨額交割，或同時變現 (實現) 資產及清償負債，亦即同時交割", "選項(1)及(2)皆須符合", "選項(1)(2)(3)皆非"], "e": "企業若同時符合下列條件時，宜將金融資產及金融負債互抵，以淨額列示：1.抵銷權利目前具備法律上之執行效力；2.意圖以淨額交割，或同時變現 (實現) 資產及清償負債，亦即同時交割。對不符合除列規定之金融資產移轉之會計處理，企業不得將該已移轉之資產與相關負債互抵。"}, {"n": 54, "a": 4, "q": "國際會計準則第 32 號「金融工具：表達」所稱「企業」：", "o": ["僅包括公司組織", "僅包括獨資、合夥組織及公司組織", "僅包括合夥組織、公司組織、信託及政府機構", "包括個人、合夥組織、公司組織、信託及政府機構"], "e": "參見國際會計準則第 32 號「金融工具：表達」第十四段，「企業」包括個人、合夥組織、公司組織、信託及政府機構。"}, {"n": 55, "a": 3, "q": "若企業合併中的或有對價分類為金融負債，應如何處理後續的公允價值變動？", "o": ["認列為其他綜合收益", "調整商譽", "認列於當期損益", "不再進行任何後續調整"], "e": "或有對價分類為金融負債時，其後續的公允價值變動應認列於當期損益中。"}, {"n": 56, "a": 1, "q": "下列有關綜合損益表格式與費用分類方式的組合，何者可直接顯示毛利之金額？", "o": ["多站式與功能別的綜合損益表", "多站式與性質別的綜合損益表", "單站式與功能別的綜合損益表", "單站式與性質別的綜合損益表"], "e": "「多站式」與「功能別」的綜合損益表可直接顯示毛利之金額。"}, {"n": 57, "a": 2, "q": "下列敘述何者錯誤？", "o": ["可比較性係指同一公司各年間均採相同的會計方法", "忠實表述係指會計資訊品質可確保免於錯誤", "攸關的會計資訊係指其具有改變決策的能力", "重要性係指公司規模可能影響投資人或債權人之決策"], "e": "忠實表述係指財務資訊與其意圖表述之現象相符；免於錯誤僅為構成忠實表述要素之一。"}, {"n": 58, "a": 4, "q": "有關「財務報導之觀念架構」，下列敘述何者錯誤？", "o": ["觀念架構會隨時間經過而修訂", "科目單位之選擇係為提供有用資訊", "當企業收購另一公司之某產業部門時，該產業部門可能構成一報導體體", "依一般用途財務報導之目的，所提供的財務資訊，已經包含投資人與債權人所需之全部資訊"], "e": "一般用途財務報告並不提供、且無法提供現有及潛在投資者、貸款人及其他債權人所需之所有資訊。"}, {"n": 59, "a": 3, "q": "下列哪一種損益不會在「其他綜合損益」中列示？", "o": ["將子公司報表由功能性貨幣換算為母公司表達貨幣之外幣換算差額", "資產重估價增值", "離職福利成本", "透過其他綜合損益按公允價值衡量金融資產之未實現損益"], "e": "離職福利成本屬於當期損益，通常直接在損益表中列示，而非其他綜合損益。"}, {"n": 60, "a": 3, "q": "下列敘述何者正確？", "o": ["綜合損益表中須列示綜合損益歸屬於普通股權益持有人之每股金額", "綜合損益金額會因其他綜合損益之重分類調整而變動", "綜合損益等於報導期間權益之變動 (但排除與業主之交易及與該等交易直接相關之交易成本所產生之變動)", "綜合損益結帳後將累計於其他權益"], "e": "選項(1)綜合損益表中須列示繼續營業單位損益及本期損益歸屬於母公司普通股權益持有人之每股盈餘；選項(2)綜合損益金額不會因其他綜合損益之重分類調整而變動；選項(4)其他綜合損益結帳後將累計於其他權益。"}, {"n": 61, "a": 1, "q": "下列何者非為會計師可能表示之查核意見類型？", "o": ["確信意見", "保留意見", "無法表示意見", "否定意見"], "e": "會計師可能出具之查核意見包括無保留意見及修正正式意見 (包括保留意見、否定意見、無法表示意見)。"}, {"n": 62, "a": 4, "q": "下列哪項財務報表使用者屬於內部使用者？", "o": ["債權人", "政府主管機關", "學術界", "企業管理階層"], "e": "選項(1)錯誤，債權人對企業有求償權，需要透過財報來了解企業經營狀況，以確保自身權益，屬於外部使用者。選項(2)錯誤，政府主管機關基於監管需求，需了解財務報表內容，屬於外部使用者。選項(3)錯誤，學術界需要財報上的數字供研究之用，屬於外部使用者。選項(4)正確，企業管理階層需要會計資訊評估經營績效以作決策，屬於內部使用者。"}, {"n": 63, "a": 1, "q": "下列何項項目是屬於動態分析？", "o": ["計算某一財務報表項目不同期間的金額變動", "計算某一資產項目占資產總額的百分比", "將某一財務比率與當年度同業平均水準比較", "計算某一期間的總資產週轉率"], "e": "動態分析是比較財務報表中某一項目在不同期間的變化。"}, {"n": 64, "a": 3, "q": "下列敘述何者錯誤？", "o": ["收益的認列可能與資產的原始認列同時發生", "負債帳面金額增加可能與費損的認列同時發生", "收益的除列通常於企業認列負債時發生", "資產的除列通常於企業喪失對已認列資產的控制時發生"], "e": "選項(3)錯誤，除列是指將已認列資產或負債自資產負債表中移除，不適用於收益及費損。"}, {"n": 65, "a": 3, "q": "衡平公司對於某一交易事件的記錄與報導方式，從原來採用不符合一般公認會計原則的方法，改為符合一般公認會計原則的方法。這項改變的稅後影響數，在財務報表中應以何種方式報導？", "o": ["列於損益表中的繼續經營單位利益之後，停業單位損益之前", "列於損益表中的停業單位損益之後", "列於權益變動表，作為期初保留盈餘餘額的調整", "列於權益變動表中的本期淨利之後，股利分配之前"], "e": "由不符合一般公認會計原則的方法改成符合一般公認會計原則的方法，此變動屬「錯誤更正」，應將此變動稅後影響數調整期初保留盈餘。"}, {"n": 66, "a": 1, "q": "具有決策攸關性之財務報表，必須具備以下哪些條件？ 甲.有預測價值；乙.有確認價值；丙.中立性", "o": ["僅甲和乙", "僅乙和丙", "僅甲和丙", "甲、乙和丙皆須具備"], "e": "甲正確，如果一項資訊能幫助決策者預測過去、現在及未來事項的可能結果，這項資訊就具有預測價值。乙正確，一項資訊如能使決策者證實或更正過去決策時的預期結果，就是有確認價值。丙錯誤，中立性為忠實表述之構成要素之一。"}, {"n": 67, "a": 3, "q": "泰山公司於 X2 年第一季末發現 X1 年底存貨低列了 $500,000，已知該公司適用的稅率均為 20%，則：", "o": ["X1 年度損益表應予重編，增加銷貨成本 $500,000 及減少所得稅費用 $100,000", "X1 年度損益表應予重編，直接調整淨利 $400,000", "X2 年第一季的期初保留盈餘金額應調整增加 $400,000", "X1 年度的錯誤會在 X2 年度自動抵銷，故不需任何調整"], "e": "此情形屬於錯誤更正，應做前期損益調整，以稅後淨額調整保留盈餘。所謂的錯誤包括計算上的錯誤，誤用或忽略當時既有的事實，或是誤用會計原則及方法，也就是採用不合一般公認的會計原則，但不包括估計或判斷的變動。"}, {"n": 68, "a": 1, "q": "相較於過去我國財務會計準則，下列何者並非國際財務報導準則 IFRSs 之特性？", "o": ["IFRSs 採用細則基礎，非原則基礎", "IFRSs 強調公允價值，非歷史成本", "IFRSs 資訊揭露之廣度及深度增加", "IFRSs 強調資產負債表外之會計處理及揭露"], "e": "有關 IFRSs 與我國過去採用之會計準則之主要差異： 1. IFRSs 採用原則基礎，非細則基礎：強調經濟實質之忠實表述。 2. IFRSs 採用公允價值法：強調資訊攸關性。 3. 資訊揭露之廣度及深度增加。 4. 加強資產負債表外項目之相關會計處理及揭露：改善資訊透明度。 5. 財務報表主體從個體財務報表轉為合併財務報表：提升資訊完整性。"}, {"n": 69, "a": 3, "q": "「公允價值層級」中的第三等級是指利用何者？", "o": ["市場報價的價格", "市場參考價格的調整值", "無法觀察到的輸入值", "最近成交的市場價值"], "e": "公允價值層級中的第三等級係指無法觀察到的輸入值，需使用內部模型估計。"}, {"n": 70, "a": 3, "q": "關於調整分錄，下列敘述何者錯誤？", "o": ["於應計基礎下定期編製財務報表始須有調整分錄", "使用工作底稿後仍需另作調整分錄", "調整分錄應作而未作將造成現金項目之不實表達", "調整分錄之作成先於結帳分錄之作成"], "e": "一般而言，調整分錄不影響現金 (除零用金及現金調節表相關的調整分錄外)。"}, {"n": 71, "a": 2, "q": "某公司於 20X1 年 12 月 1 日與客戶簽訂一份合約，銷售一批商品，價格為 $100,000，成本為 $60,000。合約規定客戶需於 20X1 年 12 月 15 日支付 50% 的款項，剩餘款項於 20X2 年 1 月 15 日支付。商品於 20X1 年 12 月 10 日交付給客戶。根據 IFRS 15，該公司應於何時認列收入？", "o": ["20X1 年 12 月 1 日", "20X1 年 12 月 10 日", "20X1 年 12 月 15 日", "20X2 年 1 月 15 日"], "e": "根據 IFRS 15，收入應於客戶取得商品的控制權時認列。在此案例中，商品於 20X1 年 12 月 10 日交付給客戶，表示客戶已取得控制權，因此收入應於該日認列，與收款時間無關。"}, {"n": 72, "a": 3, "q": "下列何者不屬於無形資產定義之無形項目所須具備的條件？", "o": ["具可辨認性", "能為企業帶來未來經濟效益", "公允價值能可靠衡量", "為企業所控制"], "e": "依據 IAS38，符合無形資產之定義須具備：1.可辨認性、2.對資源之控制及 3.具備未來經濟效益之存在。"}, {"n": 73, "a": 4, "q": "甲公司與乙公司簽訂租賃合約，自 X1 年 1 月 1 日起租用機器一部，租期 15 年，每年底付租金 $250,000，租期屆滿時，甲公司得以 $80,000 的優惠價格承購。甲公司針對此項機器設備每年以租金費用認列，其違反下列何種資訊品質特性或原則？", "o": ["時效性", "可比性", "可驗證性", "忠實表述"], "e": "應以使用權資產認列方能反映其經濟實質。"}, {"n": 74, "a": 1, "q": "資產、負債被區分為流動部分和非流動部分，是基於下列何者？", "o": ["繼續經營假設", "經濟個體假設", "重要性", "完整性"], "e": "在繼續經營假設下，企業資產並不立即出售，負債亦不必立即清償，不同資產或負債其出售或清償時間各有長短，對企業而言具不同影響，因此將資產與負債分別劃分為流動部分和非流動二類。資產、負債之長短期分類及折舊性資產之成本分攤等，皆因繼續經營假設之存在始有意義。"}, {"n": 75, "a": 2, "q": "下列有關財務報表品質之忠實表述特性敘述，何者錯誤？", "o": ["不蓄意操縱財務資訊以達成特定的影響", "某項財務資訊之有無，會使投資人與債權人作成之決策有所差異", "財務資訊在描述經濟現象時沒有錯誤或遺漏，且其選擇與應用產生該財務資訊之程序並無錯誤", "財務資訊包括了讓使用者了解所描述現象所需之所有資訊"], "e": "選項(2)係財務資訊品質特性中之攸關性。"}, {"n": 76, "a": 1, "q": "有用的財務資訊應同時具備攸關性與忠實表述兩項基本品質特性，下列何者屬於「攸關性」的内容？", "o": ["財務資訊能讓使用者用以預測未來結果", "讓使用者了解描述現象所需之所有資訊，包括所有必要之敘述及解釋", "財務資訊對經濟現象的描述，能讓各自獨立且具充分認知的經濟現象觀察者，達成對經濟現象的描述為忠實表述的共識", "財務資訊清楚簡潔的分類、凸顯特性及表達"], "e": "選項(2)(3)(4)皆屬忠實表述之內容。"}]}, {"id": 2, "title": "第2章 流動資產、負債與短期流動性分析", "questions": [{"n": 1, "a": 2, "q": "辨別一項負債是否為流動負債的時間長短，是以一年或一個營業週期：", "o": ["取短者為判斷", "取長者為判斷", "取一年或一個營業週期兩者之平均", "無法判斷"], "e": "流動負債以一年或一個營業週期中，較長者作為標準來界定流動負債與長期負債。"}, {"n": 2, "a": 1, "q": "營運資金不足，但企業仍能繼續經營之可能原因？", "o": ["營運週轉速度快", "企業不動產、廠房及設備及負債比例大", "企業股本很大", "選項(1)(2)(3)皆是"], "e": "選項(1)正確，營運週轉速度快，則可不需大量營運資金。選項(2)錯誤，不動產、廠房及設備的變現力不高，又負債比例高，短期間恐難以獲得大量現金。選項(3)錯誤，企業股本很大，不能保證未來有充分淨現金流入。選項(4)錯誤。"}, {"n": 3, "a": 1, "q": "企業評估期末備抵損失餘額較期初餘額減少$10,000，則下列何者有誤：", "o": ["流動比率不變", "應收帳款週轉率下降", "存貨週轉率不變", "毛利率不變"], "e": "選項(1)錯誤，迴轉備抵損失會使應收帳款增加，流動比率上升。選項(2)正確，應收帳款增加使應收帳款週轉率下降。選項(3)(4)正確，迴轉備抵損失使應收帳款增加及淨利增加，對存貨週轉率及毛利率沒有影響。"}, {"n": 4, "a": 1, "q": "威廉公司的應收帳款週轉率為 20，營業循環為 40 天，請問存貨週轉率為何 (一年以 365 天計算)？", "o": ["16.78", "24.33", "33.46", "50.125"], "e": "營業循環 = 存貨週轉期間 + 應收帳款週轉期間 40 = 365 / 存貨週轉率 + 365 / 20，存貨週轉率 = 16.78"}, {"n": 5, "a": 1, "q": "流動比率大於 1 時，償還應付帳款將使流動比率：", "o": ["增加", "減少", "不變", "不一定"], "e": "流動比率 = 流動資產 / 流動負債，償還應付帳款使流動資產及流動負債同時減少，此時流動比率的變化須看原本比率大於 1 或小於 1： 大於 1 時，比率上升，例如原比率為 20 / 10 = 2，同時減少 1 -> (20-1) / (10-1) = 2.11 > 2 小於 1 時，比率會下降，例如原比率為 10 / 20 = 0.5，同時減少 1 -> (10-1) / (20-1) = 0.47 < 0.5"}, {"n": 6, "a": 4, "q": "哈利企業償還進貨帳款時獲得 20% 之折扣，將使流動比率：", "o": ["增加", "減少", "無影響", "不一定"], "e": "流動比率因償還進貨帳款而變動時，須視原流動比率大於 1 或小於 1，舉例說明： 假設哈利企業有應付進貨帳款 $500，償還時有 20% 折扣，故分錄為： 應付帳款 $500 現金 $400 進貨折扣 $100 設原流動比率 = $20,000 / $10,000 = 2 -> ($20,000 - $400) / ($10,000 - $500) = 2.06 > 2，上升。 若原流動比率 = $10,000 / $20,000 = 0.5 -> ($10,000 - $400) / ($20,000 - $500) = 0.49 < 0.5，下降。"}, {"n": 7, "a": 3, "q": "關於或有事項發生的可能性中的「很有可能」是指：", "o": ["發生的機率超過 33.33%", "發生機率超過 90%", "發生的可能性大於 50%", "發生機率接近於 1"], "e": "依 IAS37 規定：若該事項很有可能發生，即發生的可能性大於不發生的可能性。"}, {"n": 8, "a": 4, "q": "下列哪一項目，在計算時會將相關資產轉換成現金所需時間的長短列入考量？", "o": ["營業活動現金流量對流動負債比率", "總資產週轉率", "財務槓桿指數", "流動性指數"], "e": "流動性指數 = (各項流動資產 * 各自轉換成現金之天數) / 流動資產"}, {"n": 9, "a": 4, "q": "下列哪一項目在財務報表中是列為資產或負債的附加科目？", "o": ["累計折舊", "備抵損失", "處分廠房設備利益", "應付公司債溢價"], "e": "選項(1)(2)為資產的評價科目，決定帳上應有的帳面金額。選項(3)處分廠房設備利益應列於綜合損益表，所以它也不會是資產的附加科目。選項(4)債券的溢價導因於票面利率和市場利率的差異，不會改變應付公司債的帳面價值，所以是附加科目，會隨著債券存在時間減少而逐期攤銷，債券到期時，溢價也攤銷完畢。"}, {"n": 10, "a": 3, "q": "在採用零售價法評估期末存貨價值時，下列哪一項目會同時影響進貨的成本與零售價？", "o": ["進貨折扣", "進貨運費", "進貨退出", "正常損耗"], "e": "零售價法是用期末存貨的零售價，透過成本比率的計算，來求得期末存貨成本。在計算成本比率時，要同時計算成本及零售價，本題中，選項(1)(2)(4)只影響了成本，但當進貨退出發生時，除了進貨成本減少外，因為貨已退回，所以在零售價的部分也會減少。"}, {"n": 11, "a": 2, "q": "以應收票據向銀行貼現，貼現息的計算是根據貼現率、貼現期間以及哪一項目？", "o": ["票據面額", "票據到期值", "票據面額加已賺得的利息", "實際貼現取得現金金額"], "e": "計算貼現現金額時，先計算： (a) 到期值 = 面額 + 本期利息 (b) 貼現利息 = 到期值 * 貼現率 * 貼現期間。 .:. 貼現現金 = (a) - (b)"}, {"n": 12, "a": 4, "q": "乙公司將其製造的銷貨商品運至經銷商店甲公司，因而付出的運費，理論上應列為：", "o": ["甲公司的費用", "甲公司存貨成本", "乙公司的費用", "乙公司存貨成本"], "e": "放在其他公司寄銷的存貨仍屬自己公司的存貨，所以乙公司寄銷的運費還是乙公司的存貨成本。"}, {"n": 13, "a": 3, "q": "向榮書店售出圖書禮券，並收到現金，此一交易對財務報表的影響為：", "o": ["收入增加", "收入減少", "負債增加", "負債減少"], "e": "書店收到現金但收益尚未實現 (書還沒賣出去)，所以算預收收入，必須在將來提供貨物來償還，所以是公司的負債。"}, {"n": 14, "a": 3, "q": "下列何者屬於負債準備？", "o": ["公司債發行溢價部分", "可轉換公司債", "產品售後服務保證負債", "應付租賃款"], "e": "選項(1)公司債溢價產生於市場利率和票面利率的差異，和負債準備沒關係。選項(2)可轉換公司債是一確定債務，但附有轉換成股東之選擇權。選項(4)這也是確定應付的負債。"}, {"n": 15, "a": 2, "q": "下列有關流動比率之敘述，何者不正確？", "o": ["流動比率容易遭窗飾", "以流動資產償還流動負債，流動比率不變", "為衡量償債能力之指標", "流動比率大於或等於 100%，較有保障"], "e": "以流動資產償還流動負債則兩者同時減少，若流動比率不等於 1，則一定會改變。"}, {"n": 16, "a": 3, "q": "出售長期投資，成本$30,000，售價$50,000，對營運資金及流動比率有何影響？", "o": ["營運資金增加，流動比率不變", "營運資金不變，流動比率增加", "二者均增加", "二者均減少"], "e": "本題中出售長期投資得現金$50,000，故流動資產增加，而營運資金 = 流動資產 - 流動負債，故流動比率及營運資金皆增加。"}, {"n": 17, "a": 1, "q": "淡水公司 X1 年 8 月底帳載現金餘額為$708,000，經核對銀行對帳單顯示：未兌現支票$270,000；在途存款為$300,000；銀行代收無息票據$36,000，手續費為$450，公司尚未入帳；公司支付給供應商的支票為$29,400，帳上誤植為$24,900。請問：該公司 X1 年 8 月的銀行對帳單上之存款餘額為多少？", "o": ["$709,050", "$739,050", "$739,500", "$739,950"], "e": "公司帳列正確餘額 = $708,000 + $36,000 - $450 - ($29,400 - $24,900) = $739,050 銀行對帳單餘額 = $739,050 - $300,000 + $270,000 = $709,050"}, {"n": 18, "a": 1, "q": "假設流動比率原為 1.50，下列何種作法可使其增加？", "o": ["以發行長期負債所得金額償還短期負債", "應收款項收現", "以現金購買存貨", "賒購存貨"], "e": "增加流動比率，可增加流動資產或減少流動負債。 選項(1)流動負債減少且流動資產增加或不變。 選項(2)、(3)皆不改變流動資產總額。 選項(4)流動資產及流動負債同時增加，但原比率 1.50 > 1，所以會下降。舉例說明，原比率 = $150 / $100 = 1.50，同時增加 -> ($150 + $10) / ($100 + $10) = 1.45，比率下降。"}, {"n": 19, "a": 4, "q": "下列何者之流動性最低？", "o": ["現金", "應收帳款", "透過損益按公允價值衡量之金融資產-流動", "存貨"], "e": "流動性大小是轉換成現金的容易性來評估，愈容易換成現金則流動性愈大，本題中以存貨換成現金最不容易。"}, {"n": 20, "a": 1, "q": "在 IFRS 9 實施之後，公司的資產負債表中不會出現：", "o": ["以成本衡量之金融資產", "透過損益按公允價值衡量之金融資產", "透過其他綜合損益按公允價值衡量之金融資產", "按攤銷後成本衡量之金融資產"], "e": "金融資產依 IFRS 9 規定分為三種類別，於資產負債表上分別表達為：透過損益按公允價值衡量之金融資產、透過其他綜合損益按公允價值衡量之金融資產、按攤銷後成本衡量之金融資產。"}, {"n": 21, "a": 4, "q": "下列有關流動性指數的敘述何者正確？", "o": ["指數愈大代表資產流動性愈高", "計算指數時假設現金的週轉天數為 0", "計算指數時現金需要列入分母中", "選項(2)(3)皆正確"], "e": "流動性指數是以各流動資產之構成項目的金額乘以該項目轉換成現金所需之天數，再以各乘積之和除以流動資產總額所得；而現金轉換成現金的天數為 0。選項(1)指數愈大代表資產流動性愈低。"}, {"n": 22, "a": 4, "q": "公司帳載銀行存款餘額為$80,000，發現下列事項：因進貨開立的支票$700，帳上記為$7,000；銀行代收票據$20,000，公司尚未入帳；未兌現支票$2,000。請問銀行存款正確的餘額應為多少？", "o": ["$91,700", "$93,700", "$104,300", "$106,300"], "e": "$80,000 + ($7,000 - $700) + $20,000 = $106,300"}, {"n": 23, "a": 3, "q": "下列何項在資產負債表中屬於「現金及約當現金」之一部分？", "o": ["存於供應商之押金", "遠期支票", "一年期定期存單", "指定用途之現金"], "e": "選項(1)押金為存出保證金。選項(2)遠期支票屬應收票據。選項(4)指定用途的現金已喪失流動性，故不具有現金之性質。"}, {"n": 24, "a": 2, "q": "如果企業在財務報表中揭露了一筆訴訟，該訴訟有可能導致重大的資金外流，這應屬於哪種負債？", "o": ["假定負債", "或有負債", "已確定負債", "估計負債"], "e": "這種情況屬於「或有負債」，因為訴訟結果未定，但可能導致資金外流。"}, {"n": 25, "a": 3, "q": "甲公司期末盤點存貨時，並未將寄銷於乙公司的存貨列入，下列何者正確？", "o": ["銷貨成本將被低估", "銷貨收入將被高估", "銷貨毛利將被低估", "銷貨收入與成本都不受影響"], "e": "寄銷於其他公司的存貨仍是自己公司的存貨，若漏列了則公司本身存貨低估，導致銷貨成本高估，毛利也就低估了。"}, {"n": 26, "a": 2, "q": "公司存貨週轉率愈高，則：", "o": ["缺貨的風險愈低", "有過時存貨的機會愈小", "毛利率愈高", "流動比率愈高"], "e": "存貨週轉率愈高代表存貨轉換次數愈多次，所以有過時的存貨機會就小多了。選項(1)由於進出貨次數多，所以缺貨風險就高。選項(3)跟毛利率沒關係，毛利率是跟成本控制有關的。選項(4)流動比率代表公司的償債能力，而存貨週轉率是代表公司營運能力，兩者並無直接關係。"}, {"n": 27, "a": 1, "q": "甲公司將一筆進貨運費誤作為銷貨運費處理，關於此錯誤對甲公司財務報表之影響，下列敘述何者正確？", "o": ["本期毛利高估", "本期毛利低估", "期末保留盈餘高估", "期末保留盈餘低估"], "e": "進貨運費低估將使進貨成本低估，故使銷貨成本低估而使毛利高估，但銷貨運費同額高估，故營業利益正確。"}, {"n": 28, "a": 3, "q": "將信用條件由 1/10，n/30 改為 1/15，n/30，假設其他因素不變，則應收帳款週轉率將：", "o": ["增加", "不變", "減少", "先增後減"], "e": "應收帳款週轉率 = 銷貨淨額 / 平均應收帳款，將信用期間加長，會使帳上之應收帳款餘額增加，故週轉率會減少。"}, {"n": 29, "a": 1, "q": "「存出保證金」在財務報表中是屬於：", "o": ["資產科目", "負債科目", "收入科目", "費用科目"], "e": "「存出保證金」是存放在他處作為保證的現金，他日還可領回，所以是公司資產。"}, {"n": 30, "a": 3, "q": "乙公司持有某企業發行的公司債，分類為按攤銷後成本衡量之金融資產。20X1 年底，乙公司評估該公司債的信用風險顯著增加，但尚未發生違約。根據 IFRS 9，乙公司應如何處理該金融資產的減損？", "o": ["不需認列減損損失", "認列 12 個月預期信用損失", "認列存續期間預期信用損失", "直接將該金融資產除列"], "e": "根據 IFRS 9，當金融資產的信用風險顯著增加時，即使尚未發生違約，企業也需認列「存續期間預期信用損失」。若信用風險未顯著增加，則僅需認列「12 個月預期信用損失」。故此題乙公司應認列存續期間預期信用損失。"}, {"n": 31, "a": 1, "q": "南方公司 20X3 年 12 月 31 日應收帳款總額為$500,000、其中逾期 30 天以上之帳款共計 $50,000。該公司估計未逾期帳款之損失率為 2%，逾期 30 天以上之帳款損失率為 20%。已知調整前備抵損失為貸餘$8,500，則 20X3 年度本期淨利應列多少預期信用減損損失？", "o": ["$10,500", "$27,500", "$19,000", "$11,500"], "e": "($500,000 - $50,000) * 2% + $50,000 * 20% - $8,500 = $10,500"}, {"n": 32, "a": 3, "q": "在定期盤存制下，銷貨成本的計算方式為：", "o": ["期初存貨 + 本期進貨", "期初存貨 + 期末存貨 + 本期進貨", "期初存貨 - 期末存貨 + 本期進貨", "期末存貨 - 期初存貨 + 本期進貨"], "e": "銷貨相關公式：銷貨成本 = 期初存貨 + 本期進貨 - 期末存貨，毛利 = 銷貨收入 - 銷貨成本。"}, {"n": 33, "a": 3, "q": "彰化公司於 X1 年 12 月 31 日的期末存貨明細如下： 產品 數量 單位成本 單位淨變現價值 登山腳踏車 11 $14,400 $13,200 滑板 13 $8,400 $10,200 滑翔翼 26 $19,200 $16,800 試以成本與市價孰低法評價，試問：該公司商品之期末存貨評價為多少？", "o": ["$714,600", "$766,800", "$691,200", "$790,200"], "e": "期末存貨 = $13,200 * 11 + $8,400 * 13 + $16,800 * 26 = $691,200"}, {"n": 34, "a": 2, "q": "三芝公司有關分期付款銷貨之處理，會計帳上於銷貨時立即認列收入，報稅則須等到收到現時才認列收入。若該公司自 X1 年初開始營業，X1 年底帳列分期應收帳款為$7,500,000，銷貨毛利率為 35%，所得稅率為 20%，且無其他暫時性差異，請問：三芝公司 X1 年底應認列遞延所得稅負債為多少？", "o": ["$0", "$525,000", "$975,000", "$1,500,000"], "e": "遞延所得稅負債 = $7,500,000 * 35% * 20% = $525,000"}, {"n": 35, "a": 4, "q": "存貨的淨變現價值是指：", "o": ["預期售價", "購買的成本加上完成製造及銷售所需的支出", "預期售價加上完成製造及銷售所需的支出", "預期售價減去完成製造及銷售所需的支出"], "e": "所謂淨變現價值是指在正常情況下，估計售價減除至完工尚需投入的製造成本及費用後的餘額。"}, {"n": 36, "a": 4, "q": "永旺公司為關係企業開立的支票背書保證，此舉將：", "o": ["增加應收票據", "提高負債對總資產比率", "可能增加或減少流動比率，視原來的流動比率是否大於 1 而定", "不影響任何財務比率"], "e": "為關係企業的支票背書，須以附註揭露說明，不用認列入帳，所以不會改變任何財務比率。"}, {"n": 37, "a": 3, "q": "天天公司有一筆應收帳款$1,000,000，天天公司認為該應收帳款自原始認列後信用風險已顯著增加，並估計其於未來 12 個月內的違約機率為 0.3%，於未來存續期間的違約機率為 0.5%，且若違約將損失帳面金額 20%。天天公司於報導期間結束日應認列的備抵損失餘額應為？", "o": ["$6,000", "$600", "$1,000", "$10,000"], "e": "$1,000,000 * 0.5% * 20% = $1,000。"}, {"n": 38, "a": 3, "q": "關於負債準備之敘述何者有誤？", "o": ["保固承諾需估列負債準備", "固定賠償金額之死亡保險，其支付金額確定但支付時點不確定，為負債準備", "負債準備並非負債", "某些負債之金額僅可藉由估計加以衡量，或其支付之時點不確定，此類負債稱為負債準備"], "e": "選項(3)錯誤。負債準備係指不確定時點或金額之負債，其於下列情況應予認列： 1. 企業因過去事件而負有現時義務 (法定義務或推定義務)； 2. 很有可能需要流出具經濟效益之資源以清償該義務；及 3. 該義務之金額能可靠估計。"}, {"n": 39, "a": 3, "q": "下列何者係屬或有負債？ 甲.因過去事件所產生之現時義務，但因並非很有可能需要流出具經濟效益之資源清償，因而未加以認列者；乙.因過去事件所產生之現時義務，但因該義務之金額無法充分可靠衡量，因而未加以認列者", "o": ["僅甲", "僅乙", "甲、乙皆是", "甲、乙皆非"], "e": "或有負債係指： 一、因過去事件所產生之可能義務，其存在與否僅能由一個或多個未能完全由企業所控制之不確定未來事件之發生或不發生加以證實。 二、因過去事件所產生之現時義務，但因下列原因而未予以認列：1.並非很有可能需要流出具經濟效益之資源以清償該義務；或 2.該義務之金額無法充分可靠衡量。"}, {"n": 40, "a": 1, "q": "下列為甲、乙、丙三家公司 20X6 年度的權益報酬率和總資產報酬率：假設 20X6 年以後，景氣持續轉壞，預估將歷時數年，則哪一家公司盈餘衰退的速度會比較快？ 公司名稱 權益報酬率 總資產報酬率 甲 35% 1% 乙 20% 15% 丙 12% 9%", "o": ["甲", "乙", "丙", "完全無法預測"], "e": "甲公司權益報酬率高，而資產報酬率低，表示公司有大量負債，在景氣衰退時仍負擔大量利息費用，故盈餘衰退較快。"}, {"n": 41, "a": 4, "q": "駱建公司本年度存貨週轉率比上期提高許多，可能的原因不包括：", "o": ["本年度存貨採零庫存制", "本年度認列鉅額的存貨過時陳廢損失", "產品製造時程縮短", "本年度提高產品售價"], "e": "存貨週轉率增加可能導因於銷貨成本增加或平均存貨減少。選項(1)採零庫存制會使平均存貨量大減。選項(2)認列大量存貨過時損失也會使平均存貨大減。選項(3)產品製程縮短可能使產品銷售加快，銷貨增加且存貨減少。選項(4)錯誤，提高產品售價不影響存貨週轉率。"}, {"n": 42, "a": 4, "q": "設流動比率為 3:1，速動比率為 1:1，如以部分現金償還應付帳款，則：", "o": ["流動比率下降", "流動比率不變", "速動比率下降", "速動比率不變"], "e": "流動資產 / 流動負債 = 3，速動資產 / 流動負債 = 1 (流動資產 - X) / (流動負債 - X) > 3 -> 流動比率上升 (速動資產 - X) / (流動負債 - X) = 1 -> 故速動比率不變"}, {"n": 43, "a": 3, "q": "石門公司為自動光學檢測(AOI)設備商，TMT 檢測量測機出售時附有兩年的維護保固，根據過去經驗，發生故障維修的機率為 0.25%，維修成本$4,000，發生零件更換的機率為 0.5%，維修成本$6,000。若 X1 年及 X2 年分別售出 1,400 及 2,000 台，實際發生修理費分別為$64,000 及 $72,000，請問：X2 年底保固之負債準備餘額為多少？", "o": ["$4,000", "$7,200", "$8,000", "$10,000"], "e": "每台量測機維修期望值 = $4,000 * 0.25% + $6,000 * 0.5% = $10 + $30 = $40 X1 年底保固之負債準備餘額 = $0 (負債準備金額$56,000 ($40 * 1,400) < 實際維修支出$64,000) X2 年底保固之負債準備餘額 = $40 * 2,000 - $72,000 = $8,000"}, {"n": 44, "a": 4, "q": "在資產年限的早期計算折舊時，下列何種方法不考慮估計的殘值？", "o": ["直線法", "生產數量法", "年數合計法", "倍數餘額遞減法"], "e": "倍數餘額遞減法公式： 期初帳面價值 * 2 / n = 折舊，故折舊不考慮估計殘值。"}, {"n": 45, "a": 4, "q": "下列哪一項不能列為流動資產？", "o": ["正常分期付款銷貨所收到之應收票據，到期日在 12 個月以內者", "預付一年內將徵收之財產稅", "以交易為目的之金融資產", "人壽保險之解約現金價值，總經理為受益人"], "e": "以總經理為受益人之人壽保險解約現金價值，屬於非流動資產，故不可列在流動資產項下，應列在非流動資產之基金與投資項下。"}, {"n": 46, "a": 4, "q": "下列哪些比率可用來衡量企業支付短期負債的能力？ 甲.流動比率；乙.負債對總資產比率；丙.負債對淨值比率", "o": ["僅甲和乙", "僅甲和丙", "甲、乙和丙", "僅甲"], "e": "衡量短期償債能力通常是流動比率及速動比率，而負債比率則是觀察企業是否為負債所累；負債與淨值比率是用來測定企業資金來源中由外部借入的比率。後兩者都是分析企業之財務結構。"}, {"n": 47, "a": 2, "q": "下列哪些事項發生，將會使流動比率增加？ 甲.以高於成本的價格出售商品並收取現金；乙.以高於成本的價格賒銷存貨；丙.收到其他公司寄銷的存貨", "o": ["僅甲", "僅甲和乙", "僅甲和丙", "甲、乙和丙"], "e": "甲.現金大於存貨成本，故流動資產增加。乙.應收帳款大於存貨，故流動資產增加。丙.寄銷之存貨不認列於自己公司帳上，故不影響流動比率。"}, {"n": 48, "a": 4, "q": "下列何者不是流動比率降低的可能原因？", "o": ["存貨採零庫存方式", "給予客戶的信用條件轉趨嚴謹", "存貨過時造成損失", "壞帳確定無法收回"], "e": "壞帳確定無法收回時將應收帳款和備抵損失對沖，不影響應收帳款淨額，流動比率也不會受到影響。"}, {"n": 49, "a": 3, "q": "流動比率愈高，則流動性指數： (以天數表示)", "o": ["愈高", "愈低", "流動比率和流動性指數無直接關係", "視流動負債金額大小而定"], "e": "流動性指數是以各流動資產之構成項目的金額乘以該項目轉換成現金所需之天數，再以各乘積之和除以流動資產總額所得，與流動比率 (流動資產 / 流動負債) 無直接關係。"}, {"n": 50, "a": 3, "q": "下列敘述何者正確？", "o": ["商店於籌備期間購買設備應記入「開辦費」帳戶", "應付費用是指已發生且已付現的費用", "有追索權之應收票據貼現會產生負債", "將資本支出誤作為收益支出，將使該期間之淨利增加"], "e": "「貼現」係指貼息取現，亦即將未到期之票據支付利息以提早取得現款，此為應收票據融通的手段。有追索權之應收票據向銀行貼現，銀行享有追索權，亦即發票人或付款人到期拒付時，公司有償還負債的義務，因此有追索權之應收票據貼現，公司仍保留該票據全部的風險及報酬，因此不得將其除列，且必須將貼現所拿到的金額認列為負債，亦不可以和原來帳列的應收票據互抵。"}, {"n": 51, "a": 3, "q": "若武當公司每年銷貨成本為$285,000，營業費用為$100,000 (非現金費用為$20,000)，其速動資產為$7,000，試問該公司短期涵蓋比率為何 (假設一年為 365 天)？", "o": ["5", "6", "7", "8"], "e": "短期涵蓋比率 = 速動資產 / 平均每天現金費用 = $7,000 / (($285,000 + $100,000 - $20,000) / 365) = 7"}, {"n": 52, "a": 3, "q": "賒銷$3,000 並代顧客支付運費$60，付款條件 2/10，n/30，若顧客於 10 天內將貨款與運費一併支付，則應收現金若干？", "o": ["$3,060", "$3,030", "$3,000", "$2,940"], "e": "付款條件 2/10，n/30 代表 10 天內付款享有 2% 的折扣。 故本題解：$3,000 * (1 - 2%) + 運費$60 = $3,000"}, {"n": 53, "a": 2, "q": "安康公司取得一項專利權，除支付現金$2,000,000 外，另開立一年期不附息票據$3,500,000，又市場利率為 8%。此專利權之入帳成本為：", "o": ["$2,000,000", "$5,240,741", "$5,351,852", "$5,092,593"], "e": "入帳成本 = 支付現金 + 票據現值 = $2,000,000 + $3,500,000 / (1 + 8%) = $5,240,741"}, {"n": 54, "a": 1, "q": "甲公司將原料加工成製成品至出售平均需 90 天，該公司應收帳款週轉率每年 6 次，該公司應付帳款平均於收到原料後 30 天支付，則該公司現金營業循環為幾天？ (假設一年以 360 天計算)", "o": ["120 天", "150 天", "60 天", "180 天"], "e": "應收帳款收現天數 = 360 / 6 = 60 天 現金營業循環週期 = 存貨週轉天數 + 應收帳款收現天數 - 應付帳款週轉天數 = 90 + 60 - 30 = 120 天"}, {"n": 55, "a": 2, "q": "大方公司 X1 年度銷貨總額為$4,000,000、銷貨退回為$200,000，銷貨成本為$3,600,000、平均流動資產為$1,900,000，則其流動資產週轉率為：", "o": ["2.50", "2", "1.50", "0.94"], "e": "流動資產週轉率 = 銷貨淨額 / 平均流動資產 題中，銷貨淨額 = $4,000,000 - $200,000 = $3,800,000 流動資產週轉率 = $3,800,000 / $1,900,000 = 2"}, {"n": 56, "a": 2, "q": "下列何者不是企業與客戶訂定合約時依 IFRS 15 認列收入之必要條件？", "o": ["該合約具商業實質", "移轉之商品生產完成可供出售", "企業對移轉之商品或勞務能辨認付款條件", "企業能辨別每一方對移轉商品或勞務之權利"], "e": "一般而言，當下列條件均符合時，企業與客戶訂定之合約應依 IFRS 15 規定認列收入： 1. 合約之各方已經以書面、口頭或依其他商業實務慣例核准該合約，且已承諾履行各自之義務。 2. 合約各方對將移轉之商品或勞務之權利能夠辨認。 3. 將移轉之商品或勞務之付款條件能夠辨認。 4. 該合約具商業實質，亦及企業將因合約之執行而改變未來現金流量之風險、時點或金額。 5. 企業因移轉之商品或勞務予客戶而換得之對價很可能可以收取。"}, {"n": 57, "a": 3, "q": "芳鄰公司的流動比率為 1，若芳鄰公司的流動負債為$10,000，流動資產包括現金、應收帳款、存貨及預付費用，已知存貨為$1,000、預付費用為$500，則其酸性比率 (速動比率) 應為何？", "o": ["0.8", "1.2", "0.85", "0.9"], "e": "流動比率 = 1，流動負債$10,000 -> 流動資產 = $10,000 速動比率 = ($10,000 - $1,000 - 500) / $10,000 = 0.85"}, {"n": 58, "a": 4, "q": "賒銷商品定價$50,000，商業折扣 10%，現金折扣 5%，若會計處理採總額法，而該筆款項於折扣期限內收到，試問下列會計處理何者正確？", "o": ["貸記應收帳款$42,500", "貸記現金$42,750", "貸記銷貨折扣$2,250", "借記現金$42,750"], "e": "商業折扣不入帳，應收帳款 = $50,000 * (1 - 10%) = $45,000； 現金折扣 = $45,000 * 5% = $2,250 借：現金 $42,750、銷貨折扣 $2,250；貸：應收帳款 $45,000。"}, {"n": 59, "a": 3, "q": "甲公司於 7 月 1 日取得乙客戶之票據一紙，面額$72,000，附息 5%，5 個月到期。甲公司於 8 月 1 日持該票據向銀行貼現，貼現率為 8%。甲公司可自銀行取得多少現金？", "o": ["$71,180", "$71,240", "$71,540", "$71,680"], "e": "到期價值 = $72,000 * (1 + 5% * 5/12) = $73,500 貼現利息 = $73,500 * 8% * 4/12 = $1,960 貼現金額 = $73,500 - $1,960 = $71,540"}, {"n": 60, "a": 4, "q": "泰山公司存貨之成本為$3,200、售價$3,500、估計銷售費用$50、正常毛利$350、重置成本為$2,800。該公司期末帳上之存貨金額應為：", "o": ["$2,800", "$2,850", "$3,000", "$3,200"], "e": "a = 成本 = $3,200，b = 淨變現價值 = $3,500 - $50 = $3,450，期末帳上存貨應按成本與淨變現價值孰低者衡量，故取 a、b 低者為存貨期末帳上金額，因$3,450 > $3,200，故答案為選項(4)。"}, {"n": 61, "a": 2, "q": "下列何者於資產負債表上應列為流動負債？", "o": ["須於報導期間結束日後 13 個月清償者", "因違反借款合約特定條件，致使長期負債依約須即期予以清償，且債權人並不同意不予追究", "因設備帳面金額與課稅基礎差異所產生之遞延所得稅負債", "5 年後到期之應付公司債"], "e": "如違反借款合約特定條件，致使長期負債依約須即期予以清償，該負債應列為流動負債。但如同時符合下列條件者，仍列為非流動負債：1.雖然違反合約規定，但於報導期間結束日前經債權人同意不予追究，並展期至報導期間結束日後逾 12 個月。2.於展期期間，企業有能力改正違約情況，債務人亦不得要求立即清償。選項(3)遞延所得稅負債一律分類為非流動。"}, {"n": 62, "a": 3, "q": "下列有關短期償債能力之敘述，何者正確？", "o": ["獲利能力好，償債能力亦佳", "流動比率至少應保持 150%", "應同時評估流動資產之品質", "最好持有高比例之現金"], "e": "選項(1)獲利能力佳並不代表有足夠之償債能力。選項(2)並無一定標準。選項(4)現金比例過高使公司營運不夠效率。"}, {"n": 63, "a": 4, "q": "本期進貨$280,000、銷貨$400,000、銷貨成本$300,000、期末存貨$30,000，則存貨週轉率為若干？", "o": ["3.5", "5", "6.67", "7.5"], "e": "存貨週轉率 = 銷貨成本 / 平均存貨 設期初存貨為 X，X + $280,000 - $30,000 = $300,000 -> X = $50,000 存貨週轉率 = $300,000 / (($30,000 + $50,000) / 2) = 7.5"}, {"n": 64, "a": 1, "q": "甲公司 X1 年初應收帳款總額為$100，當年度賒銷金額$1,000，應收帳款收現金額為$950，該公司年初與年底帳列備抵損失餘額均為應收帳款的 5%。該公司 X1 年度提列之預期信用損失為：", "o": ["$2.5", "$5", "$47.5", "$50"], "e": "期初備抵損失餘額 = $100 * 5% = $5，期末備抵損失餘額 = ($100 + $1,000 - $950) * 5% = $7.5，故提列預期信用損失$2.5。"}, {"n": 65, "a": 3, "q": "根據下列資料，銷貨毛利金額應為多少？ 期初存貨$18、進貨折扣$3、銷貨折扣$8、期末存貨$23、進貨總額$215、進貨運費$4、銷貨運費$7、進貨退回$2、銷貨退回$6、銷貨總額$440：", "o": ["$210", "$212", "$217", "$221"], "e": "銷貨淨額 = 銷貨總額 - 銷貨折扣 - 銷貨退回 = $440 - $8 - $6 = $426 進貨淨額 = 進貨總額 + 進貨運費 - 進貨折扣 - 進貨退回 = $215 + $4 - $3 - $2 = $214 銷貨成本 = 期初存貨 + 本期進貨 - 期末存貨 = $18 + $214 - $23 = $209 毛利 = $426 - $209 = $217"}, {"n": 66, "a": 1, "q": "群馬公司速動比率為 1.5，存貨占流動資產的 1/5，無預付費用及其他流動資產，流動負債為$600,000，則該公司之流動資產為若干？", "o": ["$1,125,000", "$900,000", "$875,000", "$750,000"], "e": "速動資產 = $600,000 * 1.5 = $900,000 設流動資產 = X，則存貨為 X/5，X - X/5 = $900,000 流動資產 = $1,125,000"}, {"n": 67, "a": 2, "q": "員工休假福利：", "o": ["或有負債", "需入帳的負債", "當員工休假時入帳為費用", "當員工退休時入帳為費用"], "e": "根據 IAS19 第 11 段之規定，員工休假福利之認列：為一項負債 (應計費用，扣除任何已付金額後)。若已付金額超過福利之折現金額，則企業應於該項預付金額導致致減少未來支付或退還現金等之範圍內，將超過部分認列為一項資產 (預付費用)。"}, {"n": 68, "a": 1, "q": "賒銷商品$20,000，付款條件為 2/10，1/20，n/30，若客戶於第 8 天先付現$9,800，並於第 19 天再付現$7,920，則該筆賒銷所產生之應收帳款尚有借餘多少？ (假公司以總額法入帳)：", "o": ["$2,000", "$4,000", "$4,260", "$4,460"], "e": "$20,000 - $9,800 / 98% - $7,920 / 99% = $2,000"}, {"n": 69, "a": 2, "q": "檉木公司 X1 年度之賒銷總額為$60,000，若應收帳款期初餘額為$10,000、期末餘額$20,000，則自客戶處收取之現金為：", "o": ["$40,000", "$50,000", "$60,000", "$70,000"], "e": "應收帳款期末餘額 = 期初餘額 + 本期賒銷額 - 收現數 $20,000 = $10,000 + $60,000 - 收現數 收現數 = $10,000 + $60,000 - $20,000 = $50,000"}, {"n": 70, "a": 3, "q": "甲公司所持有以外幣計價之存貨，以現時匯率及歷史匯率轉換為功能性貨幣後之金額如下表： 現時匯率 歷史匯率 存貨 (成本) $78,000 $81,250 存貨 (淨變現價值) $75,000 $71,500 請問甲公司當年底資產負債表中存貨之餘額應為多少？", "o": ["$81,250", "$78,000", "$75,000", "$71,500"], "e": "存貨成本以歷史匯率衡量 $81,250，淨變現價值以現時匯率衡量 $75,000，並取其較低者。"}, {"n": 71, "a": 1, "q": "北投公司 X1 年 12 月 31 日應收帳款總額為$750,000，其中逾期 30 天以上之帳款共計$200,000；該公司估計未逾期帳款之損失率為 2%，逾期 30 天以上之帳款損失率為 20%。若調整前備抵損失為貸餘$16,250，請問：該公司 X1 年度應提列多少預期信用損失於本期淨利？", "o": ["$34,750", "$38,750", "$51,000", "$67,250"], "e": "備抵損失 = ($750,000 - $200,000) * 2% + $200,000 * 20% = $51,000 預期信用損失 = $51,000 - $16,250 = $34,750"}, {"n": 72, "a": 1, "q": "甲公司自 20X1 年開始營業，其存貨相關資料如下： 20X3 年 20X4 年 期末存貨--採先進先出法 $10,400,000 $11,200,000 期末存貨--採加權平均法 9,200,000 9,600,000 則甲公司 20X4 年底先進先出法下之保留盈餘比加權平均法之保留盈餘多或少之金額 (不考慮所得稅)？", "o": ["多$1,600,000", "少$1,600,000", "多$400,000", "少$400,000"], "e": "$11,200,000 - $9,600,000 = $1,600,000"}, {"n": 73, "a": 2, "q": "奈川公司 X1 年度申報所得稅時有營業虧損$30,000，若該公司以前年度皆無虧損且預估 X2 年度課稅所得將大於$30,000，則於 X1 年底可認列何種項目？", "o": ["應收退稅款", "遞延所得稅資產", "預付 X1 年度所得稅", "不能認列任何資產"], "e": "我國稅法規定公司當年度之虧損可以遞轉以後十年來抵銷所得，會產生可減除暫時性差異，故應認列遞延所得稅資產。"}, {"n": 74, "a": 1, "q": "甲公司出售機器設備予乙公司，銷售價格為$100,000，銷售合約規定 X1 年 1 月 15 日甲公司須交付機器設備，惟甲公司需至 X1 年 2 月 1 日才具收取款項的權利。下列敘述何者正確？", "o": ["甲公司應於 1 月 15 日認列收入$100,000", "甲公司應於 2 月 1 日認列收入$100,000", "2 月 1 日甲公司帳上有合約資產$100,000", "1 月 15 日甲公司帳上有應收帳款$100,000"], "e": "合約資產是指企業依合約約定，已移轉商品或勞務予客戶，但仍未具無條件收取對價之權利；應收帳款是指依合約約定，已具無條件收取對價之權利。由於甲公司於 1 月 15 日已移轉商品而滿足履約義務，卻需至 2 月 1 日才具有收款的權利，因此甲公司應於 1 月 15 日認列收入及合約資產$100,000，並於 2 月 1 日將合約資產$100,000 轉列應收帳款$100,000。"}, {"n": 75, "a": 4, "q": "關於應收帳款，以下敘述何者正確？", "o": ["應收帳款應依國際財務報導準則第九號規定衡量。但未付息之短期應收帳款若折現之影響不大，得以原始發票金額衡量", "應收帳款業經貼現或轉讓者，應就該應收帳款之風險及報酬與控制之保留程度，評估是否符合國際財務報導準則第九號除列條件", "金額重大之應收關係人帳款，應單獨列示", "以上皆正確"], "e": "請見證券發行人財務報告編製準則。"}, {"n": 76, "a": 3, "q": "秋田公司宣告並發放所持有的 100,000 股福島公司股票作為財產股利，當時帳列之福島公司股票成本為每股 $20，市價則為每股 $30，而福島公司股票面額為每股 $10。假設宮城公司收到 1,000 股福島公司股票，則宮城公司應認列之股利收入金額為：", "o": ["$10,000", "$20,000", "$30,000", "依福島公司每股淨值而定"], "e": "發放財產股利時，以股利分配通過日為基準決定公允價值，本題福島公司股票公允價值為每股$30，所以宮城公司應認列股利收入 $30 * 1,000 = $30,000。"}, {"n": 77, "a": 2, "q": "川崎公司提列預期信用損失$20,000，提列存貨跌價損失$2,500，並採直線法提列設備折舊$8,000，上述交易將使川崎公司速動資產減少：", "o": ["$10,500", "$20,000", "$30,500", "$22,500"], "e": "速動資產不包括存貨和設備，本題中，提列預期信用損失時，借記「預期信用損失」作為本期損益，貸記「備抵損失」減少應收帳款淨額，故速動資產減少$20,000。"}, {"n": 78, "a": 2, "q": "奔騰公司於 X1 年第一季季末宣告現金股利，則該季之下列比率將受到何種影響？", "o": ["負債比率增加、權益報酬率減少", "負債比率增加、權益報酬率增加", "負債比率增加、權益報酬率不變", "負債比率不變、權益報酬率減少"], "e": "宣告發放現金股利時，借「股利」，貸「應付股利」，權益減少而流動負債增加，所以使負債比率增加，而權益減少也使報酬率增加。"}, {"n": 79, "a": 2, "q": "貴陽公司於 X1 年 8 月 1 日付現$31,500 支付一年保險費，交易當時借記預付保險費，X1 年初預付保險費餘額為$17,850。若貴陽公司 X1 年度該公司的保險費為$30,675，請問：該公司 X1 年底預付保險費餘額為多少？", "o": ["$17,025", "$18,675", "$44,325", "$49,355"], "e": "預付保險費餘額 = $17,850 + $31,500 - $30,675 = $18,675"}, {"n": 80, "a": 2, "q": "雲林公司在 X1 年底進行金融資產的減損測試，該資產的帳面金額為 $100,000，未來現金流量現值為$85,000，公允價值減去處分成本的價值為$80,000。試問：該公司應認列的減損損失為多少？", "o": ["$20,000", "$15,000", "$25,000", "$5,000"], "e": "減損損失 = 帳面金額 - 可回收金額 = $100,000 - $85,000 = $15,000"}, {"n": 81, "a": 3, "q": "基隆公司存貨採用定期盤存制，於 X1 年底的存貨盤點時，忘記盤點某些商品。此項疏失對該公司的 X1 年度銷貨毛利及 X2 年度的淨利之影響效果為何？", "o": ["高估；無影響", "高估；低估", "低估；高估", "低估；無影響"], "e": "X1 年期末存貨低估 -> X1 年銷貨成本高估 -> X1 年銷貨毛利低估。 X2 年期初存貨低估 -> X2 年銷貨成本低估 -> X2 年銷貨毛利高估且淨利高估。"}, {"n": 82, "a": 4, "q": "前程公司由其客戶處收到一張面額$30,000，6 個月到期，利率 10% 之票據。在收到二個月後因需要現金立即持向某銀行貼現，貼現息為 12%，試問前程公司將自銀行收到多少現金？", "o": ["$30,870", "$30,300", "$30,280", "$30,240"], "e": "應收票據到期值：$30,000 + ($30,000 * 10% * 6/12) = $31,500 貼現息 = 應收票據到期值 * 貼現率 * 期間 = $31,500 * 12% * 4/12 = $1,260 貼現收到之現金 = $31,500 - $1,260 = $30,240"}, {"n": 83, "a": 4, "q": "馬祖公司 X9 年度進貨$7,000,000，進貨運費為$1,000,000，X9 年底期末存貨比期初存貨多$2,000,000，銷貨毛利率為 60%，營業費用合計$3,000,000。馬祖公司 X9 年度營業淨利率為：", "o": ["25%", "30%", "35%", "40%"], "e": "銷貨成本 = $7,000,000 + $1,000,000 - $2,000,000 = $6,000,000； 營業淨利率 = [($6,000,000 / 0.4) - $6,000,000 - $3,000,000] / ($6,000,000 / 0.4) = 40%。"}, {"n": 84, "a": 2, "q": "甲公司將兩個月期，年利率 7%，面額$25,000 之應收票據乙紙，持往銀行貼現，該票據貼現時，尚有一個月到期，貼現率為 11%，則其貼現息應為：", "o": ["$291.67", "$231.84", "$229.17", "$145.83"], "e": "($25,000 + $25,000 * 7% * 2/12) * 11% * 1/12 = $231.84"}]}, {"id": 3, "title": "第3章 現金流量分析及財務預測", "questions": [{"n": 1, "a": 3, "q": "公司宣告並發放現金股利，則：", "o": ["純收益增加", "營運現金流量增加", "現金減少", "資產總額不變"], "e": "選項(1)錯誤，沒有影響。選項(2)錯誤，沒有影響。選項(3)正確。選項(4)錯誤，資產總額減少。"}, {"n": 2, "a": 2, "q": "波士頓公司不動產、廠房及設備毛額$10,000、長期投資$20,000、其他資產$5,000、營運資金$3,000、長期負債$60,000、營業之淨現金流入$35,000 及現金股利$15,000，則現金再投資比率為何？", "o": ["0.63", "0.53", "0.43", "0.33"], "e": "現金再投資比率 = (營業之淨現金流入 - 現金股利) / (不動產、廠房及設備毛額 + 長期投資 + 其他資產 + 營運資金) = ($35,000 - $15,000) / ($10,000 + $20,000 + $5,000 + $3,000) = 0.53"}, {"n": 3, "a": 2, "q": "四方公司將一部新機器的報稅折舊方法由直線法改為年數合計法，但會計帳上未改變方法，則在剛開始折舊時：", "o": ["純收益增加", "營運現金流量增加", "現金減少", "投資現金流量減少"], "e": "報稅折舊方法由直線法改為年數合計法則期初折舊費用，具有節稅效果，營運現金流量增加，現金金額增加，不影響投資現金流量。因帳上方法未改，故不影響公司的純益。"}, {"n": 4, "a": 3, "q": "下列何者為來自籌資活動的現金流量？", "o": ["購買不動產、廠房及設備", "應計費用增加", "借入長期負債", "應收帳款減少"], "e": "選項(1)錯誤，為投資活動。選項(2)錯誤，其為營業活動之現金流量。選項(3)正確。選項(4)錯誤，其為營業活動之現金流量。"}, {"n": 5, "a": 1, "q": "下列何者不影響直接法下營業活動之現金流量？", "o": ["處分舊資產利益", "應付款增加額", "應計所得稅增加額", "進貨增加"], "e": "選項(1)不會影響營業活動，選項(2)(3)(4)會影響營業活動。"}, {"n": 6, "a": 4, "q": "下列敘述何者為真？", "o": ["每股現金流量其值通常較每股盈餘為低", "短期借款之增減屬於投資活動之現金流量", "資金流量分析為一種靜態分析", "不論採用直接法或間接法表達營業活動之現金流量，投資活動及籌資活動之現金流量皆為相同"], "e": "選項(1)錯誤，因現金流量未扣除折舊費用，故每股現金流量其值通常較每股盈餘為高。選項(2)錯誤，短期借款為籌資活動。選項(3)錯誤，其為一種動態分析。選項(4)正確，不論營業活動部分是以直接法或間接法表達，現金流量表中的投資活動與籌資活動兩部分並不受影響。"}, {"n": 7, "a": 4, "q": "現金流量允當性比率，其目的：", "o": ["衡量企業由銷貨創造現金流入之能力", "淨利中現金流量的比率", "三或五年之間現金流量趨勢", "係在衡量營業活動所產生的淨現金流量是否足以支付各項資本支出、存貨淨投資及發放現金股利"], "e": "現金流量允當性比率乃是在衡量由營業產生之資金，是否足以支應企業業務成長所需資金及分配股利所需資金。"}, {"n": 8, "a": 4, "q": "青山公司於 X1 年 1 月 1 日以現金$40,000,000 購入油井設備。該設備使用年限為 10 年，10 年後拆除該設備的預計成本為$8,000,000 (按年利率 10%折現的現值金額為$3,084,400)。根據該公司現況年利率 10%應屬合理。試問下列對該公司 X1 年度該交易事項應記錄費用之敘述何者正確？", "o": ["折舊費用$4,800,000", "折舊費用$4,000,000 及利息費用$308,440", "折舊費用$4,000,000 及利息費用$800,000", "折舊費用$4,308,440 及利息費用$308,440"], "e": "折舊費用 = ($40,000,000 + $3,084,400) / 10 = $4,308,440 利息費用 = $3,084,400 * 10% = $308,440"}, {"n": 9, "a": 3, "q": "乙公司為甲公司持股 80%的子公司，今年現金增資$10,000,000，甲公司以$8,000,000 參與增資案的 80%，其他的 20%則向非控制股東募得$2,000,000。試問在合併的現金流量表中，該項交易為何種活動之現金流量，其金額為何？", "o": ["屬投資活動，現金流出$8,000,000", "屬投資活動，現金流入$2,000,000", "屬籌資活動，現金流入$2,000,000", "屬籌資活動，現金流入$10,000,000"], "e": "合併報表會將母子公司間的交易沖銷，僅增加從非控制股東募得$2,000,000，且屬籌資活動。"}, {"n": 10, "a": 1, "q": "下列何者非屬於約當現金？", "o": ["上市 (櫃) 公司股票", "外幣活存", "三個月內到期的定存", "兩個月內到期的國庫券"], "e": "約當現金係指形式上非屬現金，但隨時可轉換成定額現金，或即將到期且利率變動對其價值的影響很小的短期且具高度流動性的投資，但不包括股票。"}, {"n": 11, "a": 3, "q": "計算營業活動淨現金流量時，下列項目何者不可列入？", "o": ["預收貨款的減少", "遞延所得稅負債的變動", "應付銀行票據變動", "存出保證金變動"], "e": "應付銀行票據變動為一籌資活動不應計入。"}, {"n": 12, "a": 4, "q": "若福記公司 20X5 年淨利$11,000、不動產、廠房及設備折舊為$6,500、專利權攤銷$1,000、應付公司債折價攤銷$500、預付費用減少$2,000、投資非交易目的證券$3,500，該公司將利息支出分類為營業活動現金流量。試問該公司當年度之營業活動現金流量為何？", "o": ["$18,500", "$17,500", "$20,000", "$21,000"], "e": "$11,000 + $6,500 + $1,000 + $500 + $2,000 = $21,000"}, {"n": 13, "a": 1, "q": "克林公司 X1 年度淨現金流入$25,000，其 X1 年間售出舊機器得款$30,000 無損益、不動產、廠房及設備折舊為$1,000、發放股利$5,000、投資廠房$35,000，假設無其他與計算純益相關的資料，則該公司 X1 年純益為何？", "o": ["$34,000", "$21,000", "$20,000", "$17,500"], "e": "X1 年純益 + $30,000 + $1,000 - $5,000 - $35,000 = $25,000 X1 年純益 = $34,000"}, {"n": 14, "a": 1, "q": "下列哪個措施，會增加公司純益，增加營運現金以及使得現金總額增加？", "o": ["減少維修費用之支出", "延緩必要之資本支出", "延長對供應商的付款期間，而放棄現金折扣", "發行新股以收購企業"], "e": "選項(1)正確。選項(2)錯誤，此舉不改變純益及營運現金。選項(3)錯誤，此舉造成純益減少，其餘兩項目增加。選項(4)錯誤，此舉不改變純益及現金。"}, {"n": 15, "a": 1, "q": "甲公司 X3 年出售土地獲得現金$360,000，出售設備獲得現金$400,000，發行普通股獲得現金$280,000，購買設備支付現金$210,000，支付現金股利$240,000，請問該公司 X3 年度投資活動現金流量為多多？", "o": ["$550,000", "$590,000", "$830,000", "$310,000"], "e": "$360,000 + $400,000 - $210,000 = $550,000"}, {"n": 16, "a": 4, "q": "下列何者並非現金流量表之功能？", "o": ["評估公司盈餘的品質", "評估對外部資金的依賴程度", "評估公司的財務彈性", "評估資產的管理效能"], "e": "選項(1)錯誤，現金流量表可看出其盈餘是否能產生足夠的現金。選項(2)錯誤，由籌資活動現金比例，可以看出。選項(3)錯誤，可看出公司是否可以產生足夠的現金以因應外在環境變動。選項(4)正確，現金流量表無法反映資產的管理效能。"}, {"n": 17, "a": 2, "q": "已知甲公司 X1 年度自由現金流量為$25,000，當年度資本支出共$25,000，無任何現金股利，當年度平均流動負債$100,000、平均流動資產$80,000，假設無其他攸關項目下，請問該公司當年度營業淨現金流量對流動負債比率為若干：", "o": ["0.56", "0.5", "0.39", "0.28"], "e": "營業活動淨現金流量 = $25,000 + $25,000 = $50,000 營業淨現金流量對流動負債比率 = 營業活動淨現金流量 / 平均流動負債 = $50,000 / $100,000 = 0.5"}, {"n": 18, "a": 4, "q": "下列有關現金流量表之敘述何者錯誤？", "o": ["庫藏股的買回與再發行屬籌資活動", "購買設備流出現金為投資活動", "應收帳款與預付費用之變動會影響營業活動之現金流量", "購買交易目的之股票屬投資活動"], "e": "企業應交易目的而持有證券投資，其性質與專供出售而取得之存貨類似，因此，取得或出售該等項目所產生之現金流量應分類為營業活動。"}, {"n": 19, "a": 2, "q": "下列敘述何者正確？", "o": ["發放股票股利為一種交換交易，應於現金流量表中揭露", "非流動資產增加，通常為投資活動之現金流出", "因借款而產生之利息支出，我國企業實務上通常列為籌資活動之現金流出", "設備增加，會使營業活動的現金流出增加"], "e": "選項(1)錯誤，發放股票股利並無實際之交易，也無現金來往，不必記入現金流量表也不用揭露。選項(2)正確，非流動資產通常是長期投資或不動產、廠房及設備，所以是投資活動。選項(3)錯誤，利息支出雖由籌資活動產生，但因列入損益表作為當期損益，故我國企業實務上通常列為營業活動之現金流量，惟依 IAS 7 規定，亦得分類為籌資活動之現金流量。選項(4)錯誤，設備屬不動產、廠房及設備，為投資活動的現金流量。"}, {"n": 20, "a": 4, "q": "投資人應對企業的財務報表深入觀察以避免「黑字倒閉」的發生，請問下列哪一種資訊有助於避免掉入「黑字倒閉」的陷阱中？", "o": ["損益表上的純益率", "權益變動表上的每股盈餘", "企業的淨值報酬率", "現金流量表"], "e": "「黑字倒閉」是企業在有盈餘的情況下倒閉，通常是因為現金週轉不靈導致，故投資人要觀察現金流量表以了解企業現金流量情形。"}, {"n": 21, "a": 3, "q": "由來自營業活動現金流量為負值，可知：", "o": ["當期公司現金餘額減少", "營業活動現金流量小於淨利", "營業活動使用之現金數較所得到之現金數多", "公司應收帳款餘額快速增加"], "e": "現金流量若為負值表示現金流出大於現金流入，也就是使用的現金較所得到的多。"}, {"n": 22, "a": 2, "q": "現金流量表將協助財務報表使用者：", "o": ["預測未來銷售收入", "評估應計基礎和現金基礎淨利間差異產生的理由", "決定公司股票的市價", "評估公司保全現金與約當現金之能力"], "e": "透過現金流量表可以知道各項現金流動，故可了解以應計基礎記錄的現金和以現金基礎記錄的現金差異點。"}, {"n": 23, "a": 3, "q": "下列關於折舊費用的敘述何者為非？", "o": ["它通常可以使稅負減少", "會計上提列之折舊多寡與資產價值的下降幅度並沒有必然的關係", "它之所以被稱為費用是因為它是一種現金支出", "它具有稅盾的效果"], "e": "折舊費用是由於長期資產在各期提供效益而將成本平均分攤於各期，為收益費用配合原則之應用，並不是現金支出。"}, {"n": 24, "a": 4, "q": "以間接法編製現金流量表時，請問下列何種狀況是現金流量的加項？", "o": ["存貨增加", "應付帳款減少", "發放現金股利", "應收帳款減少"], "e": "以間接法編製現金流量表時，流動資產的減少、流動負債增加以及各項不影響現金的攤銷費用，皆為淨利之加項；反之，流動資產的增加或流動負債的減少則為淨利之減項。"}, {"n": 25, "a": 4, "q": "下列何者並非現金流量表上的籌資活動？", "o": ["企業發行公司債借款", "現金增資", "購買庫藏股票", "收到現金股利"], "e": "籌資活動包括業主投資、分配給業主、籌資舉債及償還等活動，而利息收入及股利收入雖由投資活動產生，但因列入損益表作為當期損益，故我國企業實務上通常將其列為營業活動之現金流量，惟依 IAS 7 規定，亦得分類為投資活動之現金流量。"}, {"n": 26, "a": 2, "q": "企業收回借出的款項，應列為現金流量表上的哪一個項目？", "o": ["籌資活動之現金流入", "投資活動之現金流入", "籌資活動之現金流出", "投資活動之現金流出"], "e": "投資活動包括借出及收回貸款，取得及處分非營業活動產生的債權、權益證券、不動產、廠房及設備、天然資產、無形資產及其他投資。"}, {"n": 27, "a": 4, "q": "下列何者並不影響現金之投資與籌資活動？", "o": ["購買設備", "支付股利給股東", "宣告現金股利", "發行普通股交換土地"], "e": "發行普通股交換土地並無現金之支出或收入。"}, {"n": 28, "a": 4, "q": "依我國企業實務上慣用歸類方式，下列何者不屬營業活動的現金流量？ (調整項目亦屬之)", "o": ["商品應收帳款減少", "建築物折舊費", "收到現金股利", "發行公司債"], "e": "在營業活動中，以間接法編製現金流量表時，流動資產的減少或流動負債增加以及各項不影響現金的攤銷費用皆為淨利之加項；反之，流動資產的增加或流動負債的減少則為淨利之減項。選項(4)屬籌資活動的現金流量。"}, {"n": 29, "a": 2, "q": "下列何種情況最可能出現在一個新成立且急速擴充的企業之現金流量表？", "o": ["投資活動現金流量淨額大於 0；籌資活動現金流量淨額小於 0", "投資活動現金流量淨額小於 0；籌資活動現金流量淨額大於 0", "投資活動現金流量淨額小於 0；籌資活動現金流量淨額小於 0", "投資活動現金流量淨額大於 0；籌資活動現金流量淨額大於 0"], "e": "新成立且急速擴充之企業會有許多籌資活動的現金流入，在投資活動上由於是新成立，故購買許多不動產、廠房及設備會使投資活動的現金流出，因此投資活動現金流量淨額會小於 0，而籌資活動會大於 0。"}, {"n": 30, "a": 2, "q": "一般而言，下列哪一項目和企業現金流量的預測最為密切？", "o": ["預測進貨金額", "預測之銷貨金額", "預估資金成本", "預測之營業費用金額"], "e": "要做現金流量預測時，必須先做銷貨預算 -> 生產預算 -> 投資理財預算，到最後才能做現金預算，故銷貨金額的預測和現金流量預測是相當有關係的。"}, {"n": 31, "a": 3, "q": "在間接法編製的現金流量表中，應單獨揭露哪些項目之現金流出？", "o": ["利息支付金額", "所得稅支付金額", "選項(1)、(2)都需揭露", "在間接法之下，現金流量表不應出現任何現金支付的項目"], "e": "依 IAS 7 規定，利息及股利收付之現金流量及來自所得稅之現金流量均應單獨揭露。"}, {"n": 32, "a": 3, "q": "波士頓公司從公開市場中買入該公司已發行之股票，這一交易在現金流量表中應列為：", "o": ["營業活動", "投資活動", "籌資活動", "減資活動"], "e": "公司發行股票為籌資活動，買入庫藏股等於收回已發行之股票，故為籌資活動。"}, {"n": 33, "a": 4, "q": "西雅圖公司 X1 年度利息費用付現金額為$8,000，已知期末應付利息比期初增加$2,500，另有$1,000 應付公司債折價攤銷。假設無利息資本化情況，則西雅圖公司 X1 年度損益表中的利息費用金額為：", "o": ["$8,500", "$9,500", "$10,500", "$11,500"], "e": "利息費用付現$8,000，而期末應付利息較期初增加$2,500，可知$2,500 利息費用未付，另公司債折價攤銷應視為利息費用，本期利息費用為 $8,000 + $2,500 + $1,000 = $11,500。"}, {"n": 34, "a": 2, "q": "企業因基本假設發生變動，而對已發布的財務預測所作的修正，稱為：", "o": ["財務預測更正", "財務預測更新", "財務預測更換", "財務預測追溯調整"], "e": "財務預測的修正有二種：1.財務預測更正：指財務預測發生錯誤，於發布後作修正。2.財務預測更新：指因基本假設 (如：數量、價格、生產率等) 已發生變動而作修正。"}, {"n": 35, "a": 3, "q": "下列關於財務預測的敘述，何者有誤？", "o": ["財務預測應於每頁標明「預測」字樣", "財務預測應包括「係屬估計，將來未必能完全達成」之聲明", "應標明財務預測所涵蓋的期間，但可不標明財務預測編製完成的日期", "編製財務預測所使用的重要會計政策應彙總揭露"], "e": "財務預測應揭露編製完成之日期。"}, {"n": 36, "a": 4, "q": "下列何者並非簡式財務預測包含之內容？", "o": ["董事會通過日期", "其他綜合損益", "取得或處分重大資產", "重要會計政策之彙總說明"], "e": "選項(4)為完整式財務預測需包含之內容，簡式財務預測不一定需包含重要會計政策之彙總說明。"}, {"n": 37, "a": 1, "q": "如果要預測一企業短期現金流量，則現金流量表中的哪一個項目可能提供較多的訊息？", "o": ["與營業活動有關的現金流量", "與投資活動有關的現金流量", "與籌資活動有關的現金流量", "流動資產增減變動的淨額"], "e": "營業活動的現金流量是從企業在一會計期間內的各項營業活動而來，故較能反映短期現金流量，而投資和籌資活動則屬企業中關於不動產、廠房、設備及長期資金的部分，較不能預測短期現金流量。"}, {"n": 38, "a": 3, "q": "下列事項是否應在現金流量表中報導？", "o": ["可轉換公司債轉換為普通股：是；可轉換特別股轉換為普通股：否", "可轉換公司債轉換為普通股：是；可轉換特別股轉換為普通股：是", "可轉換公司債轉換為普通股：否；可轉換特別股轉換為普通股：否", "可轉換公司債轉換為普通股：否；可轉換特別股轉換為普通股：是"], "e": "可轉換公司債和可轉換特別股轉換成普通股，皆屬不影響現金流量的籌資活動，無須於現金流量表中報導，惟因屬交換交易，仍應於財務報表的其他部分 (例如財務報表之附註) 作補充揭露。"}, {"n": 39, "a": 4, "q": "下列哪些揭露事項是屬於財務預測的一部分？ 甲.企業的財務預測係屬估計，將來未必能完全達成之聲明；乙.重要會計政策的彙總說明；丙.基本假設的彙總說明", "o": ["僅甲", "僅乙和丙", "僅甲和丙", "甲、乙和丙"], "e": "財務預測包括銷售預測、資金需求預測及預估財務報表的編製等工作。甲、財務預測僅為估計，無法保證將來能完全達成。乙、丙皆屬於預估財務報表的編製時，所必須揭露的事項。"}, {"n": 40, "a": 2, "q": "何謂利息資本化？", "o": ["將借款用於購買存貨的利息資本化", "將借款用於建設資產的利息資本化", "將借款用於支付營運費用的利息資本化", "將借款用於支付股利的利息資本化"], "e": "利息資本化指的是為建設資產而借款所支付的利息，這部分利息應計入資產成本。"}, {"n": 41, "a": 2, "q": "丹佛公司 (非建築業) 本年度淨利頗佳，惟營業活動之現金流量卻為負值，其可能原因因為：", "o": ["應付帳款增加", "有一大部分淨利係來自處分不動產、廠房及設備", "存貨減少", "選項(1)(2)(3)皆是"], "e": "選項(1)、(3)流動資產增加都是作為調整淨利的加項。選項(2)處分不動產、廠房及設備為投資活動，在計算營業活動現金流量時應自淨利中扣除。"}, {"n": 42, "a": 3, "q": "償還短期借款，應列為何種活動之現金流出？", "o": ["投資活動", "營業活動", "籌資活動", "其他活動"], "e": "籌資活動包括業主投資、分配給業主、籌資舉債及償還等。"}, {"n": 43, "a": 3, "q": "處分土地乙筆，成本$3,500、處分利益$500，則應於投資活動項下列入現金流入：", "o": ["$3,000", "$1,000", "$4,000", "$0"], "e": "成本$3,500，另有處分利益$500，表示共有$3,500 + $500 = $4,000 的投資活動現金流入。"}, {"n": 44, "a": 1, "q": "現金流量表上最能衡量企業繼續經營能力的資訊為何？", "o": ["來自營業活動之現金流量", "來自投資活動之現金流量", "來自籌資活動之現金流量", "不影響現金之投資活動或籌資活動"], "e": "來自營業活動之現金流量最能衡量企業繼續經營能力。"}, {"n": 45, "a": 2, "q": "下列何者在現金流量表中，若以間接法編製營業活動的現金流量，當由淨利調整為從營業而來之現金時，應列為減項？", "o": ["應付公司債折價攤銷", "依權益法認列之投資收益", "應付利息增加", "遞延所得稅負債增加"], "e": "投資收益在損益表上列為收入，雖使淨利增加，但事實上並未增加現金，故在計算「營業活動之現金流量」時，應將其自本期淨利中扣除，故選(2)。選項(1)(3)(4)則應列為加項。"}, {"n": 46, "a": 2, "q": "鐘碩公司 X1 年度淨利為$30,000、外幣兌換損失$6,000、應付公司債溢價攤銷$1,000、折舊費用$2,000、應收帳款增加數$10,000、其他應付款減少數$4,000，則鐘碩公司 X1 年度來自營業活動之淨現金流入為：", "o": ["$11,000", "$23,000", "$31,000", "$15,000"], "e": "淨利 $30,000 加：外幣兌換損失 6,000 折舊費用 2,000 減：應付公司債溢價攤銷數 (1,000) 應收帳款增加數 (10,000) 其他應付款減少數 (4,000) 營業活動之淨現金流入 $23,000"}, {"n": 47, "a": 2, "q": "桃園公司為一曆年制公司，本年度產生銷貨收入 2,000 萬元及銷貨成本 700 萬元，其他交易事項則包括：一、公司於本年度 4 月 30 日向銀行借款 1,000 萬元，利率 3%，約定每年初付息。二、經律師評估可能獲賠 200 萬元之官司仍在纏訟中。試問該公司本期淨利為何？", "o": ["1,480 萬元", "1,280 萬元", "1,270 萬元", "1,470 萬元"], "e": "本期淨利 = 銷貨收入 - 銷貨成本 - 利息費用 = 2,000 萬元 - 700 萬元 - 1,000 萬元 * 3% * 8/12 = 1,280 萬元"}, {"n": 48, "a": 4, "q": "林肯公司 110 年之淨利為$25,000、折舊費用為$9,000，其流動資產及流動負債有關資料如下： 109/12/31 110/12/31 現金及約當現金 $2,000 $15,000 應收帳款 6,000 8,000 存貨 8,000 5,000 應付帳款 4,000 5,000 銀行借款 5,000 3,000 則 110 年來自營業活動之現金流量為若干？", "o": ["$31,000", "$33,000", "$34,000", "$36,000"], "e": "來自營業活動之現金流量 = $25,000 + $9,000 - ($8,000 - $6,000) + ($8,000 - $5,000) + ($5,000 - $4,000) = $36,000"}, {"n": 49, "a": 2, "q": "羅理公司本年度稅後淨利為$20,000，本年度損益表中列有折舊費用$5,000、出售不動產、廠房及設備損失$4,000 及所得稅費用$4,500 等，試計算該公司本年度由營業活動產生之現金為：", "o": ["$31,000", "$29,000", "$25,000", "$24,000"], "e": "$20,000 + $5,000 + $4,000 = $29,000"}, {"n": 50, "a": 1, "q": "下列何者非屬交換交易，不須在財務報表的其他部分中揭露？", "o": ["盈餘轉增資", "發行股票交換不動產、廠房及設備", "公司債轉換為普通股", "以債務承受取得不動產、廠房及設備"], "e": "發行股票交換不動產、廠房及設備、公司債轉換為普通股、以債務承受取得不動產、廠房及設備均為不影響現金流量之重大投資或籌資活動；不影響現金流量之交易中，與投資、籌資活動無關者，例如發放股票股利、進行股票分割及指撥保留盈餘等，非屬交換交易。"}, {"n": 51, "a": 3, "q": "採用間接法編製現金流量表時，下列何項在現金流量表中應自稅前淨利減除，以求得來自營業活動的現金流量？", "o": ["折舊費用", "稅後利息費用", "應付公司債溢價攤銷", "應付公司債折價攤銷"], "e": "溢價攤銷每期轉為利息費用之減項而增加淨利，但是並無實際現金流入，故應自稅前淨利中扣除。"}, {"n": 52, "a": 3, "q": "採用直接法編製的現金流量表，無法用來直接評估下列哪一項目？", "o": ["未來淨現金流入之能力", "償還負債與支付股利能力", "本期損益與營業活動產生現金流量之差異原因", "本期現金與非現金之投資及籌資活動對財務狀況的影響"], "e": "直接法是以各項營業活動科目的變化算出營業活動的現金流量，所以無法像間接法 (以損益表之淨利為基礎調整現金流量) 可看出本期損益和營業活動之現金流量的差異原因。"}, {"n": 53, "a": 3, "q": "哥倫布公司依我國企業實務慣用分類方式編製現金流量表，該公司於 X1 年 6 月 30 日發行公司債，獲得$10,000,000 現金，並於 12 月 31 日支付公司利息$400,000。上述事件對該公司 X1 年度現金流量表的影響為：", "o": ["投資活動現金增加$10,000,000，籌資活動現金減少$400,000，營業活動無影響", "投資活動無影響，籌資活動現金增加$9,600,000，營業活動無影響", "投資活動無影響，籌資活動現金增加$10,000,000，營業活動現金減少$400,000", "投資活動現金增加$9,600,000，籌資活動無影響，營業活動無影響"], "e": "發行公司債為籌資活動，而支付利息雖由籌資活動而來，但因其列入損益表，故通常視為營業活動之現金流出。本題計有籌資活動現金增加$10,000,000，營業活動現金減少$400,000，而投資活動無影響。"}, {"n": 54, "a": 3, "q": "哥倫比亞公司以$5,000,000 發行公司債，由鳳凰城公司購入，上述交易在各公司現金流量表中應列為：", "o": ["哥倫比亞公司：投資活動；鳳凰城公司：投資活動", "哥倫比亞公司：投資活動；鳳凰城公司：籌資活動", "哥倫比亞公司：籌資活動；鳳凰城公司：投資活動", "哥倫比亞公司：籌資活動；鳳凰城公司：籌資活動"], "e": "發行公司債為籌資活動，購入債務證券則為投資活動。"}, {"n": 55, "a": 2, "q": "依照公開發行公司公開財務預測資訊處理準則的規定，財務預測：", "o": ["發布之後不能再修正", "編製完成後，應提報董事會通過", "和實際結果的誤差不能大於 10%", "如屬上市 (櫃) 公司，財務預測的公開方式僅限定完整式財務預測"], "e": "選項(1)錯誤，應定期與實際結果作比較，可作更正及更新。選項(3)(4)錯誤，準則無此強制規定。"}, {"n": 56, "a": 3, "q": "以間接法編製現金流量表中的「來自營業活動的現金流量」時，下列何項敘述正確？", "o": ["應加入存貨增加之金額", "應減除預付費用減少之金額", "應減除清償公司債之利益", "應加入再發行庫藏股之金額"], "e": "以間接法編製現金流量表中的「來自營業活動的現金流量」時，流動資產的減少或流動負債及各項不影響現金的攤銷費用皆為淨利之加項；反之，流動資產的增加或流動負債的減少則為淨利之減項。而選項(3)清償公司債屬籌資活動，故清償利益應自淨利中減除。"}, {"n": 57, "a": 2, "q": "當不動產、廠房及設備以低於帳面金額之金額出售，對現金流量表的影響為：", "o": ["在間接法之下，處分損失應列為營業活動現金流量的減項調整", "在直接法之下，處分損失不需列入現金流量表", "處分不動產、廠房及設備損失應列為投資活動現金流量的減項", "處分不動產、廠房及設備損失應於投資活動現金流量中加回"], "e": "處分損失應自營業活動中扣除而不列為投資活動，故為營業活動現金流量之加項。"}, {"n": 58, "a": 1, "q": "下列會計項目何者不得列報於綜合損益表作為本期淨利之一部分？", "o": ["非常損失", "財務成本", "停業單位損失", "除列按攤銷後成本衡量之金融資產淨損益"], "e": "根據 IAS 1.87 不得於綜合損益表列報非常損益。"}, {"n": 59, "a": 2, "q": "「每股現金流量」衡量的是：", "o": ["(現金收入-現金支出) / 流通在外股數", "企業由內部產生現金的能力", "企業的獲利能力", "企業短期償債能力"], "e": "公式 = (營業活動淨現金流量-特別股股利) / 流通在外普通股股數，顯示每股的資金流量，衡量企業由營運活動產生現金之能力。"}, {"n": 60, "a": 2, "q": "編製母公司之現金流量表時，為取得子公司股權所支付之現金為：", "o": ["營業活動", "投資活動", "籌資活動", "不影響現金流量之投資或籌資活動"], "e": "企業取得或處分子公司或分支機構之總現金流量應於現金流量表之投資活動中單獨表達。"}, {"n": 61, "a": 3, "q": "依 IAS 7「現金流量表」之彈性規定，利息費用付現得列於現金流量表中之何項活動？", "o": ["營業活動或投資活動", "投資活動或籌資活動", "營業活動或籌資活動", "不影響現金流量之投資及籌資活動"], "e": "利息費用付現通常被分為為營業活動，惟依 IAS 7 規定，亦得分類為籌資活動之現金流量。"}, {"n": 62, "a": 4, "q": "依我國企業實務慣用分類方式編製現金流量表時，以現金償付貸款之本金及利息，於現金流量表上可如何表達？", "o": ["全部作為營業活動", "全部作為投資活動", "本金部分屬於營業活動，利息部分屬於籌資活動", "本金部分屬於籌資活動，利息部分屬於營業活動"], "e": "償還本金為籌資活動之現金流出，支付利息通常分類為營業活動之現金流出。"}, {"n": 63, "a": 4, "q": "現金流量表之現金不包括下列何項？", "o": ["活期存款", "支票存款", "可轉讓定期存單", "人壽保險解約現金價值"], "e": "人壽保險解約現金價值為「投資」，並不屬於現金。"}, {"n": 64, "a": 2, "q": "現金流量表將企業在特定期間之活動區分為數種，下列何者非屬之？", "o": ["營業活動", "管理活動", "投資活動", "籌資活動"], "e": "現金流量表應報導企業在特定期間之營業、投資及理財活動所產生之現金流入與流出，其格式應按 1.營業活動、2.投資活動及 3.籌資活動劃分。"}, {"n": 65, "a": 3, "q": "現金流量表分析資金流入與流出，並按投資、營業、籌資三項活動歸類，若依我國企業實務慣用分類方式編製現金流量表，則現金股利之分配應屬何種活動？", "o": ["營業活動", "投資活動", "籌資活動", "選項(1)(2)(3)皆是"], "e": "籌資活動包括業主投資、分配給業主、籌資舉債及償還等，所以支付股利為籌資活動之現金流量。"}, {"n": 66, "a": 1, "q": "依 IAS 7 規定，收到現金股利與利息，在現金流量表中可歸屬何種活動之現金流量？", "o": ["營業活動或投資活動", "投資活動或籌資活動", "營業活動或籌資活動", "僅可歸屬為營業活動"], "e": "利息收入及股利收入，我國企業實務上通常因其列入損益表作為當期損益，而將其列為營業活動之現金流量。惟依 IAS 7 規定，亦得分類為投資活動之現金流量。"}, {"n": 67, "a": 2, "q": "下列何者非屬投資活動之現金流量？", "o": ["出售設備", "舉借債務", "貸款予其他企業", "購入按攤銷後成本衡量債券投資"], "e": "舉借債務屬籌資活動之現金流量。"}, {"n": 68, "a": 3, "q": "現金流量表本身通常不會列示下列哪一項目？", "o": ["股票溢價發行", "支付現金股利", "發放股票股利", "股票買回及註銷"], "e": "發放股票股利不影響現金，且不屬投資活動也不屬籌資活動，所以現金流量表中不揭露。"}, {"n": 69, "a": 3, "q": "竹圍公司 X1 年度的會計事項如下：支付所得稅$300,000、發放現金股利$560,000、購買設備支付現金$892,500、發行普通股獲得現金$1,000,000、出售土地獲得現金$1,312,500、出售設備獲得現金$995,000。請問：該公司 X1 年度投資活動現金流量為多多？", "o": ["$855,000", "$1,315,000", "$1,415,000", "$1,885,000"], "e": "投資活動淨現金流入 = 出售土地獲得現金$1,312,500 + 出售設備獲得現金$995,000 - 購買設備支付現金$892,500 = $1,415,000"}, {"n": 70, "a": 1, "q": "奕倫公司有一塊帳面金額為 100 萬元的土地被政府徵收，徵收價格為 120 萬元，並繳納各項稅款共計 5 萬元，本期淨利中包含此項處分土地利益。上述事件對營業活動現金流量的影響為：", "o": ["現金流出 5 萬元", "現金流入 115 萬元", "現金流入 15 萬元", "現金流出 15 萬元"], "e": "處分不動產、廠房及設備屬投資活動，但由於稅款繳納屬於營業活動，故有營業活動現金流出 5 萬元。"}, {"n": 71, "a": 4, "q": "甲公司在 X1 年初支付$150,000 購買一項無形資產，預計使用年限為 10 年。若在 X3 年初估計資產的剩餘使用年限改為 5 年，則 X3 年的攤銷費用為多少？", "o": ["$15,000", "$18,000", "$22,500", "$24,000"], "e": "X1 年和 X2 年累計攤銷 = $150,000 / 10 * 2 = $30,000 帳面金額 = $150,000 - $30,000 = $120,000 X3 年起新的攤銷費用 = $120,000 / 5 = $24,000"}, {"n": 72, "a": 1, "q": "品妍公司於 X3 年度曾出售一批不動產、廠房及設備，其原始成本為$500,000，出售時的累計折舊為$250,000，而得之價款為$350,000。上述事項在間接法現金流量表中應如何列示？", "o": ["從稅前淨利中減除$100,000，並從投資活動增加$350,000 現金流量", "從稅前淨利中減除$100,000，並從籌資活動減少$350,000 現金流量", "從稅前淨利中加回$350,000，並從投資活動增加$250,000 現金流量", "從稅前淨利中加回$250,000，並從籌資活動減少$350,000 現金流量"], "e": "帳面金額$500,000 - $250,000 = $250,000，售價$350,000 處分利益：$350,000 - $250,000 = $100,000，處分不動產、廠房及設備屬投資活動，故調整淨利減少$100,000，並於投資活動列$350,000 現金流入。"}, {"n": 73, "a": 1, "q": "浣熊公司專營代工事業，本期營業情況如下：銷貨收入為$60,000，應收帳款本期增加$30,000，預收貨款本期增加$45,000。試問本期自客戶收現金額為？", "o": ["$75,000", "$45,000", "$60,000", "$135,000"], "e": "本期從顧客收現金額 = 本期銷貨收入 - 本期應收帳款 (或票據) 變動數 + 本期預收貨款變動數，故$60,000 - $30,000 + $45,000 = $75,000。"}, {"n": 74, "a": 3, "q": "甲公司 20X1 年 1 月 1 日發行$285,000，6%，3 年到期抵押票據，每年年底支付現金$100,000，共支付 3 年，試問第二年之利息費用為多少？", "o": ["$13,624", "$17,100", "$12,126", "$5,000"], "e": "第 1 年償還本金 = $100,000 - ($285,000 * 6%) = $82,900 第 2 年利息費用 = ($285,000 - $82,900) * 6% = $12,126"}, {"n": 75, "a": 3, "q": "台東公司 X1 年銷貨收入淨額為$3,200,000，銷貨毛利為$800,000；年初應收帳款$2,400,000，存貨$2,560,000，應付帳款$800,000；而年底應收帳款$1,920,000，存貨$2,880,000，應付帳款$480,000，請問台東公司 X1 年度支付給供應商的現金數額為：", "o": ["$1,760,000", "$2,720,000", "$3,040,000", "$3,200,000"], "e": "銷貨收入淨額 - 銷貨毛利 = 銷貨成本 $3,200,000 - $800,000 = $2,400,000 $2,400,000 + $2,880,000 - $2,560,000 + $800,000 - $480,000 = $3,040,000。"}, {"n": 76, "a": 2, "q": "桃園公司 20X9 年相關資料如下： 銷貨收入$2,900,000 期末應收帳款餘額增加 (減少) 數 (80,000) 期末應付帳款餘額增加 (減少) 數 10,000 期末預付費用餘額增加 (減少) 數 (10,000) 期末存貨餘額增加 (減少) 數 50,000 銷貨成本 1,600,000 壞帳費用 30,000 折舊費用 20,000 處分資產利益 17,000 其他營業費用 (不含壞帳及折舊費用) 700,000 則 20X9 年營業活動淨現金流量為：", "o": ["$640,000", "$650,000", "$683,000", "$700,000"], "e": "$2,900,000 - 1,600,000 - 700,000 + 80,000 + 10,000 + 10,000 - 50,000 = $650,000。"}, {"n": 77, "a": 3, "q": "下列何項為「淨現金流量允當比率」之計算公式？", "o": ["營業活動淨現金流量 / 流動負債", "營業利益 / (營業利益 - 利息費用)", "最近五年度營業活動淨現金流量 / 最近五年度 (資本支出 + 存貨增加額 + 現金股利)", "(不動產、廠房及設備毛額 + 長期投資 + 其他非流動資產 + 營運資金) / (營業之淨現金流入 - 現金股利)"], "e": "選項(1)為現金流量比率公式；選項(2)為財務槓桿度公式；選項(4)為現金再投資比率公式。"}, {"n": 78, "a": 1, "q": "出租人融資租賃的租金收現數可如何分類：", "o": ["營業活動、投資活動", "營業活動、籌資活動", "投資活動、籌資活動", "只有營業活動"], "e": "融資租賃的租金收現數包含應收租賃款收現及已實現之利息收入可分類為營業活動、投資活動。"}, {"n": 79, "a": 2, "q": "承租人的租金付現數於現金流量表上可如何分類：", "o": ["營業活動、投資活動", "營業活動、籌資活動", "投資活動、籌資活動", "只有營業活動"], "e": "承租人的租金付現數包含應付租賃款付現及已實現之利息費用的付現數可分類為營業活動、籌資活動。"}]}, {"id": 4, "title": "第4章 非流動資產、負債及權益", "questions": [{"n": 1, "a": 4, "q": "下列哪一項有關權益法的敘述是正確的？", "o": ["投資依公允價值評價", "投資公司依原始投資成本來記錄投資，且以後皆不需作任何調整", "當被投資公司分配現金股利時，投資公司應貸記股利收入", "在期末時，投資公司應依被投資公司之損益及其投資比例調整投資科目並認列投資收益"], "e": "權益法係以原始成本調減收到的現金股利，並調增 (減) 依持股比例認列的投資收益 (損失) 後的帳面金額為評價的依據。"}, {"n": 2, "a": 1, "q": "當公司決定分配股票股利給投資人時，對於財務報表之影響為何？", "o": ["權益不變", "權益增加", "權益減少", "不一定"], "e": "發放股票股利屬盈餘轉增資，不影響權益總額。"}, {"n": 3, "a": 1, "q": "萬能公司對其持有 35%股權的被投資公司具有重大影響，該被投資公司宣告並發放股利對投資公司的影響為何？", "o": ["流動比率改變", "每股盈餘改變", "投資收入改變", "每股帳面金額改變"], "e": "被投資公司宣告並發放股利之影響在於「現金」及「長期投資」此二科目。"}, {"n": 4, "a": 2, "q": "萬能公司擁有百全公司 90%股權且無購買溢價，並採完全權益法處理其投資。若萬能公司與百全公司之合併損益表上控制權益淨利益為 X，萬能公司本身之損益表上淨利為 Y，則：", "o": ["X > Y", "X = Y", "X < Y", "選項(1)(2)(3)皆非"], "e": "在權益法下，合併總損益歸屬於母公司的部分應等於母公司的淨利。"}, {"n": 5, "a": 2, "q": "應付公司債折價攤銷為：", "o": ["利息費用之減少", "利息費用之增加", "公司債到期日應償還金額之增加", "負債之減少"], "e": "利息費用 = 應付利息 + 折價攤銷"}, {"n": 6, "a": 2, "q": "買回庫藏股後，交易採用成本法處理，若買回價格高於面額，將使權益總數？", "o": ["增加", "減少", "不變", "或增或減視情況而定"], "e": "買回庫藏股時，以成本法處理，則將庫藏股列在權益中作為減項，故不論買回價格是否高於面額，均會使權益總數減少。"}, {"n": 7, "a": 2, "q": "豪景公司 X1 年底之流動比率為 1.3，負債比率為 0.375。流動資產為$1,000,000，總資產為$4,000,000。若該公司 X1 年之淨利為$750,000 並宣告$250,000 之現金股利、$250,000 之股票股利，且無其他影響權益之交易，則該公司 X1 年初之權益金額為：", "o": ["$1,750,000", "$2,000,000", "$2,250,000", "$2,500,000"], "e": "X1 年底權益 = $4,000,000 * (1 - 0.375) = $2,500,000 X1 年初權益 = X1 年底權益 - 本期淨利 + 現金股利 = $2,500,000 - $750,000 + $250,000 = $2,000,000"}, {"n": 8, "a": 2, "q": "下列敘述何者正確？", "o": ["庫藏股交易可能減少淨利但不可能增加淨利", "庫藏股交易可能減少保留盈餘但不可能增加保留盈餘", "購入庫藏股並不受影響每股盈餘", "成本法下買回庫藏股將使法定資本減少"], "e": "選項(1)庫藏股之交易不計算損益，直接借貸資本公積。選項(2)當資本公積餘額不足以讓庫藏股減少時，則借記保留盈餘，但若有利益一律貸記資本公積，所以不可能增加保留盈餘。選項(3)購入庫藏股將使普通股加權平均流通在外股數減少，致使每股盈餘增加。選項(4)以成本法買回會以買回之成本全數記入「庫藏股票」作為權益總數之減項，不減少法定資本之部分。"}, {"n": 9, "a": 2, "q": "若期初與期末不動產、廠房及設備之帳面金額分別為$38,500 與$43,750，當年度提列折舊$6,750，且未出售或報廢任何不動產、廠房及設備，則當年度購入不動產、廠房及設備的成本為何？", "o": ["$1,500", "$12,000", "$5,250", "$13,500"], "e": "假設購入 X 元的不動產、廠房及設備，可知$38,500 + X - $6,750 = $43,750，X = $12,000"}, {"n": 10, "a": 3, "q": "長期借款合約中規定之借款回存，在財務報表上應如何表達？", "o": ["列為流動資產中之銀行存款", "列為流動資產，但非屬銀行存款", "列為長期投資或其他資產", "自長期負債中減除"], "e": "借款回存的現金由於被限制用途，所以已不屬現金，應列為長期投資或其他資產。"}, {"n": 11, "a": 3, "q": "甲公司於 X1 年初支付$500,000 購入土地，計劃在 5 年內分期開發並建設。每年建設成本預估為$100,000，完工後土地和建物的總價值估計為$800,000。公司採用分期開發模式，每年認列的資本化成本為多少？", "o": ["$0", "$80,000", "$100,000", "$120,000"], "e": "每年資本化成本包括當年度建設成本。每年建設成本 = $100,000。"}, {"n": 12, "a": 4, "q": "非控制權益為：", "o": ["母公司未持有的子公司股票之市價", "母公司之投資成本超過取得股權帳面金額之部分", "母公司之權益未被子公司擁有之部分", "子公司之權益未被母公司擁有之部分"], "e": "子公司之權益由母公司直接或間接持有者，即為非控制權益，列在合併資產負債表中權益項下。"}, {"n": 13, "a": 1, "q": "企業買回流通在外股票，下列哪一項會減少？", "o": ["權益", "實收資本", "普通股股本", "長期投資"], "e": "買回流通在外股票時，以「庫藏股」列在權益下作為減項。"}, {"n": 14, "a": 1, "q": "甲公司於 X4 年初以$100,000 購買專供種植蘋果樹的土地，並於 X4 年間為種植蘋果而支出$10,000，X4 年底產出公允價值為$20,000 的蘋果。若甲公司將蘋果運至市場販售需支付必要成本$10,000，試為甲公司依據國際會計準則第 41 號公報(IAS41)，計算應列示於 X4 年資產負債表上之農產品金額？", "o": ["$10,000", "$20,000", "$30,000", "$120,000"], "e": "由生物資產收成之農產品，應按淨公允價值認列後列於存貨項下。收成時蘋果淨公允價值 = $20,000 - $10,000 = $10,000。"}, {"n": 15, "a": 4, "q": "某企業今年決定發放 10%股票股利，故下列何者為非？", "o": ["企業的保留盈餘會減少", "企業普通股股本增加", "企業已發行且流通在外股數增加", "若當時市價高於面額，企業的權益增加"], "e": "10%股票股利為小額股票股利，應以市價減少保留盈餘，同時增加股本與資本公積，所以若市價高於面額權益總數維持不變。"}, {"n": 16, "a": 2, "q": "下列哪一項應被視為非流動資產？", "o": ["建設公司所蓋的別墅", "學校所擁有的教室", "豐田公司剛推出的新型轎車", "土地開發公司所購買的土地"], "e": "建設公司所蓋的別墅屬於存貨。選項(3)也是存貨。選項(4)還是存貨。"}, {"n": 17, "a": 4, "q": "某企業每股面額為 X 元，今年宣布發放 X 元股票股利，下列敘述何者為真？", "o": ["公司的核定股本會增加一倍", "股票的面額會等比例往下調整", "除權後每股市價不會改變", "全體股東持有的總股數會增加一倍"], "e": "選項(1)核定股本除非經股東會同意，經主管機關核准，不得變動。選項(2)面額不會變更。選項(3)市價應會調整下降至一半左右。"}, {"n": 18, "a": 2, "q": "下列關於可轉換公司債的敘述，何者正確？", "o": ["票面利率通常高於發行日市場利率", "轉換價格通常高於發行日普通股股票之公允價值", "轉換價格在發行日後不能調整", "票面利率不得設定為 0"], "e": "選項(1)因其含有轉換權，所以其利率會較市場利率低。選項(3)轉換價格會因公司發行新股或股票股利時而調整。選項(4)無此規定。"}, {"n": 19, "a": 1, "q": "母公司和子公司相互間持有債券，在合併報表中的處理方式為：", "o": ["視為發行公司收回債券處理", "不需要作任何沖銷，但在合併報表中仍會出現債券項目", "以上(1)、(2)選項都有可能，視債券發行公司為母公司或子公司而定", "將債券列為權益的一部分"], "e": "依企業個體理論來看，母子公司屬於一個經濟個體，所以互相持有債券視為債券之收回。"}, {"n": 20, "a": 2, "q": "在「銷售型」融資租賃中，出租人所賺取的收益不包括下列何者？ 甲.銷售利潤；乙.租金收入；丙.利息收入", "o": ["僅甲", "僅乙", "僅丙", "僅乙和丙"], "e": "凡是融資租賃產生製造商或經銷商損益者，稱為銷售型租賃，有兩種收益，一為成本與售價之差額，為銷售利潤，另一則為利息收入。"}, {"n": 21, "a": 2, "q": "辦理折舊性資產重估價時，將使：", "o": ["資產不變，折舊費用增加", "資產及折舊費用增加", "資產增加，折舊費用不變", "資產及折舊費用均不變"], "e": "辦理資產重估使資產之帳面金額提高，而對應之折舊費用自然也提高了。"}, {"n": 22, "a": 4, "q": "取得轉投資事業之資本公積配股時，應如何列帳？", "o": ["按市價入帳", "按平均成本入帳", "按面額入帳", "不入帳，僅註記股數增加"], "e": "資本公積配股即收到股票股利，不更動投資餘額，僅以附註揭露股數之變動。"}, {"n": 23, "a": 4, "q": "有關「投資性不動產」，下列敘述何者錯誤？", "o": ["投資性不動產購入時，應以成本衡量", "目前尚未決定未來用途所持有之土地應分類為投資性不動產", "投資性不動產認列後選用公允價值模式衡量，不得改為成本模式", "企業將不動產出租給母公司或其他子公司，在編製合併報表時，該不動產應列為投資性不動產"], "e": "編製單獨報表，認列為投資性不動產。編製合併報表，不可認列為投資性不動產，應改為自用不動產。"}, {"n": 24, "a": 2, "q": "下列何項交易會使流通在外股數發生變動，但不影響權益總金額？", "o": ["收回庫藏股", "發放股票股利", "發行特別股", "員工行使認股權"], "e": "發放股票股利是將保留盈餘轉成股本，故不影響權益總額。"}, {"n": 25, "a": 1, "q": "已提列償債基金之長期負債，若於一年內到期，將使：", "o": ["營運資金不變", "流動比率下降", "營運資金減少", "營運資金增加"], "e": "企業預期於報導期間後十二個月內到期清償之負債應列為流動負債，已提列償債基金之長期負債，若逾一年內到期，則應轉為流動負債，相對的償債基金亦應轉為流動資產，故營運資金也不改變。"}, {"n": 26, "a": 3, "q": "下列何種折舊方法所計算之第一年之折舊費用最大？", "o": ["直線法", "年數合計法", "倍數餘額遞減法", "不一定，視耐用年限而有不同"], "e": "倍數餘額遞減法是以直線法之折舊率的二倍為折舊率，故大於年數合計法及直線法。"}, {"n": 27, "a": 3, "q": "大遠百貨公司於 X1 年 1 月 1 日以$600,000 購買一套機器設備，這套設備估計有 5 年的耐用年限、估計殘值為$120,000，該公司採用倍數餘額遞減法提列折舊。若該公司使用機器設備 3 年後，將該設備以$192,000 出售，試問：出售設備將產生多少處分損益？", "o": ["損失$31,800", "損失$120,000", "利益$62,400", "利益$72,000"], "e": "X1 年折舊費用 = $600,000 * 2/5 = $240,000，帳面金額 = $600,000 - $240,000 = $360,000 X2 年折舊費用 = $360,000 * 2/5 = $144,000，帳面金額 = $360,000 - $144,000 = $216,000 X3 年折舊費用 = $216,000 * 2/5 = $86,400，帳面金額 = $216,000 - $86,400 = $129,600 處分利益 = $192,000 - $129,600 = $62,400"}, {"n": 28, "a": 1, "q": "若以有效利率法 (Effective Interest Method) 攤銷公司債之折價，則每期所攤銷之折價金額為：", "o": ["遞增", "遞減", "不變", "不一定"], "e": "公司債折價發行時，利息費用高於應付利息，而折價攤銷額為利息費用和應付利息之差額，應付利息固定，利息費用為帳面金額乘有效利率，由於折價攤銷會使債券帳面金額逐期遞增至面額，故利息費用也逐期增加，所以攤銷額也就逐期遞增。"}, {"n": 29, "a": 2, "q": "下列何者通常不會於財務報表附註中揭露？", "o": ["會計政策", "或有利益", "期後事項", "關係人交易"], "e": "或有利益只有在或有資產很有可能發生 (不論其金額是否能可靠估計)，才需於資產負債表附註中揭露其性質，因此相較於選項(1)(3)(4)，或有利益甚少於財務報表附註中揭露。"}, {"n": 30, "a": 1, "q": "存出保證金之性質為：", "o": ["資產", "負債", "收入", "費用"], "e": "存出保證金為公司存放在他處作為保證用之現金，仍屬公司之資產。"}, {"n": 31, "a": 3, "q": "投資公司對被投資公司具有重大影響者，其股權投資應採何種方法處理？", "o": ["公允價值法", "成本法", "權益法，無須編製合併報表", "權益法，且須編製合併報表"], "e": "股權投資不具重大影響力者，採公允價值法處理；有重大影響力者，以權益法處理；若有控制能力則另須編製合併報表。"}, {"n": 32, "a": 1, "q": "岡山公司將自建資產所造成利息費用，全數予以資本化，則：", "o": ["負債總額對權益比率下降", "長期負債總額對權益資本不變", "盈餘對固定支出的保障比率下降", "現金對固定支出的保障比率下降"], "e": "選項(1)正確，權益總額上升，比率下降。選項(2)錯誤，權益總額上升，比率下降。選項(3)錯誤，原本固定支出包含可資本化利息，比率不變。選項(4)錯誤，未影響到固定支出，比率不變。"}, {"n": 33, "a": 3, "q": "長期負債若將於 12 個月內到期，並將以現金或另創流動負債償還之部分：", "o": ["仍列長期負債，不必特別處理", "仍列長期負債，另設「一年內到期長期負債」科目", "轉列流動負債", "以上作法皆非"], "e": "將於 12 個月內到期之長期負債，只有在報導期間結束日前已完成長期性再融資或展期協議者方得列為長期負債。本題之長期負債將以現金或其他流動負債償還，故應轉列流動負債。"}, {"n": 34, "a": 3, "q": "支付現金購入之庫藏股，在資產負債表中應如何表達？", "o": ["列為短期投資", "列為權益之加項", "列為權益之減項", "列為長期投資"], "e": "買回流通在外股票時，以「庫藏股」列在權益下作為減項。"}, {"n": 35, "a": 2, "q": "受領股東贈與之資產在財務報表上應如何表達？", "o": ["按成本列為資產", "按取得時公允價值列為資產", "不必入帳僅附註說明", "按成本列為營業外收入"], "e": "受領股東贈與資產需按取得時之公允價值入帳，貸方記入捐贈資本 (屬資本公積)。"}, {"n": 36, "a": 4, "q": "房地產公司購入而尚未出售之房屋應列為：", "o": ["無形資產", "不動產、廠房及設備", "基金與投資", "流動資產"], "e": "房地產公司購入欲出售之房屋是公司之存貨，屬流動資產。"}, {"n": 37, "a": 4, "q": "不動產重估增值之性質為：", "o": ["負債", "資產", "收入", "權益"], "e": "不動產重估增值應列為權益項下之其他權益項目。"}, {"n": 38, "a": 1, "q": "下列何者會使權益總額發生變動？", "o": ["辦理資產重估增值", "以資本公積彌補虧損", "宣告股票股利", "自保留盈餘提撥意外損失準備公積"], "e": "選項(1)辦理資產重估增值時，一方面增加資產帳面金額，一方面增加權益項下之未實現重估增值科目，故權益總數增加。選項(2)(3)(4)都是權益內項目之轉換，不改變總額。"}, {"n": 39, "a": 2, "q": "可轉換公司債提前清償所產生之損益應列為：", "o": ["營業損益", "營業外損益", "保留盈餘之調整", "銷貨成本"], "e": "期前收回公司債已成為許多企業風險管理策略之一，通常將因此而產生之損益列為營業外損益。"}, {"n": 40, "a": 3, "q": "下列何者非為權益項目？", "o": ["庫藏股", "特別盈餘公積", "償債基金", "保留盈餘"], "e": "償債基金為非流動資產，列於「基金與投資」項目下。"}, {"n": 41, "a": 4, "q": "宣告股票股利對負債及權益之影響為：", "o": ["負債：增加；權益：減少", "負債：增加；權益：無影響", "負債：無影響；權益：減少", "負債：無影響；權益：無影響"], "e": "宣告股票股利時，將保留盈餘轉成股本，所以對資產、負債及權益總額都沒影響。"}, {"n": 42, "a": 3, "q": "採有效利率法攤銷應付公司債折、溢價時，下列關係何者正確？", "o": ["折價發行時折價攤銷額逐期遞減", "溢價發行時溢價攤銷額逐期遞減", "折價發行時折價攤銷額逐期遞增", "選項(1)(2)(3)皆不正確"], "e": "公司債折價發行時，利息費用高於應付利息，而折價攤銷額為利息費用和應付利息之差額，應付利息固定，利息費用為帳面金額乘有效利率，由於折價攤銷會使債券帳面金額逐期遞增至面額，故利息費用也逐期增加，所以攤銷額也就逐期遞增。溢價攤銷額為利息費用和應付利息之差額，應付利息高於利息費用，應付利息固定，利息費用為帳面金額乘有效利率，由於溢價逐期攤銷使帳面金額逐漸減少至面額，故利息費用也逐期減少，因此攤銷額將逐期遞增。"}, {"n": 43, "a": 1, "q": "雨形公司以帳面金額 $4,500 之舊機器，加付現金 $10,500，換得新機器，該項交易具商業實質，交換日舊、新機器之公允價值分別為 $2,500 及 $13,000，則新機器之入帳成本應為：", "o": ["$13,000", "$14,700", "$16,000", "$15,300"], "e": "具有商業價值之資產交換，換入資產應按公允價值入帳，故新機器入帳成本為$13,000。"}, {"n": 44, "a": 3, "q": "甲公司最近購入一筆土地及附帶舊屋，此舊屋已不堪使用，該舊屋在賣方的帳面金額為$750,000。甲公司並發生各項支出：土地及舊屋價款$22,500,000；代書費$375,000；舊屋拆除費$450,000；舊屋拆除期間工人意外傷害賠償$150,000。則該公司應記錄土地成本多少？", "o": ["$23,025,000", "$22,875,000", "$23,325,000", "$23,475,000"], "e": "土地成本 = $22,500,000 + $375,000 + $450,000 = $23,325,000"}, {"n": 45, "a": 1, "q": "以帳面金額$2,000,000、公允價值$3,000,000 之房屋交換一公允價值$1,600,000 之較小房屋 (與舊屋同作為辦公室用)，並向對方收取現金$1,400,000，若此項交易不具商業實質，則此交換交易將產生利益若干？", "o": ["$0", "$600,000", "$800,000", "$1,000,000"], "e": "不具商業實質之資產交換，換出資產不認列處分損益。"}, {"n": 46, "a": 1, "q": "在不動產、廠房及設備使用之初期，採用年數合計法提列折舊所列報的淨利應較使用直線法：", "o": ["低", "高", "相等", "不一定"], "e": "採年數合計法所提折舊費用在初期較直線法多，故淨利較低。"}, {"n": 47, "a": 2, "q": "甲公司於 X1 年 1 月 1 日以$200,000 購入機器設備，並預計可使用 5 年，無殘值。若採用年數合計法計算折舊費用，則 X2 年的折舊費用為多少？", "o": ["$80,000", "$53,333", "$40,000", "$30,000"], "e": "年數合計數 = 5 + 4 + 3 + 2 + 1 = 15 第一年的折舊費用 = $200,000 * (5/15) = $66,667 第二年的折舊費用 = $200,000 * (4/15) = $53,333"}, {"n": 48, "a": 2, "q": "下列敘述何者正確？", "o": ["公司債溢價發行將使每期必須支付之現金利息減少", "公司債溢價發行時市場利率應低於票面利率", "公司債溢價發行時貸記應付公司債之金額應大於面額", "應付公司債折價為借餘，故於資產負債表上應列為資產"], "e": "選項(1)每期須支付的現金利息為固定。選項(3)應付公司債科目之金額固定為面額。選項(4)折價為公司債之評價科目，和公司債一起列為負債。"}, {"n": 49, "a": 3, "q": "下列哪些項目會出現在「權益變動表」？ 甲.追溯重編之影響數(前期損益調整)；乙.累積換算調整數(Translation Adjustment)；丙.採用權益法之投資", "o": ["僅甲", "甲和丙", "甲和乙", "甲、乙、丙"], "e": "甲：前期損益調整在權益變動表中調整期初保留盈餘；乙：外幣轉換調整為外國子公司報表轉換為母公司貨幣時，借貸雙方之差額，於表中單獨列示；丙：採用權益法之投資應為資產負債表的資產科目。"}, {"n": 50, "a": 4, "q": "吉順貨運公司對其運輸設備 (卡車) 係採直線法提列折舊費用，但決定自本年度起對新購入的卡車採定率遞減法提列折舊，這是屬於：", "o": ["會計原則變動", "會計估計變動", "錯誤的更正", "不屬於會計原則或會計估計的變動，也不是錯誤的更正"], "e": "對新購入之卡車採不同之折舊方法，此乃會計政策上的決定，不影響以前年度結果，所以不屬任一種會計變動。"}, {"n": 51, "a": 2, "q": "欲彌補虧損時，下列何項目應優先使用之？", "o": ["資本公積", "法定盈餘公積", "股本", "流動資產"], "e": "公司法規定，公司發生虧損時，先以法定盈餘公積彌補，不足時再用資本公積。"}, {"n": 52, "a": 3, "q": "法定盈餘公積之性質屬於：", "o": ["資本公積", "特別盈餘公積", "保留盈餘", "營運資金"], "e": "公司法規定，法定盈餘公積為公司每年就盈餘之 10%提列，用以填補公司虧損為原則，所以性質屬於限制用途之保留盈餘。證交法第 41 條規定，主管機關認為有必要時，對於已依本法發行有價證券之公司，得以命令規定其於分派盈餘時，除依法提出法定盈餘公積外，並應另提一定比率之特別盈餘公積。已依本法發行有價證券之公司，申請以法定盈餘公積或資本公積撥充資本時，應先填補虧損；其以資本公積撥充資本者，應以其一定比率為限。"}, {"n": 53, "a": 4, "q": "已送繳金融機構專戶存儲之員工退休基金，應列入財務報表之中：", "o": ["長期投資", "信託基金", "銀行存款", "不得列入公司資產"], "e": "員工退休基金送至金融機構專戶存放時，公司已無法動用，故不屬公司之資產。"}, {"n": 54, "a": 2, "q": "下列何者不屬於權益項目？", "o": ["股本", "應付現金股利", "保留盈餘", "資本公積"], "e": "應付現金股利為流動負債，宣告股利才屬於權益項下。"}, {"n": 55, "a": 2, "q": "甲公司 X1 年初以$600,000 取得乙公司 20,000 股共計 10%之股權，並分類為透過其他綜合損益按公允價值衡量之金融資產。乙公司 X1 年間淨利為$300,000，支付股利$200,000，年末股價每股$31。甲公司資產負債表中投資乙公司股權之金額為何？", "o": ["$610,000", "$620,000", "$630,000", "$640,000"], "e": "期末按公允價值衡量，收到的股利認列股利收入。股權金額 = $31 * 20,000 = $620,000"}, {"n": 56, "a": 4, "q": "甲公司吸收合併乙公司，採發行新股方式，併入乙公司資產公允價值 10,000 元，承受乙公司負債公允價值 6,000 元，則：", "o": ["甲公司權益增加 4,000 元", "甲公司資產增加 10,000 元", "乙公司資產、負債及權益全部消滅", "選項(1)(2)(3)皆是"], "e": "吸收合併即甲公司完全承受乙公司之資產、負債，而乙公司消滅。"}, {"n": 57, "a": 1, "q": "公司以資本公積轉增資一千萬股，每股面額 10 元，對財務報表會有何影響？", "o": ["權益不變", "可改善財務結構", "可提高獲利能力", "選項(1)(2)(3)皆對"], "e": "資本公積轉增資是將資本公積轉成股本，不影響權益總額。"}, {"n": 58, "a": 4, "q": "下列何者不屬於盈餘分配之項目？", "o": ["法定盈餘公積", "特別盈餘公積", "股東股利", "資本公積配股"], "e": "選項(4)資本公積配股是將資本公積轉成股本，不屬於盈餘分配。"}, {"n": 59, "a": 3, "q": "股票發行溢價列為：", "o": ["負債", "資產之減項", "權益", "利益"], "e": "公司發行股票時，發行價格大於面額部分計入資本公積，列在權益中。"}, {"n": 60, "a": 4, "q": "以下何者不得作為股本之來源？", "o": ["現金增資", "盈餘配股", "吸收合併", "董監酬勞"], "e": "自 2008 年起，我國董、監酬勞列為費用，不是股本之來源。"}, {"n": 61, "a": 3, "q": "庫藏股在財務報表中係列為：", "o": ["短期投資", "長期投資", "權益減項", "負債"], "e": "買回流通在外股票，以「庫藏股」列在權益項下作為減項。"}, {"n": 62, "a": 4, "q": "我國公司特別盈餘公積之提列比率為：", "o": ["10%", "20%", "30%", "不一定"], "e": "特別盈餘公積之提列依公司股東會之決議，無法定比率。"}, {"n": 63, "a": 3, "q": "普通股發行股數與每股面額之乘積為：", "o": ["保留盈餘", "資本公積", "普通股股本", "權益總數"], "e": "股數乘以面額為股本，超過面額部分列為資本公積。"}, {"n": 64, "a": 3, "q": "某機器設備定價$1,000,000，購入時現金折扣為$50,000，支付運費$40,000，安裝費$80,000，搬運不慎發生損壞而付出修理費$20,000，則該機器設備之帳面成本應為：", "o": ["$1,000,000", "$1,050,000", "$1,070,000", "$1,090,000"], "e": "機器設備成本 = $1,000,000 - $50,000 + $40,000 + $80,000 = $1,070,000，搬運不慎之損壞不得列入成本。"}, {"n": 65, "a": 1, "q": "斐智公司蓋一間實驗室以供研究新技術之用，則實驗室成本應：", "o": ["認列為興建當期之研究發展費用", "分年提列折舊，作為研究發展之一部分", "分年提列折舊或立刻轉銷，依公司政策而定", "在研究發展獲致具體成果時再轉為費用"], "e": "該實驗室以供研究新技術之用，屬研究階段支出，應於發生時認列為費用。"}, {"n": 66, "a": 4, "q": "計算債券發行價格時，所使用的折現率為：", "o": ["本金用票面利率，利息用市場利率", "本金及利息均使用票面利率", "本金用市場利率，利息用票面利率", "本金及利息均使用市場利率"], "e": "債券 (本金) 及利息均採用「市場利率」折現以計算債券發行價格。"}, {"n": 67, "a": 3, "q": "投資公司擁有被投資公司 40%股權，其投資成本與股權淨值之差額，在投資公司之資產負債表上應：", "o": ["列為商譽", "列為「股權投資產生之商譽」", "包括於「股權投資」中", "列為「成本與股權淨值之差異」"], "e": "採用權益法處理股權投資，投資成本與股權淨值差額未攤銷數應包含在「股權投資」成本中。"}, {"n": 68, "a": 2, "q": "重慶公司 X1 年 7 月 1 日發行$1,000,000，年息 10%，十年到期之公司債得款$950,000，該公司採曆年制，公司折價按直線法攤銷，試計算 X1 年之利息費用：", "o": ["$53,350", "$52,500", "$50,000", "$55,000"], "e": "折價總額 = $1,000,000 - $950,000 = $50,000 X1 年之票面利息 = $1,000,000 * 10% * 6/12 = $50,000 X1 年之攤銷 = $50,000 / 10 * 6/12 = $2,500 X1 年之利息費用 = $50,000 + $2,500 = $52,500"}, {"n": 69, "a": 4, "q": "公司於 X1 年初以成本$4,000,000，累計折舊$2,500,000 之機器交換汽車，並收到現金$500,000，該項交易具商業實質，換入之汽車公允價值為$1,800,000，則換入汽車之成本為何？", "o": ["$1,000,000", "$1,200,000", "$1,500,000", "$1,800,000"], "e": "具有商業價值之資產交換，換入資產應按公允價值入帳，故新汽車入帳成本為$1,800,000。"}, {"n": 70, "a": 3, "q": "武山公司購買汽車一部，付現$100,000 並開立一年期無息票據面額 $500,000。若一般銀行貸款利率為 8%，則武山公司所購汽車之成本應為：", "o": ["$640,000", "$600,000", "$562,963", "$528,669"], "e": "無息支票之現值 = $500,000 / (1 + 8%) = $462,963，另付現$100,000，所以總成本 = $100,000 + $462,963 = $562,963"}, {"n": 71, "a": 2, "q": "若公司債之票面利率高於市場利率，則該公司債應：", "o": ["平價發行", "溢價發行", "折價發行", "發行價格不受利率影響"], "e": "市場利率 > 票面利率 -> 折價發行 市場利率 < 票面利率 -> 溢價發行 市場利率 = 票面利率 -> 平價發行"}, {"n": 72, "a": 4, "q": "下列何者非為宣告並發放股票股利之影響？", "o": ["流通在外股數增加", "保留盈餘減少", "資本公積增加", "資產總額減少"], "e": "發放股票股利時，減少保留盈餘增加股本及資本公積，流通在外股數會增加，但不影響資產及負債科目。"}, {"n": 73, "a": 1, "q": "若庫藏股之買回價格高於面額，則對投入資本總額之影響為：", "o": ["無影響", "減少", "增加", "不一定
