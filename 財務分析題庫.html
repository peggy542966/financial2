上的哪一個項目最有助於預測未來的營業狀況？", "o": ["稅後淨利", "營業淨利", "營業毛利", "停業單位損益"], "e": "要預測未來營運狀況應以現有之營運狀況為基礎，所以不考慮其他因素的營業淨利是最好的。"}, {"n": 16, "a": 4, "q": "下列哪一個項目可不須在財務報表之附註中揭露？", "o": ["關係人交易", "期後事項", "會計政策", "有可能發生之利益或資產"], "e": "或有事項可能發生利益或損失，導致資產或負債發生，在未證實其確切結果前稱為「或有資產」或「或有負債」。企業不應認列但應附註揭露或有負債。對於或有資產，若經濟效益流入之可能性由「極少可能」或「有可能」變成「很有可能」時，則應附註揭露。"}, {"n": 17, "a": 1, "q": "假設其他條件不變，並且缺少其他相關訊息時，投資人最不可能只基於以下哪一項消息，就降低其對甲公司每股盈餘的預測值？", "o": ["政府將大幅提高資本利得稅率", "一信譽卓著分析師宣告前期甲公司的經濟附加價值，其金額遠低於先前市場的預估值", "一信譽卓著分析師宣告前期甲公司的營業利益，其金額遠低於先前市場的預估值", "在環保人士抗爭中，政府拒絕了甲公司在蘊藏量極為豐富的礦區做深度開採的計畫"], "e": "提高資本利得稅對公司盈餘不一定有影響，若公司甚少有投資活動就不會受影響。"}, {"n": 18, "a": 3, "q": "上市（櫃）公司在作財務預測時，必須將以下哪些因素列入基本假設條件？ 甲.處分投資損失；乙.匯兌損益；丙.利率變動", "o": ["只有甲", "只有甲與乙", "甲、乙與丙都要列入", "甲、乙與丙不要列入"], "e": "判斷盈餘品質可透過盈餘的可預測性、轉換現金的可能性及被操控的可能性等因素分析。"}, {"n": 19, "a": 3, "q": "下列對於盈餘品質估之描述，何者不正確？", "o": ["品質高的盈餘應該具備忠實表達與完整性、穩定性及成長性的盈餘", "在複雜資本結構下，應計算二種每股盈餘，基本每股盈餘 (Primary EPS) 及稀釋每股盈餘 (Diluted EPS)", "單一盈餘的數字足以分析公司的價值及其未來成長性", "基本每股盈餘及稀釋每股盈餘差別在其他具有稀釋性潛在普通股之影響"], "e": "單一盈餘的數字不足以分析公司現在的價值及其未來成長性，當我們分析其盈餘計算是否忠實表達並能完整反映公司所有的交易？有無人為操縱？盈餘組成內容為何？其未來成長性如何？盈餘的穩定性等等。"}, {"n": 20, "a": 1, "q": "下列何者預測準確性可能較高？ 甲.營業損益；乙.稅前損益；丙.稅後淨利", "o": ["甲", "乙", "丙", "甲、乙、丙相等"], "e": "營業損益為來自經常性活動的損益，其預測準確性通常較高。"}, {"n": 21, "a": 3, "q": "某公司令海外子公司購入母公司過時滯銷之存貨，而使母公司之盈餘實際為高，此種作法稱為：", "o": ["盈餘平滑", "盈餘管理", "盈餘操縱", "盈餘預測"], "e": "公司用不正當的手段，來修飾盈餘，則為盈餘操縱。"}, {"n": 22, "a": 4, "q": "下列對於盈餘平滑與盈餘操縱之描述，何者正確？ 甲.吸引投資人投資；乙.提高經營管理者聲譽；丙.經營管理者為了增加薪資紅利", "o": ["僅甲", "僅乙", "僅丙", "甲、乙和丙皆是"], "e": "吸引投資人投資，提高經營管理者聲譽及經營管理者為了增加薪資紅利皆是盈餘平滑與盈餘操縱的動機。"}, {"n": 23, "a": 4, "q": "下列何者為盈餘管理或平滑的方法？", "o": ["透過事件之發生或承認達到平滑之目的", "透過不同期間之分攤達到平滑之目的", "透過分類達到平滑之目的", "選項(1)(2)(3)皆是"], "e": "經過 Ronen 及 Sadan 1981 年的研究，所有盈餘管理或平滑的方法如下：透過事件之發生或承認達到平滑之目的，透過不同期間之分攤達成平滑之目的及透過分類達到平滑之目的。"}, {"n": 24, "a": 1, "q": "如果一家公開上市公司因廠房失火而產生火災損失，它應該在其財務報表上揭露甚麼？", "o": ["每股稅後淨利", "每股火災損失", "每股稅後淨利與每股火災損失之差額", "選項(1)(2)(3)皆是"], "e": "公司應該在其財務報表上揭露選項(1)每股稅後淨利，在進行未來盈餘預估時，建議將此類非常續性損益項目的影響排除之。"}, {"n": 25, "a": 4, "q": "下列對於每股盈餘之描述，何者正確？", "o": ["係指公司之普通股每股在一財務年度中所賺得之盈餘", "可用來評估公司之獲利能力，其資訊常是投資決策的重要依據", "不同年度之每股盈餘的變動可代表公司獲利之趨勢", "選項(1)(2)(3)皆是"], "e": "以上對於每股盈餘之描述皆正確。"}, {"n": 26, "a": 4, "q": "對於作盈餘預測，如果已經有綜合損益表、現金流量表、資產負債表與權益變動表在手邊，哪些有可能增額或邊際資訊內涵 (Incremental Information Content)? 甲.年度經營報告書；乙.財務報表附註資料；丙.公司負責人致股東函", "o": ["僅乙、丙", "僅甲", "僅甲、丙", "甲、乙、丙"], "e": "甲、乙、丙皆能提供額外之公司經營資訊予投資人參考。"}, {"n": 27, "a": 4, "q": "基於以下哪一項假設性的消息，投資人可能會調高其對善化商業銀行盈餘預測值？", "o": ["中時頭條：經建會預測明年起國內經濟成長將趨緩", "善化銀行月刊頭條：會計師陳君指出：「為了顧及帳務處理的簡便，在沒有違反重要性原則的前提下，去年度善化銀行有幾項資本支出被遲行列記為費用」", "工商頭條：央行宣布大幅調升貼現率", "經濟頭條：存款準備率下限將進一步降低"], "e": "選項(1)經濟成長趨緩則公司之盈餘成長可能也會稍緩。選項(2)費用小小增加對整個公司無太大影響。選項(3)央行調升貼現率使銀行貼現成本提高，盈餘下降。選項(4)降低存款準備率使銀行資金可以更靈活運用在其他投資，獲利可望增加。"}, {"n": 28, "a": 3, "q": "在缺少其他相關訊息時，基於以下哪一項新聞報導，投資人最不可能調低其對天山企業盈餘預測值？", "o": ["上游廠商宣布未來將大幅減少產量", "下游廠商宣布未來將大幅減少產量", "競爭對手廠商宣布未來將大幅減少產量", "天山企業宣布未來將大幅減少產量"], "e": "競爭對手減產則公司之銷售可望增加，投資人不太可能調降盈餘預測。"}, {"n": 29, "a": 2, "q": "在缺少其他相關訊息時，基於以下哪一項消息，投資人會立即調高其對永康電腦未來各季營業利益的預測值？ 甲.永康電腦下游大廠施行 JIT，決定採行原料零庫存政策；乙.永康電腦下游大廠決定採行成品零庫存政策；丙.永康電腦上游大廠決定採行成品零庫存政策", "o": ["甲、乙與丙都對", "甲、乙與丙都不對", "僅甲對", "僅甲與丙對"], "e": "甲、乙、丙中都只是永康公司及其上下游廠改變存貨管理制度，對其營業利益可正可負。"}, {"n": 30, "a": 3, "q": "大橋企業欲對其下一年度的營業額作預測，以下何者是最好的答案？", "o": ["其預估市場總規模將成長 15%，營業額將成長 15%，故市場佔有率將成長 15%", "其預估市場總規模將成長 15%，營業額將成長 15%，故市場佔有率將成長 32%", "其預估市場總規模將成長 15%，市場佔有率將成長 15%，故營業額將成長 32%", "其預估市場總規模將成長 15%，市場佔有率將成長 15%，故營業額將成長 15%"], "e": "(1 + 15%) x (1 + 15%) = 1.32，1.32 - 1 = 0.32 = 32%"}, {"n": 31, "a": 4, "q": "甲公司持有乙公司股權 65%，持有丙公司股權 25%，乙公司持有丙公司股權 20%。則甲公司對丙公司之股權有若干之影響力？", "o": ["25%", "65%", "52%", "38%"], "e": "65% x 20% + 25% = 38%。"}, {"n": 32, "a": 3, "q": "下列何者非為有價證券評等所選用之標準？", "o": ["資本結構", "股價之穩定性", "發行股數", "每股帳面金額"], "e": "股數大小與價值低沒有直接相關。"}, {"n": 33, "a": 2, "q": "採用線性迴歸來預測每股盈餘，則：", "o": ["屬於質的分析", "屬量的分析", "較需要專業知識", "其為分析人員預測"], "e": "以線性迴歸來預測每股盈餘為統計方法，屬量的分析。"}, {"n": 34, "a": 3, "q": "下列何者可能為影響盈餘品質的因素？ 甲.會計政策的選擇；乙.資產變現之風險性；丙.現金流量與盈餘關係；丁.發行股數", "o": ["僅乙、丙", "僅甲、乙、丙", "僅甲、乙、丙、丁", "甲、乙、丙、丁皆是"], "e": "會計政策的選擇，資產變現之風險性及現金流量與盈餘關係皆是影響盈餘品質的因素。"}, {"n": 35, "a": 4, "q": "公司決定調降股利支付率使本益比：", "o": ["下降", "不變", "上升", "無法判斷"], "e": "股利支付率和本益比無關。"}, {"n": 36, "a": 3, "q": "2025 年花蓮公司因發生嚴重豪雨導致廠房毀損，其會計處理及表達為何？", "o": ["於附註中表達為非常損失", "於綜合損益表中表達為非常損失", "與一般廠房的會計處理方式相同，於報導期間結束日評估減損", "如經判斷該災害性質特殊且不常發生，始須於附註中表達為非常損失，反之則無須於附註中揭露"], "e": "IAS1 規定不論在損益表或附註中，均不得將任何收益費損表表達為非常項目。"}]}, {"id": 10, "title": "第10章 財務管理", "questions": [{"n": 1, "a": 3, "q": "年金 (Annuity) 是指：", "o": ["在未來一段期間中一系列等額給付之現值", "在未來一段期間之期末定額之給付", "在未來一段期間中一系列等額之給付", "在未來一段期間中一系列金額遞增之給付"], "e": "年金是指在未來一段期間內，連續在固定時點給付一固定金額。"}, {"n": 2, "a": 2, "q": "下列何者不影響每期淨現金流量？", "o": ["折舊方法的改變", "折現率變動", "期末資產處分損失", "收入變動"], "e": "營運現金流量 = (Δ銷售額 - Δ營運成本) x (1 - 稅率) + 折舊費用 x 稅率，由此公式可知折舊方法的改變及收入變動會改變營運現金流量。而期末資產處分損失會有節稅效果，亦會對營運現金流量造成影響。故只有折現率變動不影響營運現金流量。"}, {"n": 3, "a": 3, "q": "就 NPV 法與 IRR 法的比較，下列何者為非？", "o": ["兩者皆考量到現金流量時間價值", "兩者可能產生不同的決策結果", "兩者皆符合價值相加法則", "IRR 法的解可能為多個而 NPV 法只有一個解"], "e": "選項(1)正確，NPV 法與 IRR 法皆考量到現金流量時間價值。選項(2)正確，因為現金流量型態不同時，NPV 高者 IRR 可能較低，而 NPV 低者 IRR 可能較高。選項(3)錯誤，IRR 法不符合價值相加法則。選項(4)正確，IRR 法的解可能為多個而 NPV 法只有一個解。"}, {"n": 4, "a": 3, "q": "有關資本預算決策，下列何者為非？", "o": ["在制定決策時應考慮機會成本", "在制定決策時不應考慮沉沒成本", "成本效益不符合經濟原則的投資計畫一定不能執行", "報稅時折舊方法不同會影響投資決策"], "e": "選項(1)正確，在制定決策時應考慮機會成本。選項(2)正確，沉沒成本不影響投資及投資後現金流量，故不考慮。選項(3)錯誤，有時基於經營策略的考量，成本效益不符合經濟原則的投資計畫仍值得投資。選項(4)正確，報稅時折舊方法不同，會影響現金流量，繼而影響投資決策。"}, {"n": 5, "a": 2, "q": "有關營運資金的敘述，下列何者為非？", "o": ["存貨增加，則營運資金增加", "增加現金銷貨比重，會增加營運資金", "營運資金是為維持日常營運的經常性投資", "以現金出售土地，會增加營運現金"], "e": "營運資金 = 流動資產 - 流動負債。選項(1)正確，存貨需求增加，則須增加營運資金。選項(2)錯誤，現金與應收帳款皆屬於流動資產，兩者間的轉換不影響流動資產總值，故營運資金不會有所變動。選項(3)正確，營運資金流動性高，其目的為維持日常營運。選項(4)正確，土地為不動產、廠房及設備，以現金出售土地，則不動產、廠房及設備減少，流動資產增加。"}, {"n": 6, "a": 3, "q": "今有一投資計畫之現金流量如下： t = 1, -2 t = 2, 9 t = 3, 3 PI = 0.8 若資金成本為 12%，請問公司應：", "o": ["接受該計畫", "無法判斷", "拒絕該計畫", "接受或拒絕對股東財富並無影響"], "e": "PI < 1 時應拒絕該項計畫。"}, {"n": 7, "a": 2, "q": "在數個投資方案中作選擇時，下列何者現金流量是非攸關的？", "o": ["各方案未來期望現金流量之差異", "付給顧問公司協助作選擇的費用", "各方案期初投資金額之差異", "各方案投資於營運資金數額之差異"], "e": "選項(2)為沉沒成本。"}, {"n": 8, "a": 2, "q": "假設你投資 500 萬於某一檔股票，3 年來的報酬率分別為 3%、-8%、+15%，3 年後總共的報酬率為：", "o": ["13%", "8.97%", "13.85%", "11.78%"], "e": "報酬率為 (1+3%) x (1-8%) x (1+15%) - 1 = 8.97%"}, {"n": 9, "a": 4, "q": "估計資金成本的方法包括：", "o": ["以【(預期下一期的股利 / 目前股價) + 股利成長率】之估計值估計", "利用資本資產定價模式估計", "利用套利定價模式估計", "選項(1)(2)(3)皆可"], "e": "估計資金成本的方法除了選項中的三種方法外，還有無風險利率加風險溢酬法、以歷史報酬率資料估計法等。"}, {"n": 10, "a": 3, "q": "我們可以把折現率當成下列哪兩項之和？", "o": ["本益比及股利收益率", "投資報酬率及本益比", "股利殖利率及股利成長率", "純益率及資產週轉率"], "e": "依股利成長模式：每股市價 = 次期股利 / (折現率 - 股利成長率) 整理即可得折現率 = (次期股利 / 目前每股市價) + 股利成長率 = 股利殖利率 + 股利成長率"}, {"n": 11, "a": 4, "q": "以平均會計報酬率法衡量資本預算：", "o": ["可以合理考慮到現金流量時間價值", "考量到資金套牢時間的長短", "是一種現金流量折現法", "一般可由平均會計利潤除以平均會計成本衡量"], "e": "選項(1)錯誤，平均會計報酬率法未考慮到現金流量時間價值。選項(2)錯誤，回收期間法才考量到資金套牢時間的長短。選項(3)錯誤，未考慮折現因素。選項(4)正確，可由平均會計利潤除以平均會計成本衡量。"}, {"n": 12, "a": 3, "q": "下列何者與必要的報酬率 (Required Rate of Return) 非同義？", "o": ["投資人要求之報酬率", "資金成本率", "總資產報酬率", "折現率"], "e": "總資產報酬率與必要的報酬率意義不同。"}, {"n": 13, "a": 4, "q": "使得淨現值為 0 之折現率稱為：", "o": ["資金成本率", "會計報酬率", "必要報酬率", "內部報酬率"], "e": "選項(1)是指獲取所需資金的成本，通常是負債利率與權益報酬率之加權平均。選項(2)是指不管貨幣的時間價值，而以計畫期間所產生之平均淨利除以平均之投資金額所得之比率。選項(3)至少必須產生的預期報酬率，亦相當於資金成本率。"}, {"n": 14, "a": 1, "q": "若現在投資 50 萬元，兩年後可獲得 100 萬元，則年報酬率為多少？", "o": ["41.42%", "60.0%", "50.0%", "66.67%"], "e": "將 (100 萬元 / 50 萬元) 開根號，再減去 1，即得年報酬率為 41.42%"}, {"n": 15, "a": 4, "q": "經濟租 (Economic Rent) 發生的原因因為：", "o": ["先進入市場", "擁有別人沒有的生產技術", "擁有別人無法擁有的資產", "選項(1)(2)(3)皆是"], "e": "經濟租發生原因包括市場優勢、生產技術優勢、資產優勢、成本優勢等。"}, {"n": 16, "a": 3, "q": "如果經理人員要深入瞭解屬下所提出淨現值為正的投資計畫，則最應：", "o": ["要求屬下作預測時不能有任何錯誤", "要求屬下再計算內部報酬率", "找出淨現值為正的原因", "檢查屬下有無計算錯誤"], "e": "淨現值為正，則為可接受的投資計畫，應進一步深入探討造成淨現值為正的因素，才能確定此計畫的可行性。"}, {"n": 17, "a": 4, "q": "出售資產發生損失時所產生之淨現金流入為： (假設企業整體而言，獲利仍豐)", "o": ["損失金額 - 所得稅之節省", "售價 - 所得稅之節省", "損失金額 + 所得稅之節省", "售價 + 所得稅之節省"], "e": "出售資產發生損失時，其淨現金流入為：售價 + (帳面金額 - 售價) x 所得稅率。"}, {"n": 18, "a": 1, "q": "一證券期望報酬率之高低與下列何者較無關係？", "o": ["可以分散的風險", "無風險利率", "影響證券風險高低因素之風險溢酬 (Risk Premium)", "證券報酬率之風險"], "e": "在求算證券期望報酬率時，通常會假設其已分散風險，故不需考慮可以分散的風險。"}, {"n": 19, "a": 4, "q": "在作資本預算決策時採用蒙地卡羅模擬的好處在於讓我們能夠：", "o": ["評估一投資方案之風險", "預測未來之現金流量", "將未來變數間的關係納入模型中", "選項(1)(2)(3)皆是"], "e": "蒙地卡羅模擬分析是將所有攸關變數及其機率分配同時考慮的投資方案風險衡量技術，故可用來預測未來之現金流量和評估投資方案之風險。"}, {"n": 20, "a": 4, "q": "投資計畫支付某項成本，已無法產生未來的收益（或效益）可稱為何者？", "o": ["隱含成本", "機會成本", "殘餘成本", "沉沒成本"], "e": "沉沒成本是指已經支付不能收回的支出成本。"}, {"n": 21, "a": 4, "q": "關於投資計畫投資成本之決定，下列何者不正確？", "o": ["應考慮機會成本", "應考慮投資成本", "應考慮重置成本", "應考慮沉沒成本"], "e": "沉沒成本由於已經支付，故不需包含在投資計畫的投資成本決定中。"}, {"n": 22, "a": 4, "q": "當投資計畫的現金流量現值大於現金支出的現值時，此一投資計畫具有下列何種性質？", "o": ["還本年限超過經濟年限", "內部報酬率低於資金成本", "負的淨現值", "正的淨現值"], "e": "若現金流入現值大於現金流出現值，則表示此投資計畫的淨現值為正。"}, {"n": 23, "a": 1, "q": "評估投資專案時最應關切：", "o": ["現金流量", "稅前會計淨利", "稅後會計淨利", "折舊與重置成本"], "e": "選項(2)(3)會計淨利係在應計基礎下所計算出之淨利，故忽視了在專案中最重要的現金流量。選項(4)折舊與重置成本亦非為現金流量相關之科目，皆無法作為有效評量投資專案之標準。"}, {"n": 24, "a": 4, "q": "假設稅率為 17%，折舊費用為$50,000，則當公司有獲利時，其折舊費用稅後的效果為：", "o": ["淨現金流入$6,800", "淨現金流出$6,800", "淨現金流出$8,500", "淨現金流入$8,500"], "e": "稅盾效果為淨現金流入$50,000 x 17% = $8,500"}, {"n": 25, "a": 1, "q": "政府常允許企業報稅時採用加速折舊法，其目的在於：", "o": ["鼓勵企業從事投資", "收較多的稅", "讓企業儘量不要投資於長期性資產", "讓企業資產在使用期間裡所提列折舊的總數增加"], "e": "企業報稅時，採用加速折舊法，可在早期繳納較少稅額，故可鼓勵企業從事投資。"}, {"n": 26, "a": 4, "q": "處分設備之利益或損失係售價與下列何者之差？", "o": ["設備之成本", "設備之重置成本", "設備目前的淨變現價值", "設備之帳面金額"], "e": "當設備之帳面金額高於售價時，即有處分設備損失；反之則有處分設備利益。"}, {"n": 27, "a": 1, "q": "假設某公司有一設備，帳面金額為$70,000，公司將其出售，利益為$60,000，所得稅率為 17%，試問此交易所產生之淨現金流入為：", "o": ["$119,800", "$60,000", "$101,500", "$130,000"], "e": "由於有出售利益，故淨現金流入為：售價 - 增加之所得稅 = $130,000 - $60,000 x 17% = $119,800"}, {"n": 28, "a": 2, "q": "假設一資產之帳面金額為$70,000，出售時發生損失$50,000，若所得稅率為 17%，試問此交易對稅後淨現金流量之影響為： (假設企業整體而言，獲利仍豐，仍需課稅)", "o": ["流入$20,000", "流入$28,500", "流入$36,800", "流出$50,000"], "e": "淨現金流入為：售價 + 減少之所得稅 = $20,000 - $50,000 + $50,000 x 17% = $28,500"}, {"n": 29, "a": 4, "q": "下列何者並非一般用來處理風險之方式？", "o": ["減少風險較高計畫預期現金流入之金額", "增加風險較高計畫預期現金流出之金額", "對於風險較高的計畫增加其折現率", "增加風險較高計畫之計畫年限"], "e": "處理風險較高計畫的方式有減少其預期現金流入金額、增加其預期現金流出金額，或者增加折現率。"}, {"n": 30, "a": 3, "q": "假設不考慮所得稅，一般而言，下列何者並非攸關的現金流入或流出？", "o": ["營業產生之現金流量", "預期未來之殘值", "折舊費用", "在計畫初期之現金流入或流出"], "e": "若不考慮所得稅，則折舊費用沒有稅盾效果，則不為攸關現金流量。"}, {"n": 31, "a": 3, "q": "以下哪種評價方法在評價時會將評價標的之決策彈性納入考量？", "o": ["傳統淨現值法", "成本加成法", "實質選擇權法", "回收期間法"], "e": "實質選擇權法會將決策及管理的彈性納入投資決策的評估因素之一。"}, {"n": 32, "a": 4, "q": "邊際稅率是指：", "o": ["公司適用之最低稅率", "公司平均的稅率", "公司預期在未來最高的稅率", "稅前純益每多 1 元所要繳的稅"], "e": "邊際稅率為稅前純益每多一元所須繳的稅。"}, {"n": 33, "a": 1, "q": "在作資本預算決策時，攸關的稅率應為：", "o": ["公司預期的邊際稅率", "以前年度之稅率", "稅法中最高的稅率", "公司預期的平均稅率"], "e": "在作資本預算決策時，考慮的是此投資計畫對公司所造成的邊際影響，故攸關稅率應採公司預期的邊際稅率。"}, {"n": 34, "a": 3, "q": "永平公司決定在下年度發行票面利率等於 14%的債券，該公司認為，它可以按照某特定價格將債券賣給投資人，而在此一價格下，投資人能夠獲得 16%的收益率，假定稅率等於 17%，則永平公司的稅後負債成本為何？", "o": ["11.62%", "12.8%", "13.28%", "14.8%"], "e": "稅後負債成本是要求報酬率的概念，故以到期收益率 (YTM) 計算之。即稅後負債成本 = YTM x (1 - t) = 16% x (1 - 17%) = 13.28%。"}, {"n": 35, "a": 4, "q": "鍾國公司所屬產業較特殊，同產業僅有兩家上市公司，且該等公司的規模及獲利水準皆與鍾國公司具有一定差異。鍾國公司可合理估計未來 5 年內的財務預測，但超過 5 年的財務狀況則較難合理估計。下列何種評價方法比較適合鍾國公司？", "o": ["本益比法", "股價淨值比法", "股價營收比法", "現金流量折現法"], "e": "由於鍾國公司的可類比公司與其差異較大，較不適合採用需參考可類比公司股價資訊的本益比法、股價淨值比法及股價營收比法評價，而較適合採用現金流量折現法，以估計未來現金流量的方式評估鍾國公司的價值。"}, {"n": 36, "a": 1, "q": "進行企業股權評價時，對公司自由現金流量 (Free Cash Flow to Firm) 使用的折現率通常為：", "o": ["加權平均資金成本率，以其折現計算出的總價值減去負債的價值即為股東權益的價值", "加權平均資金成本率，以其折現計算出的數字即為股東權益之價值", "權益資金成本率，以其折現計算出的數字即為股東權益之價值", "權益資金成本率，以其折現計算出的總價值減去負債的價值即為股東權益的價值"], "e": "公司自由現金流量以加權平均資金成本率折現，可得公司整體價值，再減去負債的價值，即為股東權益的價值。"}, {"n": 37, "a": 1, "q": "根據資本資產定價模式 (CAPM)，樂樂公司股票的預期報酬率低於無風險利率，則下列敘述何者正確？", "o": ["樂樂公司股票的 β (貝他係數) 值低於零", "樂樂公司的股票風險幾近於無限大", "樂樂公司股票價格嚴重被低估", "樂樂公司股票價格嚴重被高估"], "e": "根據資本資產定價模式 (CAPM)，一證券之期望報酬由下式決定： E(ri) = rf + β(E(rm) - rf) 其中 E(ri) 為證券 i 之期望報酬率，rf 為無風險利率，E(rm) 為股票市場整體之期望報酬率，如果投資人嫌惡風險，E(rm) 將大於 rf。 因此，只有當該公司股票的 β (貝他係數) 值低於零時，其預期報酬率才會低於無風險利率。"}, {"n": 38, "a": 2, "q": "假設一公司完全以權益融資，其權益資金成本率為 20%，再假設公司期初有 1,000 股流通在外，而公司每股之經濟帳面金額為$100，該期公司產生的稅後經營利潤為$60,000，請問該公司之經濟附加價值為多少？", "o": ["$100,000", "$40,000", "$25,000", "$35,000"], "e": "經濟附加價值 (EVA) = 稅後淨營業利潤 - 總經濟帳面金額 x 資金成本率 = $60,000 - $100 x 1,000 x 20% = $40,000"}, {"n": 39, "a": 1, "q": "企業在取得資產後，無法在需要賣出時出售或必須大幅降價出售之風險稱為：", "o": ["流動性風險", "財務風險", "企業風險", "購買力風險"], "e": "選項(2)是指企業無法按時支付舉債所應付的利息而有倒閉的可能性，又稱違約風險。選項(3)個別公司在經營過程中，因產業景氣、公司管理能力、生產規模等企業本身因素，使其銷售成本或銷售額不穩定，稱之企業風險。選項(4)即通貨膨脹風險，是指物價的上漲對未來的實質報酬率的影響。"}, {"n": 40, "a": 3, "q": "企業由於產業景氣、公司營運能力的好壞，而使得業績、獲利受影響之風險稱為：", "o": ["財務風險", "市場風險", "企業風險", "流動性風險"], "e": "選項(1)是指企業無法按時支付舉債所應付的利息而有倒閉的可能性，又稱違約風險。選項(2)是指由於總體經濟因素，如金融風暴等，足以影響金融市場中所有資產報酬率的風險。選項(4)是指企業在取得資產後，無法在需要時及時出售或是會大幅折價出售之風險。"}, {"n": 41, "a": 4, "q": "有關淨現值法的優點，下列敘述何者正確？ 甲.對現金流量折現時未考慮到貨幣的時間價值；乙.未考慮到投資計畫的全部現金流量；丙.不符合價值可加原則；丁.考慮了投資風險", "o": ["僅乙、丙", "僅甲、丁", "僅甲、丙、丁", "僅丁"], "e": "淨現值法基於現金流量做決策，能正確計算時間價值，符合價值可加原則 (Value Additivity Principle)，且考慮了投資風險。"}, {"n": 42, "a": 2, "q": "下列哪一項作法的淨現值不大於 0?", "o": ["採用產品差異化的策略以滿足不同客戶之需求", "產品屬完全競爭市場", "阻止別人進入市場", "採取成本領導的策略"], "e": "在完全競爭市場下，淨現值等於 0。"}, {"n": 43, "a": 1, "q": "在作策略分析時，可將資本預算決策視為一系列關於何種的決策？", "o": ["選擇權", "期貨", "利率交換", "選項(1)(2)(3)皆是"], "e": "資本預算決策相當於一系列關於選擇權的決策。"}, {"n": 44, "a": 3, "q": "有兩家製造相同產品的公司，營業槓桿程度高的公司較槓桿程度低的公司：", "o": ["其每股盈餘較不受營業額的影響", "其營業利益較不受營業額的影響", "其成本線的截距較高", "其成本線的斜率較高"], "e": "選項(1)由於營業槓桿程度較高，故其每股盈餘較受營業額影響。選項(2)由於營業槓桿程度較高，故其營業利益較受營業額影響。選項(4)由於營業槓桿程度較高，其成本線由於變動成本所佔部分較小，故其斜率較低。"}, {"n": 45, "a": 4, "q": "資本預算計畫的類別包括：", "o": ["新產品", "維持或降低成本的重置", "舊產品產能擴充", "選項(1)(2)(3)皆是"], "e": "推出新產品、舊產品產能擴充、以及維持或降低成本之重置計畫皆是資本預算計畫。"}, {"n": 46, "a": 3, "q": "下列何者為金融資產 (Financial Asset)?", "o": ["未開發之土地", "商標", "可轉換公司債", "電腦"], "e": "金融資產有別於實質資產，如：可轉換公司債為金融資產，商標、未開發之土地、電腦則皆屬實質資產。"}, {"n": 47, "a": 2, "q": "下列何者為實質資產 (Real Asset)?", "o": ["公司債", "不動產", "股票", "商業本票"], "e": "實質資產有別於金融資產，不動產屬於實質資產，公司債、股票、商業本票皆屬金融資產。"}, {"n": 48, "a": 4, "q": "台南公司 X1 年初成立，發生下列股票發行相關交易：年初以現金每股$30 發行 20,000 股；年中發行 10,000 股，取得土地市價$400,000；以每股$20 取得 1,000 股庫藏股。X1 年淨利$90,000，發放股利$10,000。公司股票每股面額$10，請問該公司年底下列金額，何者不正確？", "o": ["年底股本$300,000", "年底資本公積$700,000", "年底保留盈餘$80,000", "年底權益$1,080,000"], "e": "年底股本 = (20,000 + 10,000) x $10 = $300,000； 資本公積 = $20 x 20,000 + $300,000 = $700,000； 保留盈餘 = $90,000 - $10,000 = $80,000； 權益 = $300,000 + $700,000 + $80,000 - $20,000 = $1,060,000"}, {"n": 49, "a": 2, "q": "甲公司資產的價值為 500 萬元，負債的價值為 200 萬元，該公司負債的貝它 (Beta) 為 0.6，權益之貝它為 1.5，試問公司整體的貝它是多少？", "o": ["0.75", "1.14", "1.02", "1.20"], "e": "公司整體的貝它值 = 0.6 x (200 萬元 / 500 萬元) + 1.5 x (300 萬元 / 500 萬元) = 1.14"}, {"n": 50, "a": 1, "q": "甲公司擁有一筆 10 年期公司債，票面利率為 4%，面額為$2,000,000，市場利率為 5%。假設年金現值係數為 7.722，現值係數為 0.614，該公司債的初始發行價格為多少？", "o": ["$1,845,760", "$1,865,000", "$1,870,000", "$1,880,000"], "e": "初始發行價格 = 年利息 x 年金現值係數 + 本金 x 現值係數 = ($2,000,000 x 4% x 7.722) + ($2,000,000 x 0.614) = $617,760 + $1,228,000 = $1,845,760"}, {"n": 51, "a": 2, "q": "許多公司利用帳面的數字來計算損益兩平點，但根據帳面數字計算之損益兩平點常較依淨現值計算之兩平點為：", "o": ["高", "低", "相等", "無法判斷，尚需計畫殘值的資訊"], "e": "根據帳面數字計算之損益兩平點未考慮投入資本之資金成本，故其算出的損益兩平點較低。"}, {"n": 52, "a": 1, "q": "根據資本資產定價模式，資產期望報酬率有差異的原因是在於下列何者不同？", "o": ["貝它 (Beta) 係數", "市場風險溢價", "無風險利率", "標準差"], "e": "根據 CAPM，資產期望報酬率 = 無風險報酬率 + 貝它值 x 市場風險溢酬，其中無風險報酬率、市場風險溢酬對每個公司來說數字均相同，唯一隨著公司不同而不同的是貝它值。"}, {"n": 53, "a": 4, "q": "一投資計畫之資金成本率決定於：", "o": ["該公司之資金成本率", "整個市場平均的資金成本率", "該公司所屬產業之平均的資金成本率", "該投資計畫本身的風險"], "e": "一投資計畫之資金成本率決定於該計畫本身之風險程度，不得直接以該公司之資金成本率代替。"}, {"n": 54, "a": 4, "q": "回收期限法 (Payback Period Rule)：", "o": ["未考慮期初的投資", "考慮了一投資計畫所有的現金流量", "考慮了貨幣的時間價值", "在直接應用時不需要考慮資金成本"], "e": "選項(1)有考慮期初投資金額；選項(2)未考慮回收期限以後的現金流量；選項(3)未考慮貨幣的時間價值。"}, {"n": 55, "a": 3, "q": "根據淨現值法則，何種情形下應該投資？", "o": ["淨現值除以投資成本大於資金成本率", "淨現值大於投資之成本", "淨現值大於 0", "淨現值的風險為 0"], "e": "根據淨現值法則，當淨現值大於 0 時，即值得投資。"}, {"n": 56, "a": 3, "q": "企業考量改變信用條件應考慮其成本效益，下列何者不在考慮範圍內？", "o": ["帳款利息成本", "收帳期間", "付款方式", "呆帳比率"], "e": "信用條件是指收款期限、折扣、折扣期限等。改變信用條件，其效益是提昇銷貨，但也會產生折扣、呆帳成本，及應收帳款增加所產生的資金成本。付款方式則較無關聯。"}, {"n": 57, "a": 1, "q": "60 元的永續年金在 5%的資金成本率之下，現值為若干？", "o": ["$1200", "$37.04", "$60", "$1,000"], "e": "永續年金現值 = 年金金額 / 資金成本率 = $60 / 5% = $1,200"}, {"n": 58, "a": 3, "q": "公司的價值等於：", "o": ["銷貨收入減銷貨成本", "現金流入減現金流出", "負債加上權益的價值", "有形之不動產、廠房及設備加上無形資產的價值"], "e": "選項(1)等於銷貨毛利。選項(2)若為正，則等於淨現金流入，若為負，則等於淨現金流出。選項(4)還須加上流動資產的價值，方為公司價值。"}, {"n": 59, "a": 3, "q": "自由現金流量的定義為：", "o": ["收入 + 費用 + 投資", "收入 + 費用 - 投資", "收入 - 費用 - 投資", "收入 - 費用 + 投資"], "e": "自由現金流量為：收入 - 費用 - 投資。"}, {"n": 60, "a": 4, "q": "一公司的本益比會受到下列何者的影響？ 甲.折舊政策；乙.利息是否資本化", "o": ["僅甲", "僅乙", "甲和乙都不對", "甲和乙都對"], "e": "本益比 = 每股市價 / 每股盈餘，而折舊政策與利息是否資本化皆會影響每股盈餘，故也會影響本益比。"}, {"n": 61, "a": 4, "q": "一公司目前的股價為$100，下一年度預計之每股盈餘為$4，假設投資人所要求之期望報酬率為 8%，則該公司成長機會現值對股價的比率為：", "o": ["10%", "20%", "25%", "50%"], "e": "目前股價 = 股利零成長價值 + 成長機會現值 = (每股盈餘 / 期望報酬率) + 成長機會現值，成長機會現值 = $100 - ($4 / 8%) = $50，故成長機會現值對股價比率為 $50 / $100 = 50%"}, {"n": 62, "a": 2, "q": "下列哪一種評估準則在正確地使用下將導致與淨現值法有相同的結果？", "o": ["回收期限法", "內部報酬率法", "平均會計報酬率法", "折現回收期限法"], "e": "當現金流量無異常現象、不是互斥計畫時，IRR 的決策結果應該會與淨現值法相同。"}, {"n": 63, "a": 3, "q": "一投資方案的資金成本是：", "o": ["一個經過充分分散風險投資組合的期望報酬率", "投資方案貸款的利率", "投資人要求該與該投資方案風險類似證券之期望報酬率", "銀行基本放款利率"], "e": "一投資方案的資金成本是與該投資方案風險類似之證券的期望報酬率。"}, {"n": 64, "a": 2, "q": "假設一公司帳面的權益報酬率為 10%，該公司每年將其所得盈餘之 70%發放給股東，試問該公司的盈餘及資產的成長率將是多少？", "o": ["10%", "3%", "30%", "12%"], "e": "成長率 = 權益報酬率 x (1 - 股利發放率) = 10% x (1 - 70%) = 3%"}, {"n": 65, "a": 1, "q": "假設一公司之權益報酬率為 15%，該公司每年將其所賺得盈餘中的 30%保留在公司內作為新的投資，試問該公司盈餘及股利的成長率將是多少？", "o": ["4.5%", "7.5%", "15%", "30%"], "e": "成長率 = 權益報酬率 x 保留比率 = 15% x 30% = 4.5%"}, {"n": 66, "a": 4, "q": "在應用內部報酬率法 (IRR) 時，若面臨的是典型的現金流量型態之投資計畫，則接受投資的條件是當內部報酬率：", "o": ["大於 0 時", "等於 0 時", "小於資金成本率時", "大於資金成本率時"], "e": "當面臨典型現金流量型態之投資計畫，則當內部報酬率大於資金成本率時可接受投資計畫。"}, {"n": 67, "a": 4, "q": "下列何者不是內部報酬率法的缺點？", "o": ["內部報酬率可能不只一個", "內部報酬率不一定愈大愈好", "在互斥的計畫中作選擇時，有可能選到較差的方案", "內部報酬率法未考慮所有的現金流量"], "e": "選項(4)內部報酬率有將所有的現金流量都納入計算。"}, {"n": 68, "a": 4, "q": "若一計畫的內部報酬率大於其資金成本率，則表示該計畫之淨現值：", "o": ["大於 0", "小於 0", "等於 0", "不一定大於或小於 0"], "e": "內部報酬率是指以 IRR 當作資金成本率時所算出的淨現值為 0，而平常我們所計算之計畫淨現值是以其本身資金成本率所算出，故即使內部報酬率大於資金成本率，但不知其現金流量是否為正常情況（此係指先有現金流出，後有現金流入），故無法判斷該計畫之淨現值大小是否大於 0。"}, {"n": 69, "a": 1, "q": "通常我們在估計未來預期報酬率時，可以計算過去一段時間報酬率的：", "o": ["簡單算術平均", "絕對值的平均", "調和平均", "幾何平均"], "e": "估計未來預期報酬率時，應計算過去一段時間報酬率的簡單算術平均。"}, {"n": 70, "a": 2, "q": "假設你於一年前購得一股票，成本為$45，目前的價格為$48（已除息），而且你剛收到$7 的現金股利，請問報酬率為多少？", "o": ["20.00%", "22.22%", "15.00%", "18.00%"], "e": "報酬率 = ($48 + $7 - $45) / $45 = 22.22%"}, {"n": 71, "a": 1, "q": "假設一投資組合中有兩種資產，第一種資產占 60%，其 β (貝他係數) 為 1.4，另外外一種資產的 β 為 1.9，請問投資組合的 β 是多少？", "o": ["1.60", "1.29", "1.70", "1.44"], "e": "投資組合之 β 等於各個資產之 β 的加權平均數，故等於 1.4 x 60% + 1.9 x 40% = 1.60"}, {"n": 72, "a": 2, "q": "我們常用貝它 (Beta) 來計算：", "o": ["一公司股票報酬率之標準差", "一公司的股權資金成本率", "一公司股票報酬率之變異數", "無風險利率或市場期望報酬率"], "e": "根據 CAPM，我們可以使用貝它值來計算一公司之股權成本率。"}, {"n": 73, "a": 2, "q": "假設某一股票之報酬率在市場報酬率為正時，其皆為負，且市場報酬率為負時，其皆為正，則此股票的貝它 (Beta) 值：", "o": ["大於 0", "小於 0", "等於 0", "資料不足，無法判斷"], "e": "由於此股票的報酬率與市場報酬率呈負向關係，故此股票貝它它小於 0。"}, {"n": 74, "a": 3, "q": "一般來說，我們會用統計上的迴歸方法來估計：", "o": ["無風險利率", "股票報酬率之共變數", "股票之貝它係數", "股票報酬率之變異數"], "e": "股票之貝它係數在實務上是以統計之迴歸分析方法來估計得出。"}, {"n": 75, "a": 3, "q": "一個投資計畫的內部報酬率 (IRR) 若等於其資金成本率，則該計畫的淨現值：", "o": ["大於 0", "小於 0", "等於 0", "不一定等於、大於或小於 0"], "e": "當一投資計畫的 IRR 計算出來剛好等於資金成本率，表示該計畫淨現值為 0。"}, {"n": 76, "a": 2, "q": "分析淨現值如何受到一些關鍵變數影響的方法稱為：", "o": ["營運分析", "敏感度分析", "成本效益分析", "損益兩平點分析"], "e": "敏感性分析是在其他條件不變的前提下，探討資本預算中單一變數的變動對評估結果的影響。"}, {"n": 77, "a": 4, "q": "利潤指數 (Profitability Index) 是：", "o": ["內部報酬率與資金成本率之比率", "總收入與總成本之比率", "內部報酬率與市場報酬率之比率", "現金流量現值對期初投資成本之比率"], "e": "利潤指數 = 現金流量現值 / 期初投資成本，當大於 1 時，表示 NPV 大於 0，值得投資此投資計畫。"}, {"n": 78, "a": 4, "q": "一企業對於固定生產成本投入之程度稱為：", "o": ["固定產能利用率", "財務槓桿", "邊際產能利用率", "營業槓桿"], "e": "營業槓桿表達出一企業之事業風險，是指公司在營運過程中，固定成本的使用程度，若固定成本占總成本的比率越高，則營業槓桿越大。當一公司之營業槓桿很大時，只要銷售額稍微下降，EBIT 就會大幅下降。"}, {"n": 79, "a": 4, "q": "在評估投資計畫時所用的平均會計報酬率法：", "o": ["主要是利用現金流量的數字作分析", "考慮了貨幣的時間價值", "通常我們會將其與資金成本率作比較", "並未將現金流量折現"], "e": "選項(1)未利用現金流量數字作分析，而是以會計帳面盈餘作分析。選項(2)未考慮貨幣的時間價值。選項(3)不會將其平均會計報酬率與資金成本率作比較。"}, {"n": 80, "a": 2, "q": "尚未對通貨膨脹率作調整的報酬率稱為：", "o": ["設定報酬率", "名目報酬率", "超額報酬率", "實質報酬率"], "e": "未考慮通貨膨脹率的報酬率稱為名目報酬率。"}, {"n": 81, "a": 4, "q": "若甲股票報酬率與乙股票報酬率之共變數為 0.5，則乙股票報酬率與甲股票報酬率之共變數為：", "o": ["資料不足，無法斷定", "-0.5", "大於 0.5", "0.5"], "e": "甲股票與乙股票報酬率之共變數不因甲、乙股票的排列先後而改變。"}, {"n": 82, "a": 3, "q": "假設兩家公司除了財務槓桿程度不同外，餘皆相同，則財務槓桿程度較大的公司，其貝它 (Beta) 值：", "o": ["與財務槓桿程度低的公司一樣", "較小", "較大", "為負"], "e": "財務槓桿程度較大的公司，其風險程度亦較大，故其貝它值會較大。"}, {"n": 83, "a": 4, "q": "一公司盈餘循環性是指：", "o": ["其售價較高", "其固定成本較高", "其財務槓桿程度高", "營收型態與總體經濟循環關係大"], "e": "盈餘循環性是指一公司之營收狀況與總體經濟循環的相關性。"}, {"n": 84, "a": 3, "q": "一般而言，下列何種產業的貝它 (Beta) 值可能較低？", "o": ["建築業", "電子業", "公用事業", "鋼鐵業"], "e": "公用事業由於受政府保護，有獨占性，公司風險較小，故其貝它值可能較低。"}, {"n": 85, "a": 1, "q": "一公司的營收如果循環性強且其營業槓桿程度亦高，則其貝它 (Beta) 值將：", "o": ["愈大", "愈小", "為 0", "小於 0"], "e": "若一公司的營收循環性強、營業槓桿程度又高，則其營業風險會較高，故其貝它值也會較大。"}, {"n": 86, "a": 4, "q": "計算現金流量現值為能考慮各期的風險應從何項調整估計著手？", "o": ["現金流量", "折現率", "風險貼水 (Risk Premium)", "選項(1)(2)(3)皆是"], "e": "若風險變高，則可以降低現金流量、或提高風險貼水而增加折現率來調整反應風險。"}, {"n": 87, "a": 1, "q": "現金預算在估計過程中，其現金流量估計，最重要應考量何項財務變動作為估計標準？", "o": ["銷售額", "呆帳比率", "應收帳款及其週轉率", "應付帳款及其週轉率"], "e": "現金預算之現金流量估計，主要是根據當年預測銷售額作為估計標準。"}, {"n": 88, "a": 4, "q": "公司現金流量如呈現非常不穩定的波動，係受何項因素影響？", "o": ["銷貨收入", "營運費用支出", "固定成本支出", "選項(1)(2)(3)皆有可能"], "e": "公司現金流量可能受銷貨收入、營運費用或固定成本支出等之變動影響而呈現不穩定現象。"}, {"n": 89, "a": 2, "q": "乙公司的借款利率為 7.5%，總資產報酬率為 6.5%，所得稅率為 20%。若乙公司以此條件舉債投資新計畫，將使得權益報酬率如何變動？", "o": ["降低", "增加", "不變", "不一定"], "e": "實質借款利率 = 7.5% x (1 - 20%) = 6% < 總資產報酬率 6.5%。故舉債投資對股東有利，會增加權益報酬率。"}, {"n": 90, "a": 4, "q": "資本結構最適化的影響因素，以下何者較不宜列入考慮？", "o": ["公司所得稅", "財務危機成本", "股東個人稅率", "現金流量的穩定性"], "e": "決定公司最適化之資本結構時，公司所得稅、財務危機成本、以及股東個人稅率皆是需要納入考慮的因素。"}, {"n": 91, "a": 4, "q": "資本資產評估模式計算證券報酬率所依據的風險因素為何？", "o": ["可分散性風險", "財務會計風險", "非系統性風險", "系統性風險"], "e": "CAPM 評價證券的預期報酬率所考慮的風險是證券的系統風險（亦稱為市場風險或不可分散風險）。"}, {"n": 92, "a": 4, "q": "下列何者與系統性風險無關？", "o": ["通貨膨脹", "匯率變動", "公共建設支出", "公司會計政策改變"], "e": "系統性風險是影響整個市場的因素所造成的，故公司會計政策改變僅影響該公司而已，屬於非系統性風險或稱個別風險。"}, {"n": 93, "a": 3, "q": "如果甲資產平均報酬率為 0.08，乙資產平均報酬率為 0.14，則投資組合包括甲與乙資產各 50%，其組合平均報酬率為何？", "o": ["0.095", "0.12", "0.11", "0.10"], "e": "投資組合平均報酬率 = 各資產平均報酬率之加權平均 = 0.5 x 0.08 + 0.5 x 0.14 = 0.11"}, {"n": 94, "a": 1, "q": "某一投資組合部位的信用槓桿倍數為 2 倍，若此一投資組合的現金部位可創造 5% 的獲利，則其槓桿組合的投資收益為何？", "o": ["10%", "8%", "6%", "5%"], "e": "槓桿組合的投資收益 = 原投資組合現金部位 x 信用槓桿倍數 = 5% x 2 = 10%"}, {"n": 95, "a": 4, "q": "某投資人投資某一股票的價格為 40 元，支付券商佣金為 0.04275 元，其交易成本率（買入部分）為何？", "o": ["0.0855%", "0.1425%", "0.095%", "0.1069%"], "e": "交易成本率=$0.04275÷40=0.1069%"}, {"n": 96, "a": 3, "q": "測試一家公司的營業風險，常採用營業槓桿係數，此一係數受哪一變數影響最大？", "o": ["售價", "銷貨數量", "固定生產成本", "變動生產成本"], "e": "營業槓桿是指公司在營運過程中，固定成本的使用程度，若固定成本占總成本的比率越高，則營業槓桿越大。"}, {"n": 97, "a": 1, "q": "BOT（建造、營運、移轉）的公共建設投資開發模式，其投資計畫評估標準，應採何者為之？", "o": ["NPV", "IRR", "會計報酬率", "還本年限法"], "e": "淨現值是指各期淨現金流量之折現值總和減去初期現金支出後之剩餘值，代表投資計畫對公司價值的直接貢獻，故使用 NPV 評估 BOT 的投資專案價值較適當。"}, {"n": 98, "a": 4, "q": "BOT（建造、營運、移轉）的公共建設投資開發型態，影響其投資計畫效益評估，宜特別注意之因素有哪些？", "o": ["投資開發年限", "殘值價值估計", "營運開發期的成本效益估計", "選項(1)(2)(3)皆對"], "e": "BOT 投資專案價值評估往往使用 NPV 法，故須特別注意投資開發年限、殘值價值估計、營運開發期的成本效益估計等問題。"}, {"n": 99, "a": 4, "q": "有關生產機器設備的重置支出問題，其決策目標為何？", "o": ["生產的未來成本極小化", "生產的內部成本極小化", "生產的收益極小化", "生產成本的現值極小化"], "e": "生產機器設備重置的決策目標是極大化生產收益或極小化生產成本。"}, {"n": 100, "a": 2, "q": "下列何者不是資本預算的主要問題？", "o": ["互相排斥投資計畫選擇", "品質交換問題", "不同年限投資計畫選定", "資本額度或預算之分配"], "e": "互相排斥之投資計畫的選擇、不同年限投資計畫的選定、以及資本額度、預算之分配，皆是進行資本預算會遇到的問題。"}, {"n": 101, "a": 3, "q": "在臺灣高速鐵路的諸多營運特色中，不包括下列何者？", "o": ["專案融資", "固定成本高", "營業槓桿程度低", "採 BOT 制度"], "e": "臺灣高鐵是採 BOT 方式，所需資金龐大，負債比率高，財務槓桿高。而且，固定成本高，營業槓桿亦高。"}, {"n": 102, "a": 1, "q": "今有一投資計畫之現金流量如下： t=0：-50 t=1：+21 t=2：+30 t=3：+20 IRR：18.88% 若資金成本為 16%，則公司應：", "o": ["接受該計畫", "拒絕該計畫", "無法判斷", "接受或拒絕對股東財富並無影響"], "e": "投資的內部報酬率較資金成本率為高，故應接受之。"}, {"n": 103, "a": 4, "q": "下列何種事件會增加公司的淨營運資金？", "o": ["買地準備蓋廠", "減少賒銷的比重", "縮小生產線的規模", "向銀行取得長期資金償還應付帳款"], "e": "淨營運資金 (Net Working Capital) =流動資產－流動負債 選項(1)錯誤，購買不動產、廠房及設備，現金減少，流動資產減少，淨營運資金減少。選項(2)錯誤，減少賒銷改為現銷，現金增加但應收帳款減少，流動資產不變，淨營運資金不變。選項(3)錯誤，生產線縮減，淨營運資金需求減少。選項(4)正確，流動負債減少，淨營運資金增加。"}, {"n": 104, "a": 2, "q": "融資租賃又可稱為何者？", "o": ["服務性性質", "財務租賃", "生產租賃", "維修租賃"], "e": "融資租賃又稱財務租賃。"}, {"n": 105, "a": 3, "q": "下列何者不是 MM 理論分析的假設？", "o": ["市場是完美的", "無破產風險", "證券不可以無限分割", "沒有交易成本"], "e": "選項(1)正確。選項(2)正確。選項(3)錯誤，證券可以無限分割。選項(4)正確。"}, {"n": 106, "a": 3, "q": "下列何種金融工具不會改變一公司的資本結構？", "o": ["認股權證", "實施庫藏股，辦理減資", "由其他證券公司發行該公司的股票認購權證", "特別股"], "e": "選項(1)錯誤，執行時公司股數會增加。選項(2)錯誤，公司股數會減少，權益減少。選項(3)正確，執行時，股票由證券公司給予，公司不發行新股。選項(4)錯誤，權益會增加。"}, {"n": 107, "a": 1, "q": "由承租人角度來看，下列何者不是租賃相關之成本？", "o": ["租賃資產之買價", "稅後之租賃給付", "放棄之折舊稅盾", "取代其他負債之使用"], "e": "以承租人角度來看，租賃的相關成本包括：折舊產生之現金流量現值、稅後殘值的現值、稅後租賃費用的現值。前兩者是因租賃而無法享受的稅盾好處，後者是租賃的直接成本。然而租賃資產的買價為出租人的成本。"}, {"n": 108, "a": 1, "q": "下列何者並非使用租賃較佳之理由？", "o": ["租賃可保留資金", "租約標準化後可降低管理及交易之成本", "可得到較佳稅盾的利用", "短期租賃有其便利性"], "e": "選項(1)：若不租賃，改用借錢購買一樣可以保留現金。"}, {"n": 109, "a": 2, "q": "在下列何種情況下租賃對出租人及承租人的好處較大（假設其他一切不變）？", "o": ["折舊所造成之稅盾發生於租約的晚期", "出租人的稅率大於承租人的稅率", "利率較低時", "租期長但租金之給付在早期較多"], "e": "選項(1)折舊的稅盾效果發生愈晚，現金流量現值愈小。選項(3)稅盾發生愈早的效果在利率愈低時愈小。選項(4)在晚期較多，方為有利。"}, {"n": 110, "a": 3, "q": "在我國，可轉換公司債每張的面額為 10 萬元，若轉換價格為 50 元，則表示轉換比率為：", "o": ["4,000", "2,500", "2,000", "100,000"], "e": "可轉換公司債面額=轉換價格×轉換比率 故轉換比率=$100,000÷$50=2,000"}, {"n": 111, "a": 2, "q": "可轉換公司債之發行日與開始轉換日間的期間稱為：", "o": ["轉換期間", "凍結期間", "到期期間", "執行期間"], "e": "可轉換公司債發行日至開始轉換日間稱為凍結期間；開始轉換日至到期日間稱為轉換期間。"}, {"n": 112, "a": 3, "q": "可轉換公司債之轉換價值為：", "o": ["股票市價", "債券部分未來給付之現值", "轉換比率乘以股票市價", "可轉換公司債價值減股票市價"], "e": "轉換價值(Convertible Value)＝轉換比率×股票市價，若依據 IAS32 之規定，發行公司發行可轉換公司債時，認列原則如下：1.應付公司債依公允價值或現值入帳（面額與溢折價分開列示）。現值係指以未來應支付之利息及應償還之本金按相同條件但不可轉換公司債之市場利率折現者。2.發行總金額減除應付公司債之公允價值即得轉換權之價值，應認列為「資本公積－認股權」。"}, {"n": 113, "a": 2, "q": "下列何者會增加可轉換公司債的價值？", "o": ["凍結期間變長", "股票價格波動變大", "股票股息的發放多", "轉換期間短"], "e": "可轉換公司債內含買權 (Call Option)，故當股價波動越大、轉換期間越長、凍結期間越短、股息越少時，可轉換公司債的價值越高。"}, {"n": 114, "a": 1, "q": "評估投資計畫時，其年限應採下列何者為宜？", "o": ["長期資產經濟年限", "長期資產實體年限", "長期資產法定期限", "長期資產實體耐用年限"], "e": "投資計畫評估年限應以長期資產所能提供效益的年限為準，即長期資產經濟年限。"}, {"n": 115, "a": 1, "q": "外匯交易之交割日在兩個工作天之內的稱為：", "o": ["即期外匯交易", "中期外匯交易", "遠期外匯交易", "短期外匯交易"], "e": "外匯交易之交割日在兩個工作天以內的稱為即期市場外匯交易，交割日在兩個工作天以上的稱為遠期市場。"}, {"n": 116, "a": 4, "q": "企業無法支付舉債利息或償還本金之風險稱為：", "o": ["購買力風險", "企業風險", "市場風險", "財務風險"], "e": "企業利用負債融資時，會增加股東的風險，如無法按時支付舉債利息或償還本金，稱為財務風險。"}, {"n": 117, "a": 2, "q": "下列何者非我國貨幣市場中常見的交易對象？", "o": ["附買回協議", "金融債券", "可轉讓定期存單", "銀行承兌匯票"], "e": "資本市場（到期日一年以上）：包括股票、公司債、CB、ECB…。貨幣市場（到期日一年以下）：國庫券 (T-Bill)、銀行承兌匯票 (BA)、商業本票 (CP)、可轉換定期存單 (NCD)、附買回協議 (RP)…。金融債券是指專業銀行所發行的債券。"}, {"n": 118, "a": 1, "q": "金融證券發行之市場稱為：", "o": ["初級市場", "次級市場", "三級市場", "基本市場"], "e": "初級市場又稱發行市場：指新證券首次發行的買賣市場。次級市場又稱流通市場：指證券發行後轉手交易的市場。"}, {"n": 119, "a": 4, "q": "一投資計畫的實質選擇權包括下列哪些選項？ 甲、延後投資；乙、經營規模變更；丙、停業；丁、經營不佳時暫時停業", "o": ["僅甲、乙", "僅甲、乙、丁", "僅乙、丙、丁", "甲、乙、丙、丁"], "e": "實質選擇權評價方式可將決策之彈性列入考量，決策之彈性包括變更經營規模、延後投資、停業、暫時停業等。"}, {"n": 120, "a": 3, "q": "假設一債券是以面值發行，如果市場利率在發行後下降，則債券的價格很可能會：", "o": ["大幅下降", "小幅下降", "上升", "不變"], "e": "債券價格與市場利率成反比。當市場利率愈低，債券價格愈高。"}, {"n": 121, "a": 4, "q": "下列何者會使得股票賣權 (Put Option) 的價值增加？", "o": ["標的股票價格增加", "執行價格 (Exercise Price) 下降", "標的股票的波動性減少", "到期日變長"], "e": "當標的股票價格增加，賣權價值下降；當執行價越高、到期日越長、波動性越大時，賣權價值越高。"}, {"n": 122, "a": 3, "q": "賣權 (Put Option) 賦與持有人：", "o": ["以一定價格出售一資產的權利與義務", "以一定價格購買一資產的權利與義務", "以一定價格出售一資產的權利", "以一定價格出售一資產的義務"], "e": "買權持有人 (Long Call)：以一特定價格購買某一資產的權利。賣權持有人 (Long Put)：以一特定價格出售某一資產的權利。買權發行人 (Short Call)：當持有買權者要求執行時，有以一特定價格出售某一資產的義務。賣權發行人 (Short Put)：當持有賣權者要求執行時，有以一特定價格購買某一資產的義務。"}, {"n": 123, "a": 1, "q": "破產的間接成本主要是由誰來負擔？", "o": ["股東", "債權人", "政府", "競爭對手"], "e": "破產的間接成本包括員工恐慌引起的成本、顧客的流失等，這些成本主要由公司股東來負擔，因為股東擁有公司剩餘財產的分配權。"}, {"n": 124, "a": 3, "q": "由經濟的角度來看，公司購買自己的股票最像：", "o": ["發行新股", "支付股票股利", "支付現金股利", "股票分割"], "e": "購回公司股票可提高公司股價，類似發放現金股利。"}, {"n": 125, "a": 1, "q": "在財務規劃 (Financial Planning) 中，外在的資金需求等於：", "o": ["資產－負債－權益", "資產－權益+負債", "權益+資產－負債", "權益+資產+負債"], "e": "外在的資金需求（EFN，External Fund Needed）=資產－負債－權益。EFN 指的是自發性資金與保留盈餘的增加仍不足因應營業擴充所需的資金。"}, {"n": 126, "a": 3, "q": "營業活動現金流量的增加不包括：", "o": ["應付帳款的增加", "應付所得稅的增加", "應收帳款的增加", "淨利的增加"], "e": "資產的減少、負債的增加或盈餘的上升，皆會使現金流量增加，故應收帳款的增加會使現金流量減少。"}, {"n": 127, "a": 2, "q": "一般公司最常應付短期資金不足的方式為：", "o": ["發行特別股", "向銀行借款", "發行公司債", "發行普通股"], "e": "選項(1)(3)(4)皆為長期資金的籌資工具。若只是短期資金不足，通常會應用短期的銀行貸款來因應。"}, {"n": 128, "a": 1, "q": "甲公司於 X1 年 1 月 1 日簽訂了一份利率交換合約，名目金額為$1,000,000，支付固定利率 5%，並收取浮動利率 LIBOR+2%。若 X1 年 12 月 31 日的 LIBOR 為 3%，甲公司應支付的交換合約結算款項是多少？", "o": ["$0", "$20,000", "$40,000", "$50,000"], "e": "固定利息支出 = $1,000,000 × 5% = $50,000 浮動利息收入 = $1,000,000 × (3% + 2%) = $50,000 淨支付額 = 固定利息支出 － 浮動利息收入 = $0"}, {"n": 129, "a": 4, "q": "下列何者為法定程序約定，同意未來支付一序列的費用，以取得某項公司資產之使用權？", "o": ["資產交換", "分期付款", "應付帳款與應計債務", "租賃義務"], "e": "選項(2)分期付款是取得所有權。選項(4)租賃義務為使用權。"}, {"n": 130, "a": 2, "q": "下列何者可增加買權的價值？", "o": ["距到期日的時間縮短", "利率較高", "標的資產價值變動小", "選項(1)(2)(3)皆是"], "e": "當標的股票價格增加、當執行價越低、到期日越長、標的資產價值波動性越大、利率越高時，買權的價值越高。"}, {"n": 131, "a": 2, "q": "甲公司擬出價 $80 購併乙公司，已知乙公司的價值為 $50，甲公司的價值為 $70，請問公司購併溢價為何？", "o": ["$20", "$30", "$50", "無法得知"], "e": "購併溢價＝現金－PV(B)＝$80－$50＝$30"}, {"n": 132, "a": 4, "q": "在第一順位抵押公司債的發行契約中通常有下列哪一種條款？", "o": ["限制高階主管的薪水", "限制股票之發行", "限制優先順位較低債務之發行", "限制優先順位更高債務之發行"], "e": "若公司日後發行優先順位更高的債券，將會損害原有的債權人權益。然而優先順位較低的債務，因其順位在其之後，並不會損及原有債權人，而股票的求償順序又在所有債券之後。"}, {"n": 133, "a": 3, "q": "假設 6 個月的利率為 0.5%，國庫券的現貨價格為 97，在未來 6 個月裡國庫券利息給付之現值為 1，則 6 個月的國庫券期貨的價值為多少？", "o": ["96.00", "97.00", "96.48", "98.70"], "e": "因為國庫券期貨並不能參與除息，所以要扣除利息金額。又 6 個月後國庫券期貨價值＝(97－1)×(1＋0.5%)＝96.48"}, {"n": 134, "a": 3, "q": "保安公司權益的帳面金額資料如下：普通股股本（面額為$10） $100,000、資本公積$104,000、保留盈餘$200,000、庫藏股（成本法）$50,000，合計$354,000，假設公司再以每股$15 的價錢出售庫藏股 5,000 股，則股本的金額將為：", "o": ["$50,000", "$75,000", "$100,000", "$175,000"], "e": "股本金額不因出售庫藏股而改變，所以仍為$100,000。"}, {"n": 135, "a": 3, "q": "下列何種情況會使決策者遞延一項淨現值為正的投資計畫？", "o": ["無風險利率下降", "投資計畫未來價值之不確定性減少", "投資計畫未來價值之不確定性增加", "投資計畫在初期產生之現金流入很大"], "e": "不確定性越大較容易使決策者遞延投資。"}, {"n": 136, "a": 2, "q": "投資計畫評估現金流量應採何基礎？", "o": ["稅前", "稅後", "機會成本", "稅盾效果"], "e": "基於公司所收到的現金流量都必須考慮到所得稅，故評估投資專案之現金流量應採稅後基礎計算，才能完全反映出此投資專案對公司的真實價值。"}, {"n": 137, "a": 3, "q": "大大公司目前有兩項相互獨立的投資方案可供選擇，兩方案的資訊如下，請問大大公司應如何選擇？ 甲方案：NPV = $2,500；IRR = 10%；乙方案：NPV = $400；IRR = 16%；則應：", "o": ["僅投資甲方案", "僅投資乙方案", "甲、乙兩方案均投資", "甲、乙兩方案均不投資"], "e": "甲、乙兩案為相互獨立但非互斥，兩案之淨現值均為正值，當大大公司預算可行時，可兩案均投資。"}, {"n": 138, "a": 3, "q": "假設負債的利率為 15%，稅率為 17%，則在計算融資租賃價值時應用的折現率為多少？", "o": ["2.4%", "9.6%", "12.45%", "20%"], "e": "計算融資租賃價值時應應用稅後折現率： 稅後折現率=稅前折現率×(1－t)＝15%×(1－17%)＝12.45%"}, {"n": 139, "a": 4, "q": "假設承租人不必繳稅，下列何種情況較不利於採用租賃？", "o": ["由直線法改為加速折舊法", "利率的上升", "公司所得稅率增加", "選項(1)(2)(3)皆非"], "e": "如公司不必繳稅，則選項(1)(3)不受影響。選項(2)利率上升，則租賃較為有利。"}, {"n": 140, "a": 1, "q": "假設租賃的出租人在訂定租金時使其淨現值為 0，當其他一切不變時，當出租人的稅率下降，則租賃對於承租人的價值將：", "o": ["下降", "增加", "不變", "無法斷定"], "e": "出租人稅率下降，其購買機器之折舊稅盾減少，因此出租人會調高租賃費用，而此舉對承租人不利。"}, {"n": 141, "a": 4, "q": "下列何者是在學理上採用租賃較佳的理由？", "o": ["租賃可增加每股盈餘", "租賃可以避免資本支出的限制", "租賃可提供百分之百的融資並保留資本", "租賃可以讓邊際稅率較低的公司「出售」其折舊稅盾"], "e": "觀念上是出租人購買資產，可以提列折舊，產生稅盾。故當出租人稅率高於承租人時，出租人因租賃而產生稅盾的節省大，而且在此情形下，出租人通常會把部分的好處回饋給承租人。此時，租賃對雙方皆有利。"}, {"n": 142, "a": 4, "q": "營業租賃又可稱為何者？", "o": ["融資租賃", "增量租賃", "財務租賃", "服務性租賃"], "e": "營業租賃又稱服務性租賃。"}, {"n": 143, "a": 2, "q": "短期融資的作法包括：", "o": ["發行公司債", "將應付帳款展期", "發行股票", "選項(1)(2)(3)皆是"], "e": "選項(1)(3)皆為長期（資本市場）融資工具。"}, {"n": 144, "a": 4, "q": "持有存貨的成本包括：", "o": ["資金之機會成本", "儲存成本", "過時成本", "選項(1)(2)(3)皆是"], "e": "持有存貨成本包括：資金之機會成本（購買存貨所喪失的利息收入）、儲存成本、過時成本。"}, {"n": 145, "a": 3, "q": "公司擬發行有價證券，如其承銷價值已充分反應公司應有價值，則其主要風險承擔者為何？", "o": ["投機者", "投資者", "承銷公司或承銷集團", "差價套利者"], "e": "包銷方式的風險承擔者為承銷商，代銷方式則為發行公司。"}, {"n": 146, "a": 2, "q": "甲公司於 X3 年 1 月 1 日向乙銀行借款$1,500,000，年息 5%公司，但乙銀行要求甲公司必須維持$150,000 的餘額，此部分以年息 3%計息，甲公司此筆借款的實質利率為何？", "o": ["5.56%", "5.22%", "4.80%", "4.70%"], "e": "實際負擔利息 = $1,500,000×5%－$150,000×3% = $70,500 實質利率 = $70,500÷($1,500,000－$150,000) = 5.22%"}, {"n": 147, "a": 4, "q": "流動負債通常表示公司應在未來多久期間內需償付的債務？", "o": ["視債務內容及項目而定", "9 個月", "3 個月", "1 年"], "e": "流動負債通常是指 1 年內需償還的負債。"}, {"n": 148, "a": 1, "q": "轉換公司債的價值可視為一般公司債價值加上下列何者為宜？", "o": ["買權價值", "賣權價值", "附認股權證標的股票價值", "權證的履約價格"], "e": "轉換公司債是指可依某一價格（轉換價格）轉換成普通股的債券，因此，只有當普通股市價大於轉換價格的時候才有可能進行轉換，其類似股票買權的性質。但因債券和買權兩個權利並非獨立，所以在評價時並不能將兩者分開評價再予以加總，所以只能說概念上可轉換債價值可視為公司債價值再加上一買權價值。"}, {"n": 149, "a": 3, "q": "下列何者決定公司債每期償息的現金支出金額？", "o": ["市場利率水準", "債券的折現率", "債券的票面利率", "有效的實質利率"], "e": "公司債的利息支出＝債券的票面利率×面額"}, {"n": 150, "a": 3, "q": "測度一家公司的財務風險常採用財務槓桿係數，請問此一槓桿係數主要受哪一變數影響？", "o": ["固定生產成本", "銷售訂價及景氣持平", "利息費用", "資產購置金額"], "e": "財務槓桿係數=EBIT÷(EBIT－I)，受利息費用影響最大。 營業槓桿係數=(EBIT+FC)÷EBIT，受固定生產成本影響最大。"}, {"n": 151, "a": 2, "q": "當企業的財務槓桿程度增加，其公司債價值通常會有何變化？", "o": ["增加", "減少", "不變", "不一定"], "e": "若舉債過多，會使公司財務風險增加，債券的要求報酬率提昇，公司債價值下降。"}, {"n": 152, "a": 2, "q": "若公司的股票股利配股率愈高（不考慮權權處理所需費用），則權益總值有何變化？", "o": ["縮小", "不變", "放大", "不一定"], "e": "若不考慮除權所需費用，股票股利的發放不影響權益總值，因為股數增加，股價等比例下跌，乘積不變。"}, {"n": 153, "a": 4, "q": "仁德公司的股利分配率預定為 40%，EPS＝8 元，則其每股現金股利將為何？", "o": ["6.4 元", "1.6 元", "0.4 元", "3.2 元"], "e": "D＝EPS×d＝8 元×0.4＝3.2 元"}, {"n": 154, "a": 4, "q": "宏碁乙是一種：", "o": ["特別股", "普通股", "可轉換公司債", "可轉換公司債轉換股票之權證"], "e": "股票名稱後加上甲、乙、丙、丁等，均為可轉換公司債轉換股票之換股權利證書。"}, {"n": 155, "a": 4, "q": "下列何者非影響公司融資決策之因素？", "o": ["銷貨量的穩定度", "成長率", "控制權考量", "產品成本"], "e": "選項(1)銷售額穩定有利於預測未來現金流量，有利於資本結構的決定。此外，銷售額愈穩定，營運風險愈小，可適度增加財務槓桿。選項(2)成長率的高低是影響融資決策的因素。選項(3)控制權的考量在於原股東擁有的股份比重有多少，普通股發行數量愈多，可掌握之控制權流失愈大。"}, {"n": 156, "a": 4, "q": "下列何種金融工具不會改變公司的資本結構？", "o": ["銀行貸款", "現金增資", "可轉換公司債", "備兌認股權證"], "e": "銀行貸款、可轉換公司債屬負債融資，均會影響公司資本結構。但備兌認股權證 (Covered Warrant) 屬於證券商或投資銀行發行之認購權證，不影響公司之資本結構。"}, {"n": 157, "a": 3, "q": "針對不同年限投資計畫的評估選擇，下列何種方法比較適合？", "o": ["會計報酬率法", "內部報酬率法", "等值年金法", "獲利指數法"], "e": "針對不同年限之投資計畫，應根據等值年金法計算出每年貢獻金額再加以比較。"}, {"n": 158, "a": 4, "q": "投資計畫採還本法評估其可行性，下列何者為其缺點？", "o": ["未考慮投資規模及還本後的現金流量", "未考慮風險", "未考慮貨幣時間價值", "選項(1)(2)(3)皆是"], "e": "回收期間法的缺點包括沒有考慮貨幣的時間價值的影響、未考慮風險、以及未考慮投資規模及還本後的現金流量。"}, {"n": 159, "a": 3, "q": "某投資計畫每年產生稅後盈餘 2,000 萬元，其投資成本為 1 億元，年限為 10 年，無殘值，其會計報酬率為何？", "o": ["100%", "50%", "40%", "20%"], "e": "會計報酬率＝稅後盈餘÷平均投資額＝2,000 萬÷（1 億÷2）＝40%"}, {"n": 160, "a": 1, "q": "一公司發行新股票以取得資金是在下列哪一種市場進行？", "o": ["初級市場", "次級市場", "三級市場", "店頭市場"], "e": "初級市場：新證券首次發行的買賣市場，公司利用此取得資金。次級市場：只是證券的轉手交易，公司並無取得資金。"}, {"n": 161, "a": 4, "q": "在制定資本預算決策時，會計盈餘往往不是重點所在，其原因為：", "o": ["會計盈餘與現金流量不一定相同", "會計盈餘未能完全考慮貨幣的時間價值", "會計盈餘會受到成本分攤方式之影響", "選項(1)(2)(3)皆是"], "e": "資本預算決策之精神在於預測在未來那些時點會產生多大金額的現金流量，而會計盈餘不一定等於現金流量，且無法反應採取不同之折舊方法會在不同時點產生現金流量之影響。"}, {"n": 162, "a": 1, "q": "下列敘述何者正確？", "o": ["對淨現值法而言，分析並確定各期的現金流量是很重要的", "淨現值法著重於淨利而非現金流量", "內部報酬率法在分析時並未考慮貨幣的時間價值", "內部報酬率法和淨現值法一樣好"], "e": "選項(2)淨現值法著重現金流量。選項(3)內部報酬率法有考慮貨幣的時間價值。選項(4)內部報酬率法因在下列情況會出現問題：不只一個 IRR、利率結構不是水平狀、計畫為互斥時、現金流量型態特殊時，故並非最理想之評估投資計畫方法，淨現值法才是最理想的方法。"}, {"n": 163, "a": 2, "q": "若同開科技公司擴建廠房之資金成本 13.66%，已知權益資金成本是 15%，所得稅率是 17%，已知公司負債權益比率是 1 : 4，且該公司新廠房的資金來源為銀行貸款，試問該公司舉債利率為何？", "o": ["15%", "10%", "9.6%", "8%"], "e": "雖然全數以銀行貸款融資，仍應以公司目標資本結構計算加權平均資金成本。 WACC＝20%×(1－17%)×舉債利率+80%×15%＝13.66%，舉債利率＝10%。"}, {"n": 164, "a": 3, "q": "評估投資計畫最好的方法為何？", "o": ["還本法", "IRR 法", "NPV 法", "利潤指數法"], "e": "投資計畫評估標準以 NPV 為最佳方式。"}, {"n": 165, "a": 3, "q": "若中洲電信公司權益資金成本是 20%，舉債利率是 10%，所得稅率是 17%，已知公司負債權益比率是 6 : 4，並知道公司將全部向銀行貸款來擴建新的機房，試問中洲電信公司之加權平均資金成本是（假設不考慮兩稅合一）：", "o": ["8.36%", "10.65%", "12.98%", "15%"], "e": "雖然全數以銀行貸款融資，仍應以公司目標資本結構計算加權平均資金成本。WACC＝60%×(1－17%)×10%+40%×20%＝12.98%"}, {"n": 166, "a": 3, "q": "已知大湖公司負債稅盾現值 6.8 億元，權益 30 億元，若稅率為 17%，貸款利率為 10%，則該公司之負債金額為何？", "o": ["30 億元", "23.2 億元", "40 億元", "33.4 億元"], "e": "負債稅盾現值＝負債金額×稅率 6.8 億元＝負債金額×17%，負債金額＝40 億元。"}, {"n": 167, "a": 4, "q": "假設一公司正考慮購買一設備，在營運的第 5 年中，將使得現金銷貨收入增加$400,000，而現金費用（不包含所得稅）增加$300,000，折舊費用則增加$50,000，假設除此外沒其他影響現金流量之事項，稅率為 17%，請問在這一年裡因為購買設備所產生之淨現金流量為：", "o": ["$8,500", "$41,500", "$83,000", "$91,500"], "e": "淨現金流量 = (增加的收入－增加的成本) × (1－稅率) + 折舊費用×稅率 = ($400,000－$300,000) × (1－17%) + $50,000×17% = $91,500"}, {"n": 168, "a": 4, "q": "試根據下列資料計算由營業來的現金流量（所得稅於當期支付）：銷貨收入（全為現金銷貨）$100,000、銷貨成本（全為現金購貨且存貨未改變）$50,000、營業費用（不含折舊且全為現金支出）$20,000、折舊費用$10,000、稅率 17%", "o": ["$10,000", "$23,200", "$24,900", "$26,600"], "e": "由營業來的現金流量＝(銷貨收入－銷貨成本－營業費用) × (1－稅率) + 折舊費用×稅率＝($100,000－$50,000－$20,000) × (1－17%) + $10,000 × 17% = $26,600"}, {"n": 169, "a": 2, "q": "某公司預計下一年度將發放每股股利 4.4 元，且假設公司未來的股利成長率固定為 3%。若該公司股票的預期報酬率為 11%，則該公司目前股票之評價結果應為多少元？", "o": ["$45.45", "$55", "$62.5", "$71.43"], "e": "$4.4 / (11% － 3%) = $55"}]}, {"id": 11, "title": "第11章 關係企業三書表之編制", "questions": [{"n": 1, "a": 2, "q": "下列何種情形下，投資公司無法視為對被投資公司具有重大影響力？", "o": ["投資公司依合資經營契約規定，擁有經營權者", "投資公司持有被投資公司有表決權之股份 30%，但第三者持有被投資公司剩餘 70%有表決權股份", "投資公司持有被投資公司有表決權之股份 20%以上", "投資公司指派人員獲聘為被投資公司總經理"], "e": "投資公司持有被投資公司有表決權之股份 30%，但第三者持有被投資公司剩餘 70%有表決權股份，則投資公司無法視為對被投資公司具有重大影響力。"}, {"n": 2, "a": 2, "q": "關於財務報表由非功能性貨幣換算為功能性貨幣，下列敘述何者正確？", "o": ["以現時匯率換算之", "產生之兌換差額，將影響企業之現金流量", "產生之兌換差額，稱為「換算調整數」，應列為當期損益", "兌換差額應列為權益之累積其他綜合損益"], "e": "將外幣報表換算為功能性貨幣時，應採用「時點法」，並非所有項目均按現時匯率換算（例如：非貨幣性項目係按歷史匯率或公允價值決定日之即期匯率換算），而換算產生之兌換差額，除屬於「構成國外營運機構淨投資一部分之貨幣性項目」之兌換差額應列為其他綜合損益外，其餘差額應列為當期損益。"}, {"n": 3, "a": 4, "q": "母公司與其持股 60%之子公司的合併報表上之保留盈餘數字相當於：", "o": ["母公司之保留盈餘+100%子公司之保留盈餘", "母公司之保留盈餘+60%子公司之保留盈餘", "母公司之保留盈餘+40%子公司之保留盈餘", "母公司之保留盈餘"], "e": "合併保留盈餘之期末數額應等於母公司之期末保留盈餘數額。"}, {"n": 4, "a": 2, "q": "依國際會計準則第 29 號「高度通貨膨脹經濟下之財務報導」原則：於通貨膨脹期間，在資產與負債未與物價水準連動之範圍內，若企業持有之貨幣性負債超過貨幣性資產，將有購買力利益。則該淨貨幣部位之損益，應如何處理？", "o": ["計入當期損益，無須單獨揭露", "計入當期損益，並單獨揭露", "減少其帳面金額，無須單獨揭露", "減少其帳面金額，並單獨揭露"], "e": "於通貨膨脹期間，在資產與負債未與物價水準連動之範圍內，若企業持有之貨幣性資產超過貨幣性負債，將有購買力損失；反之，若持有之貨幣性負債超過貨幣性資產，將有購買力利益。該淨貨幣部位之損益，應計入當期損益，並單獨揭露。"}, {"n": 5, "a": 4, "q": "於合併報表中，子公司持有母公司股票視為：", "o": ["長期投資", "受限制資產", "負債", "庫藏股"], "e": "子公司持有母公司股票，須視為庫藏股。"}, {"n": 6, "a": 3, "q": "下列有關合併會計處理之敘述，何者正確？", "o": ["合併公司發行股票取得被合併公司全部淨資產必為吸收合併", "合併公司發行股票交換被合併公司 100%股權，此時被合併公司即須消滅", "吸收合併與創設合併不一定以發行股票為對價", "當合併公司發行股票取得被合併公司全部淨資產，應依帳面金額合併"], "e": "發行股票方式之合併不限於吸收合併；取得被合併公司 100%股權時，被合併公司不一定消滅；符合 IFRS3 所定義之企業合併應採收購法處理。"}, {"n": 7, "a": 1, "q": "根據我國 IFRS 3 「企業合併」，當收購方取得被收購方的全部股份時，收購方應如何認列商譽？", "o": ["將移轉對價減去被收購方可辨認淨資產的公允價值", "將被收購方資產的帳面金額相加", "按照收購方的股東權益比例認列", "僅對持有超過 50%的股權進行認列"], "e": "商譽是收購方支付的移轉對價超過被收購方可辨認淨資產公允價值的部分，因此應按選項(1)的方式認列。"}, {"n": 8, "a": 1, "q": "根據 IFRS 3，廉價購買利益應如何處理？", "o": ["認列為當期損益", "計入其他綜合損益", "計入資本公積", "作為商譽的一部分"], "e": "廉價購買利益應作為當期損益認列。"}, {"n": 9, "a": 1, "q": "甲公司以帳面金額$1,000,000、公允價值$800,000 的不動產取得乙公司 75%股權，並依可辨認淨資產帳面金額比例衡量非控制權益。當時乙公司可辨認淨資產之帳面金額及公允價值分別為$800,000 及$950,000，則合併當天合併報表上應有之非控制權益金額為若干？", "o": ["$237,500", "$160,000", "$225,000", "$270,000"], "e": "$950,000×25%=$237,500"}, {"n": 10, "a": 1, "q": "甲公司發行每股面額$10 之普通股 6,000 股以取得乙公司 80%股份並對乙公司具有控制，甲公司所發行普通股的公允價值為$132,000。甲公司帳上應作的分錄何者錯誤？", "o": ["借記商譽$60,000", "借記採用權益法之投資$132,000", "貸記股本$60,000", "貸記資本公積$72,000"], "e": "甲公司帳上分錄：借記採用權益法之投資$132,000，貸記股本$60,000 及資本公積－普通股股票溢價$72,000。"}, {"n": 11, "a": 2, "q": "甲公司發行每股面額$10 的普通股取得乙公司 90%的股份，發行新股的成本為$11,000，其他收購相關成本為$8,000。甲公司應如何在合併財務報表中處理這些成本？", "o": ["發行新股成本計入商譽，其他收購成本作為當期費用", "發行新股成本計入資本公積，其他收購成本作為當期費用", "兩者均計入商譽", "兩者均作為當期費用列支"], "e": "發行新股成本應作為資本公積的減項，而其他收購成本應作為當期費用。"}, {"n": 12, "a": 3, "q": "公司在處理外幣交易時，應如何將外幣金額換算為功能性貨幣？", "o": ["使用契約簽訂日的匯率", "使用期末收盤的匯率", "使用交易發生日的匯率", "使用年度平均匯率"], "e": "外幣交換交易發生日的匯率換算為功能性貨幣，方能反映交易當時的真實價值。"}, {"n": 13, "a": 1, "q": "根據我國採用的 IFRS 10 「合併財務報表」，母公司如何在合併財務報表中表達非控制權益？", "o": ["在權益部分單獨列示", "在負債部分列示", "在資產部分列示", "不在合併報表中反映"], "e": "根據 IFRS 10，非控制權益應在合併財務報表的股東權益部分單獨列示，反映母公司對子公司控制權益以外的部分。"}, {"n": 14, "a": 1, "q": "母公司和子公司相互間持有債券，在合併報表中的處理方式為：", "o": ["視為發行公司收回債券處理", "不需要作任何沖銷，但在合併報表中仍會出現債券項目", "以上(1)、(2)選項都有可能，視債券發行公司為母公司或子公司而定", "將債券列為權益的一部分"], "e": "依企業個體理論來看，母子公司屬於一個經濟個體，所以互相持有債券視為債券之收回。"}, {"n": 15, "a": 4, "q": "秀賢公司於 X1 年 1 月 1 日以現金$270,000 收購東勳公司 80%股份並取得控制，另支付收購成本$4,000，且以東勳公司當日可辨認淨資產之比例份額衡量非控制權益。東勳公司當日可辨認淨資產之公允價值為$377,500，秀賢公司應如何作帳上分錄？", "o": ["認列商譽$28,000", "認列商譽$107,500", "認列廉價購買利益$28,000", "認列廉價購買利益$32,000"], "e": "收購成本$4,000 應認列為當期費用，移轉對價為$270,000，東勳公司 80%股份的公允價值為$377,500×80%=$302,000，大於移轉對價$270,000。因此，秀賢公司應認列廉價購買利益$302,000－$270,000＝$32,000。"}, {"n": 16, "a": 3, "q": "甲公司之功能性貨幣及表達貨幣均為新臺幣，其國外子公司之功能性貨幣為歐元，並以當地貨幣英鎊記帳。在編製合併報表過程中，應將該國外子公司之財務報表：", "o": ["由英鎊換算為新臺幣報表", "由歐元換算為新臺幣報表", "由英鎊換算為歐元報表，再由歐元換算為新臺幣報表", "由歐元換算為英鎊報表，再由英鎊換算為新臺幣報表"], "e": "國外營運機構外幣財務報表換算為母公司表達貨幣財務報表時，若該外幣非為功能性貨幣，須先將該外幣財務報表以功能性貨幣依時點法換算之。若該功能性貨幣與母公司表達貨幣不同，應再依現時匯率法換算為母公司表達貨幣。"}, {"n": 17, "a": 3, "q": "功能性貨幣財務報表換算其表達貨幣時，通常保留盈餘期末餘額之計算不包括：", "o": ["上期換算後保留盈餘之期末餘額", "按宣告日匯率換算之股利金額", "以歷史匯率換算之當期損益", "以上均包含於保留盈餘之計算"], "e": "當期損益應按當年度平均平均匯率換算。"}, {"n": 18, "a": 2, "q": "若國外子公司之功能性貨幣為當地貨幣，並以該功能性貨幣記帳，其財務報表在換算為母公司表達貨幣時，下列何者應以資產負債表日匯率換算？", "o": ["股本", "商譽", "股利", "保留盈餘"], "e": "子公司財務報表由功能性貨幣換算為表達貨幣時，應採現時匯率法，其中資產項目須依收盤匯率換算。"}, {"n": 19, "a": 1, "q": "左營公司於 X5 年 1 月 1 日取得鳳山公司 100%股權，當日鳳山公司之保留盈餘為$1,000,000。鳳山公司之 X5 年淨利為$300,000，並未發放股利，X5 年 12 月 31 日合併資產負債表之合併保留盈餘為$2,000,000。在完全權益法下，左營公司之 X5 年底保留盈餘應為：", "o": ["$2,000,000", "$1,300,000", "$700,000", "資訊不足，無法確定"], "e": "在完全權益法下，合併保留盈餘等於母公司保留盈餘。"}, {"n": 20, "a": 2, "q": "下列何者可推定 X 公司與 Y 公司為控制與從屬關係？ 甲.X 公司與 Y 公司的董事有半數以上相同；乙.X 公司持有 Y 公司有表決權股份總數 20%；丙. X 公司與 Y 公司已發行有表決權股份總數有半數以上來自同一股東；丁.X 公司的營收有 10%來自 Y 公司：", "o": ["僅甲、乙、丙", "僅甲、丙", "僅丙、丁", "僅甲、乙、丁"], "e": "選項甲正確，公司與他公司之執行業務股東或董事有半數以上相同者，推定為有控制與從屬關係。選項乙錯誤，X 公司須持有 Y 公司有表決權股份總數半數數者始為控制公司。選項丙正確，公司與他公司已發行有表決權之股份總數或資本總額有半數以上為相同股東持有或出資者，推定為有控制與從屬關係。選項丁錯誤，並無此種規定。"}, {"n": 21, "a": 2, "q": "在反向收購中，哪個個體被視為收購者？", "o": ["法律形式上的母公司", "法律形式上的子公司", "資產規模較大的實體", "負債規模較小的實體"], "e": "在反向收購中，法律形式上的子公司通常被視為經濟實質上的收購者。"}, {"n": 22, "a": 1, "q": "當收購者在企業合併中發行固定數量的股份作為或有對價時，應如何分類？", "o": ["分類為權益工具，且收購日後不得重新衡量", "分類為金融負債，且收購日後得重新衡量", "分類為其他綜合收益，並於收購日後得調整", "分類為短期負債"], "e": "當收購者發行固定數量的股份作為或有對價時，該對價應分類為權益工具，且其價值在收購日後不得重新衡量。"}]}]};

QUIZ_DATA.chapters.forEach(ch=>{
  ch.questions.forEach(q=>{
    const qid = `ch${ch.id}-${q.n}`;
    Q_BY_ID[qid] = {qid, chapter: ch.id, chapterTitle: ch.title, n: q.n, a: q.a, q: q.q, o: q.o, e: q.e};
    ALL_QIDS.push(qid);
  });
});

/* ======================= storage helpers ======================= */
/* loadJSON/saveJSON are function declarations defined below and hoisted, safe to use here */
let questionEdits = loadJSON(K_EDITS, {}); // qid -> {q, o:[4], a, e}
function saveEdits(){ saveJSON(K_EDITS, questionEdits); }
function hasEdit(qid){ return !!questionEdits[qid]; }
function getQ(qid){
  const base = Q_BY_ID[qid];
  if(!base) return base;
  const ed = questionEdits[qid];
  if(!ed) return base;
  return Object.assign({}, base, {q: ed.q, o: ed.o.slice(), a: ed.a, e: ed.e});
}

function loadJSON(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    if(raw===null) return fallback;
    return JSON.parse(raw);
  }catch(e){ return fallback; }
}
function saveJSON(key, val){
  try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
}

let progress = loadJSON(K_PROGRESS, {});   // qid -> {attempts,wrongAttempts,everWrong,lastSelected,lastCorrect,attemptedInAll,poolPending}
let favorites = loadJSON(K_FAVORITES, []); // array of qid
let favSet = new Set(favorites);

function isFav(qid){ return favSet.has(qid); }
function toggleFav(qid){
  if(favSet.has(qid)){ favSet.delete(qid); } else { favSet.add(qid); }
  favorites = Array.from(favSet);
  saveJSON(K_FAVORITES, favorites);
}
function getProg(qid){
  if(!progress[qid]){
    progress[qid] = {attempts:0, wrongAttempts:0, everWrong:false, lastSelected:null, lastCorrect:null, attemptedInAll:false, poolPending:false};
  }
  return progress[qid];
}
function saveProgress(){ saveJSON(K_PROGRESS, progress); }

function isWrongOrFav(qid){
  return getProg(qid).everWrong || isFav(qid);
}

/* ======================= 測驗模式 state ======================= */
let testState = loadJSON(K_TEST_STATE, {filter:'all', order:'seq', currentQid: ALL_QIDS[0], shuffleOrder:null});
if(!testState.currentQid || !Q_BY_ID[testState.currentQid]) testState.currentQid = ALL_QIDS[0];

function saveTestState(){ saveJSON(K_TEST_STATE, testState); }

function shuffleArr(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function computeFilteredList(){
  let base;
  if(testState.filter==='all') base = ALL_QIDS.slice();
  else if(testState.filter==='wrong') base = ALL_QIDS.filter(isWrongOrFav);
  else base = ALL_QIDS.filter(isFav);

  if(testState.order==='random'){
    if(!testState.shuffleOrder){
      testState.shuffleOrder = shuffleArr(base);
      saveTestState();
    }
    const baseSet = new Set(base);
    let ordered = testState.shuffleOrder.filter(q=>baseSet.has(q));
    const known = new Set(ordered);
    base.forEach(q=>{ if(!known.has(q)){ ordered.push(q); known.add(q);} });
    return ordered;
  }
  return base;
}

/* clear pending removals (called on filter/order/tab switch, or after navigating away from a resolved question) */
function flushPoolPending(exceptQid){
  let changed = false;
  Object.keys(progress).forEach(qid=>{
    if(qid===exceptQid) return;
    const p = progress[qid];
    if(p.poolPending){
      p.poolPending = false;
      p.everWrong = false;
      changed = true;
    }
  });
  if(changed) saveProgress();
}

/* ======================= 闖關複習 state ======================= */
let reviewState = loadJSON(K_REVIEW_STATE, null);
/* shape: {active, mode, roundSize, pool:[], graduateCount:{}, queue:[], firstAttempted:{}, roundNumber, currentQid, awaitingNext, lastCorrect} */

function saveReviewState(){ saveJSON(K_REVIEW_STATE, reviewState); }

function errorRate(qid){
  const p = getProg(qid);
  const base = p.attempts>0 ? (p.wrongAttempts/p.attempts) : 0;
  if(isFav(qid)) return Math.max(base, 1);
  return base;
}

function buildPool(mode){
  if(mode==='all') return shuffleArr(ALL_QIDS);
  const wrongPool = ALL_QIDS.filter(isWrongOrFav);
  wrongPool.sort((a,b)=> errorRate(b)-errorRate(a));
  return wrongPool;
}

function startNewReview(mode, roundSize){
  reviewState = {
    active:true, mode, roundSize,
    pool: buildPool(mode),
    graduateCount: {},
    queue: [], firstAttempted: {},
    roundNumber: 0,
    currentQid: null, awaitingNext:false, lastCorrect:null
  };
  startNextRound();
  saveReviewState();
}

function startNextRound(){
  const remaining = reviewState.pool.filter(qid => (reviewState.graduateCount[qid]||0) < 3);
  if(remaining.length===0){
    reviewState.queue = [];
    reviewState.currentQid = null;
    saveReviewState();
    return;
  }
  const picked = shuffleArr(remaining).slice(0, reviewState.roundSize);
  reviewState.queue = picked;
  reviewState.firstAttempted = {};
  reviewState.roundNumber += 1;
  reviewState.currentQid = reviewState.queue[0];
  reviewState.awaitingNext = false;
  reviewState.lastCorrect = null;
  saveReviewState();
}

/* ======================= 題目編輯表單(測驗/闖關共用) ======================= */
function buildEditForm(qid, onSaved, onCancel, onRestored){
  const q = getQ(qid);
  const wrap = document.createElement('div');

  const errBox = document.createElement('div');
  errBox.style.cssText = 'display:none;color:#a01a12;font-size:13px;margin-bottom:6px;';
  wrap.appendChild(errBox);

  const stemLabel = document.createElement('div');
  stemLabel.className = 'edit-field-label'; stemLabel.textContent = '題幹';
  wrap.appendChild(stemLabel);
  const stemInput = document.createElement('textarea');
  stemInput.className = 'edit-textarea'; stemInput.value = q.q;
  wrap.appendChild(stemInput);

  const optsLabel = document.createElement('div');
  optsLabel.className = 'edit-field-label'; optsLabel.textContent = '選項(左側圓鈕請點選正確答案)';
  wrap.appendChild(optsLabel);

  const radioName = 'editAns_' + qid.replace(/[^a-zA-Z0-9]/g,'_') + '_' + Math.random().toString(36).slice(2,7);
  const optInputs = [];
  for(let i=0;i<4;i++){
    const row = document.createElement('div'); row.className = 'edit-opt-row';
    const radio = document.createElement('input');
    radio.type = 'radio'; radio.name = radioName; radio.value = String(i+1);
    radio.id = radioName + '_' + i;
    if(q.a===i+1) radio.checked = true;
    const input = document.createElement('input');
    input.type = 'text'; input.className = 'edit-input'; input.value = q.o[i];
    input.placeholder = `選項(${i+1})`;
    row.appendChild(radio); row.appendChild(input);
    wrap.appendChild(row);
    optInputs.push({radio, input});
  }

  const expLabel = document.createElement('div');
  expLabel.className = 'edit-field-label'; expLabel.textContent = '解析';
  wrap.appendChild(expLabel);
  const expInput = document.createElement('textarea');
  expInput.className = 'edit-textarea'; expInput.value = q.e || '';
  wrap.appendChild(expInput);

  const toolbar = document.createElement('div'); toolbar.className = 'edit-toolbar';
  const leftGroup = document.createElement('div'); leftGroup.className = 'row';
  if(hasEdit(qid)){
    const restoreBtn = document.createElement('button');
    restoreBtn.className = 'btn'; restoreBtn.type='button'; restoreBtn.textContent = '還原原始題目';
    restoreBtn.addEventListener('click', ()=>{
      delete questionEdits[qid];
      saveEdits();
      delete progress[qid];
      saveProgress();
      onRestored();
    });
    leftGroup.appendChild(restoreBtn);
  }
  const rightGroup = document.createElement('div'); rightGroup.className = 'row';
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn'; cancelBtn.type='button'; cancelBtn.textContent = '取消';
  cancelBtn.addEventListener('click', onCancel);
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn primary'; saveBtn.type='button'; saveBtn.textContent = '儲存';
  saveBtn.addEventListener('click', ()=>{
    const stemVal = stemInput.value.trim();
    const optVals = optInputs.map(o=>o.input.value.trim());
    const selected = optInputs.find(o=>o.radio.checked);
    if(!stemVal || optVals.some(v=>!v) || !selected){
      errBox.textContent = '題幹、四個選項與正確答案皆需填寫完整。';
      errBox.style.display = 'block';
      return;
    }
    questionEdits[qid] = { q: stemVal, o: optVals, a: parseInt(selected.radio.value,10), e: expInput.value.trim() };
    saveEdits();
    delete progress[qid];
    saveProgress();
    onSaved();
  });
  rightGroup.appendChild(cancelBtn); rightGroup.appendChild(saveBtn);
  toolbar.appendChild(leftGroup); toolbar.appendChild(rightGroup);
  wrap.appendChild(toolbar);

  return wrap;
}

const testQuestionCard = document.getElementById('testQuestionCard');
const testEmptyCard = document.getElementById('testEmptyCard');
const testQNum = document.getElementById('testQNum');
const testFavBtn = document.getElementById('testFavBtn');
const testEditBtn = document.getElementById('testEditBtn');
const testViewArea = document.getElementById('testViewArea');
const testEditArea = document.getElementById('testEditArea');
let testEditing = false;
const testStem = document.getElementById('testStem');
const testOptions = document.getElementById('testOptions');
const testExplain = document.getElementById('testExplain');
const testPrevBtn = document.getElementById('testPrevBtn');
const testNextBtn = document.getElementById('testNextBtn');
const testCopyBtn = document.getElementById('testCopyBtn');
const testProgressText = document.getElementById('testProgressText');
const testAccuracyText = document.getElementById('testAccuracyText');
const testProgressFill = document.getElementById('testProgressFill');

function computeAccuracy(){
  let attempted=0, correct=0;
  ALL_QIDS.forEach(qid=>{
    const p = progress[qid];
    if(p && p.attempts>0){ attempted++; if(p.lastCorrect) correct++; }
  });
  if(attempted===0) return null;
  return Math.round(correct/attempted*100);
}

function renderTest(){
  orderBtn.textContent = '循環：' + (testState.order==='seq'?'依序':'隨機');
  const list = computeFilteredList();
  if(list.length===0){
    testQuestionCard.style.display='none';
    testEmptyCard.style.display='block';
    testEmptyCard.textContent = testState.filter==='wrong' ? '目前沒有錯題或收藏的題目。' : (testState.filter==='fav' ? '目前沒有收藏的題目。' : '題庫是空的。');
    testProgressText.textContent = '第0題／共0題';
    testProgressFill.style.width='0%';
    return;
  }
  if(!testState.currentQid || !list.includes(testState.currentQid)){
    testState.currentQid = list[0];
    saveTestState();
  }
  testQuestionCard.style.display='block';
  testEmptyCard.style.display='none';
  const idx = list.indexOf(testState.currentQid);
  testProgressText.textContent = `第${idx+1}題／共${list.length}題`;
  testProgressFill.style.width = `${Math.round((idx+1)/list.length*100)}%`;
  const acc = computeAccuracy();
  testAccuracyText.textContent = '正確率 ' + (acc===null? '--' : acc+'%');

  const q = getQ(testState.currentQid);
  testQNum.innerHTML = `${q.chapterTitle}　第${q.n}題` + (hasEdit(q.qid) ? ' <span class="edit-badge">已編輯</span>' : '');
  testFavBtn.textContent = isFav(q.qid) ? '♥' : '♡';
  testFavBtn.classList.toggle('active', isFav(q.qid));

  if(testEditing){
    testViewArea.style.display = 'none';
    testEditArea.style.display = 'block';
    testEditArea.innerHTML = '';
    testEditArea.appendChild(buildEditForm(q.qid,
      ()=>{ testEditing=false; renderTest(); },
      ()=>{ testEditing=false; renderTest(); },
      ()=>{ testEditing=false; renderTest(); }
    ));
    return;
  }
  testViewArea.style.display = 'block';
  testEditArea.style.display = 'none';

  testStem.textContent = q.q;

  const p = getProg(q.qid);
  const isPoolMode = (testState.filter==='wrong');
  // in pool mode, question is "fresh" unless it has poolPending marking to show a completed state momentarily
  const showLocked = isPoolMode ? false : p.attemptedInAll;

  testOptions.innerHTML = '';
  q.o.forEach((optText, i)=>{
    const num = i+1;
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = `(${num}) ${optText}`;
    btn.dataset.num = num;
    if(showLocked){
      btn.classList.add('disabled');
      btn.disabled = true;
      if(num===q.a) btn.classList.add('correct');
      if(p.lastSelected===num && num!==q.a) btn.classList.add('wrong');
    }
    btn.addEventListener('click', ()=> answerTest(q, num));
    testOptions.appendChild(btn);
  });
  testExplain.classList.toggle('show', !!showLocked);
  testExplain.textContent = q.e ? ('【解析】'+q.e) : '';
}

function answerTest(q, num){
  const p = getProg(q.qid);
  const isPoolMode = (testState.filter==='wrong');
  if(!isPoolMode && p.attemptedInAll) return; // locked already
  p.attempts += 1;
  const correct = (num===q.a);
  if(!correct) p.wrongAttempts += 1;
  p.lastSelected = num; p.lastCorrect = correct;

  if(isPoolMode){
    if(correct){
      if(!isFav(q.qid)) p.poolPending = true;
      // if favorited, stays regardless
    }else{
      p.everWrong = true;
      p.poolPending = false;
    }
  }else{
    p.attemptedInAll = true;
    if(!correct) p.everWrong = true;
  }
  saveProgress();

  // render result inline without losing position
  const opts = testOptions.querySelectorAll('.opt');
  opts.forEach(btn=>{
    const n = parseInt(btn.dataset.num,10);
    btn.disabled = true; btn.classList.add('disabled');
    if(n===q.a) btn.classList.add('correct');
    if(n===num && n!==q.a) btn.classList.add('wrong');
  });
  testExplain.classList.add('show');
  testExplain.textContent = q.e ? ('【解析】'+q.e) : '';
  testAccuracyText.textContent = '正確率 ' + (computeAccuracy()??'--') + '%';
}

function navTest(dir){
  testEditing = false;
  const wasPoolMode = (testState.filter==='wrong');
  const prevQid = testState.currentQid;
  const list = computeFilteredList();
  let idx = list.indexOf(testState.currentQid);
  if(idx===-1) idx=0;
  idx += dir;
  if(idx<0) idx=0;
  if(idx>=list.length) idx=list.length-1;

  if(wasPoolMode){
    // flush pending removal for the question we're leaving
    flushPoolPending(null);
  }
  const newList = computeFilteredList();
  testState.currentQid = newList[Math.min(idx, newList.length-1)] || newList[0];
  saveTestState();
  renderTest();
}
testPrevBtn.addEventListener('click', ()=>navTest(-1));
testNextBtn.addEventListener('click', ()=>navTest(1));
testFavBtn.addEventListener('click', ()=>{
  toggleFav(testState.currentQid);
  renderTest();
});
testEditBtn.addEventListener('click', ()=>{
  testEditing = true;
  renderTest();
});
testCopyBtn.addEventListener('click', ()=>{
  const q = getQ(testState.currentQid);
  const text = `${q.q}\n(1)${q.o[0]} (2)${q.o[1]} (3)${q.o[2]} (4)${q.o[3]}`;
  window.open('https://www.google.com/search?q=' + encodeURIComponent(text), '_blank');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=>{});
  }
});

/* keyboard */
document.addEventListener('keydown', (e)=>{
  const tag = (document.activeElement && document.activeElement.tagName) || '';
  if(tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT') return;
  if(window.__currentTab!=='test') return;
  if(testEditing) return;
  if(e.key==='ArrowLeft'){ navTest(-1); }
  else if(e.key==='ArrowRight'){ navTest(1); }
  else if(['1','2','3','4'].includes(e.key)){
    const q = getQ(testState.currentQid);
    if(q) answerTest(q, parseInt(e.key,10));
  }
});

function renderReview(){
  if(!reviewState){
    reviewSetupCard.style.display='block';
    reviewActiveCard.style.display='none';
    reviewDoneCard.style.display='none';
    reviewStatusText.textContent = '目前尚無進行中的複習。';
    continueReviewBtn.disabled = true;
    return;
  }
  continueReviewBtn.disabled = false;

  if(!reviewState.active){
    reviewSetupCard.style.display='block';
    reviewActiveCard.style.display='none';
    reviewDoneCard.style.display='none';
    const remaining = reviewState.pool.filter(qid=>(reviewState.graduateCount[qid]||0)<3).length;
    reviewStatusText.textContent = `上次複習：第${reviewState.roundNumber}輪，尚有 ${remaining} 題未畢業。`;
    return;
  }

  reviewSetupCard.style.display='none';

  if(!reviewState.currentQid){
    reviewActiveCard.style.display='none';
    reviewDoneCard.style.display='block';
    reviewDoneCard.textContent = '已全數作答完畢，可再複習。';
    return;
  }

  reviewDoneCard.style.display='none';
  reviewActiveCard.style.display='block';
  reviewRoundText.textContent = `第${reviewState.roundNumber}輪`;
  reviewQueueText.textContent = `本輪剩餘 ${reviewState.queue.length} 題`;

  const q = getQ(reviewState.currentQid);
  const grad = reviewState.graduateCount[q.qid]||0;
  reviewQNum.innerHTML = `${q.chapterTitle}　第${q.n}題 <span class="grad-badge">畢業進度 ${grad}/3</span>` + (hasEdit(q.qid) ? ' <span class="edit-badge">已編輯</span>' : '');
  reviewFavBtn.textContent = isFav(q.qid) ? '♥' : '♡';
  reviewFavBtn.classList.toggle('active', isFav(q.qid));

  if(reviewEditing){
    reviewViewArea.style.display = 'none';
    reviewEditArea.style.display = 'block';
    reviewEditArea.innerHTML = '';
    reviewEditArea.appendChild(buildEditForm(q.qid,
      ()=>{ reviewEditing=false; renderReview(); },
      ()=>{ reviewEditing=false; renderReview(); },
      ()=>{ reviewEditing=false; renderReview(); }
    ));
    return;
  }
  reviewViewArea.style.display = 'block';
  reviewEditArea.style.display = 'none';

  reviewStem.textContent = q.q;

  reviewOptions.innerHTML = '';
  q.o.forEach((optText,i)=>{
    const num = i+1;
    const btn = document.createElement('button');
    btn.className='opt';
    btn.textContent = `(${num}) ${optText}`;
    btn.dataset.num = num;
    if(reviewState.awaitingNext){
      btn.disabled = true; btn.classList.add('disabled');
      if(num===q.a) btn.classList.add('correct');
      if(num===reviewState.lastSelected && num!==q.a) btn.classList.add('wrong');
    }else{
      btn.addEventListener('click', ()=> answerReview(q, num));
    }
    reviewOptions.appendChild(btn);
  });
  reviewExplain.classList.toggle('show', !!reviewState.awaitingNext);
  reviewExplain.textContent = q.e ? ('【解析】'+q.e) : '';
  reviewNextBtn.style.display = reviewState.awaitingNext ? 'inline-block' : 'none';
}

function answerReview(q, num){
  const qid = q.qid;
  const isFirstAttempt = !reviewState.firstAttempted[qid];
  reviewState.firstAttempted[qid] = true;
  const correct = (num===q.a);
  reviewState.lastSelected = num;
  reviewState.lastCorrect = correct;
  reviewState.awaitingNext = true;

  if(correct){
    if(isFirstAttempt && !isFav(qid)){
      reviewState.graduateCount[qid] = (reviewState.graduateCount[qid]||0)+1;
    }
    reviewState.queue.shift();
  }else{
    reviewState.queue.shift();
    reviewState.queue.push(qid);
  }
  saveReviewState();
  renderReview();
}

/* ======================= init ======================= */
updateFilterBtns();
window.__currentTab = 'test';
renderTest();
renderReview();
</script>
</body>
</html>
