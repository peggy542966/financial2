"], "e": "成本法處理時，以購入股票之市價記入「庫藏股」，不影響投入資本。"}, {"n": 74, "a": 2, "q": "小榆公司於 X1 年 12 月 1 日以成本$3,500,000，累計折舊$2,000,000 之機器一台交換新設備，交換時並取得現金$500,000，此項交換不具有商業實質。已知新設備公允價值為$1,500,000，則新機器入帳成本為：", "o": ["$500,000", "$1,000,000", "$1,250,000", "$1,500,000"], "e": "不具商業實質之資產交換，換入資產按換出資產之帳面金額調整現金收付之金額入帳，新機器入帳成本 = ($3,500,000 - $2,000,000) - $500,000 = $1,000,000。"}, {"n": 75, "a": 2, "q": "以權益法處理長期股權投資時，所有取得股權淨值係指：", "o": ["相當於投資時被投資公司淨資產之公允價值乘上本批投資之持股比例", "相當於投資時被投資公司淨資產之帳面金額乘上本批投資之持股比例", "為長期股權投資之入帳金額", "與投資成本之差額將於投資公司帳上認列為商譽或廉價購買利益"], "e": "股權淨值之定義：相當於投資時被投資公司淨資產之帳面金額乘上本批投資之持股比例。"}, {"n": 76, "a": 3, "q": "甲公司於 X8 年 9 月 30 日以$300,000 購入乙公司普通股作為透過其他綜合損益按公允價值衡量之股票投資，X8 年底該投資之公允價值為$360,000。X9 年 10 月 1 日甲公司以$200,000 出售半數的乙公司普通股，X9 年未出售之乙公司普通股之公允價值為$230,000，則該股票投資對甲公司 X9 年度稅前其他綜合損益之影響為：", "o": ["增加 $20,000", "增加$50,000", "增加$70,000", "減少$130,000"], "e": "出售部分 X9 年應認列之未實現損益 = $200,000 - $360,000 * 1/2 = $20,000 未出售部分 X9 年應認列之未實現損益 = $230,000 - $360,000 * 1/2 = $50,000 甲公司 X9 年該股票投資之其他綜合損益影響數 = $20,000 + $50,000 = $70,000"}, {"n": 77, "a": 3, "q": "下列何者為股票投資採權益法評價時之取得成本？", "o": ["手續費", "融資買入之利息", "成交價格", "以上皆屬取得成本的一部分"], "e": "依據 IAS28 及 IFRS3 之規定，權益證券投資採用權益法時，原始應依成本認列，成本即其成交價格，交易成本通常列為費用。"}, {"n": 78, "a": 1, "q": "甲公司發行每股面額$10 之普通股 100,000 股取得乙公司全部股份，乙公司的可辨認淨資產公允價值為$1,165,000，發行新股所發生的成本為$11,000，甲公司普通股每股之公允價值為$13.6。應如何計算合併交易中的商譽？", "o": ["$195,000", "$200,000", "$210,000", "$220,000"], "e": "商譽 = 移轉對價 (發行新股的公允價值) - 可辨認淨資產公允價值 = ($13.6 * 100,000) - $1,165,000 = $195,000"}, {"n": 79, "a": 4, "q": "根據國際財務報導準則(IFRS)，下列何者屬於「不可辨認無形資產」？", "o": ["專利權", "客戶關係", "軟體", "品牌聲譽"], "e": "品牌聲譽屬於不可辨認無形資產，因其無法單獨辨認或具體量化。"}, {"n": 80, "a": 1, "q": "下列何者不會影響公司流通在外普通股之股數？", "o": ["宣告並發發現金股利", "宣告並發放盈餘轉增資股票股利", "宣告並發放資本公積轉增資股票股利", "股票分割"], "e": "宣告並發放現金股利不影響流通在外股數。"}, {"n": 81, "a": 4, "q": "甲公司擁有一部機器，成本為$750,000，帳面金額為$400,000。下列何種情況發生時，即可能產生資產減損？", "o": ["可回收金額為$700,000", "可回收金額為$630,000", "可回收金額為$410,000", "可回收金額為$360,000"], "e": "當資產帳面金額$400,000 超過資產可回收金額$360,000，即產生資產減損。"}, {"n": 82, "a": 1, "q": "甲公司在合併報表中，對於一項企業合併認列了$300,000 的商譽。於 X3 年進行減損測試，商譽的可回收金額為$250,000，應如何處理？", "o": ["認列減損損失$50,000", "將差額計入留存收益", "認列減損損失$300,000", "不需要任何調整"], "e": "商譽減損損失 = 商譽帳面金額 - 可回收金額 = $300,000 - $250,000 = $50,000"}, {"n": 83, "a": 3, "q": "「待分配股票股利」在資產負債表上應列於？", "o": ["資產", "負債", "權益", "以上皆非"], "e": "「待分配股票股利」應列於權益中之股本項下，其性質與「已認股本」類似，至股利發放日再轉為股本。"}, {"n": 84, "a": 4, "q": "力麒公司於 20X4 年初以面額發行 2,000 張、每張 1,000 元的三年期可轉換公司債，票面利率為 6%，每年付息一次，每張公司債可轉換 30 股、每股面額 10 元的普通股。若該公司發行時，條件相同但不可轉換的公司債之發行價格為$1,900,000，試問：力麒公司於 20X4 年初發行時應付公司債的帳面金額為多少？", "o": ["$2,000,000", "$1,800,000", "$2,200,000", "$1,900,000"], "e": "按 IFRS 9：金融資產之原始衡量於原始認列時，應以公允價值衡量金融資產。公允價值 = $1,900,000"}, {"n": 85, "a": 4, "q": "母公司應採下列何種方法評價待出售子公司之資產與負債？", "o": ["可回收價值", "淨公允價值", "成本與淨公允價值選低者", "帳面金額與淨公允價值選低者"], "e": "母公司將待出售子公司視為出售目的之待處分資產負債群組，並採帳面金額與淨公允價值孰低者評價。"}, {"n": 86, "a": 2, "q": "以帳面金額$600,000 之國產汽車交換公允價值$980,000 之進口汽車，並支付現金$300,000，若此項交易不具商業實質，則進口汽車之入帳金額為若干？", "o": ["$980,000", "$900,000", "$600,000", "選項(1)(2)(3)皆非"], "e": "不具商業實質之資產交換，換入資產按換出資產之帳面金額調整現金收付之金額入帳，進口汽車入帳成本 = $600,000 + $300,000 = $900,000。"}, {"n": 87, "a": 1, "q": "甲公司於 X1 年以$800,000 購入土地，並計劃進行開發建設。建設成本總計為$1,200,000，預計完工後可出售價值為$2,500,000。如果土地和建設成本均資本化，完工後應如何認列利潤？", "o": ["$500,000", "$700,000", "$800,000", "$900,000"], "e": "總成本 = 土地成本 + 建設成本 = $800,000 + $1,200,000 = $2,000,000 利潤 = 預計可出售價值 - 總成本 = $2,500,000 - $2,000,000 = $500,000"}, {"n": 88, "a": 2, "q": "不動產、廠房及設備後續支出之當年度，若將資本支出誤列為收益支出，當年度財務報表將產生下列哪一種結果？", "o": ["資產多計，淨利多計", "資產少計，淨利少計", "資產多計，淨利少計", "資產少計，淨利多計"], "e": "將資本支出誤列為收益支出，將使當期費用多計、淨利少計、資產少計。"}, {"n": 89, "a": 1, "q": "浩雲公司以成本$500,000，累計折舊$300,000 之舊機器一部及現金$350,000 換入新機器一部，若此項交易具商業實質，但新舊機器均無法得知公允價值，則該新機器成本為：", "o": ["$550,000", "$450,000", "$400,000", "$350,000"], "e": "相似資產交換不產生交換利益，故若換出與換入資產均無法得知公允價值，則不論交換是否具有商業實質，換入資產均按換出資產之帳面金額調整現金收付之金額入帳，本題的機器成本 = $200,000 + $350,000 = $550,000。"}, {"n": 90, "a": 3, "q": "甲公司在 X1 年購買一台機器設備，成本為$500,000，安裝費用為$50,000，運輸費用為$20,000。公司估計該設備的殘值為$70,000，耐用年限為 10 年，使用直線法計算折舊費用，則第一年的折舊費用應為多少？", "o": ["$45,000", "$48,000", "$50,000", "$55,000"], "e": "折舊費用 = (設備成本 + 安裝費用 + 運輸費用 - 殘值) / 耐用年限 = ($500,000 + $50,000 + $20,000 - $70,000) / 10 = $500,000 / 10 = $50,000"}, {"n": 91, "a": 2, "q": "下列有關國際會計準則第 36 號「資產減損」之敘述何者正確？", "o": ["計算使用價值時，不須將未來現金流量折現", "計算淨公允價值時，須扣除處分成本", "IAS 36 生效日前之資產減損，若未依 IAS 36 規定處理者，須追溯調整", "減損損失係指資產之原始成本超過可回收金額之部分"], "e": "選項(1)計算使用價值時，須將未來現金流量折現。選項(3)IAS 36 生效日前之資產減損，若未依 IAS 36 規定處理者，不得追溯調整。選項(4)減損損失係指資產之帳面金額超過可回收金額之部分。"}, {"n": 92, "a": 4, "q": "以下何者非國際會計準則第 36 號「資產減損」中提及「活絡市場」所必須符合的條件？", "o": ["在市場交易之商品具有同質性", "隨時可於市場中尋得具意願之買賣雙方", "價格資訊可為大眾所取得", "市場價格需具備強式效率性"], "e": "市場價格不需具備強式效率性。"}, {"n": 93, "a": 4, "q": "在國際會計準則第 36 號「資產減損」中的「耐用年限」非指下列何者：", "o": ["企業預期使用個別資產之期間", "企業預期由個別資產取得之產量或類似單位", "以上二者皆可", "企業預期之存續期間"], "e": "耐用年限係指 1.企業預期使用個別資產之期間；或 2.企業預期由個別資產取得之產量或類似單位。"}, {"n": 94, "a": 4, "q": "根據國際會計準則第 36 號「資產減損」，在評估折現率時，當類似資產於當時市場交易所隱含之報酬率無法由市場直接取得時，宜將下列何者納入？", "o": ["企業用以決定業主權益要求之報酬率 (例如可用資本資產定價模式)", "企業之增額借款利率", "其他市場借款利率", "選項(1)(2)(3)皆是"], "e": "當類似資產於當時市場交易所隱含之報酬率無法由市場直接取得時，企業宜使用替代方法估計折現率。在評估折現率時，宜將下列報酬率或利率納入：1.企業用以決定業主權益要求之報酬率 (例如可用資本資產定價模式)；2.企業之增額借款利率；3.其他市場借款利率。"}, {"n": 95, "a": 3, "q": "甲公司於 X1 年初支付$900,000 購入一台設備，該設備的使用年限為 10 年，無殘值，甲公司採用直線法折舊。於 X4 年初，甲公司決定對設備進行改良，成本共計$200,000，並將剩餘使用年限重新估計為 7 年。請問甲公司 X4 年的折舊費用為何？", "o": ["$117,369", "$122,568", "$118,571", "$142,633"], "e": "X1 到 X3 年的累計折舊 = $900,000 / 10 * 3 = $270,000 X4 年初帳面金額 = $900,000 - $270,000 = $630,000 加上改良成本 = $630,000 + $200,000 = $830,000 新折舊費用 = $830,000 / 7 = $118,571"}, {"n": 96, "a": 3, "q": "假設甲、乙債券之面額與票面利率相同，但甲債券為 10 年期，乙債券為 20 年期，且發行時市場利率與票面利率相同，則：", "o": ["乙債券之發行價格將較甲債券大", "甲債券之發行價格將較乙債券大", "甲、乙二債券之發行價格相等", "無足夠的資料比較甲、乙二債券之發行價格"], "e": "發行時市場利率 (有效利率) 與票面利率相同稱為平價發行，其發行價格等於債券面額。甲、乙二債券面額與票面利率相同，故兩者發行價格相等。"}, {"n": 97, "a": 4, "q": "若公司將短期應付票據轉為長期應付票據，則此交易將：", "o": ["降低營運資金", "同時降低營運資金及流動比率", "不影響營運資金", "同時提高營運資金及流動比率"], "e": "短期應付票據轉換為長期應付票據將使流動負債減少，營運資金增加，流動比率上升。"}, {"n": 98, "a": 4, "q": "以下「股本與資本」的觀念何者正確？", "o": ["額定股本 (Authorized Stock)，是公司章程中規定公司可發行的股本總額", "資本公積 (Additional Paid-In Capital)，包括公司因捐贈或庫藏股票交易所增加資源的金額", "我國法律規定的最低法定資本，通常指已發行股份的面額", "選項(1)(2)(3)皆對"], "e": "資本為股東或其他所提供給公司，而法定之資本稱為股本。"}, {"n": 99, "a": 2, "q": "南投公司 X1 年初資產為$450,000、負債為$180,000；若 X1 年 1 月份僅兩項交易：購買辦公設備支付 $135,000 與預收貨款 $75,000，請問 X1 年 1 月底的權益為何？", "o": ["$210,000", "$270,000", "$345,000", "$405,000"], "e": "借：辦公設備 $135,000 (資產增加)，貸：現金 $135,000 (資產減少) -> 權益不變 借：現金 $75,000 (資產增加)，貸：預收貨款 $75,000 (負債增加) -> 權益不變 X1 年期初權益 = X1 年 1 月底權益 = $450,000 - $180,000 = $270,000"}, {"n": 100, "a": 1, "q": "設有機器設備一部，其原始成本為$700,000，累計折舊$620,000，因設備功能已不適用，必須提早報廢，估計其殘值$42,500，則報廢時其「處分損益」之部分，應：", "o": ["借記：資產報廢損失$37,500", "借記：資產報廢損失$42,500", "貸記：資產報廢利益$37,500", "貸記：資產報廢利益$42,500"], "e": "帳面金額 = $700,000 - $620,000 = $80,000 資產報廢損益 = $80,000 - $42,500 = $37,500 (損失)"}, {"n": 101, "a": 3, "q": "在合併報表中，如何處理母公司和子公司之間的往來交易？", "o": ["不須沖銷", "部分沖銷", "全額沖銷", "僅於母公司對子公司銷貨時須沖銷，子公司對母公司銷貨則不須沖銷"], "e": "合併報表中，應全額沖銷母公司與子公司之間的所有往來交易。"}, {"n": 102, "a": 3, "q": "下列何者屬無形資產？", "o": ["預付費用", "應收帳款", "商標權", "研究支出"], "e": "商標為可明確辨認之無形資產，就是沒有形體，但成本及價值可明白指出者。選項(1)屬流動資產。選項(2)屬流動資產。選項(4)為當期費用。"}, {"n": 103, "a": 1, "q": "甲公司 X1 年初向乙公司承租一間辦公室，租期 8 年，甲公司於 X2 年底重新裝修此辦公室，估計重新裝修後 10 年內具有經濟效益，甲公司在計提重新裝修後的折舊時，耐用年限為何？", "o": ["6 年", "7 年", "8 年", "10 年"], "e": "剩餘租期為 8 - 2 = 6 (年)；重新裝修後經濟年限為 10 年，採兩者較短年限攤提折舊。"}, {"n": 104, "a": 4, "q": "甲公司於 X1 年初以$800,000 購入一項設備，預計使用年限為 8 年，殘值為$50,000，採直線法提列折舊。X3 年底進行減損測試時，該設備的可回收金額為$300,000。則應認列的減損損失為多少？", "o": ["$0", "$178,500", "$285,500", "$218,750"], "e": "X1 至 X3 年的累計折舊 = ($800,000 - $50,000) / 8 * 3 = $281,250 X3 年底的帳面金額 = $800,000 - $281,250 = $518,750 減損損失 = 帳面金額 - 可回收金額 = $518,750 - $300,000 = $218,750"}, {"n": 105, "a": 1, "q": "彥洪公司 X1 年 1 月 1 日以現金$1,000,000 投資煙草公司有投票權的股份 40%，當時煙草公司的股東權益為$200,000。投資當年彥洪公司收到現金股利$50,000，煙草公司 X1 年度盈餘為$5,000,000，試問彥洪公司 X1 年 12 月 31 日帳上採用權益法之投資的餘額為多少？", "o": ["$2,950,000", "3,000,000", "5,500,000", "3,050,000"], "e": "彥洪公司帳上採用權益法之投資的餘額 = $1,000,000 + ($5,000,000 * 40%) - $50,000 = $2,950,000。"}, {"n": 106, "a": 3, "q": "依 IFRS16 之規定，下列有關租賃的敘述，何者為非？", "o": ["承租人對短於 12 個月且為低價值標的資產之租賃，得選擇不認列使用權資產及租賃負債", "下一年預計應支付的租賃負債部分，應列為流動負債", "租賃會計中，現值乃非攸關資訊", "承租人採單一租賃模式作會計處理"], "e": "根據 IFRS16 之規定，承租人採用單一租賃模式，不似過去區分融資租賃與營業租賃，且以現值認列。"}, {"n": 107, "a": 2, "q": "甲公司於 20X1 年 1 月 1 日簽訂一份 5 年期的設備租賃合約，每年租金為$50,000，於每年年底支付。租賃開始日，租賃負債的現值為$200,000。根據 IFRS 16，甲公司在 20X1 年 12 月 31 日的財務報表中應如何處理該租賃？", "o": ["認列租金費用$50,000", "認列利息費用及租賃負債減少", "僅認列租賃負債減少$50,000", "不認列任何費用或負債"], "e": "根據 IFRS 16，承租人需將租賃列為「使用權資產」和「租賃負債」。每年支付租金時，需將支付金額分為利息費用 (按租賃負債的利率計算) 和租賃負債本金的減少。因此，甲公司應在 20X1 年 12 月 31 日認列利息費用和租賃負債的減少。"}, {"n": 108, "a": 3, "q": "根據我國現行規定，出租人之營業租賃與融資租賃的不同點為？", "o": ["融資租賃所收到之租金收入稱為租金收入，但於營業租賃入帳時為折舊費用", "融資租賃將使企業之總資產下降；營業租賃則不影響", "融資租賃所收到之租金收入為應收帳款之收現，營業租賃入帳時為租金收入", "融資租賃對企業之總資產不影響，營業租賃亦不影響"], "e": "融資租賃對企業之總資產不影響 (租賃資產除列、認列應收租賃款)，但營業租賃將使總資產上升 (未除列資產、租金收入使資產上升)，故選項(2)(4)皆錯誤。"}, {"n": 109, "a": 2, "q": "初牛牧場 X3 年初以$130,000 購入一批蛋雞以生產雞蛋。X3 年飼養人員薪資 $14,000、飼料成本$120,000，期末評估之公允價值為$135,000，若出售將發生出售成本$110,000。試問 X3 年財務報表中此批蛋雞之帳列金額為？", "o": ["$20,000", "$25,000", "$154,000", "$264,000"], "e": "依據 IAS41，生產性動物認列金額 = 公允價值 - 出售成本 $135,000 - $110,000 = $25,000"}, {"n": 110, "a": 4, "q": "金馬公司在自有土地上拆除舊屋改建新屋。下列敘述何者正確？", "o": ["拆除費用應增加新屋之成本", "拆除費用應增加土地之成本", "拆除費用減舊屋殘值後之金額，應列入新屋之成本", "拆除費用減舊屋殘值後之金額，應列為舊屋之處分損益"], "e": "在自有土地上拆除舊屋改建新屋，屬於舊屋之處分。拆除費用減舊屋殘值後之金額，應列為舊屋之處分損益。"}, {"n": 111, "a": 2, "q": "下列幾項屬投資性不動產？ 甲.目前尚未決定未來用途所持有之土地；乙.供員工使用之建築物；丙.以融資租賃出租予另一企業之廠房；丁.以營業租賃出租予另一企業之建築物，且對租用該建築物之承租人提供清潔服務，該服務相較租賃合約不具重大性：", "o": ["一項", "二項", "三項", "四項"], "e": "甲：目前尚未決定未來用途之土地，以及丁：以營業租賃出租予另一企業之建築物，且對租用該建築物之承租人提供保全服務，該服務相較租賃合約不具重大性，皆屬投資性不動產。"}, {"n": 112, "a": 3, "q": "下列何者交易發生時會影響權益之帳面金額？ 甲.宣告現金股利；乙.宣告股票股利；丙.買入庫藏股；丁.以低於成本之價格出售庫藏股", "o": ["僅甲、乙、丙", "僅甲、乙、丁", "僅甲、丙、丁", "甲、乙、丙、丁"], "e": "宣告股票股利減少保留盈餘但同額增加股本與資本公積，故不影響權益總額。"}, {"n": 113, "a": 2, "q": "基隆公司普通股股本 $10 億，每股面額 $10，無庫藏股。若基隆公司宣告發放 30%股票股利，其他條件不變，則下列敘述何者正確？", "o": ["權益將增加$3 億", "將增加 3,000 萬股流通在外普通股數", "不影響每股帳面金額", "不影響每股盈餘"], "e": "30%股票股利將以面額記錄盈餘之分配，權益總額不變。 普通股股本 $10 億，每股面額 $10，原有 1 億股，故將增加 30% * 100,000,000 = 30,000,000 股。每股帳面金額因股數增加而減少。每股盈餘因股數增加而減少。"}, {"n": 114, "a": 3, "q": "大華工具機公司於 X2 年取得專門生產新機器手臂的專利，申請專利時支付了 $1,200,000 的法律與申請費用。此外，該公司於 X2 年期間，因控告其他公司違反專利權法，故產生了 $4,800,000 的法律訴訟費，這筆費用將於 X3 年支付。此項專利於 X2 年 12 月 31 日生效，大華公司估計這項專利將為公司未來五年期間帶來經濟利益，該公司的政策是在取得專利的當年度不予攤銷無形資產。對於其他公司侵犯專利權的行為，若大華公司已成功地捍衛其專利權。試問：大華工具機公司於 X3 年底的財務狀況表中，專利權的帳面金額為多少？", "o": ["$1,200,000", "$4,800,000", "$6,000,000", "$5,600,000"], "e": "$1,200,000 + $4,800,000 = $6,000,000"}, {"n": 115, "a": 2, "q": "何時應進行減損測試以評估資產的帳面金額？", "o": ["在出售資產時", "當資產的公允價值顯著下降時", "不需要進行減損測試", "每五年進行一次"], "e": "當資產的公允價值顯著下降時，需要進行減損測試，以評估其帳面金額。"}, {"n": 116, "a": 4, "q": "甲公司於 X1 年初支付$800,000 購入一套系統，預計使用年限為 10 年，無殘值。若採用直線法折舊，但 X3 年改用倍數餘額遞減法，則 X3 年的折舊費用為多少？", "o": ["$96,000", "$100,000", "$102,000", "$160,000"], "e": "X1 至 X2 年的直線法累計折舊 = $800,000 / 10 * 2 = $160,000 帳面金額 = $800,000 - $160,000 = $640,000 X3 年雙倍餘額遞減法折舊費用 = $640,000 * (2/8) = $160,000"}, {"n": 117, "a": 2, "q": "關於溢價發行之公司債，下列敘述何者正確？", "o": ["發行公司於發行期間之各期利息費用將逐期增加", "發行公司於發行期間之各期有效利率不變", "發行公司於發行期間各期所償付現金之總額高於發行價格加計各期利息費用之總額", "發行公司於發行期間各期所償付現金之總額低於發行價格加計各期利息費用之總額"], "e": "選項(1)錯誤。因各期利息費用將逐期減少；選項(3)(4)錯誤。因發行公司於發行期間各期所償付現金之總額等於發行價格加計各期利息費用之總額。"}, {"n": 118, "a": 2, "q": "關於折價買入並持有至到期之公司債，下列敘述何者正確？", "o": ["持有人於買入當期之現時收益率(Current Yield)低於票面利率", "持有人於持有期間各期之到期收益率(Yield to Maturity)不變 (以會計計算)", "持有人於持有期間各期所收取現金之總額高於買入價格加計各期利息收入之總額", "持有人於持有期間各期所收取現金之總額低於買入價格加計各期利息收入之總額"], "e": "選項(1)錯誤。因買入當期之現時收益率(Current Yield)高於票面利率；選項(3)(4)錯誤。因持有人於持有期間各期所收取現金之總額等於買入價格加計各期利息收入之總額。"}]}, {"id": 5, "title": "第5章 資本結構及償債能力分析", "questions": [{"n": 1, "a": 4, "q": "下列何者並非發行公司債取得資金的優點？", "o": ["享有稅盾利益", "資金成本低於普通股及特別股", "流動比率上升", "財務槓桿比率下降"], "e": "舉債取得資金應使財務槓桿比率上升。"}, {"n": 2, "a": 4, "q": "可轉換公司債轉換成普通股 (只考慮其立即影響)，則：", "o": ["負債總額對權益比率不變", "長期負債總額對權益比率不變", "盈餘對固定支出的保障倍數下降", "現金對固定支出的保障倍數不變"], "e": "選項(1)錯誤，負債總額下降，權益增加，比率下降。選項(2)錯誤，長期負債總額下降，權益增加，比率下降。選項(3)錯誤，並未立即影響到固定支出，比率不變。選項(4)正確，並未立即影響到固定支出，比率不變。"}, {"n": 3, "a": 4, "q": "下列哪個交易會造成利息保障倍數上升、負債比率下降及現金流量對固定支出倍數上升？", "o": ["償還長期銀行借款", "公司債轉換成普通股", "以高於成本的價格出售存貨", "選項(1)(2)(3)皆是"], "e": "選項(1)正確，利息下降，利息保障倍數上升及現金流量對固定支出倍數上升，又負債減少，使得負債比率下降。選項(2)正確，利息下降，利息保障倍數上升及現金流量對固定支出倍數上升，又負債減少，使得負債比率下降。選項(3)正確，現金增加大於存貨成本，總資產增加則負債比率下降，又現金及盈餘增加造成利息保障倍數及現金流量對固定支出倍數上升。選項(4)正確，選項(1)(2)(3)皆正確。"}, {"n": 4, "a": 1, "q": "就權益比率的描述，何者為真？", "o": ["其比率愈高，債權人受保障的程度愈高", "比率愈高，對股東愈有利", "其值愈高則負債對權益愈高", "若舉債所獲的報酬小於舉債成本，股東會傾向降低權益比率"], "e": "選項(1)正確，其比率愈高，負債比例愈小，債權人受保障的程度愈高。選項(2)錯誤，除了考量財務風險外，尚需考慮財務槓桿作用。選項(3)錯誤，其值愈高則負債對權益愈低。選項(4)錯誤，股東會傾向降低負債比率，提高權益比率。"}, {"n": 5, "a": 1, "q": "關於公司提高負債比率之必然影響，下列敘述何者正確(假設其他因素不變)？ 甲.提高稅盾(Tax Shield)；乙.提高財務困難成本(Financial Distress Cost)；丙.提高加權平均資金成本(Weighted Average Cost of Capital)：", "o": ["僅甲、乙", "僅甲、丙", "僅乙、丙", "甲、乙、丙"], "e": "丙.錯誤。加權平均資金成本可能提高、降低或不變。"}, {"n": 6, "a": 1, "q": "有關債權之信用評等敘述，何者為非？", "o": ["公司之技術能力不影響其債券信用評等", "公司產業的前景會影響其信用評等", "被評為信用較佳之企業，可以較低成本取得資金", "社會資金可作較佳分配"], "e": "選項(1)錯誤，公司之技術能力會影響其債券信用評等。選項(2)(3)(4)皆正確。"}, {"n": 7, "a": 2, "q": "甲公司以現金方式銷售商品，存貨採永續盤存制，售價低於成本，則：", "o": ["流動資產不變", "速動比率增加", "固定支出保障倍數不變", "現金流量為固定支出之倍數不變"], "e": "選項(1)錯誤，現金增加數少於存貨減少數，流動資產下降。選項(2)正確，現金增加，速動比率增加。選項(3)錯誤，因售價低於成本，銷售有損失，盈餘下降，固定支出保障倍數下降。選項(4)錯誤，現金增加，比率上升。"}, {"n": 8, "a": 1, "q": "山梨公司以現金償還長期借款 (考量利息變動)，則：", "o": ["速動比率下降", "利息保障倍數不變", "長期資金占不動產、廠房及設備之比率不變", "權益比率不變"], "e": "選項(1)正確，現金減少，速動比率下降。選項(2)錯誤，因利息下降，故其利息保障倍數上升。選項(3)錯誤，比率下降。選項(4)錯誤，資產總額減少，權益比率上升。"}, {"n": 9, "a": 3, "q": "下列敘述何者為真？", "o": ["舉債經營必定使公司普通股每股盈餘提高", "資產重估增值並按增值資產攤提折舊並不會使當年度利息保障倍數下降", "所得稅率提高有利於舉債經營之租稅成本", "財務槓桿指數小於 1 時，表示財務槓桿運用成功"], "e": "選項(1)錯誤，舉債經營不見得使公司普通股每股盈餘提高，若舉債資金成本大於資產報酬率則每股盈餘下降。選項(2)錯誤，折舊攤銷使得當年度盈餘下降，盈利為利息倍數下降。選項(3)正確，所得稅率提高有利於舉債經營，因舉債節稅額度增加。選項(4)錯誤，財務槓桿指數小於 1 時對股東不利，表示使用財務槓桿導致反效果。"}, {"n": 10, "a": 3, "q": "公司所得稅率提高 (只考慮其立即影響)，則：", "o": ["負債比率不變", "長期負債總額對權益比率不變", "固定支出保障倍數不變", "現金流量為固定支出之倍數下降"], "e": "選項(1)錯誤，稅後淨利減少，權益減少，負債比率上升。選項(2)錯誤，稅後淨利減少，權益減少，長期負債總額對權益比率上升。選項(3)正確，盈餘為稅前盈餘，故不影響固定支出保障倍數。選項(4)錯誤，現金及固定支出皆不變，沒有影響。"}, {"n": 11, "a": 1, "q": "淨值為正之公司，舉債購買不動產、廠房及設備將使權益比率：", "o": ["降低", "提高", "不變", "不一定"], "e": "舉債購買不動產、廠房及設備，資產總額增加而權益不變，故權益比率 (權益/總資產) 會下降。"}, {"n": 12, "a": 2, "q": "淨值為正之公司，以現金償還 5 年到期之公司債，將使權益比率：", "o": ["降低", "提高", "不變", "不一定"], "e": "流動資產減少，且長期負債減少，則總資產和總負債都減少，故權益比率 (權益/總資產) 提高。"}, {"n": 13, "a": 2, "q": "淨值為正之企業，處分不動產、廠房及設備產生損失將使負債比率？", "o": ["降低", "提高", "不變", "不一定"], "e": "處分不動產、廠房及設備產生損失使總資產減少，負債不變，故負債比率 (負債/資產) 提高。"}, {"n": 14, "a": 1, "q": "淨值為正之企業，收回公司債產生利益將使負債比率：", "o": ["降低", "提高", "不變", "不一定"], "e": "收回公司債產生利益即減少之資產小於減少之負債，故負債比率 (負債/資產) 降低。"}, {"n": 15, "a": 3, "q": "下列財務比率何者愈高愈佳？", "o": ["負債比率", "不動產、廠房及設備對長期資金比率", "利息保障倍數", "本益比"], "e": "選項(1)負債比率過高則公司負擔債務會很沉重。選項(2)不動產、廠房及設備對長期資金比率過高將有短期債務償債危險。選項(4)本益比太高則反映市價太高或公司獲利太低。"}, {"n": 16, "a": 4, "q": "下列何者不是企業以現金購買機器設備對財務報表的影響？", "o": ["總資產不變", "資產負債比率不變", "流動比率下降", "速動比率不變"], "e": "以現金購買機器設備，則流動資產減少，不動產、廠房及設備增加，但總資產不變，負債及權益也不改變。因流動資產減少，故流動比率下降。現金減少，故速動比率下降。"}, {"n": 17, "a": 4, "q": "財務槓桿指數之計算公式為：", "o": ["總資產報酬率 / 權益報酬率", "總資產報酬率 / 總資產週轉率", "負債之利息 / 總資產報酬率", "權益報酬率 / 總資產報酬率"], "e": "財務槓桿指數 = 權益報酬率 / 總資產報酬率"}, {"n": 18, "a": 1, "q": "長期資金對不動產、廠房及設備之比率應為何較為穩健？", "o": ["大於 1", "小於 1", "等於 1", "二者無關"], "e": "比率大於 1 時，企業較無短期償債壓力，財務結構較穩健。"}, {"n": 19, "a": 1, "q": "下列何者非為長期資金之來源？", "o": ["應付帳款", "發行公司債", "發行普通股", "發行特別股"], "e": "應付帳款屬短期的負債，長期資金來源有兩類，一為長期負債，如發行公司債；一為權益融資，如發行股票。"}, {"n": 20, "a": 4, "q": "購置不動產、廠房及設備所需資金應由長期資金來支應，因此長期資金占不動產、廠房及設備之比率最好超過下列何者較為妥當？", "o": ["50%", "70%", "90%", "100%"], "e": "比率小於 1 時代表企業有使用短期資金支付不動產、廠房及設備，所以比率最好大於 1，較無短期償債壓力。"}, {"n": 21, "a": 4, "q": "下列何者非為舉債可能導致之影響？", "o": ["利息費用增加", "負債比率提高", "營業情況佳時產生槓桿利益", "所得稅將提高"], "e": "舉債使利息費用增加減少淨利，所得稅會減少。"}, {"n": 22, "a": 1, "q": "甲公司 X1 年底之負債、權益及 X1 年損益資料如下： 應付公司債、8% $1,000,000 稅前淨利 $200,000 特別股、10%、面額$10 (不可贖回，無積欠股利) $200,000 所得稅率 17% 普通股、面額$10 $500,000 稅後淨利 $166,000 保留盈餘 $350,000 則其 X1 年利息保障倍數 (Times Interest Earned) 為若干？", "o": ["3.5", "2.5", "2.33", "1.875"], "e": "利息費用 = $1,000,000 * 8% = $80,000 ($80,000 + $200,000) / $80,000 = 3.5"}, {"n": 23, "a": 2, "q": "甲公司 X1 年度稅後淨利$840,000，所得稅率 25%，利息保障倍數為 11，X1 年度期初應付利息$15,000，期末應付利息$25,000，甲公司 X1 年度支付利息現金之金額為何？", "o": ["$112,000", "$102,000", "$91,818", "$83,333"], "e": "稅前淨利 = $840,000 / (1 - 0.25) = $1,120,000 ($1,120,000 + X) / X = 11, X = $112,000 支付利息之現金 = $112,000 - ($25,000 - $15,000) = $102,000"}, {"n": 24, "a": 1, "q": "淨值為正數之公司支付已宣告之現金股利將使負債比率：", "o": ["降低", "提高", "不變", "不一定"], "e": "支付應付股利則總負債及總資產同時減少，在正常情況下，即資產大於負債的情況下，負債比率會降低。"}, {"n": 25, "a": 4, "q": "下列敘述何者正確？", "o": ["長期負債對權益比率愈高，債權保障愈高", "利息保障倍數旨在衡量盈餘支付債務本息之能力", "負債比率與權益比率合計通常大於 1", "不動產、廠房及設備對長期資金比率小於 1，表示長期資金足夠支應不動產、廠房及設備投資之所需"], "e": "選項(1)比率愈高，自有資金愈低，保障愈低。選項(2)僅衡量償付利息之能力。選項(3)(負債 / 資產) + (權益 / 資產) = (負債 + 權益) / 資產 = 1"}, {"n": 26, "a": 3, "q": "負債比率提高，將使權益報酬率如何變動？", "o": ["增加", "減少", "不一定", "不變"], "e": "負債比率提高對權益報酬率的影響要看企業的經營能力，若經營能力強，會使權益報酬率增加；若經營能力差，則權益報酬率減少。"}, {"n": 27, "a": 2, "q": "發行股票交換取得專利權對負債比率之影響為 (假設權益帳面金額原來即為正且負債金額大於零)：", "o": ["提高", "降低", "不一定", "不變"], "e": "權益和資產增加，所以負債比率 (負債 / 資產) 降低。"}, {"n": 28, "a": 2, "q": "不動產、廠房及設備對長期資金之比率應為何較為穩健？", "o": ["大於 1", "小於 1", "等於 1", "二者無關"], "e": "比率大於 1 時代表企業有使用短期資金支付不動產、廠房及設備，所以比率最好小於 1 較無短期償債壓力。"}, {"n": 29, "a": 3, "q": "萬事公司擁有如意公司普通股權 40%，且對其有重大影響，109 年如意公司有淨利，但未發放股利，此項政策將使萬事公司 109 年底：", "o": ["負債比率提高", "權益比率降低", "保留盈餘增加", "每股帳面金額減少"], "e": "擁有 40%股權時應以權益法處理，在年底時即按 40%認列投資收益，故保留盈餘增加。"}, {"n": 30, "a": 1, "q": "負債比率、利息保障倍數、固定支出保障倍數等都是作為：", "o": ["負債管理比率", "流動性比率", "經營效率比率", "獲利能力比率"], "e": "負債比率、利息保障倍數、固定支出保障倍數均為衡量公司償債能力的指標。"}, {"n": 31, "a": 4, "q": "甲公司的相關資料如下：流動負債 3,000 億元、流動資產 5,000 億元、不動產、廠房及設備 7,000 億元、自有資金比率為 60%，則該公司的長期負債為何？", "o": ["4,000 億元", "6,000 億元", "8,000 億元", "1,800 億元"], "e": "總資產 = 流動資產 + 不動產、廠房及設備 = 5,000 億元 + 7,000 億元 = 12,000 億元 自有資金比率 = 權益 / 總資產 = 權益 / 12,000 億元 = 60%，-> 權益 = 7,200 億元 權益 = 總資產 - 流動負債 - 長期負債，7,200 億元 = 12,000 億元 - 3,000 億元 - 長期負債，-> 長期負債 = 1,800 億元"}, {"n": 32, "a": 3, "q": "下列何種比率有助於評估公司的短期償債能力？", "o": ["淨利率", "負債比率", "流動性指數", "權益報酬率"], "e": "評估短期償債能力主要有流動比率和速動比率，而流動性指數是以各流動資產之構成項目的金額乘以該項目轉換成現金所需之天數，再以各乘積之和除以流動資產總額而得，亦可衡量短期償債能力。選項(1)(4)主要用來評估企業之獲利能力。選項(2)負債比率可了解企業的負債管理能力。"}, {"n": 33, "a": 3, "q": "「財務槓桿比率」的計算方式為：", "o": ["總負債除以總資產", "權益除以總負債", "資產總額除以權益總額", "總資產除以總負債"], "e": "財務槓桿比率 = 資產總額 / 權益總額"}, {"n": 34, "a": 3, "q": "下列何項資訊對短期債權人最不重要？", "o": ["獲利能力", "應收帳款週轉率", "財務結構", "速動比率"], "e": "短期債權人較關心公司短期的流動性和獲利能力，和長期財務結構無關。"}, {"n": 35, "a": 4, "q": "某公司稅前純益為$200,000，第一優先債券利息費用為$30,000，第二優先債券利息費用$10,000，第三優先債券利息費用$20,000，則第二優先債券盈餘支付利息倍數為何？", "o": ["5", "4", "3", "6.5"], "e": "第二優先債券盈餘支付利息倍數 = ($200,000 + $30,000 + $10,000 + $20,000) / ($30,000 + $10,000) = 6.5"}, {"n": 36, "a": 1, "q": "甲公司速動比率為 1.4，預付費用為流動資產的 10%，存貨為流動資產的 20%，則流動比率為：", "o": ["2", "2.22", "1.75", "1.94"], "e": "速動比率 = (流動資產 - 存貨 - 預付費用) / 流動負債 = [流動資產 * (1 - 0.2 - 0.1)] / 流動負債 = 1.4 流動比率 = 流動資產 / 流動負債 = 1.4 / (1 - 0.2 - 0.1) = 2"}, {"n": 37, "a": 4, "q": "某公司僅發行一種股票，X1 年每股盈餘$10，每股股利$5，除淨利與發放股利之結果使保留盈餘增加$200,000 外，權益無其他變動。若 X1 年底每股帳面金額$30，負債總額$1,200,000，則負債比率為何？", "o": ["60%", "57.14%", "75%", "50%"], "e": "每股盈餘$10，股利$5，所以每股盈餘剩下一$10 - $5 = $5 $200,000 / $5 = 40,000 股，期末每股帳面價$30 權益總數為$30 * 40,000 = $1,200,000 總資產 = $1,200,000 + $1,200,000 = $2,400,000 負債比率 = $1,200,000 / $2,400,000 = 50%"}, {"n": 38, "a": 3, "q": "某公司資產總額$2,500,000，負債總額$900,000，平均借款利率 10%，若所得稅率 17%，總資產報酬率為 12%，則權益報酬率為何？", "o": ["18.75%", "13.125%", "14.08%", "20%"], "e": "權益報酬率 = 稅後淨利 / 權益 權益 = 資產 - 負債 = $2,500,000 - $900,000 = $1,600,000 設稅後淨利 = X，-> 12% = [X + $900,000 * 10% * (1 - 17%)] / $2,500,000 -> $300,000 = X + $74,700 -> X = $225,300 $225,300 / $1,600,000 = 14.08%"}, {"n": 39, "a": 4, "q": "財務槓桿指數大於 1，表示：", "o": ["借款增加", "舉債經營不利", "負債比率超過總資產報酬率", "舉債經營有利"], "e": "指數大於 1 時表示權益報酬率大於總資產報酬率，即舉債利於公司經營。"}, {"n": 40, "a": 3, "q": "到期時償還應付帳款對利息保障倍數之影響為：", "o": ["增加", "減少", "不變", "不一定"], "e": "利息保障倍數 = 稅前息前淨利 / 利息費用，償還應付帳款對這些項目不影響。"}, {"n": 41, "a": 1, "q": "奈良公司 X1 年底有流動負債$1,000,000，長期負債$2,000,000，股本$2,500,000，保留盈餘$1,500,000，則其負債比率為：", "o": ["42.86%", "52.5%", "50%", "34.43%"], "e": "資產 = 負債 + 權益 = $1,000,000 + $2,000,000 + $2,500,000 + $1,500,000 = $7,000,000 負債比率 = ($1,000,000 + $2,000,000) / $7,000,000 = 42.86%"}, {"n": 42, "a": 4, "q": "已知某公司的稅後淨利為$5,395,000，所得稅率為 17%，當期的利息費用 50 萬元，則其利息保障倍數為：", "o": ["13.5 倍", "9.24 倍", "10 倍", "14 倍"], "e": "利息保障倍數 = 稅前息前盈餘 / 利息費用 稅前盈餘 = $5,395,000 / (1 - 17%) = $6,500,000 利息保障倍數 = ($6,500,000 + $500,000) / $500,000 = 14"}, {"n": 43, "a": 4, "q": "滋賀公司辦理資產重估增值，將對下列比率產生何種影響？", "o": ["負債比率：減少；權益報酬率：增加", "負債比率：不變；權益報酬率：增加", "負債比率：不變；權益報酬率：減少", "負債比率：減少；權益報酬率：減少"], "e": "資產重估增值時，增加資產及權益 (其他權益項目)，所以負債比率和權益報酬率都減少。"}, {"n": 44, "a": 3, "q": "下列對於財務槓桿指數的敘述，何者為非？", "o": ["大於 1 時，公司舉債經營有利", "當公司無負債及特別股，其財務槓桿為 1", "當公司舉債資金成本大於總資產報酬率，代表普通股權益報酬率大於總資產報酬率", "普通股權益報酬率愈高，財務槓桿愈高"], "e": "選項(3)錯誤，當公司舉債資金成本大於總資產報酬率，則因舉債經營收入部分少於利息支出，使得普通股權益報酬率小於總資產報酬率。 選項(4)正確，普通股權益報酬率在分子，愈高則其值愈高。"}, {"n": 45, "a": 2, "q": "應付公司債之持有者一般而言最關心下列那一比率？", "o": ["速動比率", "利息保障倍數", "應收帳款週轉率", "營業週期天數"], "e": "公司債持有者在每期會收到利息，所以最關心的是每一期能否順利收到利息，利息保障倍數是否足夠對此有很大影響。"}, {"n": 46, "a": 3, "q": "財務槓桿之費用，通常與下列何種情況有關？", "o": ["高品質盈餘", "高流動比率", "高負債比率", "高資產週轉率"], "e": "財務槓桿之費用是來自於向外舉債，而舉債高則權益相對就低。"}, {"n": 47, "a": 3, "q": "某公司相關資料如下：流動負債 20 億元、長期負債 30 億元、流動資產 50 億元、不動產、廠房及設備 50 億元 (無其他非流動資產)，求公司的長期資金占不動產、廠房及設備之比率？", "o": ["1", "1.3", "1.6", "1.9"], "e": "總資產 = 流動資產 + 不動產、廠房及設備 = 50 億元 + 50 億元 = 100 億元 權益 = 總資產 - 流動負債 - 長期負債 = 100 億元 - 20 億元 - 30 億元 = 50 億元 長期資金占不動產、廠房及設備比率 = (權益總額 + 長期負債總額) / 不動產、廠房及設備淨額 * 100% = (50 億元 + 30 億元) / 50 億元 = 1.6"}, {"n": 48, "a": 1, "q": "某公司相關資料如下：流動負債 20 億元、長期負債 30 億元、不動產、廠房及設備 50 億元、長期資金占不動產、廠房及設備比率為 1.6，求公司的流動資產總額？", "o": ["50 億元", "60 億元", "70 億元", "80 億元"], "e": "長期資金占不動產、廠房及設備比率 = (權益總額 + 長期負債總額) / 不動產、廠房及設備淨額 = 1.6 = (權益 + 30 億元) / 50 億元 = 1.6, 權益 = 50 億元 總資產 = 總負債 + 權益 = 20 億元 + 30 億元 + 50 億元 = 100 億元 總資產 = 流動資產 + 不動產、廠房及設備 = 流動資產 + 50 億元 = 100 億元 流動資產 = 50 億元"}, {"n": 49, "a": 3, "q": "某公司相關資料如下：流動負債 20 億元、流動資產 60 億元、非流動資產 60 億元、權益比率為 30%，求公司的長期負債？", "o": ["30 億元", "50 億元", "64 億元", "92 億元"], "e": "總資產 = 流動資產 + 非流動資產 = 60 億元 + 60 億元 = 120 億元 權益比率 = 權益 / 總資產 = 權益 / 120 億元 = 30% 權益 = 36 億元 權益 = 總資產 - 流動負債 - 長期負債 = 120 億元 - 20 億元 - 長期負債 = 36 億元 長期負債 = 64 億元"}, {"n": 50, "a": 1, "q": "企業所有各項融通資金來源，占資金來源總額的結構為：", "o": ["資本結構", "營運結構", "股權結構", "利率期間結構"], "e": "所謂「資本結構」即企業中權益及負債各組合間的比率關係。"}, {"n": 51, "a": 1, "q": "較高的負債比率，對獲利穩定且獲利能力很強的公司而言，乃表示其財務結構：", "o": ["仍稱健全", "已不健全", "隨時會週轉不靈", "必定走下坡"], "e": "穩定的獲利能力使公司仍有穩定的償債能力，故其財務結構尚屬健全。"}, {"n": 52, "a": 2, "q": "舉債經營有利時，財務槓桿指數會：", "o": ["小於 1", "大於 1", "等於 1", "無法判斷"], "e": "財務槓桿指數 = 權益報酬率 / 總資產報酬率，當舉債經營有利時，權益報酬率會比總資產報酬率大，所以指數會大於 1。"}, {"n": 53, "a": 3, "q": "如果公司宣告並發放股票股利，對其財務報表的影響為何？", "o": ["增加資產", "增加負債", "不影響權益總額", "減少投入資本總額"], "e": "股票股利的宣告及發放會轉移股東權益內部的項目，但不改變總股東權益的金額。"}, {"n": 54, "a": 2, "q": "山口公司 X1 年相關資料如下：淨利$300,000、所得稅費用$150,000、利息費用$150,000、流動負債$250,000、長期負債$500,000、資產總額$1,500,000、不動產、廠房及設備$750,000、特別股股利$80,000，該公司之負債比率為若干？", "o": ["60%", "50%", "40%", "42.86%"], "e": "負債總額 = $250,000 + $500,000 = $750,000 負債比率 = $750,000 / $1,500,000 = 50%"}, {"n": 55, "a": 4, "q": "德島公司 X1 年 12 月 31 日負債及權益資料如下，若 X1 年稅前淨利$200,000、所得稅費用$60,000，利息保障倍數為： 流動負債總額 (不附息) $500,000 應付公司債 (7.5%，114 年到期) $500,000 普通股 (面額$10) $750,000 特別股 (面額$10，累積，10%) $300,000 保留盈餘 $700,000", "o": ["4.3 倍", "5.25 倍", "9 倍", "6.33 倍"], "e": "利息費用 = $500,000 * 7.5% = $37,500 ($200,000 + $37,500) / $37,500 = 6.33 倍"}, {"n": 56, "a": 2, "q": "南投公司會計人員年底遺漏一項平價發行長期應付公司債應計利息之調整分錄，試問南投公司若未補做調整分錄，則下列對該公司當年度財務比率的敘述何者正確？", "o": ["利息保障倍數低估", "流動比率高估", "總資產報酬率低估", "本益比高估"], "e": "利息費用低估，應付利息低估，故利息保障倍數高估，流動比率高估，總資產報酬率高估，本益比低估。"}, {"n": 57, "a": 2, "q": "宜蘭公司本期稅後淨利$664,000，所得稅率 17%，非流動負債$10,600,000，流動負債$1,800,000，利息費用$200,000，利率 10%。 請問宜蘭公司本期之利息保障倍數為何？", "o": ["3.5 倍", "5 倍", "8 倍", "7 倍"], "e": "{[664,000 / (1 - 0.17) + 200,000] / 200,000} = 5。"}, {"n": 58, "a": 3, "q": "甲公司今年的純益率為 11.4%，資產週轉率 1.34，權益比率 0.67，則該公司本年度的權益報酬率(ROE)為多少 (假設公司未舉債)？", "o": ["15.28%", "10.23%", "22.80%", "12.70%"], "e": "杜邦方程式： ROE = (淨利 / 銷貨) * (銷貨 / 平均資產總額) * (平均資產總額 / 股東權益) = 純益率 * 資產週轉率 * 財務槓桿比率 ROE = 11.4% * 1.34 * 1 / 0.67 = 22.8%"}, {"n": 59, "a": 4, "q": "台北公司 X1 年之平均資產總額為$1,160,000、利息費用$25,000，另外，資產週轉率為 2、淨利率為 10%、所得稅率為 20%。試問該公司 X1 年之利息保障倍數為何？", "o": ["4.82", "6.16", "7.96", "12.6"], "e": "1,160,000 * 2 = 2,320,000 (銷貨) (2,320,000 * 10%) / (1 - 20%) = 290,000 (稅前淨利) (290,000 + 25,000) / 25,000 = 12.6"}, {"n": 60, "a": 2, "q": "新竹公司 X1 年之權益比率為 25%、權益報酬率為 20%，另外，資產週轉率為 1。試問該公司 X1 年之淨利率為何？", "o": ["1%", "5%", "20%", "10%"], "e": "淨利率 * 1 * (1 / 25%) = 20% 淨利率 = 5%"}, {"n": 61, "a": 1, "q": "下列何者無法使資產報酬率提高？", "o": ["提高權益比率", "提高資產週轉率", "提高淨利率", "增加銷貨"], "e": "提高權益比率無法使資產報酬率提高。"}]}, {"id": 6, "title": "第6章 投資報酬率及資產運用效率的分析", "questions": [{"n": 1, "a": 3, "q": "岡山公司 X1 年的資產週轉率為 4 倍，當年度總銷貨收入 $1,000,000。如果當年度的淨利為 $80,000，請問該公司 X1 年的資產報酬率(不考慮稅負)：", "o": ["16%", "24%", "32%", "40%"], "e": "平均資產總額 = $1,000,000 / 4 = $250,000 資產報酬率 = $80,000 / $250,000 = 32%"}, {"n": 2, "a": 4, "q": "淨銷貨為 $200,000，期初總資產為 $60,000，資產週轉率為 5，請問期末總資產為：", "o": ["$40,000", "$35,000", "$30,000", "$20,000"], "e": "平均資產總額 = $200,000 / 5 = $40,000 期末資產總額 = $40,000 x 2 - $60,000 = $20,000"}, {"n": 3, "a": 2, "q": "東京公司 X1 年度每股盈餘為 $4.5，每股可配股利 $3，東京公司 X1 年底每股帳面金額為 $36，每股市價為 $45，則東京公司股票的本益比為：", "o": ["5", "10", "7.5", "15"], "e": "本益比 = $45 / $4.5 = 10"}, {"n": 4, "a": 3, "q": "大分公司本益比為 60，股利支付率為 75%，今知每股股利為 $8，則普通股每股市價應為多少？", "o": ["$32", "$240", "$640", "$480"], "e": "本益比 = 股利支付率 / 股利收益率 => 股利收益率 = 股利支付率 / 本益比 = 75% / 60 = 0.0125 股利收益率 = 普通股每股股利 / 普通股每股市價 => 普通股每股市價 = 普通股每股股利 / 股利收益率 故普通股每股市價 = $8 / 0.0125 = $640"}, {"n": 5, "a": 3, "q": "熊本公司本益比為 30，當年度平均普通股權益 $250,000，淨利 $60,000，特別股股利 $10,000，則該公司之股價淨值比率為何？", "o": ["8", "10", "6", "14.4"], "e": "股價淨值比 = 普通股每股市價 / 每股帳面金額 = 本益比 x 每股盈餘 / 每股帳面金額 普通股權益報酬率 = (本期淨利 - 特別股股利) / 平均普通股權益 = ($60,000 - $10,000) / $250,000 = 20% 股價淨值比 = 30 x 20% = 6"}, {"n": 6, "a": 1, "q": "下列何項舉動使得公司總資產報酬率上升？", "o": ["管理費用下降", "出售長期投資", "出售機器", "發行公司債"], "e": "選項(1)正確，管理費用下降，淨利率上升，淨利增加，公司資產報酬率上升。選項(2)錯誤，出售長期投資不一定可增加總資產報酬率，若獲得現金等於長期投資帳面金額，則總資產數不變，淨利亦不變並不影響公司總資產報酬率。選項(3)錯誤，出售機器不一定可增加總資產報酬率，若獲得現金等於機器帳面金額，則總資產數不變，淨利亦不變並不影響公司總資產報酬率。選項(4)錯誤，發行公司債獲得資金會使總資產上升，公司總資產報酬率下降。"}, {"n": 7, "a": 3, "q": "山崎公司 X1 年度平均總資產 $150,000，銷貨 $60,000，其淨利 $3,000，稅率 25%，利息前淨利率 12.5%，則該公司總資產報酬率為何？", "o": ["10%", "8%", "5%", "4%"], "e": "總資產報酬率 = 淨利率(利息前) x 總資產週轉率 = 12.5% x ($60,000 / $150,000) = 5%"}, {"n": 8, "a": 4, "q": "下列何者不會影響公司的權益報酬率？", "o": ["總資產週轉率", "淨利率", "平均財務槓桿比率", "選項(1)(2)(3)皆有影響"], "e": "權益報酬率 = 淨利率 x 總資產週轉率 x 平均財務槓桿比率，故以上皆有影響。"}, {"n": 9, "a": 1, "q": "羅斯福公司在無負債的狀況下，其稅前總資產報酬率為 22%。若不考慮稅負，且該公司負債與權益比率為 0.2，利率為 2%，則其權益報酬率為何？", "o": ["26%", "27.8%", "23.9%", "17.25%"], "e": "權益報酬率 = ROA + [(ROA - 稅後舉債成本) x 平均總負債 / 平均權益] = 22% + [(22% - 2%) x 0.2] = 26%"}, {"n": 10, "a": 4, "q": "假設芊芊公司 X1 年底平均總資產總額為 $2,800,000，平均負債總額為 $1,600,000，利息費用為 $140,000，所得稅率為 20%，總資產報酬率為 12%，則權益報酬率為何？", "o": ["12.00%", "13.33%", "10.56%", "18.67%"], "e": "權益報酬率 = 本期淨利 / 平均權益 = [$2,800,000 x 12% - $140,000(1-20%)] / ($2,800,000 - $1,600,000) = 0.18666"}, {"n": 11, "a": 3, "q": "嘉義公司出售帳面金額 $80,000 的機器而獲得 $20,000 的資本利得，則：", "o": ["總資產報酬率下降", "權益報酬率不變", "長期資本報酬率增加", "特別股股利保障倍數不變"], "e": "選項(1)錯誤，淨利增加，總資產報酬率上升。選項(2)錯誤，淨利增加，使得權益報酬率上升。選項(3)正確，淨利增加，長期資本報酬率增加。選項(4)錯誤，淨利增加，特別股股利保障倍數上升。"}, {"n": 12, "a": 1, "q": "甲公司本期之權益報酬率(ROE)高於資產報酬率(ROA)，顯示甲公司：", "o": ["使用財務槓桿有利", "使用財務槓桿不利", "使用營業槓桿有利", "使用營業槓桿不利"], "e": "ROE 高於 ROA 顯示舉債有利。"}, {"n": 13, "a": 2, "q": "香川公司發放去年宣告的現金股利，則：", "o": ["總資產報酬率不變", "權益報酬率不變", "長期資本報酬率增加", "權益成長率下降"], "e": "選項(2)正確，權益與淨利未改變，權益報酬率不變。選項(3)錯誤，權益與淨利未改變，長期資本報酬率不變。選項(4)錯誤，權益與淨利未改變，權益成長率不變。"}, {"n": 14, "a": 2, "q": "下列敘述何者為非？", "o": ["兩公司今年本益比相同，不代表兩公司成長性一樣", "產業成長性低的公司，其本益比會較高", "公司面臨風險的改變會影響本益比變動", "會計方法變動會影響本益比"], "e": "選項(1)正確，公司今年本益比相同，可能只是因為暫時性盈餘使其今年相同，不意謂公司有相同的成長率。選項(2)錯誤，產業成長性低或風險較高的公司，則其本益比較低。選項(3)正確，公司面臨風險的改變會影響本益比變動。選項(4)正確，會計方法變動會影響本益比。"}, {"n": 15, "a": 2, "q": "高知公司 X1 年度平均總資產 $160,000，銷貨 $50,000，其稅後淨利 $25,000，稅率 25%，平均財務槓桿比率為 2，則該公司權益報酬率為何？", "o": ["18.75%", "31.25%", "12.5%", "25%"], "e": "權益報酬率 = 淨利率 x 總資產週轉率 x 平均財務槓桿比率 = ($25,000 / $50,000) x ($50,000 / $160,000) x 2 = 31.25%"}, {"n": 16, "a": 1, "q": "某公司發行普通股取得建築物，則：", "o": ["總資產報酬率下降", "權益報酬率不變", "長期資本報酬率增加", "營運資金週轉率增加"], "e": "選項(1)正確，總資產增加，資產報酬率下降。選項(2)錯誤，權益增加，使得權益報酬率下降。選項(3)錯誤，淨利增加，長期資本報酬率下降。選項(4)錯誤，不影響營運資金週轉率。"}, {"n": 17, "a": 3, "q": "巴黎公司與倫敦公司總資產報酬率相同，且已知前者淨利率較後者為高，試問那一家可能為鋼鐵公司，而那一家為電腦維修公司？", "o": ["總資產週轉率一樣，兩者行業種類相同", "前者為電腦維修公司", "後者為電腦維修公司", "無法判斷"], "e": "總資產報酬率 = 淨利率 x 總資產週轉率。得知巴黎公司的總資產週轉率較低，應為鋼鐵業(因固定成本較高)。倫敦公司總資產週轉率較高，應為電腦維修公司。"}, {"n": 18, "a": 3, "q": "某公司今實施庫藏股制度，將原以 $30,000 發行的普通股，以 $40,000 買回，其目的在於減少資本，則：", "o": ["總資產報酬率下降", "權益報酬率不變", "長期資本報酬率增加", "選項(1)(2)(3)皆非"], "e": "選項(1)錯誤，資產減少，總資產報酬率上升。選項(2)錯誤，權益減少，使得權益報酬率上升。選項(3)正確，權益減少，長期資本報酬率上升。選項(4)錯誤，只有一個正確。"}, {"n": 19, "a": 3, "q": "下列敘述何者不正確？", "o": ["現金是流動性較高之資產", "現金週轉率低表示營業所需現金充裕", "現金是收益能力較高之資產", "現金週轉率高可能有現金短缺之虞"], "e": "現金僅代表流動性，無法代表收益能力。"}, {"n": 20, "a": 2, "q": "智平公司資產總額 $4,000,000，負債總額 $1,000,000，平均利率 6%，若總資產報酬率為 12%，稅率為 35%，則權益報酬率若千？", "o": ["14%", "14.7%", "15%", "15.3%"], "e": "總資產報酬率 = [本期淨利 + 利息費用 x (1 - 稅率)] / 平均資產總額 利息費用 = $1,000,000 x 6% = $60,000，設稅後淨利 = X X + $60,000 x (1 - 35%) = $4,000,000 x 12%，X = 441,000 $441,000 / ($4,000,000 - $1,000,000) = 14.7%"}, {"n": 21, "a": 1, "q": "發放已宣告之現金股利對總資產報酬率與權益報酬率之影響分別為：", "o": ["增加，不變", "增加，減少", "不變，不變", "減少，不變"], "e": "發放已宣告之現金股利會減少流動資產 (現金) 及流動負債 (應付股利) 而權益不受影響，故總資產報酬率增加，而權益報酬率不變。"}, {"n": 22, "a": 4, "q": "企業希望提高其權益報酬率(ROE)，以下那一個方式為無效的？", "o": ["改善經營能力", "減少閒置產能", "改變資本結構", "選項(1)(2)(3)皆有效"], "e": "ROE = 淨利 / 平均權益，要提高 ROE 可透過提高淨利或減少權益。而改善經營能力與減少閒置產能皆能提高淨利；而減少權益則是改變資本結構。"}, {"n": 23, "a": 4, "q": "下列何者不影響毛利率，但使稅前淨利率下降？", "o": ["認列存貨跌價損失", "提高產品售價", "認列機器處分利益", "認列較高的廣告費用"], "e": "選項(1)銷貨成本上升，毛利率及稅前淨利率皆下降。選項(2)銷貨收入及銷貨毛利皆上升，會影響毛利率。選項(3)會使稅前淨利率上升。"}, {"n": 24, "a": 1, "q": "創意公司 X1 年部分資料如下，創意公司之權益報酬率為： (X1年12月31日:資產總額 $200,000, 負債總額 $100,000; X1年1月1日:資產總額 $150,000, 負債總額 $75,000; X1年度:銷貨收入 $500,000, 利息費用 $8,000, 稅前淨利 $10,000, 所得稅率 25%)", "o": ["8.57%", "10.91%", "13.33%", "14.55%"], "e": "權益報酬率 = 本期淨利 / 平均權益 = $10,000 x (1 - 25%) / {[($200,000 - $100,000) + ($150,000 - $75,000)] / 2} = 8.57%"}, {"n": 25, "a": 4, "q": "某上市的公司之股價為 780 元，每股股利為 14 元，請計算公司的股利收益率為何？", "o": ["16.7%", "12.9%", "1.67%", "1.79%"], "e": "股利收益率 = 14元 / 780元 = 1.79%"}, {"n": 26, "a": 1, "q": "某公司的負債比率為 0.6，總資產週轉率為 3。若公司的權益報酬率為 15%，公司的淨利率為何？", "o": ["2%", "3%", "4%", "5%"], "e": "權益報酬率 = 本期淨利 / 銷貨收入淨額 x 銷貨收入淨額 / 平均資產總額 x 平均資產總額 / 平均權益 15% = 淨利率 x 3 x (1 / 0.4)。淨利率 = 2%"}, {"n": 27, "a": 1, "q": "財務分析常計算下列何者與各資產之比率，作為資產運用效率分析之比率指標？", "o": ["銷貨收入", "本期純益", "每股盈餘", "銷貨成本"], "e": "如總資產週轉率、不動產、廠房及設備週轉率等，均以銷貨收入為分子。"}, {"n": 28, "a": 3, "q": "某公司的權益報酬率為 15%，負債 / 權益比為 0.8，則總資產報酬率為：", "o": ["7.78%", "8%", "8.33%", "12%"], "e": "負債 / 權益 = 0.8，資產 / 權益 = 1 + 負債 / 權益 = 1.8 權益報酬率 = 總資產報酬率 x (平均資產總額 / 平均權益) 15% = 總資產報酬率 x 1.8，∴總資產報酬率 = 8.33%"}, {"n": 29, "a": 1, "q": "某公司的權益報酬率為 19%，市價淨值比為 1.9 倍，則公司的本益比為：", "o": ["10", "14", "19", "36.1"], "e": "本益比 = 市價淨值比 / 權益報酬率 = 1.9 / 19% = 10"}, {"n": 30, "a": 4, "q": "下列敘述何者錯誤？", "o": ["其他條件不變下，總資產週轉率愈高，總資產報酬率愈大", "其他條件不變下，總資產週轉率愈高，權益報酬率愈大", "其他條件不變下，淨利率愈高，總資產報酬率愈大", "高成長的公司本益比較低"], "e": "高成長的公司通常有較高的本益比。"}, {"n": 31, "a": 4, "q": "阪新公司的權益報酬率在 X1 年度大幅降低，可能的原因為何？", "o": ["淨利率下降", "總資產週轉率降低", "平均財務槓桿比率降低", "選項(1)(2)(3)皆有可能"], "e": "權益報酬率 = 淨利率 x 總資產週轉率 x (平均資產總額 / 平均權益)，故皆有可能。"}, {"n": 32, "a": 4, "q": "京都公司 X1 年度的預估獲利為 150 億元，現金股利每股 3 元，流通在外股數為 20 億股，則京都公司的股利支付率為：", "o": ["10%", "20%", "30%", "40%"], "e": "每股盈餘 = 150 億元 / 20 億股 = 7.5 元 股利支付率 = 3 元 / 7.5 元 = 40%"}, {"n": 33, "a": 2, "q": "一般而言，如果舉債經營所得到的報酬率高於舉債所負擔的利率，則對權益報酬率的影響將是：", "o": ["權益報酬率會下降", "權益報酬率會上升", "權益報酬率不受影響", "視舉債之期間(流動或非流動)而定"], "e": "權益報酬率 (ROE) = 本期淨利 / 平均權益，若舉債經營報酬率高於舉債的利息，則淨利會增加，ROE 自然會上升。"}, {"n": 34, "a": 4, "q": "某公司股票的本益比為 50，股利收益率為 2%，則其股利支付率約為：", "o": ["60%", "70%", "80%", "100%"], "e": "本益比 = 市價(P) / 每股盈餘(E)，股利收益率 = 股利(D) / 市價(P)，股利支付率 = 股利(D) / 每股盈餘(E)，本題中，P / E = 50 => E = P / 50 = 0.02P, D / P = 2% = 0.02 => D = 0.02P, ∴ D / E = 0.02P / 0.02P = 100%"}, {"n": 35, "a": 1, "q": "下列有關盈餘轉增資對企業財務比率的影響，哪些是正確的？ 甲.負債比率不變；乙.權益報酬率減少；丙.總資產報酬率減少", "o": ["僅甲對", "僅乙對", "僅丙對", "乙及丙對"], "e": "盈餘轉增資即發放股票股利，就是將企業之保留盈餘轉成股本及資本公積，不影響權益的總數，對總資產及總負債也不會有任何影響。"}, {"n": 36, "a": 3, "q": "企業於年度中，以現金於市場購入該企業之股票 (即庫藏股票)，假定企業的淨利不變下，將會增加以下何種比率？ 甲.負債比率；乙.每股盈餘；丙.權益報酬率", "o": ["甲和乙會增加", "乙和丙會增加", "甲、乙和丙都會增加", "甲、乙和丙都不會增加"], "e": "以現金購入庫藏股時，資產及權益同時減少，所以：甲、負債比率 (總負債 / 總資產) 會因資產減少而上升。乙、每股盈餘 (純益 / 每股流通在外股數) 會因流通在外股數減少而上升。丙、權益報酬率 (純益 / 權益) 也因權益總數減少而上升。"}, {"n": 37, "a": 4, "q": "下列哪一種行業的總資產週轉率通常較高？", "o": ["生化製藥業", "電子業", "石油化學工業", "連鎖速食店"], "e": "總資產週轉率 = 銷貨收入淨額 / 平均資產總額，此比率較高的原因可能是銷貨額較高或總資產較低。本題中，以速食店所需的總資產較低。"}, {"n": 38, "a": 4, "q": "其他條件不變下，下列何種情況有最高的本益比？", "o": ["預期未來盈餘成長高且企業經營風險高", "預期未來盈餘成長低且企業經營風險低", "預期未來盈餘成長低且企業經營風險高", "預期未來盈餘成長高且企業經營風險低"], "e": "本益比 = 每股市價 / 每股盈餘。本益比受每股市價及每股盈餘之影響，而每股市價與預期未來盈餘成長率為正向關係，且計算股價之資金成本率受經營風險影響，兩者為反向關係，企業經營風險為由於策略選擇、產品價格及銷售手段等決策引起的未來生意不確定性，故選擇選項(4)。"}, {"n": 39, "a": 4, "q": "指撥保留盈餘與發放股票股利對權益報酬率之影響分別為何？", "o": ["降低，降低", "不變，降低", "降低，不變", "不變，不變"], "e": "指撥僅限制保留盈餘的用途，而發放股票股利是將保留盈餘轉為股本，兩者皆不影響權益之總數，所以對權益報酬率就沒有影響了。"}, {"n": 40, "a": 1, "q": "增加特別股股利對權益報酬率與權益成長率之影響分別為：", "o": ["增加、減少", "不變、減少", "減少、不變", "不變、不變"], "e": "增發特別股股利會使權益減少，所以權益報酬率 (淨利 / 平均權益) 會增加，而權益成長率當然會減少。"}, {"n": 41, "a": 3, "q": "不動產、廠房及設備週轉率高表示：", "o": ["損益兩平點較高", "銷貨潛力尚可大幅提高", "不動產、廠房及設備運用效率高", "生產能量較有彈性"], "e": "不動產、廠房及設備週轉率 = 銷貨收入淨額 / 平均不動產、廠房及設備，用來衡量企業之不動產、廠房及設備是否有效利用，以產生營業銷貨收入。"}, {"n": 42, "a": 4, "q": "下列作法何者能使公司之權益報酬率(ROE)提高(各作法為獨立情況)？ 甲.降低營業費用率；乙.提高資產使用率；丙.降低負債利率", "o": ["僅甲、乙", "僅甲、丙", "僅乙、丙", "甲、乙、丙"], "e": "權益報酬率 = (純益 - 特別股股利) / 平均權益。降低營業費用可以增加純益，降低負債利率也可以增加純益。資產使用率增加可以增加營收，進而增加純益。"}, {"n": 43, "a": 1, "q": "下列作法何者能使公司之資產報酬率(ROA)提高(各作法為獨立情況)？ 甲.降低營業費用率；乙.提高資產使用率；丙.降低負債利率", "o": ["僅甲、乙", "僅甲、丙", "僅乙、丙", "甲、乙、丙"], "e": "資產報酬率 = 「純益率」 x 總資產週轉率，此處的「純益率」的分子已加回稅後利息，故與利息無關。"}, {"n": 44, "a": 2, "q": "偉鈞公司的總資產報酬率為 12%，淨利率為 6%，淨銷貨收入為 $200,000，試問平均總資產為多少？ (假設公司未舉債)", "o": ["$200,000", "$100,000", "$5,000", "$8,000"], "e": "總資產報酬率 = 淨利率 x 銷貨收入淨額 / 平均資產總額 12% = 6% x $200,000 / 平均資產總額，∴平均資產總額 = $100,000"}, {"n": 45, "a": 2, "q": "假設淨利率與權益比率不變，則總資產週轉率增加，將使權益報酬率：", "o": ["減少", "增加", "不變", "不一定"], "e": "使總資產週轉率提高因素為銷貨提高或資產減少。(1)銷貨增加時，由於淨利率不變，所以淨利也增加，故權益報酬率增加。(2)資產減少時，由於權益比率不變，所以權益也減少，故權益報酬率增加。"}, {"n": 46, "a": 4, "q": "下列何者無法使總資產報酬率提高？", "o": ["提高淨利率", "增加銷貨", "提高總資產週轉率", "降低不動產、廠房及設備對長期資金比率"], "e": "降低不動產、廠房及設備對長期資金比率不見得得減少不動產、廠房及設備，所以不會提高資產報酬率。"}, {"n": 47, "a": 2, "q": "若總資產報酬率為 20%，淨利率為 25%，則總資產週轉率約為：", "o": ["0.6次", "0.8次", "1.25次", "2次"], "e": "總資產報酬率 = 淨利率 x 總資產週轉率 20% = 25% x 總資產週轉率，∴總資產週轉率 = 0.8"}, {"n": 48, "a": 1, "q": "一般說來，下列財務比率何者愈高愈佳？", "o": ["資產週轉率", "負債比率", "不動產、廠房及設備對總資產比率", "不動產、廠房及設備對長期資金比率"], "e": "選項(1)資產週轉率高代表資產的使用很有效率。選項(2)負債比率過高則公司負擔債務會很沉重。選項(3)比率過高會產生流動性危機。選項(4)比率過高將有短期債務清償危險。"}, {"n": 49, "a": 2, "q": "某公司之股價為 100 元，每股現金股利為 3 元，每股盈餘為 5 元，股利支付率為何？", "o": ["50%", "60%", "75%", "80%"], "e": "股利支付率 = 3元 / 5元 = 60%"}, {"n": 50, "a": 2, "q": "福德公司財務報表顯示：在 X1 年並無利息負債，淨利率為 8%、資產週轉率為 2 次、平均資產總額為 $2,000,000、平均權益為 $1,280,000。試問：該公司在 X1 年之權益報酬率為多少？", "o": ["16%", "25%", "36%", "64%"], "e": "銷貨淨額 = $2,000,000 x 2 = $4,000,000 本期淨利 = $4,000,000 x 8% = $320,000 權益報酬率 = $320,000 / $1,280,000 = 25%"}, {"n": 51, "a": 2, "q": "頭份公司 X1 年度平均權益 $200,000，平均負債 $200,000，銷貨 $1,000,000，其淨利 $50,000，負債利息 $10,000，稅率 10%，稅後純益率 10%，則 X1 年該公司總資產週轉率為何？", "o": ["1.25", "2.5", "3", "5"], "e": "總資產週轉率 = $1,000,000 / $400,000 = 2.5"}, {"n": 52, "a": 1, "q": "三義公司於 X1 年 7 月 1 日折價發行公司債一批，原擬採用有效利率法攤銷折價，但誤用直線法。此項攤銷方法之誤用，在 X2 年初，對下列項目造成何種影響？", "o": ["公司債帳面金額高估；保留盈餘低估", "公司債帳面金額低估；保留盈餘低估", "公司債帳面金額高估；保留盈餘高估", "公司債帳面金額低估；保留盈餘高估"], "e": "折價採有效利率法，採直線法攤銷折價使得應付債券折價攤銷數多計，帳面金額造成高估；利息費用多計，淨利少計，進而使保留盈餘低估。"}, {"n": 53, "a": 2, "q": "仁國公司 X3 年度平均流動資產 $800,000，平均流動負債 $350,000，銷貨收入淨額 $150,000，銷貨成本 $105,000，稅後淨利率 10%，則仁國公司營運資金週轉率為何？", "o": ["10%", "33.33%", "9%", "18.75%"], "e": "平均營運資金 = $800,000 - 350,000 = $450,000，營運資金週轉率 = 銷貨收入淨額 / 平均營運資金 = $150,000 / 450,000 = 33.33%"}, {"n": 54, "a": 1, "q": "赫洙公司發放普通股現金股利 $500,000，股價 $20，每股盈餘 $5，共發行 500,000 股，則該公司現金收益率為何？", "o": ["5%", "7.5%", "10%", "20%"], "e": "普通股每股現金股利 = $500,000 / 500,000 = $1，現金收益率 = $1 / $20 = 5%"}]}, {"id": 7, "title": "第7章 損益分析", "questions": [{"n": 1, "a": 2, "q": "智強公司只生產一種產品，X1 年時共銷售了 56,000 個單位，每單位售價 10 元，每單位變動成本及費用 7 元，固定營業費用 80,000 元，當年度利息支出 5,000 元，則其綜合槓桿度為何？", "o": ["1.61", "2.02", "3.61", "選項(1)(2)(3)皆非"], "e": "綜合槓桿度 = Q(P-V) / [Q(P-V)-F-I] = 56,000 x ($10 - $7) / [56,000 x ($10 - $7) - $80,000 - $5,000] = 2.02"}, {"n": 2, "a": 3, "q": "下列何項為「財務槓桿度」(Degree of Financial Leverage) 的計算公式？", "o": ["稅後損益 / 銷貨淨額", "營業活動淨現金流量 / 流動負債", "營業利益 / (營業利益 - 利息費用)", "(營業收入淨額 - 變動營業成本及費用) / 營業利益"], "e": "選項(1)為稅後淨利率；選項(2)為營業淨現金流量對流動負債比率；選項(4)為營運槓桿度。"}, {"n": 3, "a": 3, "q": "金賀公司 X1 年度營業利益變動 18%，其營業槓桿度 1.6，財務槓桿度 2.8，則其每股盈餘變動多少？", "o": ["25%", "45%", "50.4%", "無法判斷"], "e": "18% x 2.8 = 50.4%"}, {"n": 4, "a": 3, "q": "桃園公司 X1 年的淨利率為 12%，權益報酬率為 18%，負債比率為 60%，稅後淨利為 $180,000。若該公司未發行特別股，請問資產週轉率為多少？", "o": ["30%", "40%", "60%", "100%"], "e": "銷貨收入淨額 = $180,000 / 12% = $1,500,000 權益 = $180,000 / 18% = $1,000,000 資產 = $1,000,000 / (1 - 60%) = $2,500,000 資產週轉率 = $1,500,000 / $2,500,000 = 60%"}, {"n": 5, "a": 2, "q": "英格蘭公司只生產並銷售一種產品，X1 年度銷量變動 6%，其營業槓桿度 5，財務槓桿度 2，則其每股盈餘變動多少？", "o": ["25%", "60%", "75%", "無法判斷"], "e": "6% x 2 x 5 = 60%"}, {"n": 6, "a": 2, "q": "牛津公司只生產並銷售一種產品，當銷貨量增加 30%，則營業利益增加 90%，X1 年銷貨額 $500,000，稅後淨利 $124,500，無利息費用亦無其他營業外的收入與費用，稅率 17%，則其變動成本及費用為何？", "o": ["$350,000", "$50,000", "$150,000", "選項(1)(2)(3)皆非"], "e": "90% / 30% = 3 營運槓桿度 = CM / EBIT = CM / ($124,500 / 0.83) = 3, CM = $450,000 $500,000 - $450,000 = $50,000"}, {"n": 7, "a": 4, "q": "如果劍橋航空公司的融資決策很成功，能適度運用財務槓桿原理，則其普通股權益報酬率應該：", "o": ["低於其毛利率", "高於其毛利率", "低於其總資產報酬率", "高於其總資產報酬率"], "e": "以融資決策獲得利潤，在相同利潤下，權益報酬率會大於總資產報酬率。"}, {"n": 8, "a": 3, "q": "某知名高科技公司因成功研發人工智慧機器人程式，每年坐收上千萬權利金，此項收入在其財務報表上應列為：", "o": ["其他損益", "銷貨收入", "其他營業收入", "非常損益"], "e": "權利金之收入並非公司自行銷售而產生，故列為其他營業收入。"}, {"n": 9, "a": 3, "q": "請問下列哪一個帳戶不會出現在保留盈餘表上？", "o": ["本期損益", "前期損益調整", "特別股發行溢價", "股利宣告"], "e": "特別股發行溢價為資本公積，不列入損益，所以不影響保留盈餘。"}, {"n": 10, "a": 3, "q": "利物浦輪船公司最近購入一艘二手汽輪，請問其相關的支出中哪一項應列為當期費用？", "o": ["購入汽輪的成本 $200,000", "在購入時雇人在輪船身上噴寫利物浦公司的專屬標誌", "汰換老舊的前艙玻璃", "置換全新的動力引擎"], "e": "選項(1)資本化列為資產汽輪之帳面金額。選項(2)資本化列為資產汽輪之帳面金額。選項(4)資本化列為資產汽輪之帳面金額。"}, {"n": 11, "a": 1, "q": "下列各項成本中哪一項應歸類為變動成本？", "o": ["繳納商品的貨物稅", "應客戶之要求先墊付的聯邦快遞運費", "工廠警衛所領的值班費", "廠房設備的折舊費用"], "e": "選項(2)代客墊付不是公司的成本。選項(3)工廠警衛的薪資為固定成本，包括加班費。選項(4)折舊費用不會隨活動增減而改變，故為固定成本。"}, {"n": 12, "a": 3, "q": "下列有關銷貨毛利的敘述何者為真？", "o": ["某公司的毛利很高但營業利益卻低於一般水準，表示該公司的進貨成本可能控制不當", "某公司的毛利率大於 1，表示獲利能力很強", "毛利率不可能大於 1", "某公司的毛利率接近淨利率，表示其銷貨成本可能控制不當"], "e": "選項(1)應表示公司在其他營業費用的控制不當。選項(2)毛利率 = 銷貨毛利 / 銷貨收入；銷貨毛利 = 銷貨收入 - 銷貨成本，所以毛利率不可能大於 1。選項(4)表示公司在費用之控制很強。"}, {"n": 13, "a": 1, "q": "某公司的稅後淨利為 60 萬元，已如銷貨毛利率為 35%，純益率為 (稅後淨利率) 15%，請問該公司的銷貨成本為多少？", "o": ["260 萬元", "280 萬元", "480 萬元", "300 萬元"], "e": "銷貨收入 = 60 萬元 / 15% = 400 萬元 銷貨成本 = 銷貨收入 - 銷貨毛利 = 400 萬元 x (1 - 35%) = 260 萬元"}, {"n": 14, "a": 3, "q": "某公司的會計人員發現去年有一筆 $50,000 文具用品費用誤記為水電費用，請問這項錯誤的更正會：", "o": ["影響本期淨利", "不影響本期淨利，但影響前期損益或保留盈餘", "不影響本期淨利，也不影響前期損益或保留盈餘", "不影響本期淨利，但影響保留盈餘"], "e": "費用之項目歸類錯誤不會影響淨利，所以更正時也不會影響損益之金額。"}, {"n": 15, "a": 3, "q": "某企業因計畫興建廠房，發行 10 年期長期公司債，發行時票面利率低於市場利率故折價發行，其帳上應如何處理？", "o": ["一次認列折價總額為利息費用", "一次認列折價總額為利息收入", "折價額應列為長期負債的減項再分期攤銷", "折價總額應列為長期負債的加項再分期攤銷"], "e": "公司債折價為公司債之評價科目，減少公司債帳面金額，逐期攤銷轉為利息費用。"}, {"n": 16, "a": 3, "q": "甲公司去年銷貨毛利額為 700 萬元，銷貨退回 50 萬元，已如其期初存貨與期末存貨皆為 110 萬元，本期進貨 300 萬元，另有銷售費用 50 萬元，管理費用 62 萬元，銷貨折扣 50 萬元，請問其銷貨毛利率是多少？", "o": ["30%", "40%", "50%", "60%"], "e": "銷貨淨額 = 700 萬元 - 50 萬元 - 50 萬元 = 600 萬元 銷貨成本 = 110 萬元 + 300 萬元 - 110 萬元 = 300 萬元 毛利率 = (600 萬元 - 300 萬元) / 600 萬元 = 50%"}, {"n": 17, "a": 3, "q": "某公司去年度淨進貨 200 萬元，進貨運費 60 萬元，期末存貨比期初存貨多出 50 萬元，該公司的銷貨毛利為銷貨的 25%，營業費用有 20 萬元，問去年度該公司的銷貨收入為多少？", "o": ["200 萬元", "262.5 萬元", "280 萬元", "300 萬元"], "e": "進貨成本 = 200 萬元 + 60 萬元 = 260 萬元 銷貨成本 = 260 萬元 - 50 萬元 = 210 萬元 銷貨收入 = 210 萬元 / (1 - 25%) = 280 萬元"}, {"n": 18, "a": 4, "q": "吉利公司採用定期盤存制，去年度盤點時存貨少記 100 萬元，假設該公司的適用稅率為 17%，這項錯誤將使：", "o": ["去年度銷貨成本減少 100 萬元", "去年度淨利虛增 100 萬元", "今年度淨利虛增 50 萬元", "去年度淨利虛減 83 萬元"], "e": "期末存貨低估使銷貨成本高估，所以毛利低估，去年度淨利虛減 100 萬元 x (1 - 17%) = 83 萬元。"}, {"n": 19, "a": 2, "q": "甲公司期初存貨為 $40,000，本期進貨為 $200,000，銷貨收入為 $200,000，若其銷貨毛利率為 20%，請問其期末存貨為多少？", "o": ["$131,500", "$80,000", "$66,500", "$178,500"], "e": "銷貨成本 = $200,000 x (1 - 20%) = $160,000 $40,000 + $200,000 - 期末存貨 = $160,000 期末存貨 = $240,000 - 160,000 = $80,000"}, {"n": 20, "a": 3, "q": "下列哪些帳戶會有借方餘額？ 甲.銷貨折扣；乙.進貨折讓；丙.進貨退出；丁.銷貨折讓；戊.商業折扣", "o": ["僅甲、乙、丙", "僅甲、丁、戊", "僅甲、丁", "僅丁"], "e": "乙、丙係減少進貨成本，為貸方餘額，戊為雙方議定折扣，即可入帳之金額，故不影響進銷貨金額。"}, {"n": 21, "a": 4, "q": "三重公司 X1 年度的銷貨金額為 $5,000,000，其他財報資料如下：應收帳款總額減少 $100,000、備抵損失增加 $10,000、提列預期信用減損損失 $8,000。請問：該公司 X1 年度向客戶收取現金為多少？", "o": ["$4,998,000", "$5,002,000", "$5,098,000", "$5,102,000"], "e": "收取現金 = 銷貨金額 $5,000,000 + 應收帳款總額減少 $100,000 + 備抵損失增加 $10,000 - 提列預期信用減損損失 $8,000 = $5,102,000"}, {"n": 22, "a": 4, "q": "松躍企業今年決定將其主要生產機器的估計使用年限增長一倍，請問此舉對松躍企業的影響是什麼？", "o": ["增加本年度的折舊費用", "不利於企業的淨值", "節省本年度的所得稅費用", "增加本年度的銷貨毛利"], "e": "增加生產機器之使用年限將減少每期攤提之折舊費用，而生產機器之折舊費用於年底將轉入銷貨成本，故銷貨成本減少，而毛利增加。"}, {"n": 23, "a": 2, "q": "雪見公司所生產的礦泉水每瓶售價 $20，其中變動成本占 80%，已知目前每年產量為 50,000 瓶，該公司剛好損益兩平，請問其固定成本約為多少？", "o": ["$80,000", "$200,000", "$240,000", "$160,000"], "e": "損益兩平點 = 固定成本 / (售價 - 變動成本) 50,000 = F / ($20 - $20 x 80%) F = 50,000 x $4 = $200,000"}, {"n": 24, "a": 2, "q": "下列有關每股帳面金額的敘述何者最正確？", "o": ["每股市價是每股帳面金額的最佳估計數", "每股帳面金額是反映企業過去的財務資訊，而每股市價主要是反映投資人對企業未來獲利的預期", "每股市價大於每股帳面金額是股價被高估的徵兆", "每股帳面金額代表當公司被另外一家公司收購時，每位股東每股可能分配到的補償"], "e": "選項(1)每股市價是投資人對公司價值的判斷，而帳面金額往往是歷史成本，不能反映公司真正價值。選項(3)不一定，可能是公司有隱含未來價值，所以投資人願以較高之市價買入股票。選項(4)為清算價值。"}, {"n": 25, "a": 3, "q": "下列哪一項不算在銷貨成本當中？", "o": ["公司生產機器設備所購買的保險", "企業生產部門廠長的年薪", "企業零售店面的折舊費用", "工廠廠房的租金"], "e": "零售店面的折舊屬銷售費用，銷貨成本包含了與生產有關的成本。"}, {"n": 26, "a": 4, "q": "某買賣業公司的銷貨毛利率由去年度的 40% 下降到今年度的 30%，下列何者是可能的原因：", "o": ["該公司的利息費用大幅增加", "該公司的營業費用控制不當", "該公司的進貨退出與折讓大幅增加", "該公司所使用的存貨評價方法改變"], "e": "選項(1)、(2)影響了淨利，但不影響銷貨項目。選項(3)進貨退出與折讓增加使銷貨成本減少而毛利增加。"}, {"n": 27, "a": 2, "q": "某百貨公司年終舉行跳樓大拍賣，不計成本，出清存貨，請問其正面效果會是：", "o": ["改善銷貨毛利率", "改善營運資金的週轉能力", "提高每股盈餘", "改善淨值報酬率"], "e": "不計成本出清存貨會使淨利減少，但現金收入可改善週轉能力。"}, {"n": 28, "a": 2, "q": "採用成本法記錄庫藏股交易的企業在公開市場上買回自己公司的股票時，會影響到下列哪一個項目？", "o": ["股本", "現金", "保留盈餘", "資本公積"], "e": "公司買回自己公司股票的成本以「庫藏股」科目列為權益之減項。"}, {"n": 29, "a": 4, "q": "下列何者不是企業發放股票股利的可能因素？", "o": ["公司有長期計劃開展需要大量現金", "每股市價較高，小額投資人無法參與投資，希望資本大眾化", "公司有償債的需求，想要先利用手中現金還清負債", "現有股東想要現金增資，但希望避免股權稀釋"], "e": "發放股票股利照原比例發放，故可避免股權稀釋，現金增資不應該是股東想要的，而是企業有投資需要。"}, {"n": 30, "a": 3, "q": "以下有關庫藏股的敘述，何者錯誤？", "o": ["庫藏股不會影響公司的核准發行股數", "庫藏股不會影響公司的已發行股數", "庫藏股不會影響公司的每股盈餘", "庫藏股不應視為公司的長期投資"], "e": "買回庫藏股時，記「庫藏股」作為權益減項，不影響股本，但減少流通在外股數，所以每股盈餘增加。"}, {"n": 31, "a": 3, "q": "以下有關庫藏股的敘述，何者正確？", "o": ["買入庫藏股有盈餘分配權", "買入庫藏股有投票權", "買入庫藏股會影響公司的總資產", "買入庫藏股有剩餘財產清算權"], "e": "買入庫藏股會減少現金，而總資產減少。"}, {"n": 32, "a": 4, "q": "甲公司 X2 年初流通在外普通股為 1,000,000 股，每股面額 $10，X2 年 4 月 1 日發放 10% 股票股利，X2 年 7 月 1 日買入庫藏股 150,000 股，每股成本 $20，X2 年 9 月 1 日出售庫藏股 60,000 股，每股售價 $22。甲公司於 X2 年 12 月 20 日宣告現金股利，每股 $1.4，該現金股利於 X3 年 1 月 30 日支付給股東。上述交易使甲公司 X2 年保留盈餘減少多少金額？", "o": ["$0", "$1,000,000", "$1,414,000", "$2,414,000"], "e": "保留盈餘減少 = $10 x 1,000,000 x 10% + (1,000,000 x 1.1 - 150,000 + 60,000) x $1.4 = $2,414,000"}, {"n": 33, "a": 1, "q": "公司買回庫藏股採成本法處理時，有關庫藏股之入帳金額，以下何者敘述正確？", "o": ["若以市價購回，則應以購入之市價入帳", "若以市價購回，則仍應以面額入帳，差額為資本公積", "若以市價購回，則仍應以面額入帳，差額為證券買賣損益", "若以市價購回，購買價格與面額的差價應認列其他收入"], "e": "採成本法時，以購入之成本入帳。"}, {"n": 34, "a": 1, "q": "某企業採用定期盤存制，若在 X1 年的期末存貨被高估 $8,000，該公司當年度所適用的稅率為 17%，請問其對該公司當年度的銷貨毛利影響為何？", "o": ["毛利被高估 $8,000", "毛利被低估 $8,000", "毛利被高估 $9,700", "毛利被低估 $9,700"], "e": "期末存貨高估，則銷貨成本低估，毛利虛增 $8,000 (不須考慮稅率)。"}, {"n": 35, "a": 2, "q": "當我們去超市買牛奶的時候，許多人總是習慣拿放置在冷凍櫃較後面的牛奶，而不願拿取置於前列的牛奶，這是因為我們會假設超市的存貨管理方式為：", "o": ["移動平均法", "先進先出法", "個別認定法", "加權平均法"], "e": "若超市採先進先出法，則放在前列的是較早進貨的，而放後面的時晚進貨的，較新鮮。"}, {"n": 36, "a": 2, "q": "某家俱公司以 $25,000 賣出成本 $24,000 的沙發一組，買主立即付現，請問此交易對公司的影響為何？", "o": ["銷貨收入增加，毛利對銷貨的比率提高", "銷貨毛利增加，存貨減少", "資產增加，負債增加", "營業外收入增加，營業利潤不變"], "e": "沙發為家俱公司之存貨，此項交易公司獲得毛利 $25,000 - $24,000 = $1,000 而存貨 $24,000 轉為銷貨成本。"}, {"n": 37, "a": 1, "q": "武陵公司的營運槓桿程度為 2.8 倍，財務槓桿程度為 1.5 倍，則公司總槓桿程度約為：", "o": ["4.2", "3.3", "3.5", "3.0"], "e": "總槓桿程度 = 2.8 x 1.5 = 4.2"}, {"n": 38, "a": 4, "q": "麗芙洗面乳每盒售價 $60，該公司沒有生產其他產品，去年度總固定成本為 $360,000，單位變動成本為售價的 40%，請問該公司的損益兩平點為何？", "o": ["900,000 盒", "1,500,000 盒", "7,500 盒", "10,000 盒"], "e": "損益兩平點之銷售量 = 固定成本 / [單位售價 x (1 - 單位變動成本率)] = $360,000 / [$60 x (1 - 40%)] = 10,000 (盒)"}, {"n": 39, "a": 4, "q": "製造業公司發行 10 年期公司債所產生的利息費用在財務報表上應列為哪個項目之下？", "o": ["銷售費用", "管理費用", "長期負債", "營業外費用"], "e": "利息費用不是產、銷、管、研部門費用，列為營業外費用。"}, {"n": 40, "a": 3, "q": "下列敘述何者正確？", "o": ["保留盈餘帳戶中的金額，即當年度損益表上之淨利結轉數", "公司處分設備的損益應以稅後淨額列於損益表的繼續營業單位損益之下", "前期損益調整會使保留盈餘產生增減變動", "企業每年度至少要發放某種股利一次，虧損的公司才會發放股票股利"], "e": "選項(1)為歷年淨利累積扣除分配給股東之淨額。選項(2)處分設備損益應列於損益表中的營業外收支項下，包含於繼續營業單位稅前損益中。選項(4)是否發放股利要由股東會決議。"}, {"n": 41, "a": 4, "q": "下列敘述何者錯誤？", "o": ["銷售商品通常於客戶取得該商品的控制時認列收入", "企業如於整個履約期間平均花費努力或投入，應按直線基礎逐步認列收入", "以迄今已生產數量占總數量的比例認列相同比例的收入屬於產出法", "以完工比例法認列收入屬於按直線基礎逐步認列收入"], "e": "選項(4)錯誤，以完工比例法 (以迄今已發生成本占總成本的比例認列相同比例的收入) 屬於投入法，各期認列的收入取決於已發生成本多寡，並非直線基礎。"}, {"n": 42, "a": 3, "q": "企業提列應收帳款預期信用損失應歸類於：", "o": ["停業單位損益", "營業收入", "營業費用", "非常損益"], "e": "應收帳款之預期信用損失乃營業活動所產生，所以是營業費用。"}, {"n": 43, "a": 2, "q": "因市政府要徵收企業自用的土地興建公共停車場，某企業出售土地給市政府所得之利益歸於財務報表上的哪一個項目下？", "o": ["停業單位損益", "營業外損益", "營業毛利", "選項(1)(2)(3)皆非"], "e": "土地徵收利益非主要營業活動而產生，應歸於營業外損益。"}, {"n": 44, "a": 1, "q": "下列哪一項列在銷管費用當中？", "o": ["總公司餐廳對員工用餐的貼補", "支付股利", "銷貨被退回", "進貨時廠商所負擔的運費"], "e": "選項(2)為營業外費用。選項(3)銷貨之減少，不計入費用。選項(4)為存貨成本。"}, {"n": 45, "a": 3, "q": "某企業的營業利益率為產業之冠，而淨利卻敬陪末座，可能的原因為何？", "o": ["該企業所生產的產品附加價值太低", "該企業為了開發高利潤產品，發生大筆研究發展費用", "該企業依賴鉅額借款擴充設備", "因為經濟不景氣，該公司有嚴重滯銷"], "e": "營業利益率高但淨利卻低代表公司有大量營業外費用，長期負債之利息費用即是。"}, {"n": 46, "a": 4, "q": "請由以下通宵企業的財務資料，計算出該企業普通股的每股權益帳面金額：總資產 $250,000、淨值 $170,000、普通股股本 $50,000 (5,000 股)、特別股股本 $10,000 (1,000 股)", "o": ["$34", "$30", "$24", "$32"], "e": "普通股的每股帳面金額要先將權益中屬特別股部分扣除，($170,000 - $10,000) / 5,000 股 = $32"}, {"n": 47, "a": 4, "q": "因為新臺幣大幅貶值，奇奇皮鞋進口的高級女鞋每雙成本增加 200 元，故皮鞋被迫每雙售價也提高 200 元，在該鞋店的固定成本不變的情況下，請問此舉會造成該店的：", "o": ["邊際貢獻金額增加", "邊際貢獻金額減少", "邊際貢獻比率不變", "損益兩平的皮鞋銷售件數不變"], "e": "售價隨變動成本等量提高，故邊際貢獻金額不變，而邊際貢獻率降低，損益平衡數量不變，但損益平衡銷貨額提高。"}, {"n": 48, "a": 2, "q": "在產品售價不變的情況下，若生產某產品的總固定成本與單位變動成本都下降，對其邊際貢獻率與損益兩平銷貨收入有何影響？", "o": ["邊際貢獻率下降，損益兩平點上升", "邊際貢獻率上升，損益兩平點下降", "邊際貢獻率下降，損益兩平點下降", "邊際貢獻率不變，損益兩平點上升"], "e": "售價與變動成本等量減少時，邊際貢獻金額不變，但邊際貢獻率提高，損益平衡數量不變，損益平衡銷貨額則是減少。若商品售價不變，生產之總固定成本與單位變動成本都下降，則邊際貢獻率上升，損益兩平點下降。"}, {"n": 49, "a": 1, "q": "下列何種情況下，邊際貢獻率一定會上升？", "o": ["變動成本占銷貨淨額百分比下降", "損益兩平銷貨單位數量降低", "固定成本占變動成本的百分比下降", "損益兩平銷貨收入上升"], "e": "影響邊際貢獻率主要為變動成本，變動成本下降則邊際貢獻率提高。"}, {"n": 50, "a": 4, "q": "一個產品多樣化的廠商要計算營業額的損益兩平點，必須作哪些假設？ 甲.產品售價不變；乙.每單位產品變動成本不變；丙.產品組合比率不變", "o": ["僅甲及乙", "僅甲及丙", "僅乙及丙", "甲、乙、丙"], "e": "若不假設甲、乙、丙要素不變，則計算之損益兩平點將會失去意義，售價改變則損益兩平銷貨額已達成，但數量卻未達。"}, {"n": 51, "a": 3, "q": "要求出損益兩平的銷售金額，我們需要知道總固定成本與：", "o": ["每單位變動成本", "每單位售價", "每單位變動成本佔售價比率", "每單位售價減去平均每單位固定成本"], "e": "要求得損益兩平銷售金額，以固定成本 / 邊際貢獻率即可，而邊際貢獻率就是售價減變動成本後占售價之比率。"}, {"n": 52, "a": 1, "q": "其他情況不變時，下列哪一種情況會提高損益兩平點？", "o": ["固定成本上升", "變動成本佔銷貨的比率下降", "邊際貢獻率上升", "售價上升"], "e": "使損益兩平點提高有二法，提高固定成本或降低邊際貢獻金額，降低邊際貢獻金額則因售價降低或變動成本提高。"}, {"n": 53, "a": 3, "q": "下列哪一個項目會影響到損益兩平點？ 甲.總固定成本；乙.每單位售價；丙.每單位變動成本", "o": ["僅甲及乙", "僅甲及丙", "甲、乙、丙", "僅乙及丙"], "e": "損益兩平點 = 總固定成本 / (每單位售價 - 每單位變動成本)"}, {"n": 54, "a": 4, "q": "久久公司 X1 年度的營業收入為 $2,000,000，營業利益為 $400,000，變動營業成本及費用 $600,000，則 X1 年度其營運槓桿度為：", "o": ["1.8", "2.0", "2.5", "3.5"], "e": "營運槓桿度 = ($2,000,000 - $600,000) / $400,000 = 3.5"}, {"n": 55, "a": 3, "q": "母公司編製合併報表時，其國外子公司 (100% 股權均為母公司所有) 之資產負債表及綜合損益表科目因採用不同匯率換算而產生的項目稱為：", "o": ["未實現兌換損益", "已實現兌換損益", "累積換算調整數", "匯率變動或有損失"], "e": "國外子公司報表若採外國貨幣記帳，轉換為母公司貨幣時產生差異稱「累積換算調整數」。"}, {"n": 56, "a": 4, "q": "臺灣上市公司資產負債表的權益部分，如果有「累積換算調整數」科目，則表示：", "o": ["該公司與客戶或供應商間的交易是以外幣計價", "該公司股東匯入資本有部分是以外幣匯入", "該公司股票有在海外市場發行", "該公司擁有海外子公司，且該子公司資料包括於合併報表中"], "e": "國外子公司報表若採外國貨幣記帳，轉換為母公司貨幣時產生差異稱「累積換算調整數」。"}, {"n": 57, "a": 2, "q": "企業提前清償公司債所造成的損益，在綜合損益表中的報導方式為：", "o": ["列為營業費用的調整項目，因為這是營業活動之一", "列為營業外損益，因為這不是主要營業項目", "列為營業淨利的調整項目，因為會計原則的規定如此", "因為其性質特殊且不常發生，應以稅後淨額表達，列於停業單位損益之下"], "e": "到期前收回公司債已成為許多企業風險管理策略之一，通常將因此而產生之損益列為營業外損益。"}, {"n": 58, "a": 2, "q": "下列何種成本或費用項目通常不易因銷貨環境之變動而有彈性之變化？", "o": ["銷貨成本", "管理費用", "銷貨費用", "變動成本"], "e": "管理部門如人事、會計等之支出，不易因銷貨環境改變而改變，故為期間成本。"}, {"n": 59, "a": 4, "q": "會計政策變動追溯適用影響數應列於：", "o": ["資本公積", "前期損益調整", "營業外收支", "期初保留盈餘"], "e": "會計政策變動依 IAS8 之規定，原則上應追溯重編以前年度財務報表，並以會計政策變動之追溯適用影響數調整變動期之期初保留盈餘。"}, {"n": 60, "a": 3, "q": "設甲產品之單位售價由 $1 調為 $1.3，固定成本由 $400,000 增至 $700,000，變動成本仍為 $0.6，則損益兩平數量會有何影響？", "o": ["增加", "下降", "不變", "不一定"], "e": "原損益兩平點 = $400,000 / ($1 - $0.6) = 1,000,000 新損益兩平點 = $700,000 / ($1.3 - $0.6) = 1,000,000 -> 不變"}, {"n": 61, "a": 3, "q": "假設其他一切不變，下列財務比率何者通常愈高愈佳？", "o": ["負債比率", "固定成本比率", "邊際貢獻率", "應收帳款週轉天數"], "e": "選項(1)負債比率高則企業償債壓力大。選項(2)固定成本較難降低，故不宜太高。選項(4)比率高代表公司之收帳能力略差。"}, {"n": 62, "a": 3, "q": "安全邊際係指：", "o": ["銷貨收入 - 變動成本", "銷貨收入 - 固定成本", "銷貨收入 - 損益兩平銷貨收入", "銷貨收入 - 銷貨成本"], "e": "安全邊際 = 銷貨收入 (或單位) - 損益兩平銷貨收入 (或單位)"}, {"n": 63, "a": 3, "q": "已知損益兩平點時之銷貨為 $600,000，邊際貢獻為 $300,000，則銷貨收入 $900,000 時之營業槓桿度為：", "o": ["8", "6", "3", "2"], "e": "營業槓桿度 = 邊際貢獻金額 / 稅前息前盈餘 邊際貢獻率 = $300,000 / $600,000 = 0.5 固定成本 = $600,000 x 0.5 = $300,000 稅前息前盈餘 = $900,000 x 0.5 - $300,000 = $150,000 營業槓桿度 = $900,000 x 0.5 / $150,000 = 3"}, {"n": 64, "a": 4, "q": "市場預期下一年度波士頓公司每股稅後盈餘為 10 元，計畫以 40% 之股利支付率發放現金股利，預期未來公司盈餘與股利每年成長率為 13%，直到永遠，市場對該公司所要求的報酬率是 25%，該公司股票的合理價值應最接近：", "o": ["22.5 元", "20 元", "40 元", "33.3 元"], "e": "股價 = 下一期股利 / (預期報酬率 - 股利成長率) = $10 x 40% / (25% - 13%) = $33.3"}, {"n": 65, "a": 4, "q": "發放股票股利，將使：", "o": ["流動比率上升", "投資活動的現金流入量增加", "淨值報酬率下降", "流動在外股數增加"], "e": "股票股利發放時，流通在外股數增加，資產及負債皆無變動，權益總數也不變。"}, {"n": 66, "a": 3, "q": "甲公司採用權益法對乙公司進行投資，甲公司持有乙公司 30% 的股份。乙公司 X1 年淨利為 $500,000，宣告並發放現金股利 $200,000。則甲公司應認列多少投資收益？", "o": ["$60,000", "$90,000", "$150,000", "$200,000"], "e": "投資收益 = 公司淨利 x 持股比例 = $500,000 x 30% = $150,000"}, {"n": 67, "a": 4, "q": "請問下列何者敘述為真？", "o": ["企業毛利率愈大，表示銷貨成本率愈大", "企業獲利率愈佳，表示財務狀況愈佳", "企業自有資金比率愈低，則短期流動性愈差", "企業若發生銷貨損失，則必無法獲得正的營業利益"], "e": "選項(1)銷貨成本率 = 1 - 毛利率，故兩者呈反向變動。選項(2)財務狀況須考慮其他負債之影響。選項(3)自有資金通常指權益部分，與短期流動性無直接相關。"}, {"n": 68, "a": 1, "q": "華盛頓公司的純益率下降，資產報酬率仍上升，最可能原因是：", "o": ["其總資產週轉率上升", "其毛利率上升", "其負債比率上升", "不可能會發生"], "e": "總資產週轉率上升代表資產利用的次數增加，所以即使純益率下降，總資產報酬率仍會上升。"}, {"n": 69, "a": 4, "q": "下列敘述何者為真？", "o": ["站在投資人的立場，企業的流動比率應愈高愈好", "企業的毛利率愈高時，表示其營業費用率愈低", "企業的存貨愈多，表示短期償債能力愈好", "銷貨成本率為 1 時，表示廠商幾乎無毛利"], "e": "選項(1)流動比率代表償債能力，對投資人較無意義。選項(2)毛利率高代表銷貨成本低。選項(3)存貨多反而有存貨跌價壓力，而且不見得能馬上變現，對短期償債能力不見得好。"}, {"n": 70, "a": 3, "q": "某公司銷貨比去年增加，但毛利率卻下降，表示：", "o": ["資金週轉率下降", "營業費用過高", "銷貨成本增加過高", "企業可能遭受天然災害"], "e": "毛利率下降代表銷貨成本占營業收入比重增加。"}, {"n": 71, "a": 1, "q": "下列何者分錄與保留盈餘有關？", "o": ["宣告發放現金股利", "實際發放現金股利", "宣告作股票分割", "實際作股票分割"], "e": "股利宣告日時保留盈餘就會減少。"}, {"n": 72, "a": 3, "q": "里蘭企業在 X1 年的全年營業額為 40 億元，到 X3 年度營業額已高達 80 億元，請問：", "o": ["兩年總成長率為 200%", "兩年間，平均每年成長 150%", "兩年間，平均每年成長 41%", "兩年間，平均每年成長 100%"], "e": "sqrt(80億元 / 40億元) = 1.41，所以平均成長率 = 1.41 - 1 = 41%"}, {"n": 73, "a": 3, "q": "以下何者不是公司購入庫藏股票的目的？", "o": ["宣示現行每股市價低於每股應有真實價值水準", "避免被購併", "加強對子公司的控制權", "準備當公司實施員工入股分紅計畫時再發出"], "e": "庫藏股是公司買進自己的股票，和子公司的控制權無關。"}, {"n": 74, "a": 4, "q": "本年度銷貨收入 $1,005,000，銷貨退回 $5,000，銷貨成本 $600,000，銷貨毛利率為：", "o": ["19.9%", "35.0%", "30.0%", "40.0%"], "e": "淨銷貨 = $1,005,000 - $5,000 = $1,000,000 銷貨毛利率 = ($1,000,000 - $600,000) / $1,000,000 = 40%"}, {"n": 75, "a": 2, "q": "企業因舉債過多而無法支付應還本息的固定支出，因此所發生經營困難之風險，稱為：", "o": ["商業風險", "財務槓桿風險", "營業槓桿風險", "選項(1)(2)(3)皆是"], "e": "企業利用舉債經營獲利為財務槓桿的運用，但若舉債過多而致經營困難倒閉稱為財務槓桿風險。"}, {"n": 76, "a": 2, "q": "採用損益兩平 (Breakeven) 分析時，所隱含的假設之一是在攸關區間內：", "o": ["總成本保持不變", "單位變動成本不變", "單位固定成本不變", "變動成本和生產單位數間並非直線的關係"], "e": "單位變動成本影響損益兩平點之計算，若單位變動成本變動，即難以計算損益兩平點。"}, {"n": 77, "a": 1, "q": "霍普金斯證券公司處分交易目的持有的 10,000 張臺灣水泥股票，獲利 2 億 3,000 萬元，應記入：", "o": ["營業利益", "其他綜合利益", "公司內部移轉", "營業外收入"], "e": "霍普金斯證券公司以買賣證券為專業，處分證券獲利屬營業利益。"}, {"n": 78, "a": 2, "q": "華豐電子為非金融業之科技公司，其利息收入應列為：", "o": ["營業收入", "營業外收入", "特殊損益", "選項(1)(2)(3)皆可"], "e": "除了金融業之外，利息收入皆為營業外收入。"}, {"n": 79, "a": 2, "q": "表示企業某一特定期間之經營成果的報表是：", "o": ["公開說明書", "綜合損益表", "委託書", "權益變動表"], "e": "選項(1)公開說明書為發行人於公開發行有價證券時編製。選項(3)委託書為出席股東會時的委託投票權的代理書。選項(4)表示期間內權益的變動狀況。"}, {"n": 80, "a": 2, "q": "保羅公司的「本期損益」帳戶在結帳時會結轉到其權益帳戶中的：", "o": ["普通股本", "保留盈餘", "資本公積", "特別股本"], "e": "「本期損益」應在期末時轉入保留盈餘。"}, {"n": 81, "a": 3, "q": "下列各項中哪一項將使未指撥保留盈餘增加？", "o": ["本期淨損", "宣告現金股利", "發現前期淨利低估", "宣告股票股利"], "e": "前期淨利低估應作前期損益調整，增加期初保留盈餘。"}, {"n": 82, "a": 4, "q": "查理公司上季季報指出其指撥特定用途保留盈餘為 2 億元，未指定用途保留盈餘是 1 億元：", "o": ["其現金餘額至少為 1 億元", "其可發放現金股利至少為 1 億元", "其可發放現金股利至少為 3 億元", "選項(1)(2)(3)皆非"], "e": "保留盈餘之指撥與現金之限制用途不同，且不相關。"}, {"n": 83, "a": 4, "q": "X1 年 12 月 31 日禹英公司的備抵損失為借方餘額 $10,000。X2 年 12 月 31 日的備抵損失應為貸方餘額 $13,000，X2 年禹英公司認列多少預期信用損失？", "o": ["$3,000", "$13,000", "$10,000", "$23,000"], "e": "X2 年年底備抵損失餘額為貸方 $13,000，期初已有 $10,000 之借方餘額，故 X2 年須認列的預期信用損失為 $13,000 + $10,000 = $23,000。公司帳上分錄為：借：預期信用損失 $23,000，貸：備抵損失 $23,000。"}, {"n": 84, "a": 3, "q": "莎拉公司除了一筆 1 億美元的海外公司債，其他資產負債都是以新臺幣為收付標的，其功能性貨幣也是新臺幣，如果某年度新臺幣 (對美元) 升值，則莎拉公司會有：", "o": ["利息收入增加", "利息費用減少", "匯兌利得", "匯兌損失"], "e": "公司有外幣淨負債，當臺幣升值時，該外幣負債相對減少，公司產生匯兌利得。"}, {"n": 85, "a": 3, "q": "泰偉公司在 1997 年因泰銖貶值發生未實現匯兌利得 (Unrealized Foreign Exchange Gains) 5,000 萬元，其影響為：", "o": ["銷貨毛利會增加", "營業費用會減少", "營業外收入會增加", "選項(1)(2)(3)皆非"], "e": "匯兌利益為營業外收益。"}, {"n": 86, "a": 1, "q": "資金不足，但企業仍能繼續經營的原因是：", "o": ["企業信用良好，融資管道暢通", "企業獲利能力佳，未來現金流入穩當", "營運週轉速度快", "應收帳款週轉率高"], "e": "營運資金 = 流動資產 - 流動負債，當企業之營運資金不足時，卻還能正常運作，代表公司之信用良好，不必將流動資產拿去償還負債，所以能正常運作。"}, {"n": 87, "a": 4, "q": "在企業面臨清算時，財產求償權優先者為何？", "o": ["存託憑證 (DR) 持有人", "特別股股東", "普通股股東", "債權人"], "e": "求償之順序為：債權人 -> 特別股股東 -> 普通股股東。選項(1)存託憑證為海外發行之普通股，權利等同普通股。"}, {"n": 88, "a": 2, "q": "下列何者正確？", "o": ["假使銷售附退貨權，企業估計所銷售之 100 個商品中有 3 個商品會被退回，企業應於交付商品時認列 100 個商品的收入，再額外認列 3 個商品的退貨權負債", "支付應付帳款會減少負債對權益比率", "認列應收帳款的預期信用損失不影響流動比率", "賒購存貨會增加流動比率"], "e": "選項(1)交付商品時應認列 97 個商品的收入及 3 個商品的退貨權負債，待退貨權逾期時始將負債轉列收入。選項(3)認列應收帳款的預期信用損失使備抵損失餘額增加，應收帳款淨額減少，流動比率下降。選項(4)賒購存貨時，流動資產和流動負債同時增加，流動比率不一定增加或降低。"}, {"n": 89, "a": 4, "q": "公司購入庫藏股，對其每股盈餘與權益有何影響？", "o": ["兩者皆增加", "兩者皆減少", "沒有影響", "前者增加，後者減少"], "e": "購入之庫藏股列為權益之減項，而流通在外股數減少也使每股盈餘增加。"}, {"n": 90, "a": 3, "q": "我國現行實務上，在處理幣值變動分析時，依法令規定選用之方法為：", "o": ["躉售物價指數法", "重置變動成本法", "不動產、廠房及設備重估價法", "現值會計法"], "e": "公司可依法 (商業會計法、所得稅法) 辦理不動產、廠房及設備重估價，土地按照公告現值，其他設備資產則按照物價指數重估。"}, {"n": 91, "a": 2, "q": "企業買回流通在外股票，如果未再賣出，而買價高於報導期間結束時該股票市場價格，下列何者之帳面金額會下降？", "o": ["當期稅後淨利", "權益", "庫藏股帳面金額", "資本公積"], "e": "買回庫藏股以成本列為權益之減項。"}, {"n": 92, "a": 3, "q": "企業買回流通在外股票並再發行，如果買回價高於再發行價，下列何者帳面金額會下降？", "o": ["當期稅後淨利", "庫藏股每股帳面金額", "權益", "普通股發行溢價"], "e": "買回時以成本列為權益減項；若賣出價小於買回價，則權益會減少。"}, {"n": 93, "a": 2, "q": "權益報酬率最高的企業，不一定是值得投資的企業。在下列何項比率較高時，此比率對投資人的指標作用會變得很不明確？", "o": ["變動成本佔總成本比重", "研究發展費用佔銷貨收入比重", "流動資產佔總資產比重", "銷貨成本佔總成本比重"], "e": "研究發展費用對未來之效益難以明確衡量，故其指標作用不明確。"}, {"n": 94, "a": 3, "q": "以下哪個部門的成本，最不可能被計入麥特電腦的營業成本項下？", "o": ["封裝作業部", "主機板測試作業組", "職工福利委員會", "機器加工作業組"], "e": "麥特電腦之營業成本應與電腦相關，故職工福利委員會之成本應列為管理費用。"}, {"n": 95, "a": 2, "q": "旺旺證券提升其資本適足率，以下哪一項措施對達成此目的沒有幫助？", "o": ["現金增資", "積極取得銀行貸款承諾 (Loan Commitment)", "將原先計劃發放的 3 元現金股利，改為發放股票股利", "賣出不動產、廠房及設備，承認頗為可觀的處分不動產、廠房及設備利得"], "e": "資本適足率用來觀察企業是否有適量之自有資金，當負債增加時會減少資本適足率。"}, {"n": 96, "a": 3, "q": "以下哪一個行業，最有其可能在其財務報表中看不到銷貨成本項目？", "o": ["百貨業", "電子業", "仲介業", "陶瓷業"], "e": "因仲介業不須進貨，主要業務是當中間介紹人並收取費用，故無銷貨成本。"}, {"n": 97, "a": 3, "q": "甲公司持有一項按公允價值衡量且其變動計入其他綜合損益的股權投資，該投資的初始成本為 $500,000。X2 年底公允價值為 $550,000，X3 年底公允價值為 $520,000。請問在 X3 年應認列多少其他綜合損益？", "o": ["$20,000", "-$20,000", "-$30,000", "-$50,000"], "e": "X3 年其他綜合 (損) 益 = X3 年底公允價值 - X2 年底公允價值 = $520,000 - $550,000 = $(30,000)"}, {"n": 98, "a": 2, "q": "欲自威爾斯企業財務報表資訊判斷其負債的資金成本，以下哪一項數據是最合適的指標？", "o": ["期末應付利息 / 總負債", "利息費用 / 總負債", "(期末應付利息 - 期初應付利息) / 總負債", "[利息費用 + (期末應付利息 - 期初應付利息) + 進貨折扣] / 總負債"], "e": "資金成本即企業取得資金所需負擔的成本，以負債而言則是利息，以股票而言則是股利，故以 (當期利息費用 / 總負債) 可判斷資金成本。"}, {"n": 99, "a": 2, "q": "甲公司 X1 年 1 月 1 日購入乙公司 30% 普通股股權，該年底投資帳戶餘額為 $250,000，若乙公司 X1 年度淨利為 $150,000，支付股利 $60,000，假設投資成本與取得股權淨值無差異，請問甲公司投資金額為：", "o": ["$205,000", "$223,000", "$250,000", "$268,000"], "e": "投資金額 + ($150,000 - $60,000) x 30% = $250,000，投資金額 = $223,000"}, {"n": 100, "a": 2, "q": "大洋企業本年度銷貨成本是 26 億元，營業費用是 14 億元，屬固定性質之成本總額是 21 億元，營業利益、營業外收入費用、所得稅與淨利都是 0，則以下哪一個數字會最接近其變動成本總額？", "o": ["34 億元", "19 億元", "18 億元", "4 億元"], "e": "營業成本加減除固定成本部分即變動成本。 26 億元 + 14 億元 - 21 億元 = 19 億元"}, {"n": 101, "a": 4, "q": "太平洋電腦財務報表的營業費用包含銷售費用與一般管理費用兩大項，以下哪一個部門的費用最不可能被列在營業費用項下？", "o": ["會計室", "經濟研究組", "資金調度課", "機器設定組"], "e": "營業費用包含與銷貨及一般營業相關之費用，機器設定組屬於生產部門，所以最不可能包含在內。"}, {"n": 102, "a": 2, "q": "新隆工業財務報表的營業費用包含銷售費用與一般管理費用兩大項，以下哪一個部門的費用最有可能被列在一般管理費用項下？", "o": ["打光工程組", "出納科", "工程品管課", "工業工程課"], "e": "一般管理費用是屬於公司總管理處人事、財會部門所產生的費用，故出納科屬之。"}, {"n": 103, "a": 1, "q": "紐澤西食品財務報表的營業費用包含銷售費用與一般管理費用兩大項，以下哪一個部門的費用最有可能被列在銷售費用項下？", "o": ["媒體廣告課", "股務室", "總務課", "法務室"], "e": "銷售費用包含了與銷售產品相關的費用，本題中以廣告課和銷售最接近。"}, {"n": 104, "a": 2, "q": "以下幾項魯班建設公司的會計處理實務中，哪一項最有可能違反一般公認會計原則？", "o": ["魯班將其租賃收入，列入其營業收入", "魯班將其利息收入，列入其營業收入", "魯班將其違約金金收入，列入其營業外收入", "魯班將其營建成本，列入營業成本"], "e": "選項(1)租賃也可能是建設公司的營業項目之一。選項(2)除金融相關行業外，利息收入不得列為營業收入。選項(3)(4)皆符合會計原則。"}, {"n": 105, "a": 3, "q": "海洋企業的營業利益遠低於其銷貨毛利，其可能的原因應該不包括以下哪一項？", "o": ["本期海洋企業總管理處的折舊費用頗為可觀", "海洋企業的銷貨運費頗為可觀", "本期海洋企業所受訂單多屬多樣少量性質，生產線上的設定成本過高", "海洋企業的研究發展費用頗為可觀"], "e": "生產線成本是影響了銷貨毛利。"}, {"n": 106, "a": 3, "q": "四海企業刻意多提列生產部門機器設備的折舊費用，其影響是：", "o": ["總資產增加", "營業活動所造成現金流量減少", "毛利率降低", "營運資金減少"], "e": "生產部門之費用在期末皆轉為銷貨成本，故使毛利率降低。"}, {"n": 107, "a": 3, "q": "以下哪一項項目，其金額永遠不會是負數？", "o": ["淨值", "淨利", "營業收入", "保留盈餘"], "e": "選項(1)當負債大於資產時，淨值為負。選項(2)當費用大於收入，淨利為負。選項(3)營業收入最低是 0，不會是負的。選項(4)當營業虧損超過累積盈餘時，就會產生累積虧損。"}, {"n": 108, "a": 2, "q": "衛勤企業認列出售不動產、廠房及設備損失，此顯示其不動產、廠房及設備售價是：", "o": ["低於買進成本", "低於帳面金額", "低於累計折舊", "低於合理市值"], "e": "出售不動產、廠房及設備損益的衡量是以售價減不動產、廠房及設備帳面金額。"}, {"n": 109, "a": 2, "q": "以下何者會影響銷貨毛利？", "o": ["發放股票股利", "認列銷貨折扣", "認列應收帳款的預期信用損失", "認列不動產處分利益"], "e": "預期信用損失是銷售費用，所以不會影響銷貨毛利。不動產處分利益屬於業外支出，不影響銷貨毛利。"}, {"n": 110, "a": 2, "q": "以下哪一個會計科目，不應在綜合損益表銷售費用項中出現？", "o": ["銷售佣金", "銷貨折扣", "折舊費用", "廣告費用"], "e": "銷貨折扣應列為「銷貨收入」的減項，而非費用。"}, {"n": 111, "a": 4, "q": "在蘇澳公司的損益表中，處分企業停業單位所發生之損失是列於：", "o": ["繼續營業單位稅前淨利之後，繼續營業單位淨利之前", "繼續營業單位稅前淨利之前", "本期損益之後，每股盈餘之前", "繼續營業單位淨利之後，本期損益之前"], "e": "在損益表上，處分企業停業單位所發生之損失，應以稅後淨額列示在繼續營業單位淨利之後，本期損益之前。"}, {"n": 112, "a": 2, "q": "甲公司在 X1 年初以 $600,000 購入一棟投資物業，採用公允價值模式進行後續計量。X3 年底公允價值為 $650,000，X4 年底公允價值降至 $620,000。該公司應在 X4 年財務報表中認列的損益為多少？", "o": ["$0", "$30,000 損失", "$30,000 收益", "$50,000 損失"], "e": "X4 年公允價值變動 = $620,000 - $650,000 = $(30,000) 認列在當期損益中的損失為 $30,000"}, {"n": 113, "a": 1, "q": "採用權責基礎記帳，期末應將當期應負擔之費用由下列何者轉為費用：", "o": ["資產", "負債", "權益", "收入"], "e": "採用權責基礎記帳，期末應將資產已耗用，或已產生經濟效益之資產轉為費用。"}, {"n": 114, "a": 3, "q": "下列綜合損益表之主要組成項目，其正常順序為何？ 甲.每股盈餘；乙.繼續營業單位損益；丙.停業單位損益", "o": ["甲-乙-丙", "丙-乙-甲", "乙-丙-甲", "乙-甲-丙"], "e": "綜合損益表主要項目列示正常順序如下： 1. 繼續營業單位損益 -> 乙 2. 停業單位損益 -> 丙 3. 每股盈餘 -> 甲"}, {"n": 115, "a": 4, "q": "綜合損益表之營業外 (或其他) 收入與損失不包括下列何項目？", "o": ["利息費用", "出售不動產、廠房及設備利益", "股利收入", "銷售費用"], "e": "因為推銷費用屬於營業費用。"}, {"n": 116, "a": 2, "q": "佳山公司擁有一超級市場，最近因應營業需要，將此超級市場的舊有房屋結構拆除，並在原地蓋一新的超級市場建築，則佳山公司應將此舊有房屋結構帳面金額作何處理？", "o": ["以其他損失處理", "以舊屋之處分損益處理", "納入土地成本", "納入新的超級市場之建築成本"], "e": "應將舊建築物之帳面金額 (=建築物之成本 - 建築物之累計折舊) 作為舊屋之處分損益來處理。"}, {"n": 117, "a": 4, "q": "下列何種事項不會造成保留盈餘減少？", "o": ["前期折舊費用低估之錯誤更正", "本期淨損", "宣告分配股票股利", "公司分配清算股利"], "e": "保留盈餘 (減少) A. 本期淨損 B. 前期損益調整 (分錄借記者) C. 支付股利 (不包括清算股利之支付) D. 庫藏股交易造成淨資產減少 保留盈餘 (增加) A. 本期淨利 B. 前期損益調整 (分錄貸記者) C. 公司重整 (準改組) 之調整 (分錄貸記者) 因為清算股利之宣告支付，係借記「資本公積 (或股本)」，貸記「現金科目」，故答案為選項(4)。"}, {"n": 118, "a": 3, "q": "下列敘述，何者正確？", "o": ["公司債發行成本應列於營業費用", "企業有商譽，係指企業過去有超額利潤", "無形資產之攤銷，一般採直線法", "因專利權與人訴訟，如為勝訴，訴訟費應資本化"], "e": "選項(1)錯誤，公司債發行成本，應作為發行公司債所得價款之減少，公司應就發行所得價款之淨額，決定公司債之有效利率。選項(2)錯誤，企業有商譽是指公司有獲取超額利潤的能力。選項(4)錯誤，因專利權與人訴訟，無論是否勝訴，該支出通常無法增加未來經濟效益，故應列為費用。"}, {"n": 119, "a": 1, "q": "企業自建廠房於建造期間之資本化利息支出，在現金流量表中應如何分類？", "o": ["僅能分類為投資活動", "僅能分類為籌資活動", "可依會計政策分類為營業活動或籌資活動", "可依會計政策分類為營業活動或投資活動"], "e": "依 IAS7 第 16 段之規定，取得不動產、廠房及設備、無形資產及其他長期資產所支付之現金，包括資本化之開發成本及自建不動產、廠房及設備相關之支出係投資活動之現金流量。"}, {"n": 120, "a": 2, "q": "楊梅公司去年底財務報表上列有營業利益 7,400 萬元，營業費用 2,000 萬元，營業外收入 300 萬元，營業外費用 1,500 萬元，遞延所得稅 1,800 萬元，則其稅前純益為：", "o": ["6,100 萬元", "6,200 萬元", "1,300 萬元", "3,300 萬元"], "e": "稅前純益不考慮稅，所以 7,400 萬元 + 300 萬元 - 1,500 萬元 = 6,200 萬元。"}, {"n": 121, "a": 3, "q": "將一項營業收入誤列為利息收入，將使當期淨利：", "o": ["虛增", "虛減", "不變", "選項(1)(2)(3)皆非"], "e": "將營業收入誤認列為利息收入會使營業利益虛減，但淨利不變。"}, {"n": 122, "a": 1, "q": "下列何項不影響本期淨利率之計算？", "o": ["以前年度損益錯誤之更正", "匯兌損失", "利息支出", "停業單位損益"], "e": "前期損益更正不列入損益表，所以不影響淨利。"}, {"n": 123, "a": 4, "q": "富岡公司持有新豐公司股票 10,000 股，每股面額 $10 元。新豐公司於 X1 年 4 月 1 日宣告將發放 2 元股票股利，當日新豐公司股票市價為每股 40 元。富岡公司於 4 月 1 日應認列收入：", "o": ["$20,000", "$80,000", "$60,000", "$0"], "e": "收到股票股利時不記收入，僅改變股數。"}, {"n": 124, "a": 4, "q": "香山雜誌社於 X1 年 8 月收到訂戶匯入之款項共計 $12,000，並自 9 月起寄發一年份雜誌。X1 年度財務報表中應列報：", "o": ["收入 $12,000", "收入 $8,000", "資產 $8,000", "負債 $8,000"], "e": "預收收入於銷貨發生時轉為收入，故 X1 年共寄發 9、10、11、12 四個月份，認列 $12,000 x 4/12 = $4,000 收入，剩餘 $8,000 為流動負債。"}, {"n": 125, "a": 4, "q": "嘉南公司在 X1 年度第三季發生處分土地獲利 $50,000，這項利益：", "o": ["暫不列入第三季損益表，只需列入年度損益計算", "應平均分攤到第三季和第四季的損益表", "應追溯調整前二季損益表", "應全部列入第三季損益表"], "e": "當季發生之處分土地利益全部列入當季之損益表。"}, {"n": 126, "a": 4, "q": "甲公司於 20X4 年期初存貨為 $50,000，期末存貨為 $0，會計人員誤將當年度進貨運費 $100,000 認列為銷貨運費，則此項錯誤對 20X4 年度損益造成的影響為何？(不考慮所得稅)", "o": ["銷貨毛利少計 $100,000", "銷貨成本多計 $50,000", "營業費用少計 $100,000", "無影響"], "e": "誤將進貨運費列為銷貨運費，使進貨少計，銷貨成本少計，淨利高估 $100,000；銷貨運費(為營業費用)多計，使淨利低估 $100,000，兩者相抵銷，故選項(4)正確。"}, {"n": 127, "a": 3, "q": "甲公司去年度的銷售金額 $40,000,000，其毛利率為 40%，若今年度估計銷售金額將成長 10%，其它毛利率及成本費用數字均不變，則其稅後淨利率有何變化？", "o": ["將成長 10%", "將成長 4%", "成長將大於 10%", "成長將小於 10%"], "e": "由於成本費用不變，所以銷售增加使淨利成長大於 10%。"}, {"n": 128, "a": 3, "q": "下列何者在損益表上係以稅後金額表達？", "o": ["銷貨收入", "營業利益", "停業單位損益", "研究發展費用"], "e": "停業單位損益在損益表以稅後金額表達。"}, {"n": 129, "a": 1, "q": "已知某公司邊際貢獻率為 60%，銷貨收入 $100,000，其營運槓桿度為 2.0，試問該公司當年度固定成本及費用為何？", "o": ["$30,000", "$20,000", "$22,500", "選項(1)(2)(3)皆非"], "e": "邊際貢獻率 = 邊際貢獻 / 銷貨收入 x 100% 邊際貢獻 = $100,000 x 0.6 = $60,000 令當年度固定成本及費用 = X => 2.0 = $60,000 / ($60,000 - X), X = $30,000"}, {"n": 130, "a": 2, "q": "若公司僅生產並銷售單一產品，其營運槓桿程度為 2.0，銷售量變動 6%，則：", "o": ["EBIT 變動 15%", "EBIT 變動 12%", "每股盈餘變動 3%", "淨利變動 12%"], "e": "營運槓桿程度 = EBIT 變動% / 銷售量變動% 2.0 = EBIT 變動% / 6%，所以 EBIT 變動% = 12%"}, {"n": 131, "a": 2, "q": "若南勢公司的財務槓桿程度為 1.9，EBIT 變動 10%，則：", "o": ["銷售量變動 10%", "每股盈餘變動 19%", "淨利變動 18%", "營業毛利變動 10%"], "e": "財務槓桿程度 = EPS 變動% / EBIT 變動% 1.9 = EPS 變動% / 10%，所以 EPS 變動% = 19%"}, {"n": 132, "a": 4, "q": "銅鑼公司在 X1 年銷售了 18,000 個產品，每個產品售價為 95 元，每單位之變動成本為 55 元，固定成本為 220,000 元，請問該公司之營運槓桿程度約為：", "o": ["2.7", "4", "3.2", "1.44"], "e": "營運槓桿程度 = [Q x (P - V)] / [Q x (P - V) - F] = [18,000 x ($95 - $55)] / [18,000 x ($95 - $55) - $220,000] = 1.44"}, {"n": 133, "a": 2, "q": "某企業今年度的銷貨收入為 300 萬元，變動成本為 180 萬元，固定成本為 90 萬元，預估明年度固定成本為 120 萬元，邊際貢獻率不變，但企業希望明年度的淨利能達 50 萬元，請問其目標銷貨收入成長率應為多少？", "o": ["16.7%", "41.7%", "0%", "33.3%"], "e": "邊際貢獻率 = (300 萬元 - 180 萬元) / 300 萬元 = 40% 目標銷貨收入 = (120 萬元 + 50 萬元) / 40% = 425 萬元 銷貨收入成長率 = (425 萬元 - 300 萬元) / 300 萬元 = 41.7%"}, {"n": 134, "a": 3, "q": "甲公司經營買賣業，銷售商品單位價格為 $60，每件商品進貨成本為 $40，每件商品的變動銷售成本為 $12，固定成本為 $3,200。下列何者方案可以降低甲公司損益兩平的銷貨金額？", "o": ["降低每件商品的變動銷售成本 $2、增加固定成本 $1,000", "降低每件商品的進貨價格 $3、降低固定成本 $1,000", "提高每件商品的銷售價格 $4、增加固定成本 $1,000", "降低每件商品的進貨成本 $2、提高固定成本 $800"], "e": "目前損益兩平銷貨金額 = 3,200 / (60 - 40 - 12) x 60 = $24,000 選項(1)損益兩平銷貨金額 = 4,200 / (60 - 40 - 10) x 60 = $25,200 選項(2)損益兩平銷貨金額 = 2,200 / (57 - 40 - 12) x 57 = $25,080 選項(3)損益兩平銷貨金額 = 4,200 / (64 - 40 - 12) x 64 = $22,400 選項(4)損益兩平銷貨金額 = 4,000 / (60 - 38 - 12) x 60 = $24,000"}, {"n": 135, "a": 2, "q": "毛利率係以銷貨毛利除以：", "o": ["銷貨總額", "銷貨淨額", "銷貨成本", "進貨"], "e": "毛利率 = 銷貨毛利 / 銷貨淨額"}, {"n": 136, "a": 4, "q": "影響股價變動之因素甚多，惟綜合歸納後，其影響因素為：", "o": ["市場因素", "行業因素", "公司因素", "選項(1)(2)(3)皆是"], "e": "選項(1)因市場因素是整個交易市場內，投資人對整體市場的看法。選項(2)該公司所屬產業之前景也會影響投資意願。選項(3)公司管理當局之策略及各項控制，當然也會影響股價。"}, {"n": 137, "a": 1, "q": "泰安企業一年的採購經費是 5 億元，透過網際網路進行採購，可以輕鬆節省 1,000 萬元。也就是說，網際網路採購服務，可以幫助降低泰安企業的：", "o": ["營業成本", "研究發展費用", "折舊費用", "推銷費用"], "e": "營業成本主要成份是銷貨成本，故採購成本降低會使其營業成本降低。"}, {"n": 138, "a": 1, "q": "以下哪一個會計科目，不可能在綜合損益表中出現？", "o": ["普通股發行溢價", "停業單位損益", "銷貨退回與折讓", "研究發展費用"], "e": "普通股發行溢價為權益項下之資本公積。"}, {"n": 139, "a": 1, "q": "將於一年內發放的應付股票股利與應付現金股利在財務報表中應如何處理？", "o": ["應付股票股利為權益科目，而應付現金股利為流動負債", "應付股票股利為流動負債，而應付現金股利為權益科目", "兩者皆為流動負債", "兩者皆為權益科目"], "e": "股票股利為權益項目之變動，不列為負債，而應付現金股利需在未來以流動資產 (現金) 清償，故為流動負債。"}, {"n": 140, "a": 2, "q": "以下哪一種資訊不會在綜合損益表上揭露？", "o": ["停業單位損益", "股本溢價", "每股盈餘", "所得稅費用"], "e": "股本溢價記入資本公積，列在資產負債表權益下。"}, {"n": 141, "a": 2, "q": "公司於 X1 年購買設備，總成本 $300,000，另支付安裝費 $50,000，員工訓練費用 $10,000。設備成本應記為多少？", "o": ["$300,000", "$350,000", "$360,000", "$370,000"], "e": "設備成本包括購買成本和安裝費，員工訓練費用則不應資本化，因此成本為 $300,000 + $50,000 = $350,000。"}, {"n": 142, "a": 1, "q": "太原公司最近由國外進口自動化機器一台，發票金額為 $500,000，進口關稅 $100,000，太原公司並支付了貨櫃運費 $70,000，此機器估計耐用年限為 8 年、殘值為 $20,000，請問此機器的可折舊成本為多少？", "o": ["$650,000", "$670,000", "$480,000", "$81,250"], "e": "機器成本 = $500,000 + $100,000 + $70,000 = $670,000 可折舊成本 = 機器成本 - 殘值 = $670,000 - $20,000 = $650,000"}, {"n": 143, "a": 2, "q": "某公司帳上期初存貨 $150,000，期末盤點時剩下 $100,000，已知本期淨進貨 $100,000，進貨折扣共 $1,000，進貨運費共 $2,000，銷貨運費 $3,000，銷貨收入共 $300,000，請問該公司本期的銷貨成本應為多少？", "o": ["$210,000", "$151,000", "$90,000", "$120,000"], "e": "進貨成本 = $100,000 + $2,000 - $1,000 = $101,000 銷貨成本 = $150,000 + $101,000 - $100,000 = $151,000"}, {"n": 144, "a": 2, "q": "某企業流通在外普通股共 20,000 股，原始發行價格為每股 15 元，目前普通股每股帳面金額為 25 元，每股市價為 40 元，今年度宣告的普通股股利共有 80,000 元，請問該公司股票的收益率 (Dividend Yield) 為多少？", "o": ["7.5%", "10%", "8.0%", "13.3%"], "e": "股票收益率 (Dividend Yield) = 每股股利 / 每股市價 = ($80,000 / 20,000 股) / $40 = 0.1 = 10%"}, {"n": 145, "a": 4, "q": "下列哪些屬放綜合損益表上營業外費用的一種？", "o": ["會計政策變動影響數", "銷貨折讓", "促銷期間的贈品費用", "不動產、廠房及設備處分損失"], "e": "選項(1)會計政策變動依 IAS8 之規定，原則上應追溯重編以前年度財務報表，並以會計政策變動之累積影響數調整變動期之期初保留盈餘，不記入損益表。選項(2)銷貨折讓不屬於費用。選項(3)促銷贈品屬營業費用。"}, {"n": 146, "a": 1, "q": "大安公司 X1 年 8 月 1 日有存貨 60 件，每件成本價 $60，當月進貨 90 件，銷售 105 件，採定期盤存制及加權平均成本公式。若 X1 年 8 月 31 日存貨成本為 $2,538，請問：當月進貨單位成本為多少？", "o": ["$54", "$55", "$56.4", "$60.0"], "e": "期末存貨數量 = 60 + 90 - 105 = 45 件 加權平均單位成本 = $2,538 / 45 = $56.4 $60 x (60 / (60 + 90)) + 進貨單位成本 x (90 / (60 + 90)) = $56.4 進貨單位成本 = $54"}, {"n": 147, "a": 2, "q": "公司去年度進貨成本為 280 萬元，期末存貨比期初存貨少了 40 萬元，該公司的銷貨毛利為銷貨的 20%，銷售費用為 20 萬元，一般管理費用為 20 萬元，利息費用為 20 萬元，利息收入為 10 萬元，請問去年度該公司的營業利益為多少？", "o": ["50 萬元", "40 萬元", "30 萬元", "20 萬元"], "e": "銷貨成本 = 280 萬元 + 40 萬元 = 320 萬元 銷貨收入 = 320 萬元 / (1 - 20%) = 400 萬元 銷貨毛利 = 400 萬元 x 20% = 80 萬元 營業利益 = 80 萬元 - 20 萬元 - 20 萬元 = 40 萬元"}, {"n": 148, "a": 4, "q": "下列何者可能會造成財務所得和課稅所得認列的「暫時性差異」？", "o": ["免稅公債利息收入", "分離課稅短期票券利息收入", "研究發展支出投資抵減", "報稅上與財務報表上所使用計提折舊的方法不同"], "e": "選項(1)(2)(3)為永久性差異。選項(4)例如報稅上採定率遞減法提列折舊，而財務報表上採直線法提列折舊所造成的差異是暫時性差異。"}, {"n": 149, "a": 1, "q": "嘉義公司 X1 年間投入成本 $525,000 的原材料生產產品，尚須投入 $420,000 完工為製成品，製成品估計售價及估計銷售費用分別為 $980,000 及 $17,500。若 X1 年底原材料重置成本降至 $500,000，請問：原材料應提列多少「存貨跌價損失」？", "o": ["$0", "$17,500", "$35,000", "$70,000"], "e": "製成品成本 = $525,000 + $420,000 = $945,000 淨變現價值 = $980,000 - $17,500 = $962,500 成本 < 淨變現價值，製成品未產生跌價，原材料不須提列存貨跌價損失。"}]}, {"id": 8, "title": "第8章 每股盈餘的計算與評估", "questions": [{"n": 1, "a": 1, "q": "甲公司 X1 年底有關資料如下：10%累積特別股，每股面額$10；總面額$900,000；普通股，每股面額$10；總面額$1,000,000；稅前淨利$600,000；所得稅率 25%。若甲公司當年度流通在外股數無變動，則每股盈餘為多少？", "o": ["$3.6", "$4.5", "$5.1", "$6.3"], "e": "特別股股利 = $900,000 x 10% = $90,000 每股盈餘 = [$600,000 x (1 - 25%) - $90,000] / ($1,000,000 / $10) = $3.6"}, {"n": 2, "a": 1, "q": "X0 年初有 220,000 股，9 月 1 日增資發行 10,000 股，11 月 1 日股票分割每股分為 1.5 股，X1 年 4 月 1 日發放股票股利 10%，X1 年 10 月 1 日購回庫藏股 4,000 股，X0 年淨利$800,000，試計算 X0 年損益表之每股盈餘：", "o": ["$2.39", "$2.75", "$2.85", "$2.95"], "e": "220,000 x 1.5 x 8/12 + 230,000 x 1.5 x 2/12 + 345,000 x 2/12 = 335,000 $800,000 / 335,000 = $2.39"}, {"n": 3, "a": 3, "q": "累積特別股 5%面額$100（核准發行 1,000 股），帳面上特別股折價為$3,000、積欠股利$7,000，普通股每股面額$40，核准發行 10,000 股，已發行 8,000 股，普通股溢價為$68,000，累積盈餘為$30,000，特別股收回價格為$110，則普通股每股帳面金額為？", "o": ["$49.50", "$50.125", "$49.75", "$63.25"], "e": "權益 = ($100 x 1,000 - $3,000) + ($40 x 8,000 + $68,000) + $30,000 = $515,000 普通股每股帳面金額 = ($515,000 - $110 x 1,000 - $7,000) / 8,000 = $49.75"}, {"n": 4, "a": 4, "q": "花壇公司 X1 年底權益內容為普通股股本 3,000,000 元，股本溢價 600,000 元，法定盈餘公積 600,000 元，累積盈餘 300,000 元，若有普通股 300,000 股流通在外，則 X1 年底每股帳面金額為：", "o": ["$10", "$12", "$14", "$15"], "e": "權益 = $3,000,000 + $600,000 + $600,000 + $300,000 = $4,500,000 每股帳面金額 = $4,500,000 / 300,000 = $15"}, {"n": 5, "a": 2, "q": "下列敘述何者錯誤？", "o": ["發放普通股股票股利會降低普通股每股帳面金額", "股票股利發放後，企業現金會減少", "積欠累積優先股股利不須入帳，僅附註揭露", "股票分割會降低普通股每股帳面金額"], "e": "股票股利發放後，企業現金不變。"}, {"n": 6, "a": 3, "q": "計算每股盈餘時之庫藏股票法，係假設認股權證持有人行使權利，且公司並將因此所得之現金如何處理？", "o": ["投資一年期政府公債", "按股票年底市價購買庫藏股票", "按股票平均市價購買庫藏股票", "清償流動負債"], "e": "庫藏股票法：係指測試認股權或認股證是否具有稀釋作用之方法。此法係假定認股權或認股證持有人於期初行使權利（若認股權或認股證在期中發行，則假定於發行日行使），且公司將因此所得之現金按股票平均市價購買庫藏股票。"}, {"n": 7, "a": 3, "q": "公司將公司債轉換為普通股以及辦理盈餘轉增資，兩者對權益的影響為？", "o": ["兩者皆使內容、總額變動", "兩者內容皆變動，但總額不變", "前者內容、總額皆變動；後者內容變動，但總額不變", "選項(1)(2)(3)皆非"], "e": "前者負債減少，故權益增加，所以內容、總額皆變動，後者盈餘減少，普通股股本增加，其內容變動，總額不變。"}, {"n": 8, "a": 3, "q": "大村公司發行面額 100 元 3%累積優先股 20,000 股及面額 10 元普通股 200,000 股，保留盈餘 350,000 元，且已經兩年未發放股利，今年底可供作為發放普通股利之金額為：", "o": ["$110,000", "$120,000", "$170,000", "$70,000"], "e": "$350,000 - ($100 x 20,000 x 0.03 x 3) = $170,000"}, {"n": 9, "a": 4, "q": "股本$1,000,000，股本溢價$400,000，法定盈餘公積$100,000，未分配盈餘$500,000，若股票有 15,000 股，則每股帳面金額？", "o": ["$103.33", "$113.33", "$123.33", "$133.33"], "e": "每股帳面金額 = ($1,000,000 + $400,000 + $100,000 + $500,000) / 15,000 = $133.33"}, {"n": 10, "a": 3, "q": "以股票之每股現金股利除以每股市價，稱為：", "o": ["盈餘價格比", "股利支付率", "股利收益率", "本益比"], "e": "選項(1)盈餘價格比就是報酬率。選項(2)股利支付率 = 每股股利 / 每股盈餘。選項(4)本益比 = 每股市價 / 每股盈餘。"}, {"n": 11, "a": 1, "q": "本益比可作下列何種分析？", "o": ["投資報酬率分析", "資本結構分析", "短期償債能力分析", "資金運用效率分析"], "e": "本益比 = 每股市價 / 每股盈餘，即報酬率之倒數，本益比愈低投資報酬率愈高。"}, {"n": 12, "a": 3, "q": "採行定期盤存制的員林公司在 201X 年財務報表上列有存貨 850 萬元，但第二年發現，此存貨中有 100 萬元被重複點數，造成期末存貨高估，不論這項錯誤為管理當局有心或無心所造成，其對員林公司 201X 年財務報表的影響為何？", "o": ["只會使員林公司當年度的總資產高估", "只會使員林公司當年度的淨值高估", "使員林公司當年度的總資產、淨值、與每股盈餘高估", "只會使員林公司當年度的每股盈餘高估"], "e": "存貨虛增，總資產高估；期末存貨高估，銷貨成本低估，毛利高估，盈餘高估，淨值與每股盈餘亦高估。"}, {"n": 13, "a": 2, "q": "下列哪項方法可讓企業達到短期美化帳面盈餘的效果？", "o": ["發行公司債時選擇較低的票面利率", "設備使用期限由原先的 5 年延長至 10 年", "融資租賃支出認列為營業租賃支出", "向業主借入 1,000 萬元以支應短期資金週轉"], "e": "選項(1)公司債之利息費用受市場利率影響，不只是票面利率。選項(2)增加年限可降低每年折舊費用，增加盈餘。選項(3)將營業租賃改為融資租賃才有美化帳面的效果。選項(4)不影響盈餘。"}, {"n": 14, "a": 4, "q": "某企業採用定期盤存制，在 X1 年的期末存貨被高估$20,000，若該公司當年度所適用的稅率為 17%，請問其對該公司當年度的淨利影響為何？", "o": ["淨利被高估$12,450", "淨利被低估$12,450", "淨利被低估$20,000", "淨利被高估$16,600"], "e": "期末存貨高估，則銷貨成本低估，淨利高估，其影響為：$20,000 x (1 - 17%) = $16,600"}, {"n": 15, "a": 1, "q": "永靖企業 X2 年 12 月 31 日普通股的市價為 36 元，該公司全年流通在外普通股共 100,000 股，每股面額 10 元，該公司當年度結帳前帳上權益總額為$2,800,000，本期淨利為$600,000，X2 年中曾支付 3 元的普通股股利，請問永靖企業當天的本益比為多少？", "o": ["6", "3.6", "3", "2.4"], "e": "每股盈餘 = $600,000 / 100,000 = $6，本益比 = $36 / $6 = 6"}, {"n": 16, "a": 2, "q": "田中公司於 X1 年 1 月 1 日按溢價 20%發行 20,000 股，每股面值$10 的普通股，若 X1 年 12 月 14 日發放 10%股票股利，則該項股票股利將造成 12 月 31 日結帳時：", "o": ["流動負債增加與保留盈餘減少", "權益不變與股本增加", "權益增加與保留盈餘減少", "每股面值下跌與流通在外股數增加"], "e": "X1/12/14 發放 10%之股票股利，因小於 20%（或 25%），屬於小額股利。 X1/12/14 分錄： 保留盈餘(市價) XXX -> (權益減少) 分配股票股利(面值) XXX } (權益增加) 資本公積—股票股利 XXX } ∴權益不變，股本增加。"}, {"n": 17, "a": 4, "q": "立力公司有 35,000 股普通股流通在外，發行面額為$10。另有按面額$100 發行之 5%累積特別股 5,000 股流通在外。立力公司過去四年及今年皆未發放股利，若本年度預宣告發放$100,000 之股利，則今年底分配給特別股之股利是多少？", "o": ["$150,000", "$125,000", "$360,000", "$100,000"], "e": "$100 x 5,000 x 5% x 5 = $125,000 因為 $125,000 > $100,000 ∴$100,000 須優先做為特別股之股利。"}, {"n": 18, "a": 3, "q": "甲公司 X1 年發放股票股利，會使得該年速動比率如何變動？", "o": ["增加", "減少", "不變", "不一定"], "e": "發放股票股利並不影響資產或負債金額，故速動比率不變。"}, {"n": 19, "a": 2, "q": "甲公司 X3 年 1 月 1 日有普通股 300,000 股流通在外，4 月 1 日甲公司給予公司高級主管認股選擇權，當日成為既得，可按每股$40 認購普通股 120,000 股，至 X3 年底均未行使。甲公司普通股自 X3 年 4 月初至年底平均市價為每股$50，X3 年淨利為$477,000，則甲公司 X3 年度之稀釋每股盈餘為何？", "o": ["$1.59", "$1.50", "$1.47", "$1.22"], "e": "認股權行使所增加股數 = 120,000 - ($40 x 120,000) / $50 = 24,000 稀釋每股盈餘 = $477,000 / (300,000 + 24,000 x 9/12) = $1.5"}, {"n": 20, "a": 4, "q": "下列有關公司股票股利之敘述，何者為真？", "o": ["宣告股票股利後將使負債增加", "宣告且發放股票股利，在帳上不需作任何分錄", "發放股票股利，對於股票之每股帳面金額並不受影響", "發放股票股利，對每股盈餘之影響，需作追溯之調整"], "e": "宣告或發放股票股利並不影響負債金額，但應作會計分錄。且發放之後股數增加，每股帳面金額降低。"}, {"n": 21, "a": 1, "q": "有關公司宣告並發放股票股利和股票分割之敘述，以下何種正確？", "o": ["兩者之資產、負債及權益總額均不變", "兩者之股本總額均不變", "兩者之保留盈餘總額均減少", "兩者都只需要做備忘分錄，不用作正式會計分錄"], "e": "股票分割是將股票面額降低，股數等比例增加，僅需做備忘紀錄，不用正式會計分錄。發放股票股利是將保留盈餘轉成增資，以股票形式分配給股東，使發行在外的股票總數增加，應做正式會計分錄。股票股利和股票分割均不改變公司的資產、負債及權益總額。"}, {"n": 22, "a": 2, "q": "新營公司 X1 年度之本利比及本益比分別為 40 及 10，且其當年度每股現金股利為$2，則該公司當年度每股盈餘若干？", "o": ["$4", "$8", "$10", "$20"], "e": "本利比 = 每股市價 / 每股股利 = 40，所以每股市價 = 40 x $2 = $80 本益比 = 每股市價 / 每股盈餘 = 10，所以每股盈餘 = $80 / 10 = $8"}, {"n": 23, "a": 2, "q": "甲公司於 8 月 10 日向乙公司購貨，金額$42,000，授信條件是 2/10，n/30。甲公司在 8 月 19 日支付該筆款項，則下列何者為甲公司在 8 月 19 日正確的分錄？", "o": ["借記應付帳款$41,160", "貸記現金$41,160", "貸記應付帳款$41,160", "貸記現金$42,000"], "e": "$42,000 x 98% = $41,160"}, {"n": 24, "a": 4, "q": "下列的會計處理，何者正確？", "o": ["公司宣布發放股票股利，分錄中「待分配股票股利」已列入負債科目", "處分不動產、廠房及設備的收益，應以稅後淨額轉入資本公積，不列為當年度的營業外收益", "投資以後年度收到被投資公司所發放的股票股利時，可以股利收入入帳，列為營業外收入", "公司發行累積特別股，其積欠股利未列入負債，僅以附註揭露"], "e": "選項(1)待分配股票股利並非負債科目，應列入權益項下。選項(2)處分不動產、廠房及設備之損益應列為當年度之營業外損益。選項(3)投資以後年度收到被投資公司所發放的股票股利時，不可以股利收入入帳，而應僅作備忘記錄。"}, {"n": 25, "a": 3, "q": "所謂的稀釋每股盈餘是指企業在計算每股盈餘時要另行考慮下列那些影響？", "o": ["淨利受到企業當年度的停業單位損益的影響", "停業單位損益可能增加或減少的流通在外普通股股數", "可轉換證券可能增加企業流通在外普通股股數的影響", "可轉換證券可能對企業所帶來的潛在利益"], "e": "稀釋每股盈餘即考慮了稀釋性證券，如：可轉換證券、認股權證等流通在外普通股股數的影響。"}, {"n": 26, "a": 4, "q": "大方公司 20X4 年度稅後淨利為$100,000，股東權益包含：8%不可轉換特別股 50,000 股、每股面額$10 以及普通股 100,000 股、每股面額$30，兩種股票均全年流通在外。當普通股每股市價為$60 時，則該公司 20X4 年度的本益比為多少？", "o": ["0.01", "0.6", "50", "100"], "e": "EPS = ($100,000 - $10 x 50,000 x 8%) / 100,000 = $0.6 P/E ratio = $60 / $0.6 = 100"}, {"n": 27, "a": 4, "q": "大林公司去年度的銷貨毛利為 2,000 萬元，毛利率為 20%，稅前純益率為 10%，企業的所得稅率為 17%，該公司去年度的淨利為：", "o": ["622.5 萬元", "102 萬元", "124.5 萬元", "830 萬元"], "e": "稅前純益 = 2,000 萬元 / 20% x 10% = 1,000 萬元 稅後淨利 = 1,000 萬元 x (1 - 17%) = 830 萬元"}, {"n": 28, "a": 2, "q": "公司的每股盈餘會因下列何種情事而下降？", "o": ["結清應付帳款", "認列處分房屋損失", "銷貨收入上升", "減少現金股利發放"], "e": "選項(1)(4)不影響每股盈餘，選項(2)認列處分房屋損失使盈餘減少，因此使每股盈餘下降。選項(3)使每股盈餘上升。"}, {"n": 29, "a": 1, "q": "在理論上，本益比最主要之決定因素為：", "o": ["盈餘成長率", "殖利率", "普通股股本", "負債比率"], "e": "本益比 = 每股市價 / 每股盈餘，所以決定因素為企業的盈餘成長率對市價之影響。"}, {"n": 30, "a": 2, "q": "如果公司使用加速折舊法，則與直線折舊法相比，其折舊費用將如何變動？", "o": ["前期折舊費用較低，後期折舊費用較高", "前期折舊費用較高，後期折舊費用較低", "各期折舊費用相同", "折舊費用與市場價格相關"], "e": "加速折舊法使得資產在使用初期折舊費用較高，後期逐漸降低。"}, {"n": 31, "a": 2, "q": "以下哪一項交易，會影響企業在期末報表所顯示的本期每股盈餘金額？", "o": ["期中受贈土地", "期中發放股票股利", "期中發發現金股利", "期末賒購辦公設備"], "e": "選項(1)受贈資產記入資本公積，不影響淨利。選項(2)發放股票股利會增加流通在外股數，降低每股盈餘。選項(3)、(4)不影響淨利。"}, {"n": 32, "a": 4, "q": "以下哪一項年度中發生之交易，不會影響企業的基本每股盈餘？", "o": ["發放非累積特別股股利", "在市場上買回流通在外股票、增加庫藏股票餘額", "以買進時成本價再度賣出庫藏股票", "提撥指定用途保留盈餘"], "e": "選項(1)減少計算基本每股盈餘的分子。選項(2)減少流通在外股數，增加每股盈餘。選項(3)增加流通在外股數，減少每股盈餘。"}, {"n": 33, "a": 3, "q": "將利息收入誤列為營業收益，將使當期營業淨利：", "o": ["不變", "虛減", "虛增", "視利息費用高低而決定"], "e": "利息收入為營業外收入，故使營業淨利虛增。"}, {"n": 34, "a": 2, "q": "公司的每股盈餘會因下列何種情事而改善？", "o": ["營業外收入減少", "利息費用減少", "銷貨收入減少", "減少現金股利發放"], "e": "選項(1)(3)皆使每股盈餘減少。選項(2)利息費用減少使盈餘增加。選項(4)不影響每股盈餘。"}, {"n": 35, "a": 1, "q": "民雄公司去年底財務報表上列有銷貨毛利 6,000 萬元，營業費用 1,000 萬元，營業外收入 200 萬元，營業外費用 2,000 萬元，遞延所得稅 1,000 萬元，所得稅費用 500 萬元，則其稅後淨利為：", "o": ["2,700 萬元", "1,700 萬元", "2,300 萬元", "3,200 萬元"], "e": "稅後淨利 = 6,000 萬元 - 1,000 萬元 + 200 萬元 - 2,000 萬元 - 500 萬元 = 2,700 萬元"}, {"n": 36, "a": 3, "q": "在既定之本益比及股利支付數額下，股利支付率愈高者，表示其股票之市價：", "o": ["無影響", "愈高", "愈低", "不一定"], "e": "股利支付率 = 每股股利 / 每股盈餘，股利固定，支付率高表示每股盈餘較低；本益比固定，每股盈餘較低表示市價也較低。"}, {"n": 37, "a": 1, "q": "普通股市價下降，其股利支付率將： (假設其他一切條件不變)", "o": ["不變", "不一定", "上升", "下降"], "e": "股利支付率 = 每股股利 / 每股盈餘，市價改變對其不影響。"}, {"n": 38, "a": 2, "q": "發放股票股利，理論上將使本益比： (假設其他一切條件不變)", "o": ["降低", "不變", "提高", "不一定"], "e": "發放股票股利，會增加股數，使每股盈餘降低，但市價也會等比率調整，所以本益比在理論上是不變的。"}, {"n": 39, "a": 3, "q": "甲公司對於乙公司持股比例為 45%並擁有控制能力，若乙公司某一年度之淨利為正數但並未宣告任何股利，則此事實對甲公司之影響為：", "o": ["流動比率增加", "存貨週轉率增加", "每股盈餘增加", "每股帳面金額下降"], "e": "此事實將使甲公司之「長期投資」、「投資損益」、「保留盈餘」增加，故將使每股盈餘增加。"}, {"n": 40, "a": 2, "q": "乙公司為甲公司 100%持股之子公司。甲、乙兩公司全年流通在外之普通股股數分別 10,000 股及 3,000 股。兩家公司皆未發行潛在普通股。合併每股盈餘為：", "o": ["甲公司淨利 / 13,000 股", "甲公司淨利 / 10,000 股", "(甲公司淨利 + 子公司淨利) / 13,000 股", "(甲公司淨利 + 子公司淨利) / 10,000 股"], "e": "當子公司無潛在普通股時，合併每股盈餘之計算方式與母公司每股盈餘之計算方式相同。"}, {"n": 41, "a": 3, "q": "計算基本每股盈餘之分子時，下列項目何者是無論公司當期是否宣告發放股利，都必須自本期純益減除者？", "o": ["所有特別股之股利", "參加特別股之股利", "累積特別股之股利", "可轉換公司債之利息"], "e": "發行累積特別股者，其當年度股利不論是否發放，應自本期純益 (損) 減除。"}, {"n": 42, "a": 4, "q": "甲公司 X1 年初流通在外普通股股數為 60,000 股。該公司 X1 年初另有按面額發行之 6%可轉換公司債 3,500 張，每張面額$100，每張公司債可轉換為 3 股普通股，X1 年無實際轉換發生。X1 年度淨利為$700,000，稅率為 20%，則該公司 X1 年度之稀釋每股盈餘為：", "o": ["$5.125", "$8.230", "$5.625", "$10.167"], "e": "稀釋每股盈餘 = [$700,000 + $100 x 6% x 3,500(1 - 20%)] / (60,000 + 3,500 x 3) = $10.167"}, {"n": 43, "a": 1, "q": "大大公司 20X3 年 1 月 1 日流通在外普通股有 100,000 股，3 月 1 日發放股票股利 20,000 股，9 月 1 日增資發行新股 30,000 股，20X3 年稅後純益為$1,860,000，則 20X3 年普通股每股盈餘為：", "o": ["$14.31", "$15.17", "$13.23", "$11.24"], "e": "$1,860,000 / (100,000 + 20,000 + 30,000 x 4/12) = $14.31"}, {"n": 44, "a": 3, "q": "每股盈餘之計算公式為：", "o": ["普通股股利 / 普通股期末流通在外股數", "保留盈餘 / 普通股期末流通在外股數", "(淨利 - 特別股股利) / 加權平均流通在外普通股股數", "普通股享有之淨利 / 普通股期末流通在外股數"], "e": "公式 = (淨利 - 特別股股利) / 加權平均流通在外普通股股數"}, {"n": 45, "a": 3, "q": "大華公司 X1 年底各帳戶之餘額為：現金$15,000、應收帳款$12,000、設備$85,000、應付帳款$4,000、預收收入$2,000、普通股股本$50,000及庫藏股$2,800。另外，保留盈餘在 X1 年期初餘額為$44,000，本期發發現金股利$3,400。請問該公司 X1 年之本期淨利為多少？", "o": ["$11,400", "$12,600", "$18,200", "$22,300"], "e": "X1 年底保留盈餘 = (15,000 + 12,000 + 85,000) - (4,000 + 2,000) - (50,000 - 2,800) = $58,800 本期淨利 = 58,800 + 3,400 - 44,000 = $18,200"}, {"n": 46, "a": 4, "q": "下列有關普通股每股淨值的敘述，何者正確？ 甲.每股淨值不能低於每股之面額；乙.每股淨值不能為負值；丙.每股淨值為總資產除以流通在外股數；丁.每股淨值等於普通股權益除以流通在外股數", "o": ["僅甲和乙", "僅乙和丙", "僅乙和丁", "僅丁"], "e": "甲：淨值還是有低於面額的可能。乙：當資產小於負債時，淨值就是負值了。丙：每股淨值為普通股權益除以流通在外股數。"}, {"n": 47, "a": 1, "q": "大南公司之資料如下，X1 年度純益$6,000,000，所得稅率 17%，普通股 400,000 股，全年流通在外，每股面額$10。另有 5%累積可轉換特別股 600,000 股，每股面額$100，可轉換成普通股 3 股；可轉換公司債$6,000,000，票面利率 6%，平價發行，每$1,000 面額可轉換成普通股 20 股。試問其基本每股盈餘為何？", "o": ["$7.5", "$5", "$8.775", "$6.6"], "e": "基本每股盈餘 = [$6,000,000 - ($100 x 600,000 x 5%)] / 400,000 = $7.5"}]}, {"id": 9, "title": "第9章 盈餘的評估與預測", "questions": [{"n": 1, "a": 3, "q": "資產負債表外負債愈多，則其盈餘品質：", "o": ["愈高", "沒有影響", "愈低", "不一定"], "e": "盈餘實際的波動性會較帳面上為大。"}, {"n": 2, "a": 3, "q": "下列敘述何者通常為真？", "o": ["會計政策變動之累積影響數可預測性高", "其他收入的可預測性與停業單位損益一樣", "營業收入的可預測性較其他收入為高", "選項(1)(2)(3)皆非"], "e": "愈經常性發生的科目，其可預測性是愈高的，故營業收入的可預測性大於其他收入，而會計政策變動之累積影響數可預測性低。"}, {"n": 3, "a": 4, "q": "下列敘述何者是盈餘操縱動機？", "o": ["逃漏稅", "維持良好的產業關係", "增加管理人員的薪資紅利", "選項(1)(2)(3)皆可能"], "e": "上述皆會因盈餘的品質受到影響，也造成盈餘操縱的動機。"}, {"n": 4, "a": 3, "q": "公司折舊方式由直線法改為加速折舊法，則其本益比（假設其他條件不變）？", "o": ["不變", "較原來的低", "較原來的高", "無法判斷"], "e": "盈餘下降，其本益比應較高。"}, {"n": 5, "a": 3, "q": "隆田公司生產電視，則下列哪些事件，可能會造成投資人降低對隆田公司的盈餘預測？ 甲.一般原物料物價水準上漲；乙.接到來自美國的大訂單；丙.供應商宣布調升原料價格；丁.主計處調降明年預估經濟成長率", "o": ["僅甲及丙", "僅丙及丁", "僅甲、丙及丁", "甲、乙、丙、丁"], "e": "訂單增加，則預期公司收入增加，預期公司盈餘增加。"}, {"n": 6, "a": 4, "q": "甲公司把下一期的銷貨當作本期的銷貨，為：", "o": ["透過事件之發生或承認達到平滑盈餘之目的", "透過不同期間之分攤達到平滑盈餘之目的", "透過分類達到平滑盈餘之目的", "盈餘操縱"], "e": "公司用不正當的手段，來修飾盈餘，則為盈餘操縱。"}, {"n": 7, "a": 1, "q": "甲.地震損失；乙.日常銷貨；丙.折舊方法改變；丁.購買產品生產用之原料，上述哪些為非經常性活動？", "o": ["僅甲、丙", "僅丙、丁", "僅甲、丙、丁", "甲、乙、丙、丁"], "e": "乙、丁為經常性之活動。"}, {"n": 8, "a": 4, "q": "甲.暫時性盈餘；乙.企業風險；丙.會計政策，哪些會影響盈餘的品質？", "o": ["僅甲及乙", "僅乙及丙", "僅甲及丙", "甲、乙、丙"], "e": "上述皆會影響公司盈餘品質。"}, {"n": 9, "a": 2, "q": "甲公司產業循環為成長期，而乙公司產業循環為成熟期，資本結構相同下，則甲公司的本益比應如何？", "o": ["低", "高", "相等", "沒影響"], "e": "甲公司的成長率較高，本益比較高。"}, {"n": 10, "a": 4, "q": "下列何者會影響盈餘品質的因素？", "o": ["會計政策的選擇", "資產變現之風險性", "現金流量與盈餘關係", "選項(1)(2)(3)皆是"], "e": "會計政策的選擇，資產變現之風險性及現金流量與盈餘關係皆是影響盈餘品質的因素。"}, {"n": 11, "a": 4, "q": "下列何者是影響盈餘品質的因素？", "o": ["會計政策之選擇", "任意性成本", "管理者操控", "選項(1)(2)(3)皆會有影響"], "e": "選項(1)穩健的會計政策，盈餘品質較好。選項(2)有些公司盈餘高，可能是大幅縮減任意性成本所致如廣告費，日後可能不利之影響。選項(3)管理者操控會影響盈餘波動。選項(4)正確，以上皆會有影響。"}, {"n": 12, "a": 4, "q": "某公司將一批進貨，開立兩張支票，跨越兩個財務年度，為：", "o": ["透過事件之發生或承認達到平滑之目的", "透過不同期間之分攤達到平滑之目的", "透過分類達到平滑之目的", "盈餘操縱"], "e": "公司用不正當的手段，來修飾盈餘，則為盈餘操縱。"}, {"n": 13, "a": 3, "q": "某公司股票 X1 年初之市價為$50，每年支付股利$3，預計 X1 年底股票市價$58，則該投資之預期報酬率若干？", "o": ["5%", "15%", "22%", "25%"], "e": "除了市價上漲部分外，現金股利也要考慮進去。 預期報酬率 = ($58 - $50 + $3) / $50 = 22%"}, {"n": 14, "a": 3, "q": "無塵晶圓現有本益比為 30，今市場傳出幾項分析師預測，假設其他情形不變，請問以下哪一項預測，對其本益比會有負面影響？", "o": ["預測無塵股票的系統性風險係數會下降", "預測無塵的營業槓桿率下降", "預測無塵的每股盈餘將會繼續成長，但是成長率由原先的 25%降為 20%", "預測無塵的財務槓桿率下降"], "e": "選項(1)系統性風險係數下降代表公司受系統性風險影響變小，獲利將更穩定。選項(2)營業槓桿率下降代表盈餘受銷貨變動之影響變小，獲利和預期不會相差太遠。選項(4)財務槓桿率下降代表每股盈餘受稅前息前盈餘變動影響變小，獲利不會和預期相差太遠。"}, {"n": 15, "a": 2, "q": "在損益表
